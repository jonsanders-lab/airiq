COMPRESSORS — always recommend in this order:

function formatMsg(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<p style="font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#64748b;margin:12px 0 4px">$1</p>')
    .replace(/^## (.+)$/gm, '<p style="font-weight:600;margin:10px 0 4px">$1</p>')
    .replace(/^- (.+)/gm, '<div style="display:flex;gap:8px;margin:3px 0"><span style="color:#94a3b8;flex-shrink:0">•</span><span>$1</span></div>')
    .replace(/^(\d+)\. (.+)/gm, '<div style="display:flex;gap:8px;margin:3px 0"><span style="color:#94a3b8;flex-shrink:0;min-width:16px">$1.</span><span>$2</span></div>')
    .replace(/\n\n/g, '<br/>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer" style="color:#1d4ed8;text-decoration:underline">$1 ↗</a>')
    .replace(/\n/g, '<br/>');
}

      i.id === p.id ||
      (i.name || "").toLowerCase() === (p.displayName || p.name || "").toLowerCase() ||

    );

    const available = inv?.available ?? inv?.quantityAvailable ?? null;
    return {
      name: p.displayName || p.name,
      price: p.price != null ? `$${Number(p.price).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}` : "N/A",
      sku: p.code || p.sku || "N/A",
      active: p.active,
      onHand,
      available,
    };
  });

  inventoryItems.forEach(inv => {
    const name = inv.name || inv.displayName || "";
    if (!merged.find(m => (m.name || "").toLowerCase() === name.toLowerCase())) {
      const onHand = inv.onHand ?? inv.quantity ?? inv.quantityOnHand ?? null;
      const available = inv.available ?? inv.quantityAvailable ?? null;
      merged.push({
        name,
        price: "N/A",
        sku: inv.code || inv.sku || "N/A",
        active: inv.active,
        onHand,
        available,
      });
    }
  });

  const lines = merged.map(item => {
    const onHandStr = item.onHand !== null ? `${item.onHand} units` : "not tracked";
    const availStr = item.available !== null ? `${item.available} units` : "not tracked";
    return `${item.name} | Price: ${item.price} | On Hand: ${onHandStr} | Available: ${availStr} | SKU: ${item.sku} | Active: ${item.active}`;
  });

  return "\n\n=== LIVE SERVICETITAN DATA (pricebook + inventory) ===\n" +
    lines.join("\n") +
    "\nSource: Live pull from ServiceTitan. Present price, on-hand, and available quantities clearly using the format in your instructions.";
}

const STARTERS = [
  "What compressor for 125 CFM at 150 PSI?",
  "Price and stock on HD30?",
  "Do we have a HAD85 in stock?",
  "Customer says Atlas Copco is cheaper — how do I respond?",
];

const MODEL_REGEX = /\b(H[DBVATC][A-Z]?\d{1,3}[A-Z]?|HTM[-\s]?\d+|HAD\d+|HBD\s?\d+|HVD\s?\d+|HDD\s?\d+|HTV\s?\d+|IMPETUS\s?\d+|EAGLE\s?\d+|[A-Z]{2,6}[-\s]?\d{2,4}[A-Z]?)\b/gi;
const INTENT_REGEX = /\b(price|pricing|cost|available|availability|stock|in.?stock|on.?hand|how much|do you have|do we have|quantity|qty|can i get)\b/i;

function AirIQ() {
  const [messages, setMessages] = React.useState([]);
  const [input, setInput] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [showStarters, setShowStarters] = React.useState(true);
  const [isListening, setIsListening] = React.useState(false);
  const [stLookupActive, setStLookupActive] = React.useState(false);
  const bottomRef = React.useRef(null);
  const recognitionRef = React.useRef(null);
  const textareaRef = React.useRef(null);

  React.useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, loading]);

  const startListening = () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert("Voice not supported on this browser. Try Chrome.");
      return;
    }
    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.continuous = true;
    recognition.interimResults = false;
    recognitionRef.current = recognition;
    recognition.onstart = () => setIsListening(true);
    recognition.onend = () => setIsListening(false);
    recognition.onerror = () => setIsListening(false);
    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      setInput(transcript);
      setTimeout(() => autoResize(), 50);
    };
    recognition.start();
  };

  const autoResize = () => {
    const el = textareaRef.current;
    if (!el) return;
    el.style.height = "40px";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  };

  const submit = async (text) => {
    const msg = text || input.trim();
    if (!msg || loading) return;
    setShowStarters(false);
    setInput("");
    if (textareaRef.current) textareaRef.current.style.height = "40px";

    const newMsgs = [...messages, { role: "user", content: msg }];
    setMessages(newMsgs);
    setLoading(true);
    setStLookupActive(false);

    const modelMatches = msg.match(MODEL_REGEX);
    const hasIntent = INTENT_REGEX.test(msg);
    const needsST = !!(modelMatches && hasIntent) || hasIntent;
    const searchTerms = needsST
      ? (modelMatches ? [...new Set(modelMatches)].slice(0, 3) : [msg.replace(INTENT_REGEX, "").trim().slice(0, 40)])
      : [];

    if (needsST) setStLookupActive(true);

    const stTool = {
      name: "lookup_servicetitan_pricing",
      description: "Look up live pricing and stock availability for equipment in ServiceTitan. Only call this when the rep explicitly asks about price, cost, stock, or availability.",
      input_schema: {
        type: "object",
        properties: {
          search_term: { type: "string", description: "The model number or equipment name to search for" }
        },
        required: ["search_term"]
      }
    };

    const stInstruction = needsST
      ? `\n\n=== SERVICETITAN LIVE LOOKUP AVAILABLE ===\nThe rep is asking about pricing or stock for: ${searchTerms.join(", ")}. Call lookup_servicetitan_pricing now with each search term to get live data before responding.`
      : "";

    try {
      const res1 = await fetch("/api/claude", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 2000,
          system: SYS + stInstruction,
          messages: newMsgs.map((m) => ({ role: m.role, content: m.content })),
          tools: [
            { type: "web_search_20250305", name: "web_search" },
            stTool
          ],
        }),
      });
      const data1 = await res1.json();
      if (data1.error) throw new Error(data1.error.message);

      const toolUseBlock = (data1.content || []).find(b => b.type === "tool_use" && b.name === "lookup_servicetitan_pricing");

      let finalReply = "";
      let stDataUsed = false;
      let webSearched = (data1.content || []).some(b => b.type === "tool_use" && b.name === "web_search");

      if (toolUseBlock) {
        const searchTerm = toolUseBlock.input.search_term || searchTerms[0] || "";
        let stResult = "No data found.";
        try {
          const workerRes = await fetch("/api/st", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              endpoint: `/pricebook/v2/tenant/${ST_TENANT}/equipment?`,
              tenant: ST_TENANT,
              appKey: ST_APP_KEY,
              clientId: ST_CLIENT_ID,
              clientSecret: ST_CLIENT_SECRET,
              searchTerm: searchTerm,
            }),
          });
          if (workerRes.ok) {
            const workerData = await workerRes.json();
            const pricebookItems = workerData.data || [];
            let inventoryItems = [];
            try {
              const invRes = await fetch(`/api/inventory?q=${encodeURIComponent(searchTerm)}`);
              if (invRes.ok) {
                const invData = await invRes.json();
                inventoryItems = (invData.items || []).flatMap(item =>
                  (item.rawRows || []).filter(r =>
                    r.location && ['inventory','warehouse'].some(w => r.location.toLowerCase().includes(w))
                  ).map(r => ({
                    name: r.name,
                    code: r.code,
                    onHand: r.quantityOnHand,
                    available: r.quantityAvailable,
                    onOrder: r.quantityOnOrder,
                    location: r.location,
                  }))
                );
              }
            } catch(invErr) {
              console.log("Inventory cache lookup failed:", invErr.message);
            }
            if (pricebookItems.length > 0 || inventoryItems.length > 0) {
              stDataUsed = true;
              stResult = buildSTContext(pricebookItems, inventoryItems);
            } else {
              stResult = `No matching equipment found for "${searchTerm}" in ServiceTitan pricebook or inventory.`;
            }
          }
        } catch(stErr) {
          console.log("ST lookup failed:", stErr.message);
        }

        const res2 = await fetch("/api/claude", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 2000,
            system: SYS + stInstruction,
            messages: [
              ...newMsgs.map((m) => ({ role: m.role, content: m.content })),
              { role: "assistant", content: data1.content },
              { role: "user", content: [{ type: "tool_result", tool_use_id: toolUseBlock.id, content: stResult }] }
            ],
            tools: [
              { type: "web_search_20250305", name: "web_search" },
              stTool
            ],
          }),
        });
        const data2 = await res2.json();
        if (data2.error) throw new Error(data2.error.message);
        finalReply = (data2.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
        webSearched = webSearched || (data2.content || []).some(b => b.type === "tool_use" && b.name === "web_search");
      } else {
        finalReply = (data1.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
      }

      setStLookupActive(false);
      setMessages([...newMsgs, { role: "assistant", content: finalReply, webSearched, stDataUsed }]);
    } catch (err) {
      setStLookupActive(false);
      setMessages([...newMsgs, { role: "assistant", content: `⚠️ ${err.message}`, error: true }]);
    }
    setLoading(false);
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", maxHeight:640, background:"#0f1117", fontFamily:"system-ui,sans-serif" }}>

      {/* Header */}
      <div style={{ padding:"0", background:"#000", borderBottom:"1px solid #2a2d3a", display:"flex", alignItems:"center", gap:0, flexShrink:0 }}>

        <div style={{ width:"1px", height:40, background:"#2a2d3a", margin:"0 12px" }} />
        <span style={{ fontWeight:700, fontSize:13, color:"#f0f2f8", letterSpacing:"0.06em" }}>AirIQ</span>

        </span>
        <span style={{ fontSize:11, padding:"3px 10px", borderRadius:20, background:"#1e2535", border:"1px solid #2a3a55", color:"#60a5fa", fontWeight:500, display:"flex", alignItems:"center", gap:4, marginLeft:8, marginRight:4 }}>

          }
        </span>
      </div>

      {/* Messages */}
      <div style={{ flex:1, overflowY:"auto", padding:"20px 16px", display:"flex", flexDirection:"column", gap:14, background:"#0f1117" }}>

        {messages.length === 0 && (
          <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:8, padding:32 }}>
            <div style={{ fontSize:32, marginBottom:4 }}>💨</div>
            <div style={{ fontWeight:600, fontSize:15, color:"#f0f2f8" }}>Ready for your reps</div>
            <div style={{ fontSize:13, color:"#6b7280", textAlign:"center", maxWidth:300, lineHeight:1.6 }}>
              Ask about product specs, applications, objections — or check live pricing and stock by model number.
            </div>
          </div>
        )}

        {messages.map((m, i) => {
          const isUser = m.role === "user";
          return (
            <div key={i} style={{ display:"flex", flexDirection:"column", alignSelf: isUser ? "flex-end" : "flex-start", maxWidth:"90%", gap:4 }}>
              <div style={{ display:"flex", gap:10, flexDirection: isUser ? "row-reverse" : "row" }}>
                <div style={{ width:28, height:28, borderRadius:"50%", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:600, background: isUser ? "#e87c2a" : "#2a2d3a", color: isUser ? "#fff" : "#9ca3af" }}>
                  {isUser ? "Rep" : "AI"}
                </div>
                <div style={{ padding:"10px 14px", borderRadius: isUser ? "12px 4px 12px 12px" : "4px 12px 12px 12px", fontSize:14, lineHeight:1.65, background: isUser ? "#e87c2a" : "#1a1d27", color: isUser ? "#fff" : "#e2e6f0", border: isUser ? "none" : "1px solid #2a2d3a", maxWidth:"100%" }}>
                  {isUser
                    ? m.content
                    : <span dangerouslySetInnerHTML={{ __html: formatMsg(m.content) }} />
                  }
                </div>
              </div>
              {!isUser && (m.webSearched || m.stDataUsed) && (
                <div style={{ display:"flex", gap:6, paddingLeft:38 }}>
                  {m.stDataUsed && (
                    <span style={{ fontSize:10, padding:"2px 8px", borderRadius:20, background:"#1e2535", color:"#60a5fa", border:"1px solid #2a3a55", fontWeight:500 }}>
                      📊 Live ST data
                    </span>
                  )}
                  {m.webSearched && (
                    <span style={{ fontSize:10, padding:"2px 8px", borderRadius:20, background:"#1a1d27", color:"#6b7280", border:"1px solid #2a2d3a" }}>
                      🔍 searched vendor sites
                    </span>
                  )}
                </div>
              )}
            </div>
          );
        })}

        {loading && (
          <div style={{ display:"flex", gap:10, alignSelf:"flex-start" }}>
            <div style={{ width:28, height:28, borderRadius:"50%", background:"#2a2d3a", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:600, color:"#9ca3af" }}>AI</div>
            <div style={{ padding:"12px 16px", borderRadius:"4px 12px 12px 12px", background:"#1a1d27", border:"1px solid #2a2d3a", display:"flex", gap:5, alignItems:"center" }}>
              {stLookupActive && <span style={{ fontSize:11, color:"#1d4ed8", marginRight:4 }}>Checking ST…</span>}
              {[0,1,2].map(i => (
                <div key={i} style={{ width:6, height:6, borderRadius:"50%", background:"#4b5563", animation:"pulse 1.2s infinite", animationDelay:`${i*0.2}s` }} />
              ))}
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      {/* Starter prompts */}
      {showStarters && (

          {STARTERS.map((s, i) => (

              onMouseEnter={e => { e.target.style.background="#2a2d3a"; e.target.style.color="#f0f2f8"; }}
              onMouseLeave={e => { e.target.style.background="#1a1d27"; e.target.style.color="#9ca3af"; }}>
              {s}
            </button>
          ))}
        </div>
      )}

        {VENDORS.map((v, i) => (
          <a key={i} href={v.url} target="_blank" rel="noopener noreferrer"
            style={{ fontSize:11, fontWeight:600, padding:"3px 10px", borderRadius:20, background:"#1e2535", color:"#60a5fa", textDecoration:"none", display:"flex", alignItems:"center", gap:4, border:"1px solid #2a3a55" }}>
            <span style={{ fontSize:8 }}>↗</span>{v.short}
          </a>
        ))}
        <span style={{ fontSize:11, color:"#4b5563", marginLeft:"auto", alignSelf:"center" }}>vendor resources</span>
      </div>

      {/* Input */}
      <div style={{ padding:"12px 16px", borderTop:"1px solid #2a2d3a", display:"flex", gap:8, background:"#1a1d27", flexShrink:0 }}>
        <textarea
          ref={textareaRef}
          value={input}
          onChange={e => { setInput(e.target.value); autoResize(); }}
          onKeyDown={e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();submit();} }}
          placeholder="Ask a question or check availability — e.g. 'price and stock on HD30'"
          style={{ flex:1, resize:"none", border:"1px solid #2a2d3a", borderRadius:8, padding:"8px 12px", fontSize:14, fontFamily:"inherit", outline:"none", height:40, minHeight:40, maxHeight:120, lineHeight:1.5, color:"#e2e6f0", background:"#0f1117" }}
        />
        <button
          onClick={startListening}
          disabled={loading}
          style={{ width:40, height:40, borderRadius:8, border:"none", background: isListening ? "#7f1d1d" : "#1e2535", color: isListening ? "#f87171" : "#60a5fa", cursor: loading ? "not-allowed" : "pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"all .15s" }}>

            <path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>

          onClick={() => submit()}
          disabled={loading || !input.trim()}
          style={{ width:40, height:40, borderRadius:8, border:"none", background: loading||!input.trim() ? "#1e2535" : "#e87c2a", color:"#fff", cursor: loading||!input.trim() ? "not-allowed" : "pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"background .15s" }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

      <style>{`
        @keyframes pulse{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AirIQ));
  </script>
</body>
</html>
