function MarketIntel() {
  const BRANCHES    = ["Atlanta","Charlotte","Tampa","Greenville","Nashville","Dallas","Detroit","Cleveland","Chicago"];
  const COMPETITORS = ["Diversified Air Systems","Kaeser","Atlas Copco","Compressed Air Systems","Other"];
  const CATEGORIES  = ["Parts","Labor","Equipment","Other"];
  const today = new Date().toISOString().slice(0,10);

  const hodgeInputRef = React.useRef(null);
  const compInputRef  = React.useRef(null);
  const [header, setHeader]         = React.useState({ branch:"", repName:"", competitor:"", customer:"", equipmentModel:"", quoteDate:today });
  const [item, setItem]             = React.useState({ description:"", category:"Parts", hodgePrice:"", competitorPrice:"" });
  const [lineItems, setLineItems]   = React.useState([]);
  const [busy, setBusy]             = React.useState(false);
  const [saveMsg, setSaveMsg]       = React.useState("");
  const [hodgeFile, setHodgeFile]   = React.useState(null);
  const [compFile, setCompFile]     = React.useState(null);
  const [comparing, setComparing]   = React.useState(false);
  const [compareMsg, setCompareMsg] = React.useState("");
  const [feedbackOpen, setFeedbackOpen] = React.useState(false);

  function hf(k,v) { setHeader(p => ({...p, [k]:v})); }
  function itf(k,v) { setItem(p => ({...p, [k]:v})); }

  function recalc(row) {
    const h = row.hodgePrice, c = row.competitorPrice;
    return {...row, delta: h-c, pct: c!==0 ? (h-c)/c*100 : null};
  }

  function addItem() {
    if (!item.description.trim()) return;
    const h = parseFloat(item.hodgePrice) || 0;
    const c = parseFloat(item.competitorPrice) || 0;
    setLineItems(p => [...p, recalc({ description:item.description.trim(), category:item.category, hodgePrice:h, competitorPrice:c, equipmentModel:"" })]);
    setItem({ description:"", category:item.category, hodgePrice:"", competitorPrice:"" });
  }
  function removeItem(i) { setLineItems(p => p.filter((_,idx) => idx !== i)); }
  function updateHodgePrice(i, val) {
    setLineItems(p => p.map((row,idx) => idx!==i ? row : recalc({...row, hodgePrice: parseFloat(val)||0})));
  }
  function updateCompPrice(i, val) {
    setLineItems(p => p.map((row,idx) => idx!==i ? row : recalc({...row, competitorPrice: parseFloat(val)||0})));
  }

  function handleReset() {
    setHodgeFile(null);
    setCompFile(null);
    setLineItems([]);
    setHeader({ branch:"", repName:"", competitor:"", customer:"", equipmentModel:"", quoteDate:today });
    setItem({ description:"", category:"Parts", hodgePrice:"", competitorPrice:"" });
    setCompareMsg("");
    setSaveMsg("");
  }

  function handleHodgeFile(e) {
    const file = e.target.files[0]; if (!file) return; e.target.value = "";
    setHodgeFile(file); setCompareMsg("");
  }
  function handleCompFile(e) {
    const file = e.target.files[0]; if (!file) return; e.target.value = "";
    setCompFile(file); setCompareMsg("");
  }

  async function handleCompare() {
    setComparing(true); setCompareMsg("");
    try {
      function toBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }
      const [hodgeBase64, compBase64] = await Promise.all([toBase64(hodgeFile), toBase64(compFile)]);
      const res = await fetch("/api/market-intel/compare", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          hodgeBase64, hodgeMimeType: hodgeFile.type,
          compBase64,  compMimeType:  compFile.type,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Comparison failed");
      const r = data.result;
      const compMatch = (() => {
        if (!r.competitor) return "";
        const lower = r.competitor.toLowerCase();
        return COMPETITORS.find(c => lower.includes(c.toLowerCase()) || c.toLowerCase().includes(lower)) || "Other";
      })();
      const models = (r.groups||[]).map(g=>g.equipmentModel).filter(Boolean);
      setHeader(p => ({
        ...p,
        competitor:     compMatch         || p.competitor,
        customer:       r.customer        || p.customer,
        equipmentModel: models.join(", ") || p.equipmentModel,
      }));
      const flat = [];
      (r.groups||[]).forEach(g => {
        (g.lineItems||[]).forEach(l => {
          flat.push(recalc({
            description:     l.description || "",
            category:        CATEGORIES.includes(l.category) ? l.category : "Other",
            hodgePrice:      parseFloat(l.hodgePrice) || 0,
            competitorPrice: parseFloat(l.competitorPrice) || 0,
            equipmentModel:  g.equipmentModel || "",
          }));
        });
      });
      setLineItems(flat);
      const n = flat.length, u = (r.groups||[]).length;
      setCompareMsg("✓ " + n + " line item" + (n!==1?"s":"") + " compared across " + u + " unit" + (u!==1?"s":"") + " — review prices then Save & Log.");
    } catch(err) {
      setCompareMsg("Error: " + err.message);
    } finally {
      setComparing(false);
    }
  }

  function catTotals(cat) {
    const rows = lineItems.filter(r => r.category===cat);
    if (!rows.length) return null;
    const h = rows.reduce((s,r)=>s+r.hodgePrice,0);
    const c = rows.reduce((s,r)=>s+r.competitorPrice,0);
    return { hodge:h, comp:c, delta:h-c, pct:c!==0?(h-c)/c*100:null };
  }
  const grandH=lineItems.reduce((s,r)=>s+r.hodgePrice,0);
  const grandC=lineItems.reduce((s,r)=>s+r.competitorPrice,0);
  const grandDelta=grandH-grandC;
  const grandPct=grandC!==0?grandDelta/grandC*100:null;

  async function handleSave() {
    if (!lineItems.length) { setSaveMsg("Add at least one line item before saving."); return; }
    setBusy(true); setSaveMsg("");
    try {
      const res = await fetch("/api/market-intel/log", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          branch:header.branch, repName:header.repName,
          customer:header.customer, competitor:header.competitor,
          equipmentModel:header.equipmentModel, quoteDate:header.quoteDate,
          lineItems:lineItems.map(l=>({
            description:l.description, category:l.category,
            hodgePrice:l.hodgePrice, competitorPrice:l.competitorPrice,
            equipmentModel:l.equipmentModel||"",
          })),
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Save failed");
      setSaveMsg("✓ " + data.rowsAdded + " row" + (data.rowsAdded!==1?"s":"") + " logged to Google Sheets");
      setLineItems([]); setCompareMsg("");
      setTimeout(() => setSaveMsg(""), 6000);
    } catch(err) { setSaveMsg("Error: " + err.message); }
    finally { setBusy(false); }
  }

  const fmtPrice = n => "$" + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");
  const fmtDelta = n => n===0 ? "$0.00" : (n>0?"+":"-")+"$"+Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");
  const fmtPct   = n => n===null ? "N/A" : (n>0?"+":"") + n.toFixed(1) + "%";
  const dColor   = n => n>0 ? C.red : n<0 ? C.green : C.text;
  const rowBg    = r => r.delta>0 ? "rgba(220,38,38,0.08)" : r.delta<0 ? "rgba(34,197,94,0.08)" : "transparent";
  const tdS  = { padding:"8px 10px", fontSize:13, color:C.text, borderBottom:`1px solid ${C.border}` };
  const lblS = { display:"block", fontFamily:F.mono, fontSize:9, letterSpacing:3, color:C.mid, marginBottom:6 };
  const inpS = { background:"transparent", border:`1px solid ${C.border}`, borderRadius:4, padding:"4px 6px", color:C.text, fontSize:12, fontFamily:F.mono, outline:"none", width:72 };
  const sectTotals = CATEGORIES.map(cat=>({ cat, totals:catTotals(cat) })).filter(x=>x.totals);

  function fileChip(file, color, onClear) {
    const name = file.name.length > 22 ? file.name.slice(0,20)+"…" : file.name;
    return (
      <div style={{
        marginTop:0, display:"flex", alignItems:"center", justifyContent:"space-between",
        background:`${color}1A`, border:`1px solid ${color}`,
        borderRadius:6, padding:"7px 10px",
      }}>
        <span style={{fontFamily:F.mono, fontSize:10, color, letterSpacing:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>✓ {name}</span>
        <button onClick={onClear} disabled={comparing} style={{background:"none", border:"none", color:C.dim, cursor:"pointer", fontSize:16, padding:"0 0 0 8px", lineHeight:1}}>×</button>
      </div>
    );
  }

  return (
    <div style={{padding:"16px 16px 40px", maxWidth:600, margin:"0 auto"}}>
      {feedbackOpen && <FeedbackModal tab="Market Intel" onClose={()=>setFeedbackOpen(false)}/>}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:24}}>
        <div>
          <div style={{fontFamily:F.head,fontSize:26,letterSpacing:4,marginBottom:5,color:C.text}}>MARKET INTEL</div>
          <div style={{fontFamily:F.mono,fontSize:11,color:C.mid,letterSpacing:2}}>Competitive quote comparison &amp; price analysis</div>
        </div>
        <button onClick={()=>setFeedbackOpen(true)} style={{flexShrink:0,marginTop:4,background:'rgba(193,122,53,0.18)',border:'1px solid rgba(193,122,53,0.5)',borderRadius:12,padding:'4px 10px',color:'#C17A35',fontFamily:F.mono,fontSize:10,letterSpacing:1,cursor:'pointer'}}>💬 FEEDBACK</button>
      </div>

      
      <div style={{marginBottom:4}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4}}>
          <div style={{fontFamily:F.mono, fontSize:10, letterSpacing:2, color:C.mid}}>
            UPLOAD QUOTES <span style={{color:C.dim, fontWeight:400, letterSpacing:1}}>— OPTIONAL</span>
          </div>
          <button onClick={handleReset} style={{
            background:"transparent",
            border:`1px solid ${C.border}`,
            borderRadius:6, padding:"3px 10px",
            fontFamily:F.mono, fontSize:9, letterSpacing:1.5,
            color:C.mid, cursor:"pointer",
            transition:"all 0.15s",
          }}>↺ NEW</button>
        </div>
        <div style={{fontSize:12, color:C.dim, marginBottom:10, lineHeight:1.5}}>
          Upload both quotes for an AI-powered apples-to-apples comparison, or enter manually below.
        </div>
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>

          
          <div style={{background:C.surface, border:`1px solid rgba(59,111,212,0.45)`, borderRadius:10, padding:12}}>
            <div style={{fontFamily:F.mono, fontSize:9, letterSpacing:2, color:C.blueLight, marginBottom:8}}>HODGE QUOTE</div>
            <input ref={hodgeInputRef} type="file" accept=".pdf,image/jpeg,image/png,image/jpg"
              style={{display:"none"}} onChange={handleHodgeFile}/>
            {!hodgeFile ? (
              <button onClick={()=>hodgeInputRef.current && hodgeInputRef.current.click()} disabled={comparing} style={{
                background:C.surface3,
                border:`1.5px dashed ${comparing ? C.border : C.blueLight}`,
                borderRadius:7, padding:"11px 8px", width:"100%",
                fontFamily:F.mono, fontSize:10, letterSpacing:1,
                color: comparing ? C.dim : C.blueLight,
                cursor: comparing ? "not-allowed" : "pointer",
                display:"flex", alignItems:"center", justifyContent:"center", gap:6,
                transition:"all 0.15s",
              }}>
                <span style={{fontSize:14}}>📎</span><span>UPLOAD</span>
              </button>
            ) : fileChip(hodgeFile, C.blueLight, ()=>{ setHodgeFile(null); setCompareMsg(""); })}

}

function FieldLog() {
  const REPS = ["Jon S","Tony","Kyle","Dan","Zac","Dave J","Chase","Devon","Earl","David G","Javier","Jon L","Jackson","Mike","Jack","Tristian","Connor"];
  const ACTIVITIES = [
    { id:"pmOpp",       label:"Membership Opp"   },
    { id:"equipOpp",    label:"Equipment Opp"    },
    { id:"serviceLead", label:"Service Lead"     },
    { id:"pipingOpp",   label:"Piping/Install"   },
    { id:"sticker",     label:"Sticker Placed"   },
    { id:"vrPres",      label:"VR Presentation"  },
    { id:"apptSet",     label:"Appointment Set"  },
    { id:"nothing",     label:"Nothing"          },
  ];

  const LEADERS = ["Jon Sanders", "Tony", "Kyle"];

  const [view,       setView]       = React.useState(() => {
    const n = localStorage.getItem("fieldlog_rep") || localStorage.getItem("airiq_rep_name") || "";
    return LEADERS.some(l => l.toLowerCase() === n.toLowerCase()) ? "leader" : "rep";
  });
  const [repName,    setRepName]    = React.useState(() => localStorage.getItem("fieldlog_rep") || "");
  const [selected,   setSelected]   = React.useState({});
  const [location,   setLocation]   = React.useState("");
  const [notable,    setNotable]    = React.useState("");
  const [submitting, setSubmitting] = React.useState(false);
  const [tally,      setTally]      = React.useState(null);
  const [msg,        setMsg]        = React.useState("");
  const [dashboard,  setDashboard]  = React.useState([]);
  const [dashLoad,   setDashLoad]   = React.useState(false);
  const [dashRange,  setDashRange]  = React.useState("today");
  const [feedbackOpen, setFeedbackOpen] = React.useState(false);
  const [leaderSubView, setLeaderSubView] = React.useState("list");
  const [showExport,      setShowExport]      = React.useState(false);
  const [exportRange,     setExportRange]     = React.useState("today");
  const [exportStart,     setExportStart]     = React.useState(() => new Date().toISOString().slice(0,10));
  const [exportEnd,       setExportEnd]       = React.useState(() => new Date().toISOString().slice(0,10));
  const [exporting,       setExporting]       = React.useState(false);
  const [showRepExport,   setShowRepExport]   = React.useState(false);
  const [repExportRange,  setRepExportRange]  = React.useState("week");
  const [repExportStart,  setRepExportStart]  = React.useState(() => new Date().toISOString().slice(0,10));
  const [repExportEnd,    setRepExportEnd]    = React.useState(() => new Date().toISOString().slice(0,10));
  const [repExporting,    setRepExporting]    = React.useState(false);
  const [weekData,     setWeekData]    = React.useState({bucket:'day', rows:[]});
  const [dbError,      setDbError]     = React.useState(null);
  const [companyName,  setCompanyName] = React.useState("");
  const [contactName,  setContactName] = React.useState("");
  const [stickerCount, setStickerCount]= React.useState(1);
  const [stopSearch,   setStopSearch]  = React.useState("");
  const [branch,       setBranch]      = React.useState(() => {
    const rep = localStorage.getItem("fieldlog_rep") || "";
    return rep ? localStorage.getItem(`airiq_fieldlog_branch_${rep}`) || "" : "";
  });
  const [stops,        setStops]       = React.useState([]);
  const [stopSort,     setStopSort]    = React.useState(() => {
    const rep = localStorage.getItem("fieldlog_rep") || "";
    return localStorage.getItem(`fieldlog_sort_${rep}`) || "newest";
  });
  const [locSuggestions, setLocSuggestions] = React.useState([]);
  const [showLocDrop,  setShowLocDrop]  = React.useState(false);
  const [stLookupQuery,      setStLookupQuery]      = React.useState("");
  const [stLookupResults,    setStLookupResults]    = React.useState(null);
  const [stLookupLoading,    setStLookupLoading]    = React.useState(false);
  const [deletingStopId,     setDeletingStopId]     = React.useState(null);
  const [cardLoading,        setCardLoading]        = React.useState(false);
  const [cardMsg,            setCardMsg]            = React.useState("");
  const [showContactFields,  setShowContactFields]  = React.useState(false);
  const [cTitle,             setCTitle]             = React.useState("");
  const [cMobile,            setCMobile]            = React.useState("");
  const [cOfficePhone,       setCOfficePhone]       = React.useState("");
  const [cEmail,             setCEmail]             = React.useState("");
  const [cWebsite,           setCWebsite]           = React.useState("");
  const [cCardAddress,       setCCardAddress]       = React.useState("");
  const [stLeadConfirmed,   setStLeadConfirmed]   = React.useState(false);
  const [memberEstConfirmed, setMemberEstConfirmed] = React.useState(false);
  const [expandedStopId,   setExpandedStopId]   = React.useState(null);
  const [stopHistoryRange, setStopHistoryRange] = React.useState("today");
  const [historyLoading,   setHistoryLoading]   = React.useState(false);
  const [draftBanner,          setDraftBanner]          = React.useState(false);
  const [editingStopId,        setEditingStopId]        = React.useState(null);
  const [editStop,             setEditStop]             = React.useState({});
  const [editSaving,           setEditSaving]           = React.useState(false);
  const [allLeaderStops,       setAllLeaderStops]       = React.useState([]);
  const [allLeaderLoad,        setAllLeaderLoad]        = React.useState(false);
  const [expandedLeaderStopId, setExpandedLeaderStopId] = React.useState(null);
  const [repGoals,             setRepGoals]             = React.useState([]);
  const [showGoalModal,        setShowGoalModal]        = React.useState(false);
  const [repInlineRange,       setRepInlineRange]       = React.useState("today");
  const [repInlineFrom,        setRepInlineFrom]        = React.useState(() => new Date().toISOString().slice(0,10));
  const [repInlineTo,          setRepInlineTo]          = React.useState(() => new Date().toISOString().slice(0,10));
  const [repInlineExporting,   setRepInlineExporting]   = React.useState(false);
  const dashTimer      = React.useRef(null);
  const dashRangeRef   = React.useRef("today");
  const saveDraftTimer = React.useRef(null);
  const draftMounted   = React.useRef(false);
  const stLookupTimer  = React.useRef(null);

  React.useEffect(() => {
    if (repName) fetchTally(repName);
  }, []);

  React.useEffect(() => {
    if (repName) fetchStops(repName);
  }, [stopHistoryRange]);

  React.useEffect(() => {
    if (view === "leader") {
      fetchDashboard();
      fetchWeekData();
      fetchAllStops();
      fetchGoals();
      dashTimer.current = setInterval(fetchDashboard, 60000);
    } else {
      clearInterval(dashTimer.current);
    }
    return () => clearInterval(dashTimer.current);
  }, [view]);

  // Draft restore — runs on mount only
  React.useEffect(() => {
    if (!repName) { draftMounted.current = true; return; }
    try {
      const raw = localStorage.getItem(`airiq_fieldlog_draft_${repName}`);
      if (!raw) { draftMounted.current = true; return; }
      const d = JSON.parse(raw);
      if (!d) { draftMounted.current = true; return; }
      const hasContent = d.companyName || d.contactName || d.location || d.notes ||
        d.pmOpp || d.equipOpp || d.serviceLead || d.pipingOpp ||
        d.stickerPlaced || d.vrPresentation || d.apptSet || d.nothing;
      if (!hasContent) { draftMounted.current = true; return; }
      if (d.companyName)    setCompanyName(d.companyName);
      if (d.contactName)    setContactName(d.contactName);
      if (d.location)       setLocation(d.location);
      if (d.notes)          setNotable(d.notes);
      if (d.stickerCount)   setStickerCount(d.stickerCount);
      const sel = {};
      if (d.pmOpp)           sel.pmOpp = true;
      if (d.equipOpp)        sel.equipOpp = true;
      if (d.serviceLead)     sel.serviceLead = true;
      if (d.pipingOpp)       sel.pipingOpp = true;
      if (d.stickerPlaced)   sel.sticker = true;
      if (d.vrPresentation)  sel.vrPres = true;
      if (d.apptSet)         sel.apptSet = true;
      if (d.nothing)         sel.nothing = true;
      if (Object.keys(sel).length > 0) setSelected(sel);
      setDraftBanner(true);
      setTimeout(() => setDraftBanner(false), 3000);
    } catch (e) { console.error('draft restore error:', e.message); }
    // Delay enabling save until after the restored state has rendered,
    // so the save effect can't wipe the draft with empty values first.
    setTimeout(() => { draftMounted.current = true; }, 0);
  }, []);

  // Draft auto-save — 500ms debounce on every form field change
  React.useEffect(() => {
    if (!draftMounted.current) return;
    if (!repName) return;
    clearTimeout(saveDraftTimer.current);
    saveDraftTimer.current = setTimeout(() => {
      const hasContent = companyName || contactName || location || notable ||
        Object.values(selected).some(Boolean) || stickerCount > 1;
      if (!hasContent) {
        try { localStorage.removeItem(`airiq_fieldlog_draft_${repName}`); } catch {}
        return;
      }
      try {
        localStorage.setItem(`airiq_fieldlog_draft_${repName}`, JSON.stringify({
          companyName, contactName, branch, location, notes: notable,
          pmOpp:          !!selected.pmOpp,
          equipOpp:       !!selected.equipOpp,
          serviceLead:    !!selected.serviceLead,
          pipingOpp:      !!selected.pipingOpp,
          stickerPlaced:  !!selected.sticker,
          stickerCount,
          vrPresentation: !!selected.vrPres,
          apptSet:        !!selected.apptSet,
          nothing:        !!selected.nothing,
        }));
      } catch {}
    }, 500);
  }, [repName, companyName, contactName, branch, location, notable, selected, stickerCount]);

  async function fetchTally(name) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 10000);
    try {
      const r = await fetch(`/api/field-log/today/${encodeURIComponent(name)}?branch=${encodeURIComponent(branch)}`, { signal: ctrl.signal });
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      setTally(d);
      setDbError(null);
    } catch (e) {
      console.error('Field Log fetchTally error:', e.message);
      setDbError({ msg: e.message, retry: () => fetchTally(name) });
    } finally {
      clearTimeout(timer);
    }
  }

  async function fetchDashboard() {
    setDashLoad(true);
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 10000);
    try {
      const r = await fetch(`/api/field-log/dashboard?range=${dashRangeRef.current}`, { signal: ctrl.signal });
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      setDashboard(Array.isArray(d) ? d : []);
      setDbError(null);
    } catch (e) {
      console.error('Field Log fetchDashboard error:', e.message);
      setDbError({ msg: e.message, retry: () => { fetchDashboard(); fetchWeekData(); } });
    } finally {
      clearTimeout(timer);
      setDashLoad(false);
    }
  }

  async function fetchWeekData() {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 10000);
    try {
      const r = await fetch(`/api/field-log/trend?range=${dashRangeRef.current}`, { signal: ctrl.signal });
      const d = await r.json();
      if (!d.error && d.bucket) setWeekData({ bucket: d.bucket, rows: Array.isArray(d.rows) ? d.rows : [] });
    } catch (e) {
      console.error('Field Log fetchWeekData error:', e.message);
    } finally {
      clearTimeout(timer);
    }
  }

  async function fetchAllStops() {
    setAllLeaderLoad(true);
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 10000);
    try {
      const r = await fetch(`/api/field-log/all-stops?range=${dashRangeRef.current}`, { signal: ctrl.signal });
      const d = await r.json();
      if (Array.isArray(d)) { setAllLeaderStops(d); setExpandedLeaderStopId(null); }
    } catch (e) {
      console.error('fetchAllStops error:', e.message);
    } finally {
      clearTimeout(timer);
      setAllLeaderLoad(false);
    }
  }

  async function fetchGoals() {
    try {
      const r = await fetch('/api/field-log/goals');
      const d = await r.json();
      if (Array.isArray(d)) setRepGoals(d);
    } catch (e) { console.error('fetchGoals error:', e.message); }
  }

  async function exportRepInlineCSV() {
    if (!repName) return;
    setRepInlineExporting(true);
    try {
      const today = new Date().toISOString().slice(0,10);
      const safeRep = repName.replace(/[^a-zA-Z0-9]/g, '_');
      const rangeLabel = { today:'Today', week:'Week', month:'Month', all:'AllTime', custom:`${repInlineFrom}_to_${repInlineTo}` }[repInlineRange] || repInlineRange;

  function buildStopCSV(rows, repBranch) {
    const esc = v => `"${(String(v||'')).replace(/"/g,'""')}"`;
    const headers = ['Rep Name','Date','Time','Company','Contact','Title','Email','Mobile','Phone','Address','Branch','Outcome','Sticker Count','Notes','Area/Location'];
    return [
      headers.join(','),
      ...rows.map(row => [
        esc(row.rep_name),
        row.date||'',
        row.time||'',
        esc(row.company_name),
        esc(row.contact_name),
        esc(row.contact_title),
        esc(row.email),
        esc(row.mobile),
        esc(row.office_phone),
        esc(row.card_address),
        esc(repBranch||''),
        esc(stopOutcome(row)),
        row.sticker ? (row.sticker_count||1) : 0,
        esc(row.notes),
        esc(row.area_location),
      ].join(','))
    ].join('\n');
  }

  function triggerDownload(csv, filename) {
    const blob = new Blob([csv], { type:'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }

  async function exportCSV() {
    setExporting(true);
    try {
      const today = new Date().toISOString().slice(0,10);
      let start = today, end = today, label = 'Today';
      if (exportRange === 'week') {
        const d = new Date(); const dow = d.getDay() || 7;
        d.setDate(d.getDate() - dow + 1);
        start = d.toISOString().slice(0,10); label = 'Week';
      } else if (exportRange === 'month') {
        start = today.slice(0,7) + '-01'; label = 'Month';
      } else if (exportRange === 'year') {
        start = today.slice(0,4) + '-01-01'; label = 'Year';
      } else if (exportRange === 'custom') {
        start = exportStart; end = exportEnd;
        label = `${exportStart}_to_${exportEnd}`;
      }
      const r = await fetch(`/api/field-log/export?start=${start}&end=${end}`);
      const rows = await r.json();
      if (!Array.isArray(rows)) throw new Error(rows.error || 'Export failed');
      triggerDownload(buildStopCSV(rows, ''), `FieldLog_AllReps_${label}_${today}.csv`);
      setShowExport(false);
    } catch (e) { alert('Export failed: ' + e.message); }
    setExporting(false);
  }

  function paceColor(stops, goal) {
    const s = Number(stops);
    const g = goal || 25;
    if (s >= g) return C.green;
    if (s >= 10) return "#F59E0B";
    return C.red;
  }

  function paceColorDark(stops, goal) {
    const s = Number(stops);
    const g = goal || 25;
    if (s >= g) return "#16a34a";
    if (s >= 10) return "#d97706";
    return "#991B1B";
  }

  function timeSince(ts) {
    if (!ts) return "—";
    const mins = Math.round((Date.now() - new Date(ts)) / 60000);
    if (mins < 1)  return "just now";
    if (mins < 60) return `${mins}m ago`;
    return `${Math.floor(mins/60)}h ${mins % 60}m ago`;
  }

  function formatTime(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true });

  function saveLocation(loc) {

  async function scanBusinessCard(file) {
    setCardLoading(true);
    setCardMsg("");
    try {
      const b64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      const mime = file.type || 'image/jpeg';
      const r = await fetch('/api/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 400,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: mime, data: b64 } },
              { type: 'text', text: 'Extract all contact information from this business card. Return ONLY a JSON object with these exact keys (use empty string if not found): {"name":"","title":"","company":"","mobile":"","office":"","email":"","website":"","address":""}. No markdown, no explanation, no code fences.' }
            ]
          }]
        })
      });
      const d = await r.json();
      const text = (d.content?.[0]?.text || '').replace(/^```(?:json)?\s*/,'').replace(/\s*```$/,'').trim();
      const info = JSON.parse(text);
      if (info.company) setCompanyName(info.company);
      if (info.name)    setContactName(info.name);
      if (info.title)   setCTitle(info.title);
      if (info.mobile)  setCMobile(info.mobile);
      if (info.office)  setCOfficePhone(info.office);
      if (info.email)   setCEmail(info.email);
      if (info.website) setCWebsite(info.website);
      if (info.address) setCCardAddress(info.address);
      const hasContact = info.title || info.mobile || info.office || info.email || info.website || info.address;
      if (hasContact) setShowContactFields(true);
      setCardMsg("✓ Card scanned — review and edit below");
    } catch (e) {
      console.error('scanBusinessCard error:', e.message);
      setCardMsg("Couldn't read card — fill in manually");
    }
    setCardLoading(false);
    setTimeout(() => setCardMsg(""), 4000);
  }

              {(()=>{

                const W=280, H=52, PX=10, PY=8, plotW=W-PX*2, plotH=H-PY*2;

                if (bucket === 'hour') {
                  const hourMap = {};
                  tRows.forEach(r => { hourMap[Number(r.hour)] = Number(r.stops); });
                  const allH = tRows.map(r => Number(r.hour));
                  const minH = allH.length > 0 ? Math.min(...allH) : 6;
                  const maxH = allH.length > 0 ? Math.max(...allH) : new Date().getHours();
                  for (let h = minH; h <= Math.max(maxH, minH); h++) {
                    const lbl = h === 0 ? '12a' : h < 12 ? `${h}a` : h === 12 ? '12p' : `${h-12}p`;
                    pts.push({ label: lbl, v: hourMap[h] || 0 });
                  }
                  xLabel = 'TODAY — STOPS BY HOUR';
                } else if (dashRange === 'week') {
                  const today = new Date();
                  const dow = (today.getDay() + 6) % 7;
                  const numDays = Math.max(1, Math.min(dow + 1, 5));
                  const DNAMES = ['Mon','Tue','Wed','Thu','Fri'];
                  const dayMap = {};
                  tRows.forEach(r => { dayMap[r.day] = Number(r.stops); });

                    const d = new Date(today);
                    d.setDate(d.getDate() - (dow - i));

                  }

                } else if (dashRange === 'month') {
                  const today = new Date();
                  const yr = today.getFullYear(), mo = today.getMonth(), dom = today.getDate();
                  const dayMap = {};
                  tRows.forEach(r => { dayMap[r.day] = Number(r.stops); });
                  for (let d = 1; d <= dom; d++) {
                    const iso = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const show = (d === 1 || d % 5 === 0 || d === dom);
                    pts.push({ label: show ? String(d) : '', v: dayMap[iso] || 0 });
                  }
                  xLabel = 'THIS MONTH — STOPS BY DAY';
                } else if (bucket === 'week') {
                  const n = tRows.length;
                  const skip = Math.max(1, Math.floor(n / 5));
                  pts = tRows.map((r, i) => ({
                    label: (i === 0 || i === n-1 || i % skip === 0) ? r.week.slice(5,7)+'/'+r.week.slice(8,10) : '',
                    v: Number(r.stops),
                  }));
                  xLabel = 'ALL TIME — STOPS BY WEEK';
                } else if (bucket === 'month') {
                  const MNAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                  const n = tRows.length;
                  const skip = Math.max(1, Math.ceil(n / 6));
                  pts = tRows.map((r, i) => ({
                    label: i % skip === 0 ? MNAMES[parseInt(r.month.slice(5,7))-1] : '',
                    v: Number(r.stops),
                  }));
                  xLabel = 'ALL TIME — STOPS BY MONTH';
                }

                if (pts.length === 0) return null;
                const maxV = Math.max(...pts.map(p=>p.v), 1);
                const n = pts.length;
                const showDots = n <= 15;
                const showVals = n <= 10;
                const isMonth = dashRange === 'month';
                const peakV = isMonth ? Math.max(...pts.map(p => p.v), 0) : 0;
                const coords = pts.map((p,i) => ({
                  x: n <= 1 ? W/2 : PX + i*(plotW/(n-1)),
                  y: PY + plotH - (p.v/maxV)*plotH,
                  ...p,
                }));
                const line = coords.map((c,i)=>`${i===0?'M':'L'}${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' ');
                const area = `${line} L${coords[n-1].x.toFixed(1)},${(PY+plotH).toFixed(1)} L${coords[0].x.toFixed(1)},${(PY+plotH).toFixed(1)} Z`;
                return (

                      <path d={line} fill="none" style={{stroke:C.blueLight}} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>

                            {(showDots || isMonth) && (

                            {(isMonth ? c.v > 0 : (showVals && c.v > 0)) && (

                            )}
                            {c.label && <text x={c.x} y={H+14} textAnchor="middle" fontSize="9" style={{fill:C.mid}}>{c.label}</text>}
                          </g>
                        );
                      })}
                    </svg>
                  </div>
                );
              })()}

        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
