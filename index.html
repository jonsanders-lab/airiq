  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;overflow:hidden;}
    body{background:#06090F;font-family:system-ui,sans-serif;color:#E4EDF8;}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-track{background:#06090F;}
    ::-webkit-scrollbar-thumb{background:#1E2D47;border-radius:2px;}
    input,textarea,select,button{font-family:inherit;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.25;}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
    @keyframes copperGlow{0%,100%{box-shadow:0 0 20px rgba(193,122,53,0.45),0 4px 12px rgba(0,0,0,0.3);}50%{box-shadow:0 0 48px rgba(193,122,53,0.85),0 0 28px rgba(232,134,10,0.55),0 4px 12px rgba(0,0,0,0.3);}}
    .pulse{animation:pulse 1.6s ease infinite;}
    .copper-pulse{animation:copperGlow 2.2s ease-in-out infinite;}
    .fadeUp{animation:fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards;}
    .s1{animation:fadeUp 0.4s 0.04s cubic-bezier(0.16,1,0.3,1) both;}
    .s2{animation:fadeUp 0.4s 0.10s cubic-bezier(0.16,1,0.3,1) both;}
    .s3{animation:fadeUp 0.4s 0.16s cubic-bezier(0.16,1,0.3,1) both;}
    .s4{animation:fadeUp 0.4s 0.22s cubic-bezier(0.16,1,0.3,1) both;}
    .s5{animation:fadeUp 0.4s 0.28s cubic-bezier(0.16,1,0.3,1) both;}
    .s6{animation:fadeUp 0.4s 0.34s cubic-bezier(0.16,1,0.3,1) both;}
    .s7{animation:fadeUp 0.4s 0.40s cubic-bezier(0.16,1,0.3,1) both;}
    /* ── Print / PDF styles ─────────────────────────────────────── */
    /* #print-portal lives outside #root in the DOM — display:none hides the
       entire app, display:block on the portal shows only the BOM, so the
       content starts on page 1 with no blank pages from hidden UI elements */
    #print-portal{display:none;}
    @media print{
      @page{margin:0.5in;}
      html,body{height:auto!important;min-height:0!important;overflow:visible!important;background:white!important;}
      #root{display:none!important;height:0!important;min-height:0!important;overflow:hidden!important;}
      #print-portal{
        display:block!important;
        background:white;
        font-family:Arial,Helvetica,sans-serif;color:#111;font-size:10pt;line-height:1.45;
        -webkit-print-color-adjust:exact;print-color-adjust:exact;
      }
      #print-portal .print-logo{max-height:48px!important;width:auto!important;}
      #print-portal table{width:100%;border-collapse:collapse;margin-bottom:10pt;page-break-inside:auto;}
      #print-portal tr{page-break-inside:avoid;page-break-after:auto;}
      #print-portal th{
        background:#1E3A8A!important;color:#fff!important;
        padding:5pt 7pt;text-align:left;font-size:8.5pt;
        -webkit-print-color-adjust:exact;print-color-adjust:exact;
      }
      #print-portal td{padding:4pt 7pt;border-bottom:0.5pt solid #ddd;font-size:8.5pt;vertical-align:top;}
      #print-portal tr:nth-child(even) td{
        background:#f5f7fb!important;
        -webkit-print-color-adjust:exact;print-color-adjust:exact;
      }
    }
    .app-header{position:sticky;top:0;z-index:100;}
    .vendor-bar{position:sticky;top:0;z-index:99;}
    @media (max-width:640px){
      .gbb-grid{grid-template-columns:1fr!important;}
    }
    .pm-pillars{display:flex;gap:10px;overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:4px;}
    .pm-pillars::-webkit-scrollbar{display:none;}
    .tab-bar-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none;}
    .tab-bar-scroll::-webkit-scrollbar{display:none;}
    @media (max-width:640px){
      .pm-pillars{flex-wrap:wrap!important;overflow-x:visible!important;}
      .pm-pillars>div{flex:0 0 calc(50% - 5px)!important;min-width:0!important;}
    }
    @media (max-width:480px){
      .grid-2col{grid-template-columns:1fr!important;}
      .app-header-inner{padding:5px 12px!important;}
      .app-header-logo{height:32px!important;}
      .app-header-title{font-size:16px!important;}
      .app-header-sub{font-size:9px!important;}
    }
  </style>

=== PRODUCT PRIORITY & UPSELL RULES ===
COMPRESSORS — always recommend in this order:
1. Hodge branded compressors FIRST for all oil-flooded rotary screw applications. Models: HB (belt drive fixed speed), HD (direct drive fixed speed), HV (variable speed direct drive), HT (2-stage direct drive), HTV (2-stage variable speed). Match CFM and PSI to the correct Hodge model and always include the data sheet and drawing link.
2. Only recommend Hertz or other brands when the application requires technology Hodge does not offer — e.g. oil-free compressors (recommend Hertz Eagle series), high-pressure (Sauer), vacuum (Dekker).

DRYERS — always recommend in this order:
1. Hodge HAD series refrigerant dryers FIRST for standard refrigerant dryer applications. Match CFM to HAD model and round up if needed.
2. Beko dryers when the application requires something beyond Hodge HAD range or capability — desiccant drying, high-temp inlet, large CFM beyond HAD487, cycling technology, high-pressure.
3. Only suggest Hertz dryers as a last resort if neither Hodge nor Beko has a suitable model.

RECEIVER TANKS — always recommend Samuel Pressure Vessel FIRST. Never recommend Hertz receivers or tanks.
- When sizing a receiver tank for HD/HB/HV/HT/HTV units, a general rule is 1-4 gallons per CFM depending on duty cycle. Higher duty cycle = larger tank. Always offer to calculate the right size.

HTM SERIES — tank and dryer are already integrated. NEVER upsell a receiver tank or dryer on HTM models.

HTM SERIES — ASSEMBLY LEAD TIME & DEPOSIT POLICY (applies to HTM7.5, HTM10, HTM15, HTM20):
- HTM units are NOT pre-built. They are assembled to order. Even if ServiceTitan shows stock as "available" or "on hand," the unit still requires 2-3 days for assembly before it can ship or be picked up. Always communicate this to the rep.
- Standard orders: 50% deposit required before assembly begins. Nothing is reserved or built until the deposit is received.
- Hot rush / expedited (faster than the standard 2-3 day assembly window): 100% payment in full required upfront before any work begins or any unit is reserved. Acceptable proof of payment: ACH remittance confirmation or a deposited check. Do not promise a rush slot until payment is confirmed.
- When an HTM model comes up, proactively mention the lead time and deposit requirement — do not wait for the rep to ask.

RUSH ORDER POLICY — applies to ALL models, not just HTM:
- Any unit requested faster than its standard lead time is a hot rush and requires 100% payment in full upfront.
- No work begins and nothing is reserved until proof of payment is received (ACH remittance or deposited check).
- Always surface this policy when a rep mentions urgency, tight timelines, or asks about same-day / next-day availability.

PIPING — always recommend AIRpipe USA.

UPSELL RULE — after recommending any base-mount compressor (HD, HB, HV, HT, HTV series):
- Always ask if the rep wants help sizing a receiver tank (Samuel), dryer (Hodge HAD first), and piping (AIRpipe).
- These units ship without a tank or dryer so the full system needs to be quoted.

VSD compressors best for variable demand — saves 20-35% energy vs fixed speed.
Oil-free (Eagle, Scroll) for food/pharma/electronics. Also offer food grade oil option on oil-injected.

function formatMsg(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<p style="font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#64748b;margin:12px 0 4px">$1</p>')
    .replace(/^## (.+)$/gm, '<p style="font-weight:600;margin:10px 0 4px">$1</p>')
    .replace(/^- (.+)/gm, '<div style="display:flex;gap:8px;margin:3px 0"><span style="color:#94a3b8;flex-shrink:0">•</span><span>$1</span></div>')
    .replace(/^(\d+)\. (.+)/gm, '<div style="display:flex;gap:8px;margin:3px 0"><span style="color:#94a3b8;flex-shrink:0;min-width:16px">$1.</span><span>$2</span></div>')
    .replace(/\n\n/g, '<br/>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer" style="color:#1d4ed8;text-decoration:underline">$1 ↗</a>')
    .replace(/\n/g, '<br/>');
}

function buildSTContext(pricebookItems, inventoryItems) {
  if (pricebookItems.length === 0 && inventoryItems.length === 0) return "";
  const merged = pricebookItems.map(p => {
    const inv = inventoryItems.find(i =>
      i.id === p.id ||
      (i.name||"").toLowerCase() === (p.displayName||p.name||"").toLowerCase() ||
      (i.code||"").toLowerCase() === (p.code||"").toLowerCase()
    );
    return {
      name: p.displayName||p.name,
      price: p.price != null ? `$${Number(p.price).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}` : "N/A",
      sku: p.code||p.sku||"N/A", active: p.active,
      onHand: inv?.onHand??inv?.quantityOnHand??p.quantity??null,
      available: inv?.available??inv?.quantityAvailable??null,
    };
  });
  inventoryItems.forEach(inv => {
    const name = inv.name||"";
    if (!merged.find(m=>(m.name||"").toLowerCase()===name.toLowerCase())) {
      merged.push({ name, price:"N/A", sku:inv.code||"N/A", active:inv.active,
        onHand:inv.onHand??inv.quantityOnHand??null, available:inv.available??inv.quantityAvailable??null });
    }
  });
  const lines = merged.map(item => {
    const onHandStr = item.onHand!==null ? `${item.onHand} units` : "not tracked";
    const availStr  = item.available!==null ? `${item.available} units` : "not tracked";
    return `${item.name} | Price: ${item.price} | On Hand: ${onHandStr} | Available: ${availStr} | SKU: ${item.sku} | Active: ${item.active}`;
  });
  return "\n\n=== LIVE SERVICETITAN DATA (pricebook + inventory) ===\n" + lines.join("\n") +
    "\nSource: Live pull from ServiceTitan. Present price, on-hand, and available quantities clearly using the format in your instructions.";
}

          </div>

            background: remember ? C.orangeSoft : "transparent",

          width:"100%", background:`linear-gradient(135deg,${C.orange} 0%,#E8640A 100%)`,
          border:"none", borderRadius:8, padding:"16px",
          fontFamily:F.head, fontSize:20, letterSpacing:5, color:"#fff",
          boxShadow:"0 0 28px rgba(249,115,22,0.25)",
        }}>ENTER</button>
      </div>
    </div>
  );
}

// ─── AIRIQ COMPONENT ─────────────────────────────────────────────────────────
function AirIQ() {
  const [messages, setMessages]     = React.useState([]);
  const [input, setInput]           = React.useState("");
  const [loading, setLoading]       = React.useState(false);
  const [showStarters, setShowStarters] = React.useState(true);
  const [isListening, setIsListening]   = React.useState(false);
  const [stLookupActive, setStLookupActive] = React.useState(false);
  const bottomRef      = React.useRef(null);
  const recognitionRef = React.useRef(null);
  const textareaRef    = React.useRef(null);

  React.useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior:"smooth" });
  }, [messages, loading]);

  const stopListening = () => {
    if (recognitionRef.current) { recognitionRef.current.stop(); recognitionRef.current = null; }
    setIsListening(false);
  };
  const startListening = () => {
    if (isListening) { stopListening(); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("Voice not supported. Try Chrome."); return; }
    const r = new SR(); r.lang="en-US"; r.continuous=false; r.interimResults=false;
    recognitionRef.current = r;
    r.onstart = () => setIsListening(true);
    r.onend   = () => { setIsListening(false); recognitionRef.current=null; };
    r.onerror = () => { setIsListening(false); recognitionRef.current=null; };
    r.onresult = e => { setInput(e.results[0][0].transcript); setTimeout(autoResize,50); };
    r.start();
  };
  const autoResize = () => {
    const el = textareaRef.current; if (!el) return;
    el.style.height="40px"; el.style.height=Math.min(el.scrollHeight,120)+"px";
  };

  const normalizeModelNumber = s =>
    s.replace(/\b(HTM|HTV|HAD|HD|HV|HT|HB)\s+(\d+[A-Z]?)\b/gi,
              (_, prefix, num) => prefix.toUpperCase() + num.toUpperCase());

  const detectSeriesStockQuery = (msg) => {
    const seriesAlt = 'HTM|HTV|HAD|HD|HV|HT|HB';
    const m1 = msg.match(new RegExp(`\\b(${seriesAlt})(?!\\d)\\b[\\s\\w]*?(?:stock|units?|availability|inventory)`, 'i'));
    if (m1) return m1[1].toUpperCase();
    const m2 = msg.match(new RegExp(`\\ball\\s+(${seriesAlt})\\b`, 'i'));
    if (m2) return m2[1].toUpperCase();
    return null;
  };

  const fetchSeriesStock = async (series, newMsgs) => {
    const MODEL_NAME_MAP = { "HTM7":"HTM7.5", "HTM7(1PH)":"HTM7.5 (1-Phase)", "HTM7.5(1PH)":"HTM7.5 (1-Phase)" };
    try {
      const invRes = await fetch(`/api/inventory?q=${encodeURIComponent(series)}`);
      if (!invRes.ok) throw new Error("Inventory fetch failed");
      const invData = await invRes.json();
      const items = (invData.items || [])
        .flatMap(item => (item.rawRows || []).map(r => ({
          code: r.code, onHand: r.quantityOnHand, available: r.quantityAvailable
        })))
        .filter(r => r.code && r.code.toUpperCase().startsWith(series.toUpperCase()));
      items.sort((a, b) => (a.code || "").localeCompare(b.code || "", undefined, { numeric: true }));

      if (items.length === 0) {
        setMessages([...newMsgs, { role:"assistant", content:`📦 No inventory items found for <strong>${series}</strong> series.`, stDataUsed:true, isHtml:true }]);
        return;
      }

      const inStockCount = items.filter(r => r.available > 0).length;

      const rowsHtml = items.map(r => {
        const displayCode = MODEL_NAME_MAP[r.code] || r.code;
        let statusHtml;
        if (r.onHand === 0) {
          statusHtml = `<span style="color:#ef4444">❌ Out of Stock</span>`;
        } else if (r.available < 0) {
          statusHtml = `<span style="color:#ef4444">⚠️ Over-reserved — confirm with ops</span>`;
        } else if (r.available === 0) {
          statusHtml = `<span style="color:#f59e0b">⚠️ All reserved — confirm with ops</span>`;
        } else {
          statusHtml = `<span style="color:#22c55e">✅ In Stock</span>`;
        }
        const availDisplay = r.available < 0 ? "—" : r.available;
        return `<tr style="border-bottom:1px solid #2a2d3a">
          <td style="padding:6px 10px">${displayCode}</td>
          <td style="padding:6px 10px;text-align:center">${r.onHand}</td>
          <td style="padding:6px 10px;text-align:center">${availDisplay}</td>
          <td style="padding:6px 10px">${statusHtml}</td>
        </tr>`;
      }).join("");

      const html = `<div>
        <p style="font-weight:600;margin:0 0 8px;color:#e2e6f0">📦 ${series} SERIES — LIVE STOCK</p>
        <table style="width:100%;border-collapse:collapse;font-size:12px;background:#1a1d27;border:1px solid #2a2d3a;border-radius:6px;overflow:hidden">
          <thead>
            <tr style="background:#1e2535;color:#94a3b8;font-size:11px;text-transform:uppercase;letter-spacing:.05em">
              <th style="padding:6px 10px;text-align:left">Model</th>
              <th style="padding:6px 10px;text-align:center">On Hand</th>
              <th style="padding:6px 10px;text-align:center">Available</th>
              <th style="padding:6px 10px;text-align:left">Status</th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
        <p style="font-size:11px;color:#64748b;margin:6px 0 0">${inStockCount} of ${items.length} models in stock · Last updated from ServiceTitan inventory report</p>
      </div>`;

      setMessages([...newMsgs, { role:"assistant", content:html, stDataUsed:true, isHtml:true }]);
    } catch(err) {
      setMessages([...newMsgs, { role:"assistant", content:`⚠️ Could not fetch ${series} series inventory: ${err.message}`, error:true }]);
    }
  };

  const submit = async (text) => {
    const msg = normalizeModelNumber(text || input.trim());
    if (!msg || loading) return;
    setShowStarters(false); setInput("");
    if (textareaRef.current) textareaRef.current.style.height="40px";
    const newMsgs = [...messages, { role:"user", content:msg }];
    setMessages(newMsgs); setLoading(true); setStLookupActive(false);

    const seriesPrefix = detectSeriesStockQuery(msg);
    if (seriesPrefix) {
      await fetchSeriesStock(seriesPrefix, newMsgs);
      setLoading(false);
      return;
    }

    const modelMatches = [...new Set(msg.match(MODEL_REGEX) || [])].slice(0, 5);
    const hasIntent    = INTENT_REGEX.test(msg);
    const needsST      = !!(modelMatches.length > 0 && hasIntent) || hasIntent;
    const searchTerms  = needsST ? (modelMatches.length > 0 ? modelMatches : [msg.replace(INTENT_REGEX,"").trim().slice(0,40)]) : [];
    if (needsST) setStLookupActive(true);

    const stTool = {
      name:"lookup_servicetitan_pricing",
      description:"Look up live pricing and stock availability for equipment in ServiceTitan. Only call this when the rep explicitly asks about price, cost, stock, or availability.",
      input_schema:{ type:"object", properties:{ search_term:{ type:"string", description:"The model number or equipment name to search for" } }, required:["search_term"] }
    };
    const stInstruction = needsST ? `\n\n=== SERVICETITAN LIVE LOOKUP AVAILABLE ===\nThe rep is asking about pricing or stock for: ${searchTerms.join(", ")}. Call lookup_servicetitan_pricing now with each search term to get live data before responding.` : "";

    try {
      const res1 = await fetch("/api/claude", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-6", max_tokens:2000, system:SYS+stInstruction,
          messages:newMsgs.map(m=>({ role:m.role, content:m.content })),
          tools:[{ type:"web_search_20250305", name:"web_search" }, stTool],
        }),
      });
      const data1 = await res1.json();
      if (data1.error) throw new Error(data1.error.message);

      const toolUseBlock = (data1.content||[]).find(b=>b.type==="tool_use"&&b.name==="lookup_servicetitan_pricing");
      let finalReply="", stDataUsed=false;
      let webSearched = (data1.content||[]).some(b=>b.type==="tool_use"&&b.name==="web_search");

      // FIX 7: if stop_reason is tool_use but our ST toolUseBlock wasn't found, fall through to text extraction
      // FIX 4: also guard against toolUseBlock.id being undefined (would cause invalid API call)
      if (toolUseBlock && toolUseBlock.id) {
        // FIX 3: guard against null/empty data1.content before attempting res2
        if (!data1.content || !Array.isArray(data1.content) || data1.content.length === 0) {
          finalReply = "";
        } else {
          const lookupTerms = searchTerms.length > 0 ? searchTerms : [toolUseBlock.input.search_term || ""];
          let stResult = "No data found.";

          const parallelLookup = Promise.all([
            Promise.all(lookupTerms.map(term =>
              fetch("/api/st", { method:"POST", headers:{"Content-Type":"application/json"},
                body: JSON.stringify({ endpoint:`/pricebook/v2/tenant/${ST_TENANT}/equipment?`,
                  tenant:ST_TENANT, appKey:ST_APP_KEY, clientId:ST_CLIENT_ID, clientSecret:ST_CLIENT_SECRET, searchTerm:term })
              }).then(r => r.ok ? r.json() : {data:[]}).then(d => d.data||[]).catch(() => [])
            )).then(results => results.flat()),
            Promise.all(lookupTerms.map(term =>
              fetch(`/api/inventory?q=${encodeURIComponent(term)}`)
                .then(r => r.ok ? r.json() : {items:[]})
                .then(d => (d.items||[]).flatMap(i => (i.rawRows||[]).map(r => ({
                  name:r.name, code:r.code, onHand:r.quantityOnHand, available:r.quantityAvailable,
                  onOrder:r.quantityOnOrder, location:r.location }))))
                .catch(() => [])
            )).then(results => results.flat())
          ]);

          const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 6000));
          const [allPricebookItems, allInventoryItems] = await Promise.race([parallelLookup, timeoutPromise])
            .catch(() => [[], []]);

          if (allPricebookItems.length > 0 || allInventoryItems.length > 0) {
            stDataUsed=true; stResult=buildSTContext(allPricebookItems, allInventoryItems);
          } else {
            stResult=`No matching equipment found for "${lookupTerms.join(", ")}" in ServiceTitan pricebook or inventory.`;
          }

          const allToolUseBlocks = (data1.content||[]).filter(b => b.type === "tool_use");
          if (allToolUseBlocks.length === 0) {
            finalReply = (data1.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
          } else {
            const toolResults = allToolUseBlocks.map(block =>
              block.name === "lookup_servicetitan_pricing"
                ? { type:"tool_result", tool_use_id:block.id, content:stResult }
                : { type:"tool_result", tool_use_id:block.id, content:"No result available" }
            );
            try {
              const res2 = await fetch("/api/claude", {
                method:"POST", headers:{"Content-Type":"application/json"},
                body: JSON.stringify({
                  model:"claude-sonnet-4-6", max_tokens:2000, system:SYS+stInstruction,
                  messages: [
                    ...newMsgs.map(m=>({ role:m.role, content:m.content })),
                    { role:"assistant", content:data1.content },
                    { role:"user", content:toolResults }
                  ],
                  tools:[{ type:"web_search_20250305", name:"web_search" }, stTool],
                }),
              });
              if (!res2.ok) {
                const errText = await res2.text();
                console.error('res2 failed:', res2.status, errText);
                throw new Error('Claude API call 2 failed: ' + res2.status);
              }
              const data2 = await res2.json();
              console.log('data2 full response:', JSON.stringify(data2).slice(0, 500));
              console.log('data2 content types:', (data2.content||[]).map(b=>b.type));
              console.log('data2 stop_reason:', data2.stop_reason);
              if (data2.error) throw new Error(`Claude res2 error: ${data2.error.message||JSON.stringify(data2.error)}`);
              webSearched = webSearched || (data2.content||[]).some(b=>b.type==="tool_use"&&b.name==="web_search");
              const textBlocks = (data2.content||[]).filter(b=>b.type==="text");
              if (textBlocks.length > 0) {
                finalReply = textBlocks.map(b=>b.text).join("\n");
              } else if (data2.stop_reason === "tool_use") {
                finalReply = (data1.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n") ||
                             "Checking ServiceTitan... please try again.";
              } else {
                finalReply = (data1.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
              }
              if (!finalReply) {
                finalReply = "I found data in ServiceTitan but had trouble formatting the response. Please try asking again.";
              }
            } catch(res2Err) {
              console.error('res2Err:', res2Err.message);
              finalReply = (data1.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
            }
          }
        }
      } else {
        // No ST toolUseBlock (or id missing) — extract text directly from data1
        // This also handles FIX 7: stop_reason=tool_use for a different tool (e.g. web_search only)
        finalReply = (data1.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
      }

      setStLookupActive(false);
      setMessages([...newMsgs, { role:"assistant", content:finalReply, webSearched, stDataUsed }]);
    } catch(err) {
      setStLookupActive(false);
      setMessages([...newMsgs, { role:"assistant", content:`⚠️ ${err.message}`, error:true }]);
    }
    setLoading(false);
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:C.bg }}>
      {/* ST Status bar — single scrollable row */}
      <div className="vendor-bar" style={{ padding:"4px 12px 6px", background:C.surface, borderBottom:`1px solid ${C.border}`,
        display:"flex", alignItems:"center", gap:6, overflowX:"auto", flexWrap:"nowrap",
        flexShrink:0, WebkitOverflowScrolling:"touch" }}>
        {ST_VENDORS.map((v,i) => (
          <a key={i} href={v.url} target="_blank" rel="noopener noreferrer"
            style={{ fontSize:10, fontWeight:600, padding:"2px 8px", borderRadius:20,
              background:"#1e2535", color:"#60a5fa", textDecoration:"none",
              display:"flex", alignItems:"center", gap:3, border:"1px solid #2a3a55",
              flexShrink:0, whiteSpace:"nowrap" }}>
            <span style={{ fontSize:7 }}>↗</span>{v.short}
          </a>
        ))}
        <span style={{ fontSize:10, padding:"2px 8px", borderRadius:20, background:"#1e2535",
          border:"1px solid #2a3a55", color:"#60a5fa", fontWeight:500,
          display:"flex", alignItems:"center", gap:4, flexShrink:0, whiteSpace:"nowrap" }}>
          {stLookupActive
            ? <><span style={{ width:5,height:5,borderRadius:"50%",background:"#f59e0b",display:"inline-block",animation:"blink 1s infinite" }}/> ST…</>
            : "ST Price + Stock"}
        </span>
      </div>

      {/* Messages */}
      <div style={{ flex:1, overflowY:"auto", padding:"16px", display:"flex", flexDirection:"column", gap:12 }}>
        {messages.length===0 && (
          <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center",
            justifyContent:"center", gap:8, padding:32, minHeight:200 }}>
            <div style={{ fontSize:28, marginBottom:4 }}>💨</div>
            <div style={{ fontWeight:600, fontSize:14, color:C.text }}>Ready for your reps</div>
            <div style={{ fontSize:12, color:C.mid, textAlign:"center", maxWidth:260, lineHeight:1.6 }}>
              Ask about specs, applications, objections — or check live pricing and stock by model number.
            </div>
          </div>
        )}
        {messages.map((m,i) => {
          const isUser = m.role==="user";
          return (

              {stLookupActive && <span style={{ fontSize:10, color:"#1d4ed8", marginRight:3 }}>Checking ST…</span>}

          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();submit();}}}

// ─── WINGMAN COMPONENT ───────────────────────────────────────────────────────
function Wingman() {
  const [tab, setTab]     = React.useState("brief");
  const [stories, setStories] = React.useState([]);

  React.useEffect(() => {
    (async () => {
      try {
        const res = await fetch('/api/stories');
        const data = await res.json();
        setStories(data.stories || []);
      } catch { setStories([]); }
    })();
  }, []);

  const save = async (newStory) => {
    try {
      const res = await fetch('/api/stories', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(newStory)
      });
      const data = await res.json();
      if (data.success) setStories(prev => [...prev, data.story]);
    } catch {}
  };

  const WTABS = [
    { id:"brief", label:"MISSION BRIEF" },
    { id:"intel", label:"FIELD INTEL" },
    { id:"log",   label:"LOG A WIN" },
  ];

  return (
    <div>
      {/* Wingman sub-tabs */}
      <div style={{ display:"flex", gap:2, marginBottom:20, borderBottom:`1px solid ${C.border}`,
        marginLeft:-16, marginRight:-16, paddingLeft:16 }}>
        {WTABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            background: tab===t.id ? `linear-gradient(180deg,${C.orangeSoft} 0%,transparent 100%)` : "none",
            border:"none", padding:"10px 18px",
            fontFamily:F.head, fontSize:13, letterSpacing:2,
            color: tab===t.id ? C.orange : C.mid,
            borderBottom: tab===t.id ? `2px solid ${C.orange}` : "2px solid transparent",
          }}>{t.label}</button>
        ))}
      </div>
      {tab==="brief" && <MissionBrief stories={stories}/>}
      {tab==="intel" && <FieldIntel stories={stories}/>}
      {tab==="log"   && <LogAWin stories={stories} onSave={save} onDone={()=>setTab("intel")}/>}
    </div>
  );
}

// ─── MISSION BRIEF ───────────────────────────────────────────────────────────
function MissionBrief({ stories }) {
  const [company,  setCompany]  = React.useState("");
  const [industry, setIndustry] = React.useState("");
  const [entry,    setEntry]    = React.useState("");
  const [loading,  setLoading]  = React.useState(false);
  const [brief,    setBrief]    = React.useState(null);
  const [err,      setErr]      = React.useState("");
  const [branch,   setBranch]   = React.useState(() => localStorage.getItem("wingman_branch") || "");
  const [repNotes, setRepNotes] = React.useState("");

  const handleBranchChange = (val) => {
    setBranch(val);
    localStorage.setItem("wingman_branch", val);
  };

  const ready = industry && entry;

  const generate = async () => {
    setLoading(true); setBrief(null); setErr("");
    const ind = INDUSTRIES.find(i => i.id === industry);
    const storySummaries = stories.map(s =>
      `[ID:${s.id}] ${INDUSTRIES.find(x=>x.id===s.industry)?.label||s.industry} | Problem: ${s.problem.slice(0,90)} | Outcome: ${s.outcome.slice(0,70)}`
    ).join("\n");

    const branchLine = branch && BRANCH_INTEL[branch]
      ? `\nBranch territory (${branch}): ${BRANCH_INTEL[branch]}`
      : "";
    const notesLine = repNotes.trim()
      ? `\nCustomer intel from rep: ${repNotes.trim()}`
      : "";

    const prompt = `You are an elite field sales coach for Hodge Compressors, an industrial compressed air equipment company with branches across the Southeast and Midwest. A sales rep is in the parking lot, about to cold-call a manufacturing facility — no appointment, no contact.

Company: ${company || "(unknown — rep will identify on arrival)"}
Industry: ${ind?.label}
Industry pain points: ${ind?.pains}
Entry approach: ${entry==="back" ? "Back door / shipping dock (primary)" : "Front door / reception (fallback)"}${branchLine}${notesLine}

War stories available:
${storySummaries}
${branchLine ? `\nUse the branch territory intel to suggest hyper-local rapport builders — specific sports teams, local pride points, regional references — woven naturally into conversation starters and facility tips.` : ""}${notesLine ? `\nThe rep has shared specific customer context above. Weave this directly into rapport suggestions, opening lines, and facility tips — make it feel like the rep already knows this person.` : ""}

Respond ONLY with valid JSON, zero markdown:
{
  "who_to_find": "Specific role title + one punchy sentence on why they're the right target",
  "opening_line": "Exact casual words to say at this entry point — natural, not salesy, 1-2 sentences",
  "recovery_line": "Exact words if turned away or told to come back — specific and natural",
  "hook": "One punchy sentence dropping the right pain angle for this industry naturally",
  "door_strategy": "4-5 sentences of specific tactical advice for ${entry==="back"?"working the shipping dock and back door":"navigating front desk reception without getting screened out"}",
  "facility_tips": ["Specific visual cue or physical observation that opens a real conversation","Another concrete tip","Another tip"],
  "rapport_starters": ["A hyper-local or customer-specific conversation starter based on the branch intel or rep notes","Another one","A third one"],
  "matched_story_id": "Best matching story ID or null",
  "matched_story_reason": "One sentence on why this story fits"
}`;

    try {
      const res = await fetch("/api/claude", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-6", max_tokens:1000,
          messages:[{ role:"user", content:prompt }]
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const raw = data.content?.find(b=>b.type==="text")?.text || "";
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setBrief({ ...parsed, matchedStory:stories.find(s=>s.id===parsed.matched_story_id)||null });
    } catch(e) { setErr("Brief generation failed — " + e.message); }
    setLoading(false);
  };

  if (brief) return <BriefOutput brief={brief} entry={entry} onReset={() => setBrief(null)} stories={stories}/>;

  return (
    <div>
      <SectionHeader label="MISSION BRIEF" sub="You're in the parking lot. Get armed before you walk in."/>

      {/* LOCAL INTEL card */}
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10,
        padding:20, marginBottom:12, boxShadow:"0 4px 40px rgba(0,0,0,0.4)" }}>
        <div style={{ fontFamily:F.mono, fontSize:9, color:C.copper, letterSpacing:2, marginBottom:12 }}>
          📍 LOCAL INTEL
        </div>
        <div style={{ marginBottom:12 }}>
          <FieldRow label="YOUR BRANCH">
            <select value={branch} onChange={e=>handleBranchChange(e.target.value)} style={inS}>
              <option value="">— Select your branch —</option>
              {Object.keys(BRANCH_INTEL).map(b => (
                <option key={b} value={b}>{b}</option>
              ))}
            </select>
          </FieldRow>
          {branch && (
            <div style={{ marginTop:8, fontSize:11, color:C.mid, lineHeight:1.6,
              padding:"8px 10px", background:C.surface2, borderRadius:6,
              border:`1px solid ${C.border}`, fontStyle:"italic" }}>
              {BRANCH_INTEL[branch]}
            </div>
          )}
        </div>
        <FieldRow label="CUSTOMER CONTEXT" hint="optional">
          <textarea
            value={repNotes}
            onChange={e=>setRepNotes(e.target.value)}
            placeholder="Add anything you know — sports teams, hometown, hobbies, shared interests, kids in same school, anything..."
            rows={3}
            style={{ ...inS, resize:"vertical", lineHeight:1.6 }}
          />
        </FieldRow>
      </div>

      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10,
        padding:20, marginBottom:16, boxShadow:"0 4px 40px rgba(0,0,0,0.4)" }}>
        <div style={{ marginBottom:16 }}>
          <FieldRow label="COMPANY NAME" hint="optional">
            <input value={company} onChange={e=>setCompany(e.target.value)}
              placeholder="You'll find out once you're inside" style={inS}/>
          </FieldRow>
        </div>
        <div style={{ marginBottom:16 }}>
          <FieldRow label="FACILITY TYPE" required>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6 }}>
              {INDUSTRIES.map(i=>(
                <ToggleBtn key={i.id} active={industry===i.id} onClick={()=>setIndustry(i.id)}>
                  {i.label}
                </ToggleBtn>
              ))}
            </div>
          </FieldRow>
        </div>
        <div style={{ marginBottom:16 }}>
          <FieldRow label="ENTRY POINT" required>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              {[
                { id:"back",  icon:"🚛", label:"Dock / Back Door", sub:"Primary — always try first" },
                { id:"front", icon:"🏢", label:"Front Door",       sub:"Fallback when no dock" },
              ].map(opt=>(
                <ToggleBtn key={opt.id} active={entry===opt.id} onClick={()=>setEntry(opt.id)} tall>
                  <div style={{ fontSize:20, marginBottom:4 }}>{opt.icon}</div>
                  <div style={{ fontFamily:F.head, fontSize:15, letterSpacing:1 }}>{opt.label}</div>
                  <div style={{ fontSize:11, marginTop:2, color:entry===opt.id?C.orange:C.dim }}>{opt.sub}</div>
                </ToggleBtn>
              ))}
            </div>
          </FieldRow>
        </div>
        <button onClick={generate} disabled={!ready||loading} style={{
          width:"100%",
          background:ready&&!loading?`linear-gradient(135deg,${C.orange} 0%,#E8640A 100%)`:C.surface2,
          border:"none", borderRadius:8, padding:"15px",
          fontFamily:F.head, fontSize:18, letterSpacing:4,
          color:ready&&!loading?"#fff":C.dim, transition:"all 0.2s", marginTop:4,
          boxShadow:ready&&!loading?`0 0 28px rgba(249,115,22,0.22)`:"none",
        }}>
          {loading ? <span className="pulse">⚡ BRIEFING IN PROGRESS...</span> : "⚡ GET YOUR WINGMAN BRIEF"}
        </button>
        {err && <div style={{ marginTop:10, color:C.red, fontSize:12, textAlign:"center", fontFamily:F.mono }}>{err}</div>}
      </div>
      <div style={{ background:C.blueSoft, border:`1px solid ${C.blue}44`,
        borderLeft:`3px solid ${C.blueLight}`, borderRadius:8, padding:"12px 16px" }}>
        <p style={{ fontSize:13, color:C.mid, lineHeight:1.75 }}>
          <span style={{ color:C.text, fontWeight:600 }}>Dock first. Always.</span>{" "}
          Shipping docks are where you find the people who actually feel the pain — maintenance techs, floor leads, plant supervisors.
        </p>
      </div>
    </div>
  );
}

// ─── FIELD INTEL ─────────────────────────────────────────────────────────────
function FieldIntel({ stories }) {
  const [search, setSearch]     = React.useState("");
  const [indFilter, setIndFilter] = React.useState("all");

  const filtered = stories.filter(s => {
    const okInd = indFilter==="all" || s.industry===indFilter;
    const q = search.toLowerCase();
    const okQ = !q || [s.problem,s.outcome,s.narrative,s.solution].some(f=>f?.toLowerCase().includes(q));
    return okInd && okQ;
  });

  return (
    <div>
      <SectionHeader label="FIELD INTEL" sub={`${stories.length} confirmed wins from across all branches.`}/>
      <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search by problem, outcome, industry..."
          style={{ ...inS, flex:1, minWidth:180 }}/>
        <select value={indFilter} onChange={e=>setIndFilter(e.target.value)}
          style={{ ...inS, width:"auto" }}>
          <option value="all">All Industries</option>
          {INDUSTRIES.map(i=><option key={i.id} value={i.id}>{i.label}</option>)}
        </select>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {filtered.length===0
          ? <div style={{ textAlign:"center", padding:40, color:C.dim, fontFamily:F.mono }}>NO STORIES MATCH</div>
          : filtered.map((s,i) => (
            <div key={s.id} className="fadeUp" style={{ animationDelay:`${i*0.04}s` }}>
              <StoryCard story={s}/>
            </div>
          ))
        }
      </div>
    </div>
  );
}

function StoryCard({ story, compact }) {
  const [open, setOpen] = React.useState(false);
  const ind = INDUSTRIES.find(i=>i.id===story.industry);
  return (
    <div style={{ background:`linear-gradient(160deg,${C.surface} 0%,${C.surface2} 100%)`,

// Energy cost calculated in JS — never trust LLM arithmetic for this
function calcEnergyCost(model, series, ratedCFM, requiredCFM, annualHours) {
  const motorKw = MOTOR_KW[model];
  if (!motorKw || !ratedCFM || !annualHours) return 0;
  const loadFactor = Math.min(requiredCFM / ratedCFM, 1.0);
  const isVSD = series === "HV" || series === "HTV";
  const inputKw = motorKw * (isVSD ? Math.pow(loadFactor, 1.6) : loadFactor);
  return Math.round(inputKw * annualHours * 0.085);
}

function estAvailPressures(series, model) {
  const cfm = COMP_DB[series]?.cfm[model];
  if (!cfm) return [116,145,181];
  return Object.keys(cfm).map(Number).sort((a,b)=>a-b);
}
function estCFM(series, model, psi) {
  return COMP_DB[series]?.cfm[model]?.[psi] ?? null;
}
function estReqDryerCFM(cfm, inletT, ambT, psi) {
  const ci = CF_INLET[inletT]  || 1.0;
  const ca = CF_AMBIENT[ambT]  || 1.0;
  const cp = CF_PRESS[psi]     || 1.0;
  return cfm / (ci * ca * cp);
}
function estRecHAD(reqCFM) {
  return HAD_DRYERS.find(d => d.cfm >= reqCFM) || HAD_DRYERS[HAD_DRYERS.length-1];
}
function estRecTank(cfm) {
  return TANK_TBL.find(r => cfm <= r.max) || TANK_TBL[TANK_TBL.length-1];
}

// ─── EQUIPMENT INSTALL LABOR MINIMUMS ────────────────────────────────────────
// First compressor: 8 hrs min. Each additional compressor: 4 hrs/unit.
// Each dryer row: 4 hrs/unit. Each tank row: 4 hrs/unit.
function applyEquipLabor(equipment) {
  let firstComp = true;
  return (equipment || []).map(r => {
    const desc = r.description || "";
    const qty  = Number(r.qty) || 1;
    const isComp  = /compressor|htv|htm|hv\d|ht\d|hd\d/i.test(desc) && !/dryer|tank|receiver|filter/i.test(desc);
    const isDryer = /dryer|had\b|desiccant|refrigerat/i.test(desc);
    const isTank  = /\btank\b|receiver/i.test(desc);
    let minHrs = 0;
    if (isComp) {
      minHrs = firstComp ? 8 + (qty - 1) * 4 : qty * 4;
      firstComp = false;
    } else if (isDryer) {
      minHrs = qty * 4;
    } else if (isTank) {
      minHrs = qty * 4;
    }
    return minHrs > 0 ? { ...r, laborHrs: Math.max(Number(r.laborHrs) || 0, minHrs) } : r;
  });
}

// ─── ESTIMATOR DRAWING-ANALYSIS HELPERS ──────────────────────────────────────
function findClosestCompModel(modelStr) {
  if (!modelStr) return null;
  const s = String(modelStr).toUpperCase().replace(/[-\s]/g,'');
  const series = ['HTV','HTM','HV','HT','HD'].find(p=>s.startsWith(p));
  if (!series || !COMP_DB[series]) return null;
  const models = Object.keys(COMP_DB[series].cfm||{});
  if (models.includes(s)) return {series, model:s};
  const num = parseFloat(s.slice(series.length));
  if (isNaN(num)) return {series, model:models[0]};
  let best=models[0], bestDiff=Infinity;
  models.forEach(m=>{const n=parseFloat(m.slice(series.length));if(!isNaN(n)&&Math.abs(n-num)<bestDiff){bestDiff=Math.abs(n-num);best=m;}});
  return {series, model:best};
}
function findDryerOption(modelStr) {
  if (!modelStr) return null;
  const u = String(modelStr).toUpperCase();
  return DRYER_OPTS.find(o=>o.toUpperCase().startsWith(u))||null;
}
function findTankOption(sizeStr) {
  if (!sizeStr) return null;
  const m = String(sizeStr).match(/(\d+)/);
  if (!m) return null;
  const g = parseInt(m[1]);
  return TANK_OPTS.find(o=>{const n=o.match(/^(\d+)/);return n&&parseInt(n[1])>=g;})||TANK_OPTS[TANK_OPTS.length-1];
}
function matchPipeSize(raw) {
  if (!raw) return null;
  const s = String(raw).trim();
  if (PIPE_SIZES.includes(s)) return s;
  const num = parseFloat(s.replace(/[^\d.]/g,''));
  if (isNaN(num)) return null;
  return PIPE_SIZES.find(ps=>Math.abs(parseFloat(ps)-num)<0.05)||null;
}

// ─── ENERGY & COST CALCULATOR ─────────────────────────────────────────────────
function EnergyCalculator() {
  const [open, setOpen]               = React.useState(false);
  const [kwhRate, setKwhRate]         = React.useState("0.085");
  const [hoursPerDay, setHoursPerDay] = React.useState("8");
  const [daysPerWeek, setDaysPerWeek] = React.useState("5");
  const [weeksPerYear, setWeeksPerYear] = React.useState("50");
  const [units, setUnits] = React.useState([
    { id:'existing', label:'Existing Unit', enabled:true,  hp:'30', loadFactor:0.65, isVSD:false, equipmentCost:'' },
    { id:'hodge',    label:'Hodge Fixed',   enabled:true,  hp:'30', loadFactor:0.65, isVSD:false, equipmentCost:'' },
    { id:'hodgeVSD', label:'Hodge VSD',     enabled:true,  hp:'30', loadFactor:0.65, isVSD:true,  equipmentCost:'' },
  ]);
  const [tank, setTank] = React.useState({ cfm:'100', pressure:'100', band:'10', gallons:'120' });

  function updUnit(id, field, val) { setUnits(p => p.map(u => u.id===id ? {...u,[field]:val} : u)); }

  const rate = parseFloat(kwhRate) || 0.085;
  const hpd  = parseFloat(hoursPerDay) || 8;
  const dpw  = parseFloat(daysPerWeek) || 5;
  const wpy  = parseFloat(weeksPerYear) || 50;
  const annualHours = hpd * dpw * wpy;

  function calcUnit(u) {
    const hp = parseFloat(u.hp) || 0;
    const lf = u.loadFactor;
    const motorKW = hp * 0.746;
    const inputKW = u.isVSD ? motorKW * Math.pow(lf, 1.6) : motorKW * (lf + (1-lf) * 0.25);
    const annualKWh  = inputKW * annualHours;
    const annualCost = annualKWh * rate;
    return { hp, motorKW, inputKW, annualKWh, annualCost };
  }

  const calcs = units.map(u => ({...u, ...calcUnit(u)}));
  const existingCalc = calcs.find(u => u.id === 'existing');
  const hodgeFixed   = calcs.find(u => u.id === 'hodge');
  const hodgeVSD     = calcs.find(u => u.id === 'hodgeVSD');

  function paybackMonths(c) {
    const ec = parseFloat(c.equipmentCost);
    if (!ec || !existingCalc || existingCalc.annualCost <= c.annualCost) return null;
    return ec / ((existingCalc.annualCost - c.annualCost) / 12);
  }

  const tCFM  = parseFloat(tank.cfm)      || 0;
  const tPSI  = parseFloat(tank.pressure) || 100;
  const tBand = parseFloat(tank.band)     || 10;
  const tGal  = parseFloat(tank.gallons)  || 0;
  const cycleTime     = tCFM > 0 ? (tGal * 0.1337 * tBand) / (tCFM / 60 * 14.7 / tPSI) : 0;
  const cyclesPerHour = cycleTime > 0 ? 3600 / cycleTime : 0;

  const savingsFixed      = existingCalc && hodgeFixed ? existingCalc.annualCost - hodgeFixed.annualCost  : 0;
  const savingsVSD        = existingCalc && hodgeVSD   ? existingCalc.annualCost - hodgeVSD.annualCost    : 0;
  const savingsVSDvsFixed = hodgeFixed   && hodgeVSD   ? hodgeFixed.annualCost   - hodgeVSD.annualCost    : 0;

  const fmt    = n => '$' + Math.abs(Math.round(n)).toLocaleString('en-US');
  const fmtS   = n => n > 0 ? '+'+fmt(n) : n < 0 ? '-'+fmt(n) : '$0';
  const fmtKWh = n => Math.round(n).toLocaleString('en-US');

  const colBorder = [`2px solid ${C.mid}`, `2px solid ${C.blueLight}`, `2px solid ${C.copper}`];
  const colColor  = [C.mid, C.blueLight, C.copper];
  // lbl9: C.mid for better contrast throughout
  const lbl9 = { display:'block', fontFamily:F.mono, fontSize:9, letterSpacing:2, color:C.mid, marginBottom:4 };
  const numIn = { background:C.surface2, border:`1px solid ${C.border}`, borderRadius:4, padding:'4px 6px', color:C.text, fontSize:12, fontFamily:F.mono, outline:'none', width:'100%' };
  const tdS   = { padding:'6px 10px', fontSize:12, color:C.text, borderBottom:`1px solid ${C.border}` };
  const thS   = { padding:'6px 10px', textAlign:'right', fontFamily:F.mono, fontSize:9, letterSpacing:1, color:C.mid, borderBottom:`1px solid ${C.border}`, fontWeight:'normal', whiteSpace:'nowrap' };

  const refLF    = (units.find(u=>u.id==='existing'&&u.enabled) || units.find(u=>u.id==='hodge'&&u.enabled) || units[0]).loadFactor;
  const vsdColor = refLF < 0.40 ? C.copper : refLF <= 0.80 ? C.green : C.blueLight;
  const vsdMsg   = refLF < 0.40
    ? `Load factor ${Math.round(refLF*100)}% — below 40%. A smaller fixed speed unit may be more cost effective than VSD.`
    : refLF <= 0.80
    ? `Load factor ${Math.round(refLF*100)}% — in VSD sweet spot (40–80%). VSD recommended, strong energy ROI.`

  // Always exactly 3 bullets

    else if (existingCalc && existingCalc.enabled && hodgeFixed && hodgeFixed.enabled && savingsFixed > 0)
      p.push(`Your current unit costs ${fmt(existingCalc.annualCost)}/year to run. Our ${hodgeFixed.label} cuts that to ${fmt(hodgeFixed.annualCost)} — saving ${fmt(savingsFixed)} annually.`);
    else
      p.push('Enter HP and load factor above to see annual energy cost and savings vs. Hodge options.');
    // Bullet 2: payback if cost entered, else tank sizing

    const pbFixed = hodgeFixed ? paybackMonths(hodgeFixed) : null;
    if (pbVSD)
      p.push(`The ${hodgeVSD.label} pays for itself in approximately ${Math.round(pbVSD)} months at current energy rates.`);
    else if (pbFixed)
      p.push(`The ${hodgeFixed.label} pays for itself in approximately ${Math.round(pbFixed)} months at current energy rates.`);
    else if (cyclesPerHour > 6)
      p.push(`At ${cyclesPerHour.toFixed(0)} cycles/hr, ${cyclesPerHour > 12 ? 'the compressor is short cycling' : 'cycling is frequent'}. Upsizing the receiver tank reduces wear and improves system stability.`);
    else
      p.push('Enter equipment cost (optional) to calculate payback period based on energy savings.');
    // Bullet 3: VSD sweet spot interpretation
    if (refLF < 0.40)
      p.push(`At ${Math.round(refLF*100)}% load factor, a smaller fixed speed unit may be more cost effective than VSD — consider right-sizing the compressor first.`);
    else if (refLF <= 0.80)
      p.push(`At ${Math.round(refLF*100)}% load factor, this system is in the VSD sweet spot. Variable speed drive delivers strong energy ROI here.`);
    else
      p.push(`At ${Math.round(refLF*100)}% load factor, the unit runs near full capacity. Fixed speed is competitive — evaluate VSD payback carefully before recommending.`);
    return p;
  })();

  return (
    <div style={{marginBottom:12}}>

        borderRadius:10, overflow:'hidden',

function Estimator() {

  // ── Design Advisor state ──
  const [sysOpen, setSysOpen]       = React.useState(false);
  const [sysMethod, setSysMethod]   = React.useState("manual");
  const [sysReqs, setSysReqs]       = React.useState({ cfm:"", psi:"100", appType:"General Manufacturing", airQuality:"4", hours:"8", days:"5", weeks:"50", phase:"3ph", voltage:"460v3ph", notes:"" });
  const [sysFileBusy, setSysFileBusy] = React.useState(false);
  const [sysBusy, setSysBusy]       = React.useState(false);
  const [sysRec, setSysRec]         = React.useState(null);
  const [sysStock, setSysStock]     = React.useState({});
  const sysFileRef                  = React.useRef(null);
  const [pmData, setPmData]         = React.useState(null);
  const [pmBusy, setPmBusy]         = React.useState(false);
  const pmFileRef                   = React.useRef(null);
  const [pmFileKey, setPmFileKey]   = React.useState(0);
  const [equipPrice, setEquipPrice]           = React.useState("");
  const [compToggle, setCompToggle]           = React.useState(false);
  const [compEquipPrice, setCompEquipPrice]   = React.useState("");
  const [compAnnualMaint, setCompAnnualMaint] = React.useState("");
  const [selectedTier, setSelectedTier] = React.useState(null);
  const [openSections, setOpenSections] = React.useState({buildSystem:true,saveexport:false,valueJustification:false});
  const toggleSection = k => setOpenSections(p=>({...p,[k]:!p[k]}));
  const secOpen       = k => !!openSections[k];
  const secHdr = (key, label, badge, step, subtitle) => (
    <div onClick={()=>toggleSection(key)} style={{
      display:'flex', justifyContent:'space-between', alignItems:'center',
      cursor:'pointer', userSelect:'none',
      background:`linear-gradient(135deg,rgba(193,122,53,0.08) 0%,${C.surface} 60%)`,
      border:`1.5px solid ${C.copper}`, borderLeft:`4px solid ${C.copper}`,
      borderRadius: secOpen(key) ? '10px 10px 0 0' : 10,
      padding:'14px 16px', marginBottom: secOpen(key) ? 0 : 12,
    }}>
      <div>
        <div style={{display:'flex', alignItems:'center', gap:8, marginBottom: subtitle ? 4 : 0}}>
          {step && <span style={{fontFamily:F.mono,fontSize:8,letterSpacing:2,color:C.copper,background:'rgba(193,122,53,0.15)',border:'1px solid rgba(193,122,53,0.3)',padding:'2px 6px',borderRadius:4}}>{step}</span>}
          <span style={{fontFamily:F.head, fontSize:20, letterSpacing:3, color:C.copper}}>{label}</span>
          {!secOpen(key) && badge && (
            <span style={{fontFamily:F.mono, fontSize:9, color:C.copper, background:'rgba(193,122,53,0.12)', border:`1px solid rgba(193,122,53,0.3)`, borderRadius:4, padding:'2px 8px', letterSpacing:1}}>{badge}</span>
          )}
        </div>

    </div>
  );

  const uid = () => Date.now() + Math.random();

  function addComp() {
    setComps(p => [...p, {id:uid(),series:"HD",model:"HD30",pressure:116,inletTemp:100,ambientTemp:100}]);
  }
  function updComp(id, field, val) {
    setComps(p => p.map(c => {
      if (c.id !== id) return c;
      const u = {...c,[field]:val};
      if (field==="series") {
        u.model = Object.keys(COMP_DB[val]?.cfm||{})[0]||"";
        const ap = estAvailPressures(val, u.model);
        u.pressure = ap[0]||116;
      }
      if (field==="model") {
        const ap = estAvailPressures(u.series, val);
        if (!ap.includes(u.pressure)) u.pressure = ap[0];
      }
      return u;
    }));
  }
  function rmComp(id) { setComps(p=>p.filter(c=>c.id!==id)); }

  function addRow(setter, def) { setter(p=>[...p,{id:uid(),name:def||"",qty:1}]); }
  function updRow(setter, id, f, v) { setter(p=>p.map(r=>r.id===id?{...r,[f]:v}:r)); }
  function rmRow(setter, id) { setter(p=>p.filter(r=>r.id!==id)); }

  async function loadEstimates() {
    setPastLoading(true);
    try {
      const r = await fetch("/api/estimates");
      const d = await r.json();
      setPastList(Array.isArray(d) ? d : []);
    } catch { setPastList([]); }
    setPastLoading(false);
  }

  React.useEffect(() => { if (showPast) loadEstimates(); }, [showPast]);

  async function saveEstimate() {
    setSaveBusy(true); setSaveMsg("");
    const sysType = layoutAnalysis && !layoutAnalysis.error
      ? (layoutAnalysis.systemType === "loop" ? "loop" : layoutAnalysis.systemType === "dead-end" ? "branch" : "")
      : "";
    const payload = {
      repName:      saveRep,
      customer:     job.customer,
      address:      job.address,
      pipeSize:     job.pipeSize,
      dropSize:     job.dropSize,
      pipeColor:    job.pipeColor,
      totalRunFt:   Number(job.totalRun) || 0,
      systemType:   sysType,
      compressors:  comps.map(c => ({ series:c.series, model:c.model, pressure:c.pressure, cfm: estCFM(c.series,c.model,c.pressure)||null })),
      dryers:       dryers.map(d => ({ qty:d.qty, name:d.name })),
      tanks:        tanks.map(t  => ({ qty:t.qty, name:t.name })),
      hoseReels:    reels.map(r  => ({ qty:r.qty, name:r.name })),
      analysisNotes: layoutAnalysis && !layoutAnalysis.error ? layoutAnalysis.notes||"" : "",
      bomOutput:    bomText,
    };
    try {
      const r = await fetch("/api/estimates", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload) });
      if (!r.ok) throw new Error("Server error " + r.status);
      setSaveMsg("Saved!");
      setTimeout(() => setSaveMsg(""), 3000);
    } catch(e) { setSaveMsg("⚠ " + e.message); }
    setSaveBusy(false);
  }

  function resetEstimate() {
    setJob({customer:"",address:"",pipeSize:"1\"",pipeColor:"Blue",totalRun:"",dropSize:"3/4\""});
    setComps([]); setDryers([]); setTanks([]); setReels([]);
    setLayoutImgs([]); setLayoutAnalysis(null);
    setBomText(""); setSaveMsg("");
    setFileInputKey(k => k + 1);
    setSelectedTier(null);
  }

  async function extractFromSpec(file) {
    setSysFileBusy(true);
    try {
      const b64 = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.onerror=rej; r.readAsDataURL(file); });
      const isImg = file.type.startsWith("image/");
      const mediaBlock = isImg
        ? { type:"image", source:{ type:"base64", media_type:file.type, data:b64 } }
        : { type:"document", source:{ type:"base64", media_type:"application/pdf", data:b64 } };
      const res = await fetch("/api/claude",{ method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:600,
          messages:[{ role:"user", content:[mediaBlock,{ type:"text",
            text:`Extract compressed air system requirements from this document. Return only JSON:
{"cfm":number_or_null,"psi":number_or_null,"appType":"string_or_null","airQuality":"1"|"2"|"3"|"4"|"5"|null,"hours":"8"|"10"|"16"|"24"|null,"phase":"1ph"|"3ph"|null,"notes":"string_or_null"}` }] }] }) });
      const d = await res.json(); if (d.error) throw new Error(d.error.message);
      const text = (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const m = text.match(/\{[\s\S]*?\}/);
      if (m) { const ex=JSON.parse(m[0]); setSysReqs(p=>({ cfm:ex.cfm?String(ex.cfm):p.cfm, psi:ex.psi?String(ex.psi):p.psi, appType:ex.appType||p.appType, airQuality:ex.airQuality||p.airQuality, hours:ex.hours||p.hours, phase:ex.phase||p.phase, notes:ex.notes||p.notes })); }
    } catch(e) { console.warn("extractFromSpec:",e); }
    setSysFileBusy(false);
  }

  async function designSystem() {
    if (!sysReqs.cfm) return;
    setSysBusy(true); setSysRec(null); setSysStock({}); setSelectedTier(null);

      `${k} (${v.label}): `+Object.entries(v.cfm||{}).map(([m,ps])=>
        `${m}@${Object.entries(ps).map(([p,c])=>`${p}psi=${c}cfm`).join("/")}`)
      .join(", ")
    ).join("\n");
    const hadCatalog = HAD_DRYERS.map(d=>`${d.model}=${d.cfm}CFM`).join(", ");
    const airQualityLabels = {"1":"Class 1 — Pharmaceutical/food (oil-free)","2":"Class 2 — Electronics/painting","3":"Class 3 — Instrument air","4":"Class 4 — General manufacturing","5":"Class 5 — Basic"};
    const filterPkgs = {"1":"Desiccant dryer + coalescing pre-filter + coalescing after-filter + carbon filter + sterile filter (consider oil-free compressor)","2":"Refrigerant dryer + coalescing pre-filter + coalescing after-filter + carbon filter","3":"Refrigerant dryer + coalescing pre-filter + coalescing after-filter","4":"Refrigerant dryer + coalescing filter","5":"Coalescing filter only (dryer recommended)"};
    const prompt =
`You are a compressed air system design engineer for Hodge Compressor. Design Good/Better/Best recommendations.

CUSTOMER REQUIREMENTS:
Required CFM: ${sysReqs.cfm} CFM | Pressure: ${sysReqs.psi} PSIG | Application: ${sysReqs.appType}
Air quality: ISO 8573-1 ${airQualityLabels[sysReqs.airQuality]||sysReqs.airQuality}
Operating schedule: ${sysReqs.hours} hrs/day × ${sysReqs.days} days/week × ${sysReqs.weeks} weeks/year = ${Number(sysReqs.hours)*Number(sysReqs.days)*Number(sysReqs.weeks)} annual hours
Power: ${sysReqs.phase==="1ph"?"Single-phase (very limited Hodge options — recommend phase converter or HTM7.5(1Ph) only)":"Three-phase"} | Voltage: ${{
  "230v1ph":"208-230V Single Phase — restrict recommendations to: HTM series (HTM7.5, HTM10, HTM15, HTM20 — all run on 208V despite tech data) and small HD models (HD10, HD15, HD20, HD25 only). HV/HT/HTV and larger HD units require 3-phase; flag and recommend phase converter if needed.",
  "230v3ph":"208-230V Three Phase — available on smaller HD models (HD10–HD25) and HTM series (HTM units run on 208V). Most HV/HT/HTV models are 460V standard; note non-standard motor configuration and confirm with factory for larger models.",
  "460v3ph":"460V Three Phase — standard Hodge catalog voltage, all models available",
  "575v3ph":"575V Three Phase — available on most models, common in Canada, confirm with factory",
  "380v3ph":"380V Three Phase — export voltage, factory order, confirm lead time"
}[sysReqs.voltage]||sysReqs.voltage}
${sysReqs.notes?`Special requirements: ${sysReqs.notes}`:""}

HODGE COMPRESSOR CATALOG (model@psi=cfm):
${compCatalog}

HAD REFRIGERANT DRYERS: ${hadCatalog} — always prefer HAD if CFM fits; use Beko DRYPOINT if above HAD487.

  async function parsePmEstimate(file) {
    setPmBusy(true); setPmData(null);
    try {
      const isDocx = file.type==="application/vnd.openxmlformats-officedocument.wordprocessingml.document" || file.name?.toLowerCase().endsWith(".docx");
      const isPdf  = file.type==="application/pdf";
      const isImg  = file.type.startsWith("image/");
      if (!isPdf && !isImg && !isDocx) { setPmData({error:"Please upload a PDF, Word doc (.docx), or image of the PM estimate."}); setPmBusy(false); return; }
      const b64 = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.onerror=rej; r.readAsDataURL(file); });
      const EXTRACT_PROMPT = `{"annualPmCost":number,"monthlySubscriptionCost":number|null,"servicesIncluded":["..."],"unitCovered":"string"}
If a field is absent, use null.`;
      let messages;
      if (isDocx) {
        const textResp = await fetch("/api/parse-docx",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({base64:b64}) });
        const textData = await textResp.json();
        if (textData.error) throw new Error(textData.error);
        messages = [{ role:"user", content:[{ type:"text", text:`Extract from this Hodge PM estimate and return ONLY valid JSON (no markdown):\n${EXTRACT_PROMPT}\n\nPM ESTIMATE TEXT:\n${textData.text}` }] }];
      } else {
        const mediaBlock = isPdf
          ? { type:"document", source:{ type:"base64", media_type:"application/pdf", data:b64 } }
          : { type:"image",    source:{ type:"base64", media_type:file.type, data:b64 } };
        messages = [{ role:"user", content:[mediaBlock,{ type:"text", text:`Extract from this Hodge PM estimate and return ONLY valid JSON (no markdown):\n${EXTRACT_PROMPT}` }] }];
      }
      const resp = await fetch("/api/claude",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:512, messages }) });
      const d = await resp.json();
      if (d.error) throw new Error(d.error.message||JSON.stringify(d.error));
      const raw = (d.content?.[0]?.text||"").trim();
      const clean = raw.replace(/^```(?:json)?\n?|\n?```$/g,"").trim();
      setPmData(JSON.parse(clean));
    } catch(e) { setPmData({error:e.message}); }
    setPmBusy(false);
  }

  function filterPastList(list) {
    return list.filter(est => {
      if (fSeries !== "Any" && !(est.compressors||[]).some(c => c.series === fSeries)) return false;
      if (fPipeSize !== "Any" && est.pipeSize !== fPipeSize) return false;
      if (fSysType !== "Any") {
        const st = (est.systemType||"").toLowerCase();
        if (fSysType === "Loop" && st !== "loop") return false;
        if (fSysType === "Branch" && st !== "branch") return false;
      }
      const run = Number(est.totalRunFt)||0;
      if (fRunRange === "Under 100ft" && run >= 100) return false;
      if (fRunRange === "100-300ft"   && (run < 100 || run > 300)) return false;
      if (fRunRange === "300ft+"      && run <= 300) return false;
      return true;
    });
  }

  async function handleFileUpload(e) {
    const files = Array.from(e.target.files);
    // Remount input now (key+1) — files already copied, so reads are unaffected
    setFileInputKey(k => k + 1);
    if (!files.length) return;
    const newImgs = [];
    for (const file of files) {
      if (file.type === "application/pdf") {
        alert(`${file.name}: PDF detected — export as PNG or JPG first.`);
        continue;
      }
      try {
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = ev => resolve(ev.target.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        newImgs.push({ dataUrl, mediaType: file.type || "image/jpeg", name: file.name });
      } catch { /* skip unreadable file */ }
    }
    if (newImgs.length) {
      setLayoutImgs(prev => [...prev, ...newImgs]);
      setLayoutAnalysis(null);
    }
  }

                    <div>
                      <div style={{fontFamily:F.body,fontSize:14,color:C.text,fontWeight:600,lineHeight:1.2}}>

                      <div style={{fontFamily:F.mono,fontSize:9,color:C.mid,letterSpacing:1,marginTop:3}}>
                        {est.repName} · {dateStr}

                    </div>
                    <button onClick={()=>loadEstimateIntoForm(est)} style={{
                      background:`linear-gradient(135deg,${C.copper} 0%,#A0632A 100%)`,

                      cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"

                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {[

                      ["System", sysLabel],

                      <div key={lbl} style={{background:C.surface3,borderRadius:4,padding:"3px 8px"}}>
                        <span style={{fontFamily:F.mono,fontSize:8,color:C.dim,letterSpacing:1}}>{lbl}: </span>
                        <span style={{fontFamily:F.body,fontSize:11,color:C.mid}}>{val}</span>

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>

          height="36" alt="Hodge" style={{borderRadius:4,background:"white",padding:"2px 6px"}}/>
        <div>
          <div style={{fontFamily:F.head,fontSize:22,letterSpacing:3,color:C.text,lineHeight:1}}>SYSTEM ENGINEER</div>
          <div style={{fontFamily:F.mono,fontSize:9,color:C.mid,letterSpacing:2,marginTop:3}}>Compressed Air System Design &amp; Estimation</div>
        </div>
      </div>

              <input value={job.customer} onChange={e=>setJob({...job,customer:e.target.value})}

            </FieldRow>
            <FieldRow label="SITE ADDRESS">
              <input value={job.address} onChange={e=>setJob({...job,address:e.target.value})}
                placeholder="City, State" style={inS}/>
            </FieldRow>
          </div>
          <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

            </FieldRow>
            <FieldRow label="DROP SIZE" hint="branch takeoffs">
              <select value={job.dropSize||"3/4\""} onChange={e=>setJob({...job,dropSize:e.target.value})} style={inS}>

          </div>
          <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <FieldRow label="PIPE COLOR">

                {PIPE_COLORS.map(c=><option key={c} value={c}>{c}</option>)}

            <FieldRow label="TOTAL RUN (FT)">
              <input type="number" value={job.totalRun}

                placeholder="e.g. 250" style={inS}/>
            </FieldRow>
          </div>
        </div>
      </div>

        background:`linear-gradient(135deg,rgba(193,122,53,0.08) 0%,${C.surface} 60%)`,

        border:`1.5px solid ${C.copper}`,
        borderLeft:`4px solid ${C.copper}`,
        boxShadow:`0 0 40px rgba(193,122,53,0.28), 0 4px 16px rgba(0,0,0,0.5)`,
      }}>
        {/* Copper accent bar */}
        <div style={{height:3,background:`linear-gradient(90deg,${C.copper},#E8860A,${C.orange})`}}/>
        <div style={{padding:16}}>
        <div onClick={()=>setSysOpen(o=>!o)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",userSelect:"none",marginBottom:sysOpen?14:0}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <span style={{fontFamily:F.mono,fontSize:8,letterSpacing:2,color:C.copper,background:"rgba(193,122,53,0.15)",border:"1px solid rgba(193,122,53,0.3)",padding:"2px 6px",borderRadius:4}}>STEP 2</span>
              <span style={{fontFamily:F.head,fontSize:20,letterSpacing:3,color:C.copper,lineHeight:1}}>⚙️ SYSTEM REQUIREMENTS &amp; DESIGN ADVISOR</span>
            </div>
            <div style={{fontFamily:F.body,fontSize:11,color:C.mid}}>Define requirements → get Good / Better / Best recommendation</div>
          </div>
          <span style={{color:C.copper,fontSize:18,marginLeft:12,flexShrink:0}}>{sysOpen?"▲":"▼"}</span>
        </div>

          </div>

          {/* Method toggle */}
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {[["manual","✏️ Manual Input"],["upload","📄 Upload Spec Sheet"]].map(([k,lbl])=>(
              <button key={k} onClick={()=>setSysMethod(k)} style={{
                flex:1, padding:"8px 0", borderRadius:7, fontSize:13, cursor:"pointer",
                fontFamily:F.body, background:sysMethod===k?C.copper:"none",
                border:`1.5px solid ${sysMethod===k?C.copper:C.border}`,
                color:sysMethod===k?"#fff":C.mid, transition:"all 0.15s"
              }}>{lbl}</button>
            ))}
          </div>

            <div style={{marginBottom:14}}>

                onChange={e=>{ const f=e.target.files[0]; if(f) extractFromSpec(f); e.target.value=""; }}/>
              <button onClick={()=>sysFileRef.current?.click()} disabled={sysFileBusy} style={{
                background:sysFileBusy?C.surface2:"none", border:`1.5px dashed ${C.border}`, borderRadius:7,
                padding:"10px 18px", color:sysFileBusy?C.mid:C.text, cursor:sysFileBusy?"default":"pointer",
                fontFamily:F.body, fontSize:13, display:"flex", alignItems:"center", gap:8
              }}>
                {sysFileBusy ? "⏳ Reading document…" : "📎 Choose file (image or PDF)"}
              </button>
            </div>
          )}
