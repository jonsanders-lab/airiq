              {TEMPLATE_OPTS.map(t=>(
                <button key={t.key} onClick={()=>applyTemplate(t.key)}
                  style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:7,padding:'12px 16px',
                         textAlign:'left',cursor:'pointer',transition:'border-color 0.15s'}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=C.copper}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
                  <div style={{fontFamily:F.mono,fontSize:10,color:'#fff',marginBottom:3}}>{t.name}</div>
                  <div style={{fontFamily:F.mono,fontSize:8,color:C.mid}}>{t.desc}</div>
                </button>
              ))}
              <button onClick={()=>{ if(els.length>0&&!window.confirm('Clear current drawing?'))return; mutate(()=>[]); setShowTemplates(false); }}
                style={{background:'transparent',border:`1px solid ${C.border}`,borderRadius:7,padding:'10px 16px',
                       fontFamily:F.mono,fontSize:9,color:C.dim,cursor:'pointer',textAlign:'left'}}>
                Blank canvas (clear current)
              </button>
            </div>
            <button onClick={()=>setShowTemplates(false)}
              style={{marginTop:14,background:'transparent',border:'none',fontFamily:F.mono,fontSize:9,color:C.mid,cursor:'pointer'}}>
              ✕ cancel
            </button>
          </div>
        </div>
      )}
    </div>
  );
});

// ─── SITE SURVEY COMPONENT ────────────────────────────────────────────────────
function SiteSurvey() {
  const LS_KEY = "airiq_site_survey_draft";
  const today = new Date().toISOString().slice(0,10);
  const BLANK_FORM = {
    date:today, rep:"", branch:"", customer:"", contact:"", driveTime:"",
    delivery:"", electrical:"", piping:"",
    eqRotaryScrew:false, eqRecip:false, eqDryer:false, eqReceiver:false,
    eqFilter:false, eqOWSep:false, eqAutoDrains:false, eqSafetyValve:false,
    eqOther:false, eqOtherText:"",
    existingEquip:"",
    equipLocation:"", hasDock:null, hasForklift:null, forkRamp:null,
    unloadingIssues:null, unloadingNotes:"", forkCanSet:null,
    clearPath:null, doorsHalls:null, doorsHallsNotes:"",
    grassGravel:null, needLevelers:null, placingChallenges:null, placingChallengesNotes:"",
    fusDisconnect:null, circuitBreaker:null, wireSize:"", electricalNotes:"",
    pipingDescription:"", pipeMaterial:"", pipeSize:"1\"", linearFeet:"",
    pipeAbove8ft:null, pipeHeightNotes:"",
    elbows90:"", tees:"", couplings:"", ballValves:"", nptConnectors:"",
    bushings:"", unions:"", pipeClips:"", unistrut:"", quickBranch:"",
    bypasses:"", numDrops:"", dropLength:"", terminationBlocks:"", quickConnects:"",
    equipObstructions:null, equipObstructionsNotes:"",
    beams:null, beamsNotes:"", pipingNotes:"",
    rentalDiesel:false, rentalScissor:false, rentalForklift:false,
    rentalLugging:false, rentalOther:"",
    drawDrops:false, drawElectrical:false, drawBypasses:false, drawEquipment:false,
    drawBeams:false, drawDock:false, drawCustomerEquip:false, drawPiping:false, drawDiagrams:false,
    managerApproval:null, approvalNotes:"",
  };

  function initForm() {
    try {
      const saved = localStorage.getItem(LS_KEY);
      if (saved) {
        const draft = JSON.parse(saved);
        // Only restore if the draft has meaningful data — skip blank forms
        if (draft.customer || draft.rep) return draft;
      }
    } catch(e) {}
    return {...BLANK_FORM};
  }

  const [form, setFormRaw] = React.useState(initForm);
  const [open, setOpen]           = React.useState([0]);
  const [busy, setBusy]           = React.useState(false);
  const [saveMsg, setSaveMsg]     = React.useState("");
  const [showPast, setShowPast]   = React.useState(false);
  const [pastList, setPastList]   = React.useState([]);
  const [pastLoading, setPastLoading] = React.useState(false);
  const [savedData, setSavedData]       = React.useState(null);
  const [drawingOpen, setDrawingOpen]   = React.useState(false);
  const drawingRef                      = React.useRef(null);
  const [repEmail, setRepEmail]   = React.useState(() => {
    try { return localStorage.getItem("airiq_rep_email")||""; } catch { return ""; }
  });
  const [repEmailInput, setRepEmailInput] = React.useState("");

  function setForm(update) {
    setFormRaw(prev => {
      const next = typeof update === "function" ? update(prev) : {...prev, ...update};
      // Only persist drafts with meaningful data — don't save blank forms
      if (next.customer || next.rep) {
        try { localStorage.setItem(LS_KEY, JSON.stringify(next)); } catch(e) {}
      }
      return next;
    });
  }

  function f(field, val) { setForm({[field]:val}); }

  React.useEffect(() => {
    if (LUGGING_SIZES.includes(form.pipeSize) && !form.rentalLugging) {
      setForm({rentalLugging:true});
    }
  }, [form.pipeSize]);

  const sectionDone = [
    !!(form.date && form.rep && form.branch && form.customer),
    !!(form.delivery && form.electrical && form.piping),
    !!(form.eqRotaryScrew||form.eqRecip||form.eqDryer||form.eqReceiver||form.eqFilter||form.eqOWSep||form.eqAutoDrains||form.eqSafetyValve||form.eqOther),
    !!(form.existingEquip.trim()),
    !!(form.equipLocation.trim()),
    !!(form.wireSize.trim()),
    !!(form.pipingDescription.trim() && form.pipeMaterial && form.linearFeet),
    true,
    !!(form.drawDrops && form.drawElectrical && form.drawBypasses && form.drawEquipment &&
       form.drawBeams && form.drawDock && form.drawCustomerEquip && form.drawPiping && form.drawDiagrams),
    form.managerApproval !== null,
  ];
  const completedCount = sectionDone.filter(Boolean).length;

  function toggleSection(i) {
    setOpen(prev => prev.includes(i) ? prev.filter(x=>x!==i) : [...prev,i]);
  }

  const sel = (field, options, placeholder) => (
    <select value={form[field]} onChange={e=>f(field,e.target.value)} style={inS}>
      <option value="">{placeholder||"— Select —"}</option>
      {options.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  );

  function buildEmailBody(data) {
    const lines = ["SITE SURVEY — INSTALLATION QUOTING FORM",""];
    const yn = v => v===true?"Yes":v===false?"No":null;
    function add(lbl,v){ if(v!==null&&v!==undefined&&v!==""&&v!==false) lines.push(`${lbl}: ${v}`); }
    function h(t){ lines.push(""); lines.push(t); lines.push("-".repeat(t.length)); }

    h("JOB INFO");
    add("Date",data.date); add("Sales Rep",data.rep); add("Branch",data.branch);
    add("Customer",data.customer); add("Contact",data.contact); add("Drive Time",data.driveTime);

    h("DELIVERY & RESPONSIBILITY");
    add("Delivery",data.delivery); add("Electrical",data.electrical); add("Piping",data.piping);

    const equip=[data.eqRotaryScrew&&"Rotary Screw Compressor",data.eqRecip&&"Reciprocating Compressor",
      data.eqDryer&&"Air Dryer",data.eqReceiver&&"Receiver Tank",data.eqFilter&&"Filter",
      data.eqOWSep&&"O/W Separator",data.eqAutoDrains&&"Auto Drains",
      data.eqSafetyValve&&"Safety Valve & Gauge for Tank",
      data.eqOther&&(data.eqOtherText||"Other")].filter(Boolean);
    if(equip.length){h("NEW EQUIPMENT");equip.forEach(e=>lines.push("• "+e));}

    h("EXISTING EQUIPMENT"); add("Description",data.existingEquip);

    h("SITE CONDITIONS");
    add("Equipment Location",data.equipLocation);
    add("Loading Dock",yn(data.hasDock)); add("Customer Forklift",yn(data.hasForklift));
    add("Forklift Drive Out/Ramp",yn(data.forkRamp));
    if(data.unloadingIssues!==null) add("Unloading Issues",yn(data.unloadingIssues)+(data.unloadingNotes?": "+data.unloadingNotes:""));
    add("Forklift Can Set Equipment",yn(data.forkCanSet)); add("Clear Path",yn(data.clearPath));
    if(data.doorsHalls!==null) add("Doors or Halls",yn(data.doorsHalls)+(data.doorsHallsNotes?": "+data.doorsHallsNotes:""));
    add("Grass/Gravel/Unlevel",yn(data.grassGravel)); add("Levelers or Pads",yn(data.needLevelers));
    if(data.placingChallenges!==null) add("Placing Challenges",yn(data.placingChallenges)+(data.placingChallengesNotes?": "+data.placingChallengesNotes:""));

    h("ELECTRICAL");
    add("Fusible Disconnect <10ft",yn(data.fusDisconnect));
    add("Room for Circuit Breaker",yn(data.circuitBreaker));
    add("Wire Size",data.wireSize); add("Notes",data.electricalNotes);

    h("PIPING");
    add("Description",data.pipingDescription); add("Material",data.pipeMaterial);
    add("Pipe Size",data.pipeSize); add("Linear Feet",data.linearFeet?data.linearFeet+" ft":null);
    if(data.pipeAbove8ft!==null) add("Pipe Above 8ft",yn(data.pipeAbove8ft)+(data.pipeHeightNotes?": "+data.pipeHeightNotes:""));
    [["90 Elbows",data.elbows90],["Tees",data.tees],["Couplings",data.couplings],
     ["Ball Valves",data.ballValves],["NPT Connectors",data.nptConnectors],["Bushings/Reducers",data.bushings],
     ["Unions",data.unions],["Pipe Clips",data.pipeClips],["Unistrut",data.unistrut],
     ["Quick Branch",data.quickBranch],["Bypasses",data.bypasses],["# of Drops",data.numDrops],
     ["Drop Length & Size",data.dropLength],["Termination Blocks",data.terminationBlocks],
     ["Quick Connects",data.quickConnects],
    ].forEach(([l,v])=>add(l,v));
    if(data.equipObstructions!==null) add("Equipment Obstructions",yn(data.equipObstructions)+(data.equipObstructionsNotes?": "+data.equipObstructionsNotes:""));
    if(data.beams!==null) add("Beams/Workarounds",yn(data.beams)+(data.beamsNotes?": "+data.beamsNotes:""));
    add("Piping Notes",data.pipingNotes);

    const rental=[data.rentalDiesel&&"Diesel Compressor",data.rentalScissor&&"Scissor Lift",
      data.rentalForklift&&"Forklift",data.rentalLugging&&"Lugging Tool",data.rentalOther||null].filter(Boolean);
    if(rental.length){h("RENTAL EQUIPMENT");rental.forEach(r=>lines.push("• "+r));}

    const drawing=[data.drawDrops&&"Locations of all drops",
      data.drawElectrical&&"Locations of disconnects and all electrical",
      data.drawBypasses&&"Locations of bypasses",data.drawEquipment&&"All new and existing equipment",
      data.drawBeams&&"Beams and other workarounds",data.drawDock&&"Dock, ramp, delivery areas",
      data.drawCustomerEquip&&"Customer equipment or shelving",data.drawPiping&&"Locations of all piping",
      data.drawDiagrams&&"All diagrams, sketches, drawings"].filter(Boolean);
    if(drawing.length){h("DRAWING CHECKLIST");drawing.forEach(d=>lines.push("✓ "+d));}

    h("APPROVAL");
    add("Manager Approval",yn(data.managerApproval)); add("Notes",data.approvalNotes);

    return lines.join("\n");
  }

  async function loadPastSurveys() {
    setPastLoading(true);
    try {
      const r = await fetch("/api/estimates");
      const d = await r.json();
      setPastList(Array.isArray(d) ? d.filter(e => e.type === "site-survey") : []);
    } catch { setPastList([]); }
    setPastLoading(false);
  }

  React.useEffect(() => { if (showPast) loadPastSurveys(); }, [showPast]);

  async function deleteSurvey(id) {
    if (!window.confirm("Delete this survey? This cannot be undone.")) return;
    try {
      await fetch(`/api/estimates/${id}`, { method:"DELETE" });
      setPastList(prev => prev.filter(e => e.id !== id));
    } catch(e) {
      alert("Delete failed — check connection");
    }
  }

  async function handleSave() {
    setBusy(true); setSaveMsg("");
    try {
      const snapshot = {...form};
      const drawingDataURL = drawingRef.current?.getDataURL();
      if (drawingDataURL) snapshot.drawingDataURL = drawingDataURL;
      const res = await fetch("/api/estimates", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({type:"site-survey", data:snapshot, savedAt:new Date().toISOString()})
      });
      if (!res.ok) throw new Error();
      try { localStorage.removeItem(LS_KEY); } catch(e) {}
      setFormRaw({...BLANK_FORM});
      setOpen([0]);
      setSavedData(snapshot);
      setTimeout(() => setSavedData(null), 10000);
    } catch(e) {
      setSaveMsg("Save failed — check connection");
    } finally { setBusy(false); }
  }

  const SECTION_TITLES = [
    "1 — JOB INFO","2 — DELIVERY & RESPONSIBILITY","3 — NEW EQUIPMENT",
    "4 — EXISTING EQUIPMENT","5 — SITE CONDITIONS","6 — ELECTRICAL",
    "7 — PIPING","8 — RENTAL EQUIPMENT NEEDED","9 — DRAWING CHECKLIST","10 — APPROVAL",
  ];

  return (
    <div style={{padding:"16px 16px 32px", maxWidth:600, margin:"0 auto"}} onClick={()=>setSavedData(null)}>

      {/* Past Site Surveys Panel */}
      <div style={{marginBottom:16}}>
        <div style={{display:"flex", gap:8}}>
          <button onClick={()=>setShowPast(p=>!p)} style={{
            flex:1, background:C.surface, border:`1px solid ${C.border}`, borderRadius:10,
            padding:"12px 16px", display:"flex", justifyContent:"space-between", alignItems:"center",
            cursor:"pointer", fontFamily:F.mono, fontSize:11, color:C.mid, letterSpacing:2,
          }}>
            <span>📋 PAST SITE SURVEYS</span>
            <span style={{fontSize:14, transform:showPast?"rotate(180deg)":"rotate(0deg)", transition:"transform 0.2s"}}>▾</span>
          </button>
          <button onClick={e=>{ e.stopPropagation(); try{localStorage.removeItem(LS_KEY);}catch(e){} setFormRaw({...BLANK_FORM}); setOpen([0]); }} style={{
            background:"none", border:`1px solid ${C.border}`, borderRadius:10,
            padding:"12px 14px", fontFamily:F.mono, fontSize:10, letterSpacing:1,
            color:C.dim, cursor:"pointer", whiteSpace:"nowrap", flexShrink:0,
          }}>↺ Fresh</button>
        </div>

        {showPast && (
          <div style={{background:C.surface, border:`1px solid ${C.border}`, borderTopWidth:0,
            borderRadius:"0 0 10px 10px", padding:"0 12px 12px"}}>
            {pastLoading && (
              <div style={{color:C.dim, fontSize:12, fontFamily:F.mono, padding:"12px 0", letterSpacing:1}}>Loading...</div>
            )}
            {!pastLoading && pastList.length===0 && (
              <div style={{color:C.dim, fontSize:12, fontFamily:F.mono, padding:"12px 0", letterSpacing:1}}>No site surveys saved yet.</div>
            )}
            {!pastLoading && pastList.map(s => {
              const d = new Date(s.savedAt || s.timestamp);
              const dateStr = d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
              return (
                <div key={s.id} style={{background:C.surface2, border:`1px solid ${C.border}`,
                  borderRadius:8, padding:"10px 12px", marginTop:8,
                  display:"flex", flexDirection:"column", gap:6}}>
                  <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8}}>
                    <div>
                      <div style={{fontFamily:F.body, fontSize:14, color:C.text, fontWeight:600, lineHeight:1.2}}>
                        {s.data?.customer||"(no customer)"}
                      </div>
                      <div style={{fontFamily:F.mono, fontSize:9, color:C.mid, letterSpacing:1, marginTop:3}}>
                        {s.data?.rep} · {s.data?.branch} · {dateStr}
                      </div>
                    </div>
                    <div style={{display:"flex", gap:6, flexShrink:0}}>
                      <button onClick={()=>{ setForm(()=>s.data); setShowPast(false); setOpen([0]); }} style={{
                        background:`linear-gradient(135deg,${C.copper} 0%,#A0632A 100%)`,
                        border:"none", borderRadius:6, padding:"6px 11px",
                        fontFamily:F.mono, fontSize:9, letterSpacing:1, color:"#fff",
                        cursor:"pointer", whiteSpace:"nowrap"
                      }}>LOAD →</button>
                      <button onClick={()=>deleteSurvey(s.id)} style={{
                        background:"none", border:`1px solid ${C.red}`, borderRadius:6,
                        padding:"6px 9px", fontFamily:F.mono, fontSize:9, letterSpacing:1,
                        color:C.red, cursor:"pointer", whiteSpace:"nowrap"
                      }}>DEL</button>
                    </div>
                  </div>
                  <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                    {[
                      ["Date",    s.data?.date||"—"],
                      ["Pipe",    s.data?.pipeSize||"—"],
                      ["Footage", s.data?.linearFeet ? s.data.linearFeet+" ft" : "—"],
                    ].map(([lbl,val])=>(
                      <div key={lbl} style={{background:C.surface3, borderRadius:4, padding:"3px 8px"}}>
                        <span style={{fontFamily:F.mono, fontSize:8, color:C.dim, letterSpacing:1}}>{lbl}: </span>
                        <span style={{fontFamily:F.body, fontSize:11, color:C.mid}}>{val}</span>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Header + completion bar */}
      <div style={{marginBottom:16}}>
        <div style={{fontFamily:F.head, fontSize:26, letterSpacing:4, color:C.text, marginBottom:8}}>
          SITE SURVEY
        </div>
        <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:4}}>
          <div style={{flex:1, height:6, background:C.surface2, borderRadius:3, overflow:"hidden"}}>
            <div style={{height:"100%", width:`${completedCount*10}%`,
              background:C.copper, borderRadius:3, transition:"width 0.3s"}}/>
          </div>
          <span style={{fontFamily:F.mono, fontSize:11, color:C.copper, letterSpacing:1, whiteSpace:"nowrap"}}>
            {completedCount}/10
          </span>
        </div>
        <div style={{fontFamily:F.mono, fontSize:10, color:C.dim, letterSpacing:1}}>
          {completedCount===10
            ? "ALL SECTIONS COMPLETE"
            : completedCount===0
              ? "TAP SECTIONS TO EXPAND"
              : `${10-completedCount} SECTION${10-completedCount!==1?"S":""} REMAINING`}
        </div>
      </div>

      {/* FACILITY DRAWING TOOL */}
      <div style={{marginBottom:12}}>
        <div onClick={()=>setDrawingOpen(o=>!o)} style={{
          display:'flex',justifyContent:'space-between',alignItems:'center',
          cursor:'pointer',userSelect:'none',
          background:`linear-gradient(135deg,rgba(193,122,53,0.08) 0%,${C.surface} 60%)`,
          border:`1.5px solid ${C.copper}`,borderLeft:`4px solid ${C.copper}`,
          borderRadius:drawingOpen?'10px 10px 0 0':10,
          padding:'14px 16px',marginBottom:0,
        }}>
          <div>
            <div style={{fontFamily:F.head,fontSize:20,letterSpacing:3,color:C.copper,lineHeight:1}}>📐 FACILITY DRAWING TOOL</div>
            <div style={{fontFamily:F.body,fontSize:11,color:C.mid,marginTop:3}}>Sketch the facility — pipe runs, equipment placement, drops</div>
          </div>
          <span style={{color:C.copper,fontSize:18,marginLeft:12,flexShrink:0}}>{drawingOpen?'▲':'▼'}</span>
        </div>
        <div style={{overflow:'hidden',maxHeight:drawingOpen?'9999px':'0',transition:'max-height 0.3s ease'}}>
          <FacilityDrawing ref={drawingRef} customerName={form.customer} repName={form.rep}/>
        </div>
      </div>

      {/* S1 — JOB INFO */}
      <SurveyCard title={SECTION_TITLES[0]} done={sectionDone[0]} open={open.includes(0)} onToggle={()=>toggleSection(0)}>
        <FieldRow label="DATE">
          <input type="date" value={form.date} onChange={e=>f("date",e.target.value)} style={inS}/>
        </FieldRow>
        <FieldRow label="SALES REP" required>
          {sel("rep", REPS, "— Select Rep —")}
        </FieldRow>
        <FieldRow label="BRANCH" required>
          {sel("branch", BRANCHES, "— Select Branch —")}
        </FieldRow>
        <FieldRow label="COMPANY / CUSTOMER NAME" required>
          <input value={form.customer} onChange={e=>f("customer",e.target.value)} style={inS} placeholder="Customer name"/>
        </FieldRow>
        <FieldRow label="CONTACT NAME">
          <input value={form.contact} onChange={e=>f("contact",e.target.value)} style={inS} placeholder="Contact name"/>
        </FieldRow>
        <FieldRow label="DRIVE TIME RT">
          <input value={form.driveTime} onChange={e=>f("driveTime",e.target.value)} style={inS} placeholder="e.g. 1.5 hrs"/>
        </FieldRow>
      </SurveyCard>

      {/* S2 — DELIVERY & RESPONSIBILITY */}
      <SurveyCard title={SECTION_TITLES[1]} done={sectionDone[1]} open={open.includes(1)} onToggle={()=>toggleSection(1)}>
        <FieldRow label="HOW WILL EQUIPMENT BE DELIVERED?" required>
          {sel("delivery", ["Freight Delivery","Technician Delivery","Customer Pickup","Other"])}
        </FieldRow>
        <FieldRow label="WHO WILL BE HANDLING THE ELECTRICAL?" required>
          {sel("electrical", ["Electrical Contractor","Service Technicians","Customer to do themselves"])}
        </FieldRow>
        <FieldRow label="WHO WILL BE DOING THE PIPING?" required>
          {sel("piping", ["Service Technicians","Customer to do themselves","Plumbing Contractor","Other"])}
        </FieldRow>
      </SurveyCard>

      {/* S3 — NEW EQUIPMENT */}
      <SurveyCard title={SECTION_TITLES[2]} done={sectionDone[2]} open={open.includes(2)} onToggle={()=>toggleSection(2)}>
        <div style={{display:"flex", flexDirection:"column", gap:10}}>
          <SurveyChk checked={form.eqRotaryScrew} onChange={v=>f("eqRotaryScrew",v)} label="Rotary Screw Compressor"/>
          <SurveyChk checked={form.eqRecip}       onChange={v=>f("eqRecip",v)}       label="Reciprocating Compressor"/>
          <SurveyChk checked={form.eqDryer}       onChange={v=>f("eqDryer",v)}       label="Air Dryer"/>
          <SurveyChk checked={form.eqReceiver}    onChange={v=>f("eqReceiver",v)}    label="Receiver Tank"/>
          <SurveyChk checked={form.eqFilter}      onChange={v=>f("eqFilter",v)}      label="Filter"/>
          <SurveyChk checked={form.eqOWSep}       onChange={v=>f("eqOWSep",v)}       label="O/W Separator"/>
          <SurveyChk checked={form.eqAutoDrains}  onChange={v=>f("eqAutoDrains",v)}  label="Auto Drains"/>
          <SurveyChk checked={form.eqSafetyValve} onChange={v=>f("eqSafetyValve",v)} label="Safety Valve & Gauge for Tank"/>
          <SurveyChk checked={form.eqOther}       onChange={v=>f("eqOther",v)}       label="Other New Equipment"/>
          {form.eqOther && (
            <input value={form.eqOtherText} onChange={e=>f("eqOtherText",e.target.value)}
              style={inS} placeholder="Describe other new equipment"/>
          )}
        </div>
      </SurveyCard>

      {/* S4 — EXISTING EQUIPMENT */}
      <SurveyCard title={SECTION_TITLES[3]} done={sectionDone[3]} open={open.includes(3)} onToggle={()=>toggleSection(3)}>
        <FieldRow label="DESCRIBE EXISTING EQUIPMENT">
          <textarea value={form.existingEquip} onChange={e=>f("existingEquip",e.target.value)}
            rows={4} style={taS} placeholder="List existing compressors, dryers, tanks, etc."/>
        </FieldRow>
      </SurveyCard>

      {/* S5 — SITE CONDITIONS */}
      <SurveyCard title={SECTION_TITLES[4]} done={sectionDone[4]} open={open.includes(4)} onToggle={()=>toggleSection(4)}>
        <FieldRow label="DESCRIBE EQUIPMENT LOCATION">
          <textarea value={form.equipLocation} onChange={e=>f("equipLocation",e.target.value)}
            rows={3} style={taS} placeholder="Where in the facility is the equipment going?"/>
        </FieldRow>
        <FieldRow label="DOES CUSTOMER HAVE A LOADING DOCK?">
          <YNToggle value={form.hasDock} onChange={v=>f("hasDock",v)}/>
        </FieldRow>
        <FieldRow label="DOES CUSTOMER HAVE A FORKLIFT?">
          <YNToggle value={form.hasForklift} onChange={v=>f("hasForklift",v)}/>
        </FieldRow>
        <FieldRow label="FORKLIFT DRIVE OUT OR RAMP?">
          <YNToggle value={form.forkRamp} onChange={v=>f("forkRamp",v)}/>

// ─── MARKET INTEL COMPONENT ──────────────────────────────────────────────────
function MarketIntel() {
  const BRANCHES    = ["Atlanta","Charlotte","Tampa","Greenville","Nashville","Dallas","Detroit","Cleveland","Chicago"];
  const COMPETITORS = ["Diversified Air Systems","Kaeser","Atlas Copco","Compressed Air Systems","Other"];
  const CATEGORIES  = ["Parts","Labor","Equipment","Other"];
  const today = new Date().toISOString().slice(0,10);

  const hodgeInputRef = React.useRef(null);
  const compInputRef  = React.useRef(null);
  const [header, setHeader]         = React.useState({ branch:"", repName:"", competitor:"", customer:"", equipmentModel:"", quoteDate:today });
  const [item, setItem]             = React.useState({ description:"", category:"Parts", hodgePrice:"", competitorPrice:"" });
  const [lineItems, setLineItems]   = React.useState([]);
  const [busy, setBusy]             = React.useState(false);
  const [saveMsg, setSaveMsg]       = React.useState("");
  const [hodgeFile, setHodgeFile]   = React.useState(null);
  const [compFile, setCompFile]     = React.useState(null);
  const [comparing, setComparing]   = React.useState(false);
  const [compareMsg, setCompareMsg] = React.useState("");

  // ── Manual entry ────────────────────────────────────────────────────────────
  function hf(k,v) { setHeader(p => ({...p, [k]:v})); }
  function itf(k,v) { setItem(p => ({...p, [k]:v})); }

  function recalc(row) {
    const h = row.hodgePrice, c = row.competitorPrice;
    return {...row, delta: h-c, pct: c!==0 ? (h-c)/c*100 : null};
  }

  function addItem() {
    if (!item.description.trim()) return;
    const h = parseFloat(item.hodgePrice) || 0;
    const c = parseFloat(item.competitorPrice) || 0;
    setLineItems(p => [...p, recalc({ description:item.description.trim(), category:item.category, hodgePrice:h, competitorPrice:c, equipmentModel:"" })]);
    setItem({ description:"", category:item.category, hodgePrice:"", competitorPrice:"" });
  }
  function removeItem(i) { setLineItems(p => p.filter((_,idx) => idx !== i)); }
  function updateHodgePrice(i, val) {
    setLineItems(p => p.map((row,idx) => idx!==i ? row : recalc({...row, hodgePrice: parseFloat(val)||0})));
  }
  function updateCompPrice(i, val) {
    setLineItems(p => p.map((row,idx) => idx!==i ? row : recalc({...row, competitorPrice: parseFloat(val)||0})));
  }

  // ── Reset ───────────────────────────────────────────────────────────────────
  function handleReset() {
    setHodgeFile(null);
    setCompFile(null);
    setLineItems([]);
    setHeader({ branch:"", repName:"", competitor:"", customer:"", equipmentModel:"", quoteDate:today });
    setItem({ description:"", category:"Parts", hodgePrice:"", competitorPrice:"" });
    setCompareMsg("");
    setSaveMsg("");
  }

  // ── File selection ──────────────────────────────────────────────────────────
  function handleHodgeFile(e) {
    const file = e.target.files[0]; if (!file) return; e.target.value = "";
    setHodgeFile(file); setCompareMsg("");
  }
  function handleCompFile(e) {
    const file = e.target.files[0]; if (!file) return; e.target.value = "";
    setCompFile(file); setCompareMsg("");
  }

  // ── Compare ─────────────────────────────────────────────────────────────────
  async function handleCompare() {
    setComparing(true); setCompareMsg("");
    try {
      function toBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }
      const [hodgeBase64, compBase64] = await Promise.all([toBase64(hodgeFile), toBase64(compFile)]);
      const res = await fetch("/api/market-intel/compare", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          hodgeBase64, hodgeMimeType: hodgeFile.type,
          compBase64,  compMimeType:  compFile.type,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Comparison failed");
      const r = data.result;
      const compMatch = (() => {
        if (!r.competitor) return "";
        const lower = r.competitor.toLowerCase();
        return COMPETITORS.find(c => lower.includes(c.toLowerCase()) || c.toLowerCase().includes(lower)) || "Other";
      })();
      const models = (r.groups||[]).map(g=>g.equipmentModel).filter(Boolean);
      setHeader(p => ({
        ...p,
        competitor:     compMatch         || p.competitor,
        customer:       r.customer        || p.customer,
        equipmentModel: models.join(", ") || p.equipmentModel,
      }));
      const flat = [];
      (r.groups||[]).forEach(g => {
        (g.lineItems||[]).forEach(l => {
          flat.push(recalc({
            description:     l.description || "",
            category:        CATEGORIES.includes(l.category) ? l.category : "Other",
            hodgePrice:      parseFloat(l.hodgePrice) || 0,
            competitorPrice: parseFloat(l.competitorPrice) || 0,
            equipmentModel:  g.equipmentModel || "",
          }));
        });
      });
      setLineItems(flat);
      const n = flat.length, u = (r.groups||[]).length;
      setCompareMsg("✓ " + n + " line item" + (n!==1?"s":"") + " compared across " + u + " unit" + (u!==1?"s":"") + " — review prices then Save & Log.");
    } catch(err) {
      setCompareMsg("Error: " + err.message);
    } finally {
      setComparing(false);
    }
  }

  // ── Totals ──────────────────────────────────────────────────────────────────
  function catTotals(cat) {
    const rows = lineItems.filter(r => r.category===cat);
    if (!rows.length) return null;
    const h = rows.reduce((s,r)=>s+r.hodgePrice,0);
    const c = rows.reduce((s,r)=>s+r.competitorPrice,0);
    return { hodge:h, comp:c, delta:h-c, pct:c!==0?(h-c)/c*100:null };
  }
  const grandH=lineItems.reduce((s,r)=>s+r.hodgePrice,0);
  const grandC=lineItems.reduce((s,r)=>s+r.competitorPrice,0);
  const grandDelta=grandH-grandC;
  const grandPct=grandC!==0?grandDelta/grandC*100:null;

  // ── Save ────────────────────────────────────────────────────────────────────
  async function handleSave() {
    if (!lineItems.length) { setSaveMsg("Add at least one line item before saving."); return; }
    setBusy(true); setSaveMsg("");
    try {
      const res = await fetch("/api/market-intel/log", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          branch:header.branch, repName:header.repName,
          customer:header.customer, competitor:header.competitor,
          equipmentModel:header.equipmentModel, quoteDate:header.quoteDate,
          lineItems:lineItems.map(l=>({
            description:l.description, category:l.category,
            hodgePrice:l.hodgePrice, competitorPrice:l.competitorPrice,
            equipmentModel:l.equipmentModel||"",
          })),
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Save failed");
      setSaveMsg("✓ " + data.rowsAdded + " row" + (data.rowsAdded!==1?"s":"") + " logged to Google Sheets");
      setLineItems([]); setCompareMsg("");
      setTimeout(() => setSaveMsg(""), 6000);
    } catch(err) { setSaveMsg("Error: " + err.message); }
    finally { setBusy(false); }
  }

  // ── Formatters / styles ─────────────────────────────────────────────────────
  const fmtPrice = n => "$" + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");
  const fmtDelta = n => n===0 ? "$0.00" : (n>0?"+":"-")+"$"+Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");
  const fmtPct   = n => n===null ? "N/A" : (n>0?"+":"") + n.toFixed(1) + "%";
  const dColor   = n => n>0 ? C.red : n<0 ? C.green : C.text;
  const rowBg    = r => r.delta>0 ? "rgba(220,38,38,0.08)" : r.delta<0 ? "rgba(34,197,94,0.08)" : "transparent";
  const tdS  = { padding:"8px 10px", fontSize:13, color:C.text, borderBottom:`1px solid ${C.border}` };
  const lblS = { display:"block", fontFamily:F.mono, fontSize:9, letterSpacing:3, color:C.mid, marginBottom:6 };
  const inpS = { background:"transparent", border:`1px solid ${C.border}`, borderRadius:4, padding:"4px 6px", color:C.text, fontSize:12, fontFamily:F.mono, outline:"none", width:72 };
  const sectTotals = CATEGORIES.map(cat=>({ cat, totals:catTotals(cat) })).filter(x=>x.totals);

  function fileChip(file, color, onClear) {
    const name = file.name.length > 22 ? file.name.slice(0,20)+"…" : file.name;
    return (
      <div style={{
        marginTop:0, display:"flex", alignItems:"center", justifyContent:"space-between",
        background:`${color}1A`, border:`1px solid ${color}`,
        borderRadius:6, padding:"7px 10px",
      }}>
        <span style={{fontFamily:F.mono, fontSize:10, color, letterSpacing:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>✓ {name}</span>
        <button onClick={onClear} disabled={comparing} style={{background:"none", border:"none", color:C.dim, cursor:"pointer", fontSize:16, padding:"0 0 0 8px", lineHeight:1}}>×</button>
      </div>
    );
  }

  return (
    <div style={{padding:"16px 16px 40px", maxWidth:600, margin:"0 auto"}}>
      <SectionHeader label="MARKET INTEL" sub="Competitive quote comparison & price analysis"/>

      {/* Dual upload zones */}
      <div style={{marginBottom:4}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4}}>
          <div style={{fontFamily:F.mono, fontSize:10, letterSpacing:2, color:C.mid}}>
            UPLOAD QUOTES <span style={{color:C.dim, fontWeight:400, letterSpacing:1}}>— OPTIONAL</span>
          </div>
          <button onClick={handleReset} style={{
            background:"transparent",
            border:`1px solid ${C.border}`,
            borderRadius:6, padding:"3px 10px",
            fontFamily:F.mono, fontSize:9, letterSpacing:1.5,
            color:C.mid, cursor:"pointer",
            transition:"all 0.15s",
          }}>↺ NEW</button>
        </div>
        <div style={{fontSize:12, color:C.dim, marginBottom:10, lineHeight:1.5}}>
          Upload both quotes for an AI-powered apples-to-apples comparison, or enter manually below.
        </div>
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>

          {/* Hodge Quote zone */}
          <div style={{background:C.surface, border:`1px solid rgba(59,111,212,0.45)`, borderRadius:10, padding:12}}>
            <div style={{fontFamily:F.mono, fontSize:9, letterSpacing:2, color:C.blueLight, marginBottom:8}}>HODGE QUOTE</div>
            <input ref={hodgeInputRef} type="file" accept=".pdf,image/jpeg,image/png,image/jpg"
              style={{display:"none"}} onChange={handleHodgeFile}/>
            {!hodgeFile ? (
              <button onClick={()=>hodgeInputRef.current && hodgeInputRef.current.click()} disabled={comparing} style={{
                background:C.surface3,
                border:`1.5px dashed ${comparing ? C.border : C.blueLight}`,
                borderRadius:7, padding:"11px 8px", width:"100%",
                fontFamily:F.mono, fontSize:10, letterSpacing:1,
                color: comparing ? C.dim : C.blueLight,
                cursor: comparing ? "not-allowed" : "pointer",
                display:"flex", alignItems:"center", justifyContent:"center", gap:6,
                transition:"all 0.15s",
              }}>
                <span style={{fontSize:14}}>📎</span><span>UPLOAD</span>
              </button>
            ) : fileChip(hodgeFile, C.blueLight, ()=>{ setHodgeFile(null); setCompareMsg(""); })}
          </div>

          {/* Competitor Quote zone */}
          <div style={{background:C.surface, border:`1px solid rgba(220,38,38,0.45)`, borderRadius:10, padding:12}}>
            <div style={{fontFamily:F.mono, fontSize:9, letterSpacing:2, color:C.red, marginBottom:8}}>COMPETITOR QUOTE</div>
            <input ref={compInputRef} type="file" accept=".pdf,image/jpeg,image/png,image/jpg"
              style={{display:"none"}} onChange={handleCompFile}/>
            {!compFile ? (
              <button onClick={()=>compInputRef.current && compInputRef.current.click()} disabled={comparing} style={{
                background:C.surface3,
                border:`1.5px dashed ${comparing ? C.border : C.red}`,
                borderRadius:7, padding:"11px 8px", width:"100%",
                fontFamily:F.mono, fontSize:10, letterSpacing:1,
                color: comparing ? C.dim : C.red,
                cursor: comparing ? "not-allowed" : "pointer",
                display:"flex", alignItems:"center", justifyContent:"center", gap:6,
                transition:"all 0.15s",
              }}>
                <span style={{fontSize:14}}>📎</span><span>UPLOAD</span>
              </button>
            ) : fileChip(compFile, C.red, ()=>{ setCompFile(null); setCompareMsg(""); })}
          </div>

        </div>

        {/* Compare button — only when both files loaded */}
        {(hodgeFile && compFile) && (
          <button onClick={handleCompare} disabled={comparing} style={{
            width:"100%", marginTop:10,
            background: comparing ? C.surface2 : `linear-gradient(135deg,${C.copper} 0%,#A0632A 100%)`,
            border:`1.5px solid ${comparing ? C.border : C.copper}`,
            borderRadius:8, padding:"12px 16px",
            fontFamily:F.mono, fontSize:12, letterSpacing:2,
            color: comparing ? C.dim : "#fff",
            cursor: comparing ? "not-allowed" : "pointer",
            display:"flex", alignItems:"center", justifyContent:"center", gap:8,
            transition:"all 0.15s",
          }}>
            {comparing
              ? <><span className="pulse" style={{fontSize:14}}>⏳</span><span>COMPARING QUOTES...</span></>
              : <><span style={{fontSize:14}}>⚡</span><span>COMPARE QUOTES</span></>
            }
          </button>
        )}

        {compareMsg && (
          <div style={{
            marginTop:10, padding:"10px 12px", borderRadius:7, lineHeight:1.5,
            background: compareMsg.startsWith("✓") ? C.greenSoft : "rgba(220,38,38,0.10)",
            border:`1px solid ${compareMsg.startsWith("✓") ? C.green : C.red}`,
            fontFamily:F.mono, fontSize:11, letterSpacing:1,
            color: compareMsg.startsWith("✓") ? C.green : C.red,
          }}>{compareMsg}</div>
        )}
      </div>

      {/* Divider */}
      <div style={{display:"flex", alignItems:"center", gap:10, margin:"14px 0 16px"}}>
        <div style={{flex:1, height:1, background:C.border}}/>
        <span style={{fontFamily:F.mono, fontSize:9, letterSpacing:2, color:C.dim, whiteSpace:"nowrap"}}>OR ENTER MANUALLY</span>
        <div style={{flex:1, height:1, background:C.border}}/>
      </div>

      {/* Header fields */}
      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16}}>
        <div>
          <label style={lblS}>Branch</label>
          <select value={header.branch} onChange={e=>hf("branch",e.target.value)} style={inS}>
            <option value="">— Select —</option>
            {BRANCHES.map(b=><option key={b} value={b}>{b}</option>)}
          </select>
        </div>
        <div>
          <label style={lblS}>Competitor</label>
          <select value={header.competitor} onChange={e=>hf("competitor",e.target.value)} style={inS}>
            <option value="">— Select —</option>
            {COMPETITORS.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div>
          <label style={lblS}>Customer Name</label>
          <input type="text" value={header.customer} onChange={e=>hf("customer",e.target.value)}
            placeholder="Customer name" style={inS}/>
        </div>
        <div>
          <label style={lblS}>Equipment Model</label>
          <input type="text" value={header.equipmentModel} onChange={e=>hf("equipmentModel",e.target.value)}
            placeholder="e.g. Kaeser SM 15" style={inS}/>
        </div>
        <div>
          <label style={lblS}>Rep Name</label>
          <select value={header.repName} onChange={e=>hf("repName",e.target.value)} style={inS}>
            <option value="">— Select —</option>
            {REPS.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
        </div>
        <div>
          <label style={lblS}>Quote Date</label>
          <input type="date" value={header.quoteDate} onChange={e=>hf("quoteDate",e.target.value)} style={inS}/>
        </div>
      </div>

      {/* Line item entry form */}
      <div style={{background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:14, marginBottom:14}}>
        <div style={{fontFamily:F.mono, fontSize:11, letterSpacing:2, color:C.mid, marginBottom:10}}>ADD LINE ITEM</div>
        <div style={{display:"grid", gap:8}}>
          <input type="text" value={item.description} onChange={e=>itf("description",e.target.value)}
            placeholder="Description" style={inS}
            onKeyDown={e=>{ if(e.key==="Enter") addItem(); }}/>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8}}>
            <select value={item.category} onChange={e=>itf("category",e.target.value)} style={inS}>
              {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <input type="number" min="0" step="0.01" value={item.hodgePrice}
              onChange={e=>itf("hodgePrice",e.target.value)} placeholder="Hodge $" style={inS}/>
            <input type="number" min="0" step="0.01" value={item.competitorPrice}
              onChange={e=>itf("competitorPrice",e.target.value)} placeholder="Comp $" style={inS}/>
          </div>
          <button onClick={addItem} style={{
            background:C.orange, border:"none", borderRadius:7, padding:"10px 16px",
            fontFamily:F.mono, fontSize:12, letterSpacing:2, color:"#fff", cursor:"pointer",
          }}>+ ADD</button>
        </div>
      </div>

      {/* Line items table */}
      {lineItems.length > 0 && (
        <div style={{background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, marginBottom:14, overflowX:"auto"}}>
          <table style={{width:"100%", borderCollapse:"collapse", minWidth:500}}>
            <thead>
              <tr style={{borderBottom:`1px solid ${C.border}`}}>
                {["Description","Category","Hodge","Comp","$ Δ","% Δ",""].map(h=>(
                  <th key={h} style={{padding:"9px 10px", textAlign:"left",
                    fontFamily:F.mono, fontSize:10, letterSpacing:1.5,
                    color:C.mid, fontWeight:500, whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {lineItems.map((row,i) => (
                <tr key={i} style={{background:rowBg(row)}}>
                  <td style={tdS}>
                    <div>{row.description}</div>
                    {row.equipmentModel && <div style={{fontFamily:F.mono, fontSize:9, color:C.dim, letterSpacing:1, marginTop:2}}>{row.equipmentModel}</div>}
                  </td>
                  <td style={{...tdS, color:C.mid, fontSize:11, fontFamily:F.mono}}>{row.category}</td>
                  <td style={{...tdS, padding:"4px 6px"}}>
                    <input type="number" min="0" step="0.01" value={row.hodgePrice||""} placeholder="—"
                      onChange={e=>updateHodgePrice(i,e.target.value)} style={inpS}/>
                  </td>
                  <td style={{...tdS, padding:"4px 6px"}}>
                    <input type="number" min="0" step="0.01" value={row.competitorPrice||""} placeholder="—"
                      onChange={e=>updateCompPrice(i,e.target.value)} style={inpS}/>
                  </td>
                  <td style={{...tdS, fontFamily:F.mono, fontSize:12, color:dColor(row.delta)}}>{fmtDelta(row.delta)}</td>
                  <td style={{...tdS, fontFamily:F.mono, fontSize:12, color:dColor(row.pct===null?0:row.pct)}}>{fmtPct(row.pct)}</td>
                  <td style={{...tdS, padding:"8px 6px"}}>
                    <button onClick={()=>removeItem(i)} style={{
                      background:"none", border:"none", color:C.dim,
                      cursor:"pointer", fontSize:16, padding:"0 4px", lineHeight:1,
                    }}>×</button>
                  </td>
                </tr>
              ))}
              {sectTotals.map(({cat,totals}) => (
                <tr key={cat} style={{background:C.surface2, borderTop:`1px solid ${C.border}`}}>
                  <td colSpan={2} style={{...tdS, fontFamily:F.mono, fontSize:10, letterSpacing:1, color:C.mid}}>{cat.toUpperCase()} TOTAL</td>
                  <td style={{...tdS, fontFamily:F.mono, fontSize:12, fontWeight:600}}>{fmtPrice(totals.hodge)}</td>
                  <td style={{...tdS, fontFamily:F.mono, fontSize:12, fontWeight:600}}>{fmtPrice(totals.comp)}</td>
                  <td style={{...tdS, fontFamily:F.mono, fontSize:12, fontWeight:600, color:dColor(totals.delta)}}>{fmtDelta(totals.delta)}</td>
                  <td style={{...tdS, fontFamily:F.mono, fontSize:12, fontWeight:600, color:dColor(totals.pct===null?0:totals.pct)}}>{fmtPct(totals.pct)}</td>
                  <td style={tdS}/>
                </tr>
              ))}
              <tr style={{background:C.surface2, borderTop:`2px solid ${C.border}`}}>
                <td colSpan={2} style={{...tdS, fontFamily:F.mono, fontSize:11, letterSpacing:2, color:C.text, fontWeight:700}}>GRAND TOTAL</td>
                <td style={{...tdS, fontFamily:F.mono, fontSize:13, fontWeight:700}}>{fmtPrice(grandH)}</td>
                <td style={{...tdS, fontFamily:F.mono, fontSize:13, fontWeight:700}}>{fmtPrice(grandC)}</td>
                <td style={{...tdS, fontFamily:F.mono, fontSize:13, fontWeight:700, color:dColor(grandDelta)}}>{fmtDelta(grandDelta)}</td>
                <td style={{...tdS, fontFamily:F.mono, fontSize:13, fontWeight:700, color:dColor(grandPct===null?0:grandPct)}}>{fmtPct(grandPct)}</td>
                <td style={tdS}/>
              </tr>
            </tbody>
          </table>
        </div>
      )}

      {/* Save & Log */}
      <button onClick={handleSave} disabled={busy||lineItems.length===0} style={{
        width:"100%",
        background: busy||lineItems.length===0 ? C.surface2 : `linear-gradient(135deg,${C.orange} 0%,#EA580C 100%)`,
        border:`1.5px solid ${busy||lineItems.length===0 ? C.border : C.orange}`,
        borderRadius:10, padding:"14px 16px",
        fontFamily:F.mono, fontSize:13, letterSpacing:2,
        color: busy||lineItems.length===0 ? C.dim : "#fff",
        cursor: busy||lineItems.length===0 ? "not-allowed" : "pointer",
        transition:"all 0.15s",
      }}>
        {busy ? "LOGGING..." : "SAVE & LOG TO SHEETS"}
      </button>

      {saveMsg && (
        <div style={{
          marginTop:12, padding:"12px 14px", borderRadius:8,
          background: saveMsg.startsWith("✓") ? C.greenSoft : "rgba(220,38,38,0.10)",
          border:`1px solid ${saveMsg.startsWith("✓") ? C.green : C.red}`,
          fontFamily:F.mono, fontSize:12, letterSpacing:1,
          color: saveMsg.startsWith("✓") ? C.green : C.red,
        }}>
          {saveMsg}
        </div>
      )}

    </div>
  );
}

// ─── FIELD LOG ───────────────────────────────────────────────────────────────
function FieldLog() {
  const REPS = ["Dan","Zac","Dave J","Chase","Devon","Earl","David G","Javier","Jon L","Jackson","Mike","Jack","Tristian","Connor"];
  const ACTIVITIES = [
    { id:"pmOpp",       label:"PM Opp"           },
    { id:"equipOpp",    label:"Equipment Opp"    },
    { id:"serviceLead", label:"Service Lead"     },
    { id:"pipingOpp",   label:"Piping/Install"   },
    { id:"sticker",     label:"Sticker Placed"   },
    { id:"vrPres",      label:"VR Presentation"  },
    { id:"apptSet",     label:"Appointment Set"  },
    { id:"nothing",     label:"Nothing"          },
  ];

  const [view,       setView]       = React.useState("rep");
  const [repName,    setRepName]    = React.useState(() => localStorage.getItem("fieldlog_rep") || "");
  const [selected,   setSelected]   = React.useState({});
  const [location,   setLocation]   = React.useState("");
  const [notable,    setNotable]    = React.useState("");
  const [submitting, setSubmitting] = React.useState(false);
  const [tally,      setTally]      = React.useState(null);
  const [msg,        setMsg]        = React.useState("");
  const [dashboard,  setDashboard]  = React.useState([]);
  const [dashLoad,   setDashLoad]   = React.useState(false);
  const dashTimer = React.useRef(null);

  React.useEffect(() => {
    if (repName) fetchTally(repName);
  }, []);

  React.useEffect(() => {
    if (view === "leader") {
      fetchDashboard();
      dashTimer.current = setInterval(fetchDashboard, 60000);
    } else {
      clearInterval(dashTimer.current);
    }
    return () => clearInterval(dashTimer.current);
  }, [view]);

  async function fetchTally(name) {
    try {
      const r = await fetch(`/api/field-log/today/${encodeURIComponent(name)}`);
      const d = await r.json();
      setTally(d);
    } catch {}
  }

  async function fetchDashboard() {
    setDashLoad(true);
    try {
      const r = await fetch('/api/field-log/dashboard');
      const d = await r.json();
      setDashboard(Array.isArray(d) ? d : []);
    } catch {}
    setDashLoad(false);
  }

  function toggleActivity(id) {
    if (id === "nothing") {
      setSelected(prev => ({ nothing: !prev.nothing }));
    } else {
      setSelected(prev => ({ ...prev, [id]: !prev[id], nothing: false }));
    }
  }

  async function logStop() {
    if (!repName)                              { setMsg("Select your name first"); return; }
    if (!Object.values(selected).some(Boolean)) { setMsg("Tap what you found");   return; }
    setSubmitting(true);
    setMsg("");
    try {
      const r = await fetch('/api/field-log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ repName, ...selected, location: location.trim(), notableMoment: notable.trim() }),
      });
      const d = await r.json();
      if (!d.success) throw new Error(d.error || 'Unknown error');
      setSelected({});
      setLocation("");
      setNotable("");
      setMsg("✓ Stop logged!");
      await fetchTally(repName);
      setTimeout(() => setMsg(""), 3000);
    } catch (e) {
      setMsg("Error: " + e.message);
    }
    setSubmitting(false);
  }

  function paceColor(stops) {
    const s = Number(stops);
    if (s >= 20) return C.green;
    if (s >= 10) return "#F59E0B";
    return C.red;
  }

  function timeSince(ts) {
    if (!ts) return "—";
    const mins = Math.round((Date.now() - new Date(ts)) / 60000);
    if (mins < 1)  return "just now";
    if (mins < 60) return `${mins}m ago`;
    return `${Math.floor(mins/60)}h ${mins % 60}m ago`;
  }

  // Merge live dashboard data with full rep roster
  const repRows = React.useMemo(() => {
    const map = {};
    dashboard.forEach(d => { map[d.rep_name] = d; });
    return REPS
      .map(name => map[name] || { rep_name: name, stops: 0, pm_opps: 0, equip_opps: 0, appt_set: 0, last_logged: null })
      .sort((a, b) => Number(b.stops) - Number(a.stops));
  }, [dashboard]);

  return (
    <div style={{ height:"100%", display:"flex", flexDirection:"column", background:C.bg }}>

      {/* View toggle */}
      <div style={{ padding:"10px 16px 0", flexShrink:0 }}>
        <div style={{ display:"flex", background:C.surface2, borderRadius:8, padding:3, border:`1px solid ${C.border}` }}>
          {[["rep","MY LOG"],["leader","LEADER VIEW"]].map(([v,label]) => (
            <button key={v} onClick={() => setView(v)} style={{
              flex:1, padding:"9px 0", borderRadius:6,
              background: view===v ? C.blue : "transparent",
              border:"none", fontFamily:F.mono, fontSize:12, letterSpacing:2,
              color: view===v ? "#fff" : C.mid, cursor:"pointer", transition:"all 0.15s",
            }}>{label}</button>
          ))}
        </div>
      </div>

      {/* ── REP VIEW ── */}
      {view === "rep" && (
        <div style={{ flex:1, overflowY:"auto", padding:"14px 16px 24px" }}>

          {/* Name selector */}
          <div style={{ marginBottom:14 }}>
            <label style={{ display:"block", fontFamily:F.mono, fontSize:11, letterSpacing:2, color:C.mid, marginBottom:6 }}>REP</label>
            <select value={repName} onChange={e => {
                const v = e.target.value;
                setRepName(v);
                localStorage.setItem("fieldlog_rep", v);
                if (v) fetchTally(v);
              }}
              style={{ width:"100%", background:C.surface3, border:`1px solid ${C.border}`, borderRadius:8,
                color: repName ? C.text : C.mid, fontFamily:F.body, fontSize:16,
                padding:"12px 14px", appearance:"none", boxSizing:"border-box" }}>
              <option value="">Select your name...</option>
              {REPS.map(r => <option key={r} value={r}>{r}</option>)}
            </select>
          </div>

          {/* Activity grid */}
          <div style={{ marginBottom:14 }}>
            <label style={{ display:"block", fontFamily:F.mono, fontSize:11, letterSpacing:2, color:C.mid, marginBottom:8 }}>WHAT DID YOU FIND?</label>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
              {ACTIVITIES.map(a => (
                <button key={a.id} onClick={() => toggleActivity(a.id)} style={{
                  padding:"14px 10px",
                  background: selected[a.id]
                    ? `linear-gradient(135deg,${C.blue} 0%,#2D5BBF 100%)`
                    : C.surface2,
                  border:`1.5px solid ${selected[a.id] ? C.blueLight : C.border}`,
                  borderRadius:8, fontFamily:F.body, fontSize:14, fontWeight:600,
                  color: selected[a.id] ? "#fff" : C.text,
                  cursor:"pointer", transition:"all 0.15s", textAlign:"center",
                }}>{a.label}</button>
              ))}
            </div>
          </div>

          {/* Location */}
          <div style={{ marginBottom:10 }}>
            <label style={{ display:"block", fontFamily:F.mono, fontSize:11, letterSpacing:2, color:C.mid, marginBottom:6 }}>
              AREA / LOCATION <span style={{ color:C.dim }}>(optional)</span>
            </label>
            <input value={location} onChange={e => setLocation(e.target.value)}
              placeholder="e.g. Midtown Atlanta, Industrial Pkwy"
              style={{ width:"100%", background:C.surface3, border:`1px solid ${C.border}`, borderRadius:8,
                color:C.text, fontFamily:F.body, fontSize:15, padding:"11px 14px", boxSizing:"border-box" }}/>
          </div>

          {/* Notable moment */}
          <div style={{ marginBottom:18 }}>
            <label style={{ display:"block", fontFamily:F.mono, fontSize:11, letterSpacing:2, color:C.mid, marginBottom:6 }}>
              NOTABLE MOMENT <span style={{ color:C.dim }}>(optional)</span>
            </label>
            <textarea value={notable} onChange={e => setNotable(e.target.value)}
              rows={2} placeholder="Hot lead, competitor spotted, anything worth flagging..."
              style={{ width:"100%", background:C.surface3, border:`1px solid ${C.border}`, borderRadius:8,
                color:C.text, fontFamily:F.body, fontSize:15, padding:"11px 14px",
                boxSizing:"border-box", resize:"none" }}/>
          </div>

          {/* LOG STOP button */}
          <button onClick={logStop} disabled={submitting} style={{
            width:"100%", padding:"18px 0",
            background: submitting ? C.surface2 : `linear-gradient(135deg,${C.orange} 0%,#EA580C 100%)`,
            border:`1.5px solid ${submitting ? C.border : C.orange}`,
            borderRadius:10, fontFamily:F.head, fontSize:28, letterSpacing:4,
            color: submitting ? C.dim : "#fff",
            cursor: submitting ? "not-allowed" : "pointer", transition:"all 0.15s",
          }}>{submitting ? "LOGGING..." : "LOG STOP"}</button>

          {msg && (
            <div style={{
              marginTop:10, padding:"11px 14px", borderRadius:8,
              background: msg.startsWith("✓") ? C.greenSoft : "rgba(220,38,38,0.10)",
              border:`1px solid ${msg.startsWith("✓") ? C.green : C.red}`,
              fontFamily:F.mono, fontSize:12, letterSpacing:1,
              color: msg.startsWith("✓") ? C.green : C.red,
            }}>{msg}</div>
          )}

          {/* Today's tally */}
          {tally && repName && (
            <div style={{ marginTop:18, background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:"14px 16px" }}>
              <div style={{ fontFamily:F.mono, fontSize:11, letterSpacing:2, color:C.mid, marginBottom:10 }}>
                TODAY — {repName.toUpperCase()}
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8 }}>
                {[
                  ["STOPS",    tally.stops,         C.orange],
                  ["PM OPP",   tally.pm_opps,       C.blueLight],
                  ["EQ OPP",   tally.equip_opps,    C.blueLight],
                  ["SVC LEAD", tally.service_leads, C.blueLight],
                  ["PIPING",   tally.piping_opps,   C.blueLight],
                  ["STICKER",  tally.stickers,      C.mid],
                  ["VR PRES",  tally.vr_pres,       C.mid],
                  ["APPT SET", tally.appt_set,      C.green],
                ].map(([label, val, color]) => (
                  <div key={label} style={{ background:C.surface2, borderRadius:8, padding:"10px 6px", textAlign:"center" }}>
                    <div style={{ fontFamily:F.head, fontSize:22, color, lineHeight:1 }}>{val || 0}</div>
                    <div style={{ fontFamily:F.mono, fontSize:8, letterSpacing:0.5, color:C.dim, marginTop:3 }}>{label}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── LEADER VIEW ── */}
      {view === "leader" && (
        <div style={{ flex:1, overflowY:"auto", padding:"14px 16px 24px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <div style={{ fontFamily:F.head, fontSize:20, letterSpacing:3, color:C.text }}>FIELD ACTIVITY — TODAY</div>
            <div style={{ fontFamily:F.mono, fontSize:9, color:dashLoad ? C.orange : C.mid, letterSpacing:1 }}>
              {dashLoad ? "REFRESHING..." : "AUTO-REFRESH 60s"}
            </div>
          </div>

          {/* Pace legend */}
          <div style={{ display:"flex", gap:14, marginBottom:14 }}>
            {[[C.green,"20+ on pace"],["#F59E0B","10–19 behind"],[C.red,"<10 low"]].map(([color,label]) => (
              <div key={label} style={{ display:"flex", alignItems:"center", gap:5 }}>
                <div style={{ width:8, height:8, borderRadius:"50%", background:color, flexShrink:0 }}/>
                <span style={{ fontFamily:F.mono, fontSize:9, letterSpacing:0.5, color:C.mid }}>{label}</span>
              </div>
            ))}
          </div>

          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {repRows.map(row => {
              const stops = Number(row.stops);
              const pace  = paceColor(stops);
              return (
                <div key={row.rep_name} style={{
                  background:C.surface, border:`1px solid ${C.border}`,
                  borderLeft:`3px solid ${pace}`, borderRadius:8, padding:"11px 14px",
                }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                    <div style={{ fontFamily:F.body, fontSize:16, fontWeight:700, color:C.text }}>{row.rep_name}</div>
                    <div style={{ fontFamily:F.mono, fontSize:10, color:C.dim }}>{timeSince(row.last_logged)}</div>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:4 }}>
                    {[
                      ["STOPS",  stops,            pace],
                      ["PM OPP", row.pm_opps,      C.blueLight],
                      ["EQ OPP", row.equip_opps,   C.blueLight],
                      ["APPT",   row.appt_set,     C.green],
                    ].map(([label, val, color]) => (
                      <div key={label} style={{ textAlign:"center" }}>
                        <div style={{ fontFamily:F.head, fontSize:22, color, lineHeight:1 }}>{val || 0}</div>
                        <div style={{ fontFamily:F.mono, fontSize:8, letterSpacing:0.5, color:C.dim, marginTop:2 }}>{label}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
