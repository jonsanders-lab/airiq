=== PRODUCT PRIORITY & UPSELL RULES ===
COMPRESSORS — always recommend in this order:
1. Hodge branded compressors FIRST for all oil-flooded rotary screw applications. Models: HB (belt drive fixed speed), HD (direct drive fixed speed), HV (variable speed direct drive), HT (2-stage direct drive), HTV (2-stage variable speed). Match CFM and PSI to the correct Hodge model and always include the data sheet and drawing link.
2. Only recommend Hertz or other brands when the application requires technology Hodge does not offer — e.g. oil-free compressors (recommend Hertz Eagle series), high-pressure (Sauer), vacuum (Dekker).

DRYERS — always recommend in this order:
1. Hodge HAD series refrigerant dryers FIRST for standard refrigerant dryer applications. Match CFM to HAD model and round up if needed.
2. Beko dryers when the application requires something beyond Hodge HAD range or capability — desiccant drying, high-temp inlet, large CFM beyond HAD487, cycling technology, high-pressure.
3. Only suggest Hertz dryers as a last resort if neither Hodge nor Beko has a suitable model.

RECEIVER TANKS — always recommend Samuel Pressure Vessel FIRST. Never recommend Hertz receivers or tanks.
- When sizing a receiver tank for HD/HB/HV/HT/HTV units, a general rule is 1-4 gallons per CFM depending on duty cycle. Higher duty cycle = larger tank. Always offer to calculate the right size.

HTM SERIES — tank and dryer are already integrated. NEVER upsell a receiver tank or dryer on HTM models.

HTM SERIES — ASSEMBLY LEAD TIME & DEPOSIT POLICY (applies to HTM7.5, HTM10, HTM15, HTM20):
- HTM units are NOT pre-built. They are assembled to order. Even if ServiceTitan shows stock as "available" or "on hand," the unit still requires 2-3 days for assembly before it can ship or be picked up. Always communicate this to the rep.
- Standard orders: 50% deposit required before assembly begins. Nothing is reserved or built until the deposit is received.
- Hot rush / expedited (faster than the standard 2-3 day assembly window): 100% payment in full required upfront before any work begins or any unit is reserved. Acceptable proof of payment: ACH remittance confirmation or a deposited check. Do not promise a rush slot until payment is confirmed.
- When an HTM model comes up, proactively mention the lead time and deposit requirement — do not wait for the rep to ask.

RUSH ORDER POLICY — applies to ALL models, not just HTM:
- Any unit requested faster than its standard lead time is a hot rush and requires 100% payment in full upfront.
- No work begins and nothing is reserved until proof of payment is received (ACH remittance or deposited check).
- Always surface this policy when a rep mentions urgency, tight timelines, or asks about same-day / next-day availability.

PIPING — always recommend AIRpipe USA.

UPSELL RULE — after recommending any base-mount compressor (HD, HB, HV, HT, HTV series):
- Always ask if the rep wants help sizing a receiver tank (Samuel), dryer (Hodge HAD first), and piping (AIRpipe).
- These units ship without a tank or dryer so the full system needs to be quoted.

BELT DRIVE ACCURACY RULE:
- Never describe belt drive compressors as having higher "equivalent output" than their nameplate HP. The HB30 is a 30hp compressor, not a "40hp equivalent." Belt drive vs direct drive affects serviceability and noise, not output rating.

VSD compressors best for variable demand — saves 20-35% energy vs fixed speed.
Oil-free (Eagle, Scroll) for food/pharma/electronics. Also offer food grade oil option on oil-injected.
Desiccant dryers needed for dew points below 35F or freezing line runs.
Always cite both brand name AND specific model number together (e.g. "Hodge HD30", "Hertz HBD 22", "Beko DRYPOINT XCe 200"). Never just the series name alone.
Keep answers crisp — reps are often in front of customers.
Always output document links as clickable markdown links: [Link Text](URL). Never output a bare URL.
Whenever you tell a rep to reach out to a vendor, manager, or contact for more information, always add: "💬 You can copy and paste this response into your message to help explain the situation."

function getRepGoals(repName, goalsOverride) {
  const isWed = new Date().getDay() === 3;
  if (goalsOverride && Array.isArray(goalsOverride)) {
    const row = goalsOverride.find(r => r.rep_name === repName);
    if (row) {
      const daily = isWed ? row.wednesday_goal : (row.daily_goal != null ? row.daily_goal : null);
      return { daily, weekly: row.weekly_goal, monthly: Math.round(row.weekly_goal * 4.3) };
    }
  }
  const start = REP_START_DATES[repName];
  if (!start) {
    return { daily: isWed ? 25 : null, weekly: 30, monthly: 130 };
  }
  const isNew = (Date.now() - new Date(start).getTime()) / 86400000 < 90;
  const daily = isWed ? 25 : isNew ? 20 : null;
  return { daily, weekly: isNew ? 100 : 30, monthly: isNew ? 420 : 130 };
}

function getRepBaseGoals(repName, goalsOverride) {

  const start = REP_START_DATES[repName];
  if (!start) {
    return { wednesday_goal: 25, daily_goal: null, weekly_goal: 30 };

  const isNew = (Date.now() - new Date(start).getTime()) / 86400000 < 90;

function formatMsg(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<p style="font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--c-mid);margin:12px 0 4px">$1</p>')
    .replace(/^## (.+)$/gm, '<p style="font-weight:600;margin:10px 0 4px">$1</p>')
    .replace(/^- (.+)/gm, '<div style="display:flex;gap:8px;margin:3px 0"><span style="color:var(--c-mid);flex-shrink:0">•</span><span>$1</span></div>')
    .replace(/^(\d+)\. (.+)/gm, '<div style="display:flex;gap:8px;margin:3px 0"><span style="color:var(--c-mid);flex-shrink:0;min-width:16px">$1.</span><span>$2</span></div>')
    .replace(/\n\n/g, '<br/>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer" style="color:var(--c-blue-light);text-decoration:underline">$1 ↗</a>')
    .replace(/\n/g, '<br/>');
}

function formatSTReply(text) {
  const T_BG = 'var(--c-surface)', T_HEAD = 'var(--c-surface2)', T_BORDER = 'var(--c-border)';
  const isTableLine = l => /^\s*\|/.test(l);
  const isSepLine   = l => /^\s*\|[-| :]+\|\s*$/.test(l);
  const parseRow    = l => l.split('|').slice(1, -1).map(c => c.trim());
  const styleCell   = c => c
    .replace(/✅/g, '<span style="color:#22c55e">✅</span>')
    .replace(/⚠️/g, '<span style="color:#f59e0b">⚠️</span>')
    .replace(/❌/g, '<span style="color:#ef4444">❌</span>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

  const lines = text.split('\n');
  const parts = [];
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    if (/^\s*---+\s*$/.test(line)) {
      parts.push(`<hr style="border:none;border-top:1px solid ${T_BORDER};margin:12px 0"/>`);
      i++; continue;
    }

    if (isTableLine(line)) {
      const tLines = [];
      while (i < lines.length && isTableLine(lines[i])) { tLines.push(lines[i++]); }
      const headers  = parseRow(tLines[0]);
      const dataRows = tLines.slice(1).filter(l => !isSepLine(l));
      const thHtml   = headers.map(h => `<th style="padding:6px 10px;text-align:left;white-space:nowrap">${h}</th>`).join('');
      const trHtml   = dataRows.map(rl =>
        `<tr style="border-bottom:1px solid ${T_BORDER}">${parseRow(rl).map(c => `<td style="padding:6px 10px">${styleCell(c)}</td>`).join('')}</tr>`
      ).join('');
      parts.push(`<table style="width:100%;border-collapse:collapse;font-size:12px;background:${T_BG};border:1px solid ${T_BORDER};border-radius:6px;overflow:hidden;margin:6px 0"><thead><tr style="background:${T_HEAD};color:var(--c-mid);font-size:11px;text-transform:uppercase;letter-spacing:.05em">${thHtml}</tr></thead><tbody>${trHtml}</tbody></table>`);
      continue;
    }

    const textLines = [];
    while (i < lines.length && !isTableLine(lines[i]) && !/^\s*---+\s*$/.test(lines[i])) {
      textLines.push(lines[i++]);
    }
    const block = textLines.join('\n').trim();
    if (block) {
      const processed = block.replace(/^\*\*(.+?)\*\*\s*$/gm,
        `<p style="font-weight:700;color:var(--c-orange);margin:12px 0 4px;font-size:13px">$1</p>`);
      parts.push(formatMsg(processed));
    }
  }

  return parts.join('');
}

function buildSTContext(pricebookItems, inventoryItems) {
  if (pricebookItems.length === 0 && inventoryItems.length === 0) return "";
  const merged = pricebookItems.map(p => {
    const inv = inventoryItems.find(i =>
      i.id === p.id ||
      (i.name||"").toLowerCase() === (p.displayName||p.name||"").toLowerCase() ||
      (i.code||"").toLowerCase() === (p.code||"").toLowerCase()
    );
    return {
      name: p.displayName||p.name,
      price: p.price != null ? `$${Number(p.price).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}` : "N/A",
      sku: p.code||p.sku||"N/A", active: p.active,
      onHand: inv?.onHand??inv?.quantityOnHand??p.quantity??null,
      available: inv?.available??inv?.quantityAvailable??null,
    };
  });
  inventoryItems.forEach(inv => {
    const name = inv.name||"";
    if (!merged.find(m=>(m.name||"").toLowerCase()===name.toLowerCase())) {
      merged.push({ name, price:"N/A", sku:inv.code||"N/A", active:inv.active,
        onHand:inv.onHand??inv.quantityOnHand??null, available:inv.available??inv.quantityAvailable??null });
    }
  });
  const lines = merged.map(item => {
    const onHandStr = item.onHand!==null ? `${item.onHand} units` : "not tracked";
    const availStr  = item.available!==null ? `${item.available} units` : "not tracked";
    return `${item.name} | Price: ${item.price} | On Hand: ${onHandStr} | Available: ${availStr} | SKU: ${item.sku} | Active: ${item.active}`;
  });
  return "\n\n=== LIVE SERVICETITAN DATA (pricebook + inventory) ===\n" + lines.join("\n") +
    "\nSource: Live pull from ServiceTitan. Present price, on-hand, and available quantities clearly using the format in your instructions.";
}

    if (pw === PASSWORD) {

      setTimeout(() => setShake(false), 500);

      <div style={{

        borderRadius:16, padding:36, width:"100%", maxWidth:400,

        </div>

        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20, cursor:"pointer" }}
          onClick={() => setRemember(!remember)}>
          <div style={{
            width:18, height:18, borderRadius:4, border:`1px solid ${remember ? C.orange : C.border}`,
            background: remember ? C.orangeSoft : "transparent",
            display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0,
          }}>
            {remember && <span style={{ color:C.orange, fontSize:12, lineHeight:1 }}>✓</span>}
          </div>
          <span style={{ fontFamily:F.mono, fontSize:10, color:C.mid, letterSpacing:2 }}>
            REMEMBER ON THIS DEVICE

        </div>

        <button onClick={attempt} style={{

function GoalSettingsModal({ repRows, repGoals, onSaved, onClose }) {
  const [edits, setEdits] = React.useState(() => {
    const m = {};
    repRows.forEach(r => {
      const base = getRepBaseGoals(r.rep_name, repGoals);
      m[r.rep_name] = {
        wednesday_goal: base.wednesday_goal != null ? String(base.wednesday_goal) : '25',
        daily_goal:     base.daily_goal     != null ? String(base.daily_goal)     : '',
        weekly_goal:    base.weekly_goal    != null ? String(base.weekly_goal)    : '30',
        saving: false, saved: false,
      };
    });
    return m;
  });

  function setField(repName, field, val) {
    setEdits(prev => ({ ...prev, [repName]: { ...prev[repName], [field]: val, saved: false } }));
  }

  async function saveRep(repName) {
    const e = edits[repName];
    setEdits(prev => ({ ...prev, [repName]: { ...prev[repName], saving: true, saved: false } }));
    try {
      const body = {
        rep_name:       repName,
        wednesday_goal: parseInt(e.wednesday_goal) || 25,
        daily_goal:     e.daily_goal !== '' ? (parseInt(e.daily_goal) || null) : null,
        weekly_goal:    parseInt(e.weekly_goal) || 30,
      };
      const r = await fetch('/api/field-log/goals', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      setEdits(prev => ({ ...prev, [repName]: { ...prev[repName], saving: false, saved: true } }));
      onSaved(d);
      setTimeout(() => setEdits(prev => ({ ...prev, [repName]: { ...prev[repName], saved: false } })), 2500);
    } catch (err) {
      setEdits(prev => ({ ...prev, [repName]: { ...prev[repName], saving: false } }));
      console.error('saveRep error:', err.message);
    }
  }

  const numInput = (repName, field, placeholder, maxW) => {
    const e = edits[repName] || {};
    return (
      <input
        type="number" min="0" max="999"

  );

function SerialLookup() {
  const [open,    setOpen]    = React.useState(false);
  const [query,   setQuery]   = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [results, setResults] = React.useState(null);
  const [error,   setError]   = React.useState(null);

  async function doSearch() {
    const q = query.trim();
    if (!q) return;
    setLoading(true); setResults(null); setError(null);
    try {
      const r = await fetch(`/api/serial-lookup?serial=${encodeURIComponent(q)}`);
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      setResults(d.matches);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  const field = (label, val) => val ? (
    <div style={{display:'flex',gap:8,alignItems:'baseline',padding:'4px 0',borderBottom:`1px solid ${C.border}`}}>
      <span style={{fontFamily:F.mono,fontSize:9,letterSpacing:1,color:C.mid,flexShrink:0,minWidth:90}}>{label}</span>
      <span style={{fontFamily:F.body,fontSize:13,color:C.text}}>{val}</span>
    </div>
  ) : null;

  return (
    <div style={{borderBottom:`1px solid ${C.border}`,background:C.surface,flexShrink:0}}>
      <button onClick={()=>setOpen(o=>!o)} style={{
        width:'100%',display:'flex',alignItems:'center',gap:6,padding:'7px 14px',
        background:'none',border:'none',cursor:'pointer',color:C.mid,
        fontFamily:F.mono,fontSize:10,letterSpacing:2,textAlign:'left',
      }}>
        <span style={{color:C.copper}}>🔍</span>
        SERIAL # LOOKUP
        <span style={{marginLeft:'auto',fontSize:9}}>{open?'▲':'▼'}</span>
      </button>
      {open && (
        <div style={{padding:'0 14px 12px'}}>
          <div style={{display:'flex',gap:7,marginBottom:10}}>
            <input value={query} onChange={e=>setQuery(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter')doSearch();}}
              placeholder="Enter serial number..."
              style={{flex:1,background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,
                padding:'9px 11px',fontSize:13,color:C.text,fontFamily:F.body,outline:'none'}}/>
            <button onClick={doSearch} disabled={loading||!query.trim()} style={{
              padding:'9px 16px',borderRadius:7,border:'none',fontFamily:F.mono,fontSize:11,
              letterSpacing:1,cursor:loading||!query.trim()?'not-allowed':'pointer',
              background:loading||!query.trim()?C.surface2:'#C17A35',color:'#fff',flexShrink:0,
            }}>{loading?'…':'SEARCH'}</button>
          </div>
          {error && <div style={{fontFamily:F.body,fontSize:12,color:C.red,padding:'4px 0'}}>{error}</div>}
          {results && results.length===0 && (
            <div style={{fontFamily:F.body,fontSize:12,color:C.mid,padding:'4px 0'}}>No unit found for that serial number.</div>
          )}
          {results && results.length>0 && results.map((r,i)=>(
            <div key={i} style={{background:C.surface2,border:`1px solid ${C.border}`,
              borderLeft:'3px solid #C17A35',borderRadius:8,padding:'10px 12px',
              marginBottom:i<results.length-1?8:0}}>
              {field('SERIAL #',   r.serialNumber)}
              {field('MODEL',      r.model)}
              {field('CUSTOMER',   r.customer)}
              {field('SALE DATE',  r.saleDate)}
              {field('STARTUP',    r.startupDate)}
              {field('MEMO',       r.memo)}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AirIQ() {
  const [messages, setMessages]     = React.useState([]);
  const [input, setInput]           = React.useState("");
  const [loading, setLoading]       = React.useState(false);
  const [showStarters, setShowStarters] = React.useState(true);
  const [isListening, setIsListening]   = React.useState(false);
  const [stLookupActive, setStLookupActive] = React.useState(false);
  const [feedbackOpen, setFeedbackOpen]     = React.useState(false);
  const bottomRef      = React.useRef(null);
  const recognitionRef = React.useRef(null);
  const textareaRef    = React.useRef(null);
  const faqsRef        = React.useRef([]);

  React.useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior:"smooth" });
  }, [messages, loading]);

  React.useEffect(() => {
    fetch('/api/faq').then(r=>r.json()).then(d=>{ if(Array.isArray(d)) faqsRef.current=d; }).catch(()=>{});
  }, []);

  const stopListening = () => {
    if (recognitionRef.current) { recognitionRef.current.stop(); recognitionRef.current = null; }
    setIsListening(false);
  };
  const startListening = () => {
    if (isListening) { stopListening(); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("Voice not supported. Try Chrome."); return; }
    const r = new SR(); r.lang="en-US"; r.continuous=false; r.interimResults=false;
    recognitionRef.current = r;
    r.onstart = () => setIsListening(true);
    r.onend   = () => { setIsListening(false); recognitionRef.current=null; };
    r.onerror = () => { setIsListening(false); recognitionRef.current=null; };
    r.onresult = e => { setInput(e.results[0][0].transcript); setTimeout(autoResize,50); };
    r.start();
  };
  const autoResize = () => {
    const el = textareaRef.current; if (!el) return;
    el.style.height="40px"; el.style.height=Math.min(el.scrollHeight,120)+"px";
  };

  const normalizeModelNumber = s =>
    s.replace(/\b(HTM|HTV|HAD|HD|HV|HT|HB)\s+(\d+[A-Z]?)\b/gi,
              (_, prefix, num) => prefix.toUpperCase() + num.toUpperCase());

  const detectSeriesStockQuery = (msg) => {
    const seriesAlt = 'HTM|HTV|HAD|HD|HV|HT|HB';
    const m1 = msg.match(new RegExp(`\\b(${seriesAlt})(?!\\d)\\b[\\s\\w]*?(?:stock|units?|availability|inventory)`, 'i'));
    if (m1) return m1[1].toUpperCase();
    const m2 = msg.match(new RegExp(`\\ball\\s+(${seriesAlt})\\b`, 'i'));
    if (m2) return m2[1].toUpperCase();
    return null;
  };

  const fetchSeriesStock = async (series, newMsgs) => {
    const MODEL_NAME_MAP = { "HTM7":"HTM7.5", "HTM7(1PH)":"HTM7.5 (1-Phase)", "HTM7.5(1PH)":"HTM7.5 (1-Phase)" };
    try {
      const invRes = await fetch(`/api/inventory?q=${encodeURIComponent(series)}`);
      if (!invRes.ok) throw new Error("Inventory fetch failed");
      const invData = await invRes.json();
      const items = (invData.items || [])
        .flatMap(item => (item.rawRows || []).map(r => ({
          code: r.code, onHand: r.quantityOnHand, available: r.quantityAvailable
        })))
        .filter(r => r.code && r.code.toUpperCase().startsWith(series.toUpperCase()));
      items.sort((a, b) => (a.code || "").localeCompare(b.code || "", undefined, { numeric: true }));

      if (items.length === 0) {
        setMessages([...newMsgs, { role:"assistant", content:`📦 No inventory items found for <strong>${series}</strong> series.`, stDataUsed:true, isHtml:true }]);
        return;
      }

      const inStockCount = items.filter(r => r.available > 0).length;

      const rowsHtml = items.map(r => {
        const displayCode = MODEL_NAME_MAP[r.code] || r.code;
        let statusHtml;
        if (r.onHand === 0) {
          statusHtml = `<span style="color:#ef4444">❌ Out of Stock</span>`;
        } else if (r.available < 0) {
          statusHtml = `<span style="color:#ef4444">⚠️ Over-reserved — confirm with ops</span>`;
        } else if (r.available === 0) {
          statusHtml = `<span style="color:#f59e0b">⚠️ All reserved — confirm with ops</span>`;
        } else {
          statusHtml = `<span style="color:#22c55e">✅ In Stock</span>`;
        }
        const availDisplay = r.available < 0 ? "—" : r.available;
        return `<tr style="border-bottom:1px solid var(--c-border)">
          <td style="padding:6px 10px">${displayCode}</td>
          <td style="padding:6px 10px;text-align:center">${r.onHand}</td>
          <td style="padding:6px 10px;text-align:center">${availDisplay}</td>
          <td style="padding:6px 10px">${statusHtml}</td>
        </tr>`;
      }).join("");

      const html = `<div>
        <p style="font-weight:600;margin:0 0 8px;color:var(--c-text)">📦 ${series} SERIES — LIVE STOCK</p>
        <table style="width:100%;border-collapse:collapse;font-size:12px;background:var(--c-surface);border:1px solid var(--c-border);border-radius:6px;overflow:hidden">
          <thead>
            <tr style="background:var(--c-surface2);color:var(--c-mid);font-size:11px;text-transform:uppercase;letter-spacing:.05em">
              <th style="padding:6px 10px;text-align:left">Model</th>
              <th style="padding:6px 10px;text-align:center">On Hand</th>
              <th style="padding:6px 10px;text-align:center">Available</th>
              <th style="padding:6px 10px;text-align:left">Status</th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
        <p style="font-size:11px;color:var(--c-mid);margin:6px 0 0">${inStockCount} of ${items.length} models in stock · Last updated from ServiceTitan inventory report</p>
      </div>`;

      setMessages([...newMsgs, { role:"assistant", content:html, stDataUsed:true, isHtml:true }]);
    } catch(err) {
      setMessages([...newMsgs, { role:"assistant", content:`⚠️ Could not fetch ${series} series inventory: ${err.message}`, error:true }]);
    }
  };

  const getFaqContext = (msg) => {
    if (faqsRef.current.length === 0) return "";
    const words = msg.toLowerCase().split(/\W+/).filter(w => w.length >= 4);
    if (words.length < 2) return "";
    const matches = faqsRef.current.filter(f => {
      const hay = (f.question + " " + f.answer).toLowerCase();
      return words.filter(w => hay.includes(w)).length >= 2;
    });
    if (matches.length === 0) return "";
    return "\n\nINTERNAL FAQ — use these answers for matching questions:\n" +
      matches.map(f => `Q: ${f.question}\nA: ${f.answer}`).join("\n\n");
  };

  const submit = async (text) => {
    const msg = normalizeModelNumber(text || input.trim());
    if (!msg || loading) return;
    setShowStarters(false); setInput("");
    if (textareaRef.current) textareaRef.current.style.height="40px";
    const newMsgs = [...messages, { role:"user", content:msg }];
    setMessages(newMsgs); setLoading(true); setStLookupActive(false);

    const seriesPrefix = detectSeriesStockQuery(msg);
    if (seriesPrefix) {
      await fetchSeriesStock(seriesPrefix, newMsgs);
      setLoading(false);
      return;
    }

    const modelMatches = [...new Set(msg.match(MODEL_REGEX) || [])].slice(0, 5);
    const hasIntent    = INTENT_REGEX.test(msg);
    const needsST      = !!(modelMatches.length > 0 && hasIntent) || hasIntent;
    const searchTerms  = needsST ? (modelMatches.length > 0 ? modelMatches : [msg.replace(INTENT_REGEX,"").trim().slice(0,40)]) : [];
    if (needsST) setStLookupActive(true);

    const stTool = {
      name:"lookup_servicetitan_pricing",
      description:"Look up live pricing and stock availability for equipment in ServiceTitan. Only call this when the rep explicitly asks about price, cost, stock, or availability.",
      input_schema:{ type:"object", properties:{ search_term:{ type:"string", description:"The model number or equipment name to search for" } }, required:["search_term"] }
    };
    const faqContext    = getFaqContext(msg);
    const stInstruction = needsST ? `\n\n=== SERVICETITAN LIVE LOOKUP AVAILABLE ===\nThe rep is asking about pricing or stock for: ${searchTerms.join(", ")}. Call lookup_servicetitan_pricing now with each search term to get live data before responding.` : "";

    try {
      const res1 = await fetch("/api/claude", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-6", max_tokens:2000, system:SYS+faqContext+stInstruction,
          messages:newMsgs.map(m=>({ role:m.role, content:m.content })),
          tools:[{ type:"web_search_20250305", name:"web_search" }, stTool],
        }),
      });
      const data1 = await res1.json();
      if (data1.error) throw new Error(data1.error.message);

      const toolUseBlock = (data1.content||[]).find(b=>b.type==="tool_use"&&b.name==="lookup_servicetitan_pricing");
      let finalReply="", stDataUsed=false;
      let webSearched = (data1.content||[]).some(b=>b.type==="tool_use"&&b.name==="web_search");

      if (toolUseBlock && toolUseBlock.id) {
        if (!data1.content || !Array.isArray(data1.content) || data1.content.length === 0) {
          finalReply = "";
        } else {
          const lookupTerms = searchTerms.length > 0 ? searchTerms : [toolUseBlock.input.search_term || ""];
          let stResult = "No data found.";

          const parallelLookup = Promise.all([
            Promise.all(lookupTerms.map(term =>
              fetch("/api/st", { method:"POST", headers:{"Content-Type":"application/json"},
                body: JSON.stringify({ endpoint:`/pricebook/v2/tenant/${ST_TENANT}/equipment?`,
                  tenant:ST_TENANT, appKey:ST_APP_KEY, clientId:ST_CLIENT_ID, clientSecret:ST_CLIENT_SECRET, searchTerm:term })
              }).then(r => r.ok ? r.json() : {data:[]}).then(d => d.data||[]).catch(() => [])
            )).then(results => results.flat()),
            Promise.all(lookupTerms.map(term =>
              fetch(`/api/inventory?q=${encodeURIComponent(term)}`)
                .then(r => r.ok ? r.json() : {items:[]})
                .then(d => (d.items||[]).flatMap(i => (i.rawRows||[]).map(r => ({
                  name:r.name, code:r.code, onHand:r.quantityOnHand, available:r.quantityAvailable,
                  onOrder:r.quantityOnOrder, location:r.location }))))
                .catch(() => [])
            )).then(results => results.flat())
          ]);

          const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 6000));
          const [allPricebookItems, allInventoryItems] = await Promise.race([parallelLookup, timeoutPromise])
            .catch(() => [[], []]);

          if (allPricebookItems.length > 0 || allInventoryItems.length > 0) {
            stDataUsed=true; stResult=buildSTContext(allPricebookItems, allInventoryItems);
          } else {
            stResult=`No matching equipment found for "${lookupTerms.join(", ")}" in ServiceTitan pricebook or inventory.`;
          }

          const allToolUseBlocks = (data1.content||[]).filter(b => b.type === "tool_use");
          if (allToolUseBlocks.length === 0) {
            finalReply = (data1.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
          } else {
            const toolResults = allToolUseBlocks.map(block =>
              block.name === "lookup_servicetitan_pricing"
                ? { type:"tool_result", tool_use_id:block.id, content:stResult }
                : { type:"tool_result", tool_use_id:block.id, content:"No result available" }
            );
            try {
              const res2 = await fetch("/api/claude", {
                method:"POST", headers:{"Content-Type":"application/json"},
                body: JSON.stringify({
                  model:"claude-sonnet-4-6", max_tokens:2000, system:SYS+faqContext+stInstruction,
                  messages: [
                    ...newMsgs.map(m=>({ role:m.role, content:m.content })),
                    { role:"assistant", content:data1.content },
                    { role:"user", content:toolResults }
                  ],
                  tools:[{ type:"web_search_20250305", name:"web_search" }, stTool],
                }),
              });
              if (!res2.ok) {
                const errText = await res2.text();
                console.error('res2 failed:', res2.status, errText);
                throw new Error('Claude API call 2 failed: ' + res2.status);
              }
              const data2 = await res2.json();
              console.log('data2 full response:', JSON.stringify(data2).slice(0, 500));
              console.log('data2 content types:', (data2.content||[]).map(b=>b.type));
              console.log('data2 stop_reason:', data2.stop_reason);
              if (data2.error) throw new Error(`Claude res2 error: ${data2.error.message||JSON.stringify(data2.error)}`);
              webSearched = webSearched || (data2.content||[]).some(b=>b.type==="tool_use"&&b.name==="web_search");
              const textBlocks = (data2.content||[]).filter(b=>b.type==="text");
              if (textBlocks.length > 0) {
                finalReply = textBlocks.map(b=>b.text).join("\n");
              } else if (data2.stop_reason === "tool_use") {
                finalReply = (data1.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n") ||
                             "Checking ServiceTitan... please try again.";
              } else {
                finalReply = (data1.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
              }
              if (!finalReply) {
                finalReply = "I found data in ServiceTitan but had trouble formatting the response. Please try asking again.";
              }
            } catch(res2Err) {
              console.error('res2Err:', res2Err.message);
              finalReply = (data1.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
            }
          }
        }
      } else {
        finalReply = (data1.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
      }

      setStLookupActive(false);
      const displayReply = stDataUsed && finalReply ? formatSTReply(finalReply) : finalReply;
      setMessages([...newMsgs, { role:"assistant", content:displayReply, webSearched, stDataUsed, isHtml: !!(stDataUsed && finalReply) }]);
    } catch(err) {
      setStLookupActive(false);
      setMessages([...newMsgs, { role:"assistant", content:`⚠️ ${err.message}`, error:true }]);
    }
    setLoading(false);
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:C.bg }}>
      {feedbackOpen && <FeedbackModal tab="AirIQ" onClose={()=>setFeedbackOpen(false)}/>}
      
      <div className="vendor-bar" style={{ padding:"4px 12px 6px", background:C.surface, borderBottom:`1px solid ${C.border}`,
        display:"flex", alignItems:"center", gap:6, overflowX:"auto", flexWrap:"nowrap",
        flexShrink:0, WebkitOverflowScrolling:"touch" }}>
        {ST_VENDORS.map((v,i) => (
          <a key={i} href={v.url} target="_blank" rel="noopener noreferrer"
            style={{ fontSize:10, fontWeight:600, padding:"2px 8px", borderRadius:20,
              background:C.surface2, color:C.blueLight, textDecoration:"none",
              display:"flex", alignItems:"center", gap:3, border:`1px solid ${C.border}`,
              flexShrink:0, whiteSpace:"nowrap" }}>
            <span style={{ fontSize:7 }}>↗</span>{v.short}
          </a>
        ))}
        <span style={{ fontSize:10, padding:"2px 8px", borderRadius:20, background:C.surface2,
          border:`1px solid ${C.border}`, color:C.blueLight, fontWeight:500,
          display:"flex", alignItems:"center", gap:4, flexShrink:0, whiteSpace:"nowrap" }}>
          {stLookupActive
            ? <><span style={{ width:5,height:5,borderRadius:"50%",background:"#f59e0b",display:"inline-block",animation:"blink 1s infinite" }}/> ST…</>
            : "ST Price + Stock"}
        </span>
        <button onClick={()=>setFeedbackOpen(true)} style={{marginLeft:"auto",flexShrink:0,background:'rgba(193,122,53,0.18)',border:'1px solid rgba(193,122,53,0.5)',borderRadius:12,padding:'3px 10px',color:'#C17A35',fontFamily:F.mono,fontSize:10,letterSpacing:1,cursor:'pointer',whiteSpace:'nowrap'}}>💬 FEEDBACK</button>
      </div>

      <SerialLookup/>

      <div style={{ flex:1, overflowY:"auto", padding:"16px", display:"flex", flexDirection:"column", gap:12 }}>
        {messages.length===0 && (
          <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center",
            justifyContent:"center", gap:8, padding:32, minHeight:200 }}>
            <div style={{ fontSize:28, marginBottom:4 }}>💨</div>
            <div style={{ fontWeight:600, fontSize:14, color:C.text }}>Ready for your reps</div>
            <div style={{ fontSize:12, color:C.mid, textAlign:"center", maxWidth:260, lineHeight:1.6 }}>
              Ask about specs, applications, objections — or check live pricing and stock by model number.
            </div>
          </div>
        )}
        {messages.map((m,i) => {
          const isUser = m.role==="user";
          return (
            <div key={i} style={{ display:"flex", flexDirection:"column",
              alignSelf:isUser?"flex-end":"flex-start", maxWidth:"92%", gap:4 }}>
              <div style={{ display:"flex", gap:8, flexDirection:isUser?"row-reverse":"row" }}>
                <div style={{ width:26, height:26, borderRadius:"50%", flexShrink:0,
                  display:"flex", alignItems:"center", justifyContent:"center",

                <div style={{ padding:"10px 13px",

                  fontSize:14, lineHeight:1.65,

                  color:isUser?"#fff":C.text,
                  border:isUser?"none":`1px solid ${C.border}`, maxWidth:"100%" }}>
                  {isUser ? m.content : <span dangerouslySetInnerHTML={{ __html: m.isHtml ? m.content : formatMsg(m.content) }}/>}
                </div>
              </div>
              {!isUser && (m.webSearched||m.stDataUsed) && (
                <div style={{ display:"flex", gap:5, paddingLeft:34 }}>
                  {m.stDataUsed && <span style={{ fontSize:9, padding:"2px 7px", borderRadius:20,
                    background:C.surface2, color:C.blueLight, border:`1px solid ${C.border}` }}>📊 Live ST data</span>}
                  {m.webSearched && <span style={{ fontSize:9, padding:"2px 7px", borderRadius:20,
                    background:C.surface, color:C.mid, border:`1px solid ${C.border}` }}>🔍 web searched</span>}
                </div>
              )}
            </div>
          );
        })}
        {loading && (
          <div style={{ display:"flex", gap:8, alignSelf:"flex-start" }}>
            <div style={{ width:26, height:26, borderRadius:"50%", background:C.border,
              display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, color:C.mid }}>AI</div>
            <div style={{ padding:"10px 14px", borderRadius:"4px 12px 12px 12px",
              background:C.surface, border:`1px solid ${C.border}`, display:"flex", gap:4, alignItems:"center" }}>
              {stLookupActive && <span style={{ fontSize:10, color:C.blueLight, marginRight:3 }}>Checking ST…</span>}
              {[0,1,2].map(i=>(
                <div key={i} style={{ width:5,height:5,borderRadius:"50%",background:C.mid,
                  animation:"pulse 1.2s infinite", animationDelay:`${i*0.2}s` }}/>

          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      
      {showStarters && (
        <div style={{ padding:"6px 14px 8px", display:"flex", flexWrap:"wrap", gap:5,
          flexShrink:0, background:C.bg, borderTop:`1px solid ${C.border}` }}>
          {STARTERS.map((s,i) => (
            <button key={i} onClick={() => submit(s)} style={{

            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>

    </div>
  );

function Sandbot() {
  const [tab, setTab]     = React.useState("brief");
  const [stories, setStories] = React.useState([]);
  const [feedbackOpen, setFeedbackOpen] = React.useState(false);

  React.useEffect(() => {
    (async () => {
      try {
        const res = await fetch('/api/stories');
        const data = await res.json();
        setStories(data.stories || []);
      } catch { setStories([]); }
    })();
  }, []);

  const save = async (newStory) => {
    try {
      const res = await fetch('/api/stories', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(newStory)
      });
      const data = await res.json();
      if (data.success) setStories(prev => [...prev, data.story]);
    } catch {}
  };

  const WTABS = [
    { id:"brief", label:"MISSION BRIEF" },
    { id:"intel", label:"FIELD INTEL" },
    { id:"log",   label:"LOG A WIN" },
  ];

  return (
    <div>
      {feedbackOpen && <FeedbackModal tab="Sandbot" onClose={()=>setFeedbackOpen(false)}/>}
      
      <div style={{ display:"flex", gap:2, alignItems:"center", marginBottom:20, borderBottom:`1px solid ${C.border}`,
        marginLeft:-16, marginRight:-16, paddingLeft:16 }}>
        {WTABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            background: tab===t.id ? `linear-gradient(180deg,${C.orangeSoft} 0%,transparent 100%)` : "none",
            border:"none", padding:"10px 18px",
            fontFamily:F.head, fontSize:13, letterSpacing:2,
            color: tab===t.id ? C.orange : C.mid,
            borderBottom: tab===t.id ? `2px solid ${C.orange}` : "2px solid transparent",
          }}>{t.label}</button>
        ))}

      </div>
      {tab==="brief" && <MissionBrief stories={stories}/>}
      {tab==="intel" && <FieldIntel stories={stories}/>}
      {tab==="log"   && <LogAWin stories={stories} onSave={save} onDone={()=>setTab("intel")}/>}

  );

function calcEnergyCost(model, series, ratedCFM, requiredCFM, annualHours) {
  const motorKw = MOTOR_KW[model];
  if (!motorKw || !ratedCFM || !annualHours) return 0;
  const loadFactor = Math.min(requiredCFM / ratedCFM, 1.0);
  const isVSD = series === "HV" || series === "HTV";
  const inputKw = motorKw * (isVSD ? Math.pow(loadFactor, 1.6) : loadFactor);
  return Math.round(inputKw * annualHours * 0.085);
}

function estAvailPressures(series, model) {
  const cfm = COMP_DB[series]?.cfm[model];
  if (!cfm) return [116,145,181];
  return Object.keys(cfm).map(Number).sort((a,b)=>a-b);
}
function estCFM(series, model, psi) {
  return COMP_DB[series]?.cfm[model]?.[psi] ?? null;
}
function estReqDryerCFM(cfm, inletT, ambT, psi) {
  const ci = CF_INLET[inletT]  || 1.0;
  const ca = CF_AMBIENT[ambT]  || 1.0;
  const cp = CF_PRESS[psi]     || 1.0;
  return cfm / (ci * ca * cp);
}
function estRecHAD(reqCFM) {
  return HAD_DRYERS.find(d => d.cfm >= reqCFM) || HAD_DRYERS[HAD_DRYERS.length-1];
}
function estRecTank(cfm) {
  return TANK_TBL.find(r => cfm <= r.max) || TANK_TBL[TANK_TBL.length-1];
}

function applyEquipLabor(equipment) {
  let firstComp = true;
  return (equipment || []).map(r => {
    const desc = r.description || "";
    const qty  = Number(r.qty) || 1;
    const isComp  = /compressor|htv|htm|hv\d|ht\d|hd\d/i.test(desc) && !/dryer|tank|receiver|filter/i.test(desc);
    const isDryer = /dryer|had\b|desiccant|refrigerat/i.test(desc);
    const isTank  = /\btank\b|receiver/i.test(desc);
    let minHrs = 0;
    if (isComp) {
      minHrs = firstComp ? 8 + (qty - 1) * 4 : qty * 4;
      firstComp = false;
    } else if (isDryer) {
      minHrs = qty * 4;
    } else if (isTank) {
      minHrs = qty * 4;
    }
    return minHrs > 0 ? { ...r, laborHrs: Math.max(Number(r.laborHrs) || 0, minHrs) } : r;
  });
}

function findClosestCompModel(modelStr) {
  if (!modelStr) return null;
  const s = String(modelStr).toUpperCase().replace(/[-\s]/g,'');
  const series = ['HTV','HTM','HV','HT','HD'].find(p=>s.startsWith(p));
  if (!series || !COMP_DB[series]) return null;
  const models = Object.keys(COMP_DB[series].cfm||{});
  if (models.includes(s)) return {series, model:s};
  const num = parseFloat(s.slice(series.length));
  if (isNaN(num)) return {series, model:models[0]};
  let best=models[0], bestDiff=Infinity;
  models.forEach(m=>{const n=parseFloat(m.slice(series.length));if(!isNaN(n)&&Math.abs(n-num)<bestDiff){bestDiff=Math.abs(n-num);best=m;}});
  return {series, model:best};
}
function findDryerOption(modelStr) {
  if (!modelStr) return null;
  const u = String(modelStr).toUpperCase();
  return DRYER_OPTS.find(o=>o.toUpperCase().startsWith(u))||null;
}
function findTankOption(sizeStr) {
  if (!sizeStr) return null;
  const m = String(sizeStr).match(/(\d+)/);
  if (!m) return null;
  const g = parseInt(m[1]);
  return TANK_OPTS.find(o=>{const n=o.match(/^(\d+)/);return n&&parseInt(n[1])>=g;})||TANK_OPTS[TANK_OPTS.length-1];
}
function matchPipeSize(raw) {
  if (!raw) return null;
  const s = String(raw).trim();
  if (PIPE_SIZES.includes(s)) return s;
  const num = parseFloat(s.replace(/[^\d.]/g,''));
  if (isNaN(num)) return null;
  return PIPE_SIZES.find(ps=>Math.abs(parseFloat(ps)-num)<0.05)||null;
}

function EnergyCalculator() {
  const [open, setOpen]               = React.useState(false);
  const [kwhRate, setKwhRate]         = React.useState("0.085");
  const [hoursPerDay, setHoursPerDay] = React.useState("8");
  const [daysPerWeek, setDaysPerWeek] = React.useState("5");
  const [weeksPerYear, setWeeksPerYear] = React.useState("50");
  const [units, setUnits] = React.useState([
    { id:'existing', label:'Existing Unit', enabled:true,  hp:'30', loadFactor:0.65, isVSD:false, equipmentCost:'' },
    { id:'hodge',    label:'Hodge Fixed',   enabled:true,  hp:'30', loadFactor:0.65, isVSD:false, equipmentCost:'' },
    { id:'hodgeVSD', label:'Hodge VSD',     enabled:true,  hp:'30', loadFactor:0.65, isVSD:true,  equipmentCost:'' },
  ]);
  const [tank, setTank] = React.useState({ cfm:'100', pressure:'100', band:'10', gallons:'120' });

  function updUnit(id, field, val) { setUnits(p => p.map(u => u.id===id ? {...u,[field]:val} : u)); }

  const rate = parseFloat(kwhRate) || 0.085;
  const hpd  = parseFloat(hoursPerDay) || 8;
  const dpw  = parseFloat(daysPerWeek) || 5;
  const wpy  = parseFloat(weeksPerYear) || 50;
  const annualHours = hpd * dpw * wpy;

  function calcUnit(u) {
    const hp = parseFloat(u.hp) || 0;
    const lf = u.loadFactor;
    const motorKW = hp * 0.746;
    const inputKW = u.isVSD ? motorKW * Math.pow(lf, 1.6) : motorKW * (lf + (1-lf) * 0.25);
    const annualKWh  = inputKW * annualHours;
    const annualCost = annualKWh * rate;
    return { hp, motorKW, inputKW, annualKWh, annualCost };
  }

  const calcs = units.map(u => ({...u, ...calcUnit(u)}));
  const existingCalc = calcs.find(u => u.id === 'existing');
  const hodgeFixed   = calcs.find(u => u.id === 'hodge');
  const hodgeVSD     = calcs.find(u => u.id === 'hodgeVSD');

  function paybackMonths(c) {
    const ec = parseFloat(c.equipmentCost);
    if (!ec || !existingCalc || existingCalc.annualCost <= c.annualCost) return null;
    return ec / ((existingCalc.annualCost - c.annualCost) / 12);
  }

  const tCFM  = parseFloat(tank.cfm)      || 0;
  const tPSI  = parseFloat(tank.pressure) || 100;
  const tBand = parseFloat(tank.band)     || 10;
  const tGal  = parseFloat(tank.gallons)  || 0;
  const cycleTime     = tCFM > 0 ? (tGal * 0.1337 * tBand) / (tCFM / 60 * 14.7 / tPSI) : 0;
  const cyclesPerHour = cycleTime > 0 ? 3600 / cycleTime : 0;

  const savingsFixed      = existingCalc && hodgeFixed ? existingCalc.annualCost - hodgeFixed.annualCost  : 0;
  const savingsVSD        = existingCalc && hodgeVSD   ? existingCalc.annualCost - hodgeVSD.annualCost    : 0;
  const savingsVSDvsFixed = hodgeFixed   && hodgeVSD   ? hodgeFixed.annualCost   - hodgeVSD.annualCost    : 0;

  const fmt    = n => '$' + Math.abs(Math.round(n)).toLocaleString('en-US');
  const fmtS   = n => n > 0 ? '+'+fmt(n) : n < 0 ? '-'+fmt(n) : '$0';
  const fmtKWh = n => Math.round(n).toLocaleString('en-US');

  const colBorder = [`2px solid ${C.mid}`, `2px solid ${C.blueLight}`, `2px solid ${C.copper}`];

function ElectricalSizingCalc({ initHp, initPhase, initVoltage }) {
  const [hp,      setHp]      = React.useState(initHp != null ? Number(initHp) : 30);
  const [phase,   setPhase]   = React.useState(initPhase || '3');
  const [voltage, setVoltage] = React.useState(initVoltage != null ? Number(initVoltage) : 460);

  React.useEffect(()=>{ if(initHp != null) setHp(Number(initHp)); }, [initHp]);
  React.useEffect(()=>{ if(initPhase != null) setPhase(initPhase); }, [initPhase]);
  React.useEffect(()=>{ if(initVoltage != null) setVoltage(Number(initVoltage)); }, [initVoltage]);
  React.useEffect(()=>{
    const valid = phase === '1' ? [200,208,230] : [200,208,230,460,575];
    if(!valid.includes(Number(voltage))) setVoltage(phase === '1' ? 230 : 460);
  }, [phase]);
  React.useEffect(()=>{
    if(phase === '1' && !ELEC_1PH_HP.includes(Number(hp))) setPhase('3');
  }, [hp]);

  const nextStd = v => STD_OCP.find(s => s >= v) || 2000;
  const flc     = (phase === '1' ? NEC_1PH : NEC_3PH)[Number(hp)]?.[Number(voltage)] ?? null;
  const mca     = flc != null ? Math.round(flc * 1.25 * 10) / 10 : null;
  const disconnect  = flc  != null ? Math.round(flc * 1.15 * 10) / 10 : null;
  const maxFuse     = flc  != null ? nextStd(flc * 1.75) : null;
  const maxBreaker  = flc  != null ? nextStd(flc * 2.5)  : null;
  const cuCond  = mca  != null ? ELEC_CU_COND.reduce((acc, c) => mca >= c.minA ? c : acc, null) : null;
  const alCond  = mca  != null ? ELEC_AL_COND.reduce((acc, c) => mca >= c.minA ? c : acc, null) : null;
  const maxOcp  = (maxFuse != null && maxBreaker != null) ? Math.max(maxFuse, maxBreaker) : null;
  const gnd     = maxOcp != null ? ELEC_GROUNDS.find(g => g.maxOCP >= maxOcp) : null;

  const voltOpts = phase === '1' ? [200,208,230] : [200,208,230,460,575];
  const inS = {background:C.surface2,border:`1px solid ${C.border}`,borderRadius:5,
    padding:'6px 8px',color:C.text,fontFamily:F.body,fontSize:12,width:'100%'};
  const row = (label, value) => (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',
      padding:'5px 0',borderBottom:`1px solid ${C.border}`}}>
      <span style={{fontFamily:F.body,fontSize:12,color:C.mid}}>{label}</span>
      <span style={{fontFamily:F.head,fontSize:15,letterSpacing:1,color:'#F97316',flexShrink:0,marginLeft:8}}>{value}</span>
    </div>
  );

  return (
    <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:12}}>
        <div>
          <div style={{fontFamily:F.mono,fontSize:9,letterSpacing:2,color:C.mid,marginBottom:4}}>HP</div>
          <select value={hp} onChange={e=>setHp(Number(e.target.value))} style={inS}>
            {ELEC_HP_LIST.map(h=><option key={h} value={h}>{h} HP</option>)}
          </select>
        </div>
        <div>
          <div style={{fontFamily:F.mono,fontSize:9,letterSpacing:2,color:C.mid,marginBottom:4}}>PHASE</div>
          <select value={phase} onChange={e=>setPhase(e.target.value)} style={inS}>
            {ELEC_1PH_HP.includes(Number(hp)) && <option value="1">1-Phase</option>}
            <option value="3">3-Phase</option>
          </select>
        </div>
        <div>
          <div style={{fontFamily:F.mono,fontSize:9,letterSpacing:2,color:C.mid,marginBottom:4}}>VOLTAGE</div>
          <select value={voltage} onChange={e=>setVoltage(Number(e.target.value))} style={inS}>
            {voltOpts.map(v=><option key={v} value={v}>{v}V</option>)}
          </select>
        </div>
      </div>
      {flc != null ? (
        <div style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,padding:'12px 14px'}}>
          <div style={{fontFamily:F.mono,fontSize:9,letterSpacing:2,color:C.copper,marginBottom:10}}>
            NEC 430 RESULTS — {hp} HP · {phase==='1'?'1-Phase':'3-Phase'} · {voltage}V
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 20px'}}>
            {row('NEC Motor FLC', flc+' A')}
            {row('Min Circuit Ampacity (MCA)', mca+' A')}
            {row('Min Motor Disconnect Ampacity', disconnect+' A')}
            {row('Max TD Fuse (DETDF)', maxFuse+' A')}
            {row('Max Breaker (HACR/ITB)', maxBreaker+' A')}
            {cuCond && row('Cu Conductors (75°C)', cuCond.cu)}
            {alCond && row('Al Conductors (75°C)', alCond.al)}
            {gnd  && row('Ground — Cu (EGC)', gnd.cuEGC)}
            {gnd  && row('Ground — Al (EGC)', gnd.alEGC)}
          </div>
          <div style={{marginTop:10,fontFamily:F.body,fontSize:10,color:C.dim,lineHeight:1.5,
            borderTop:`1px solid ${C.border}`,paddingTop:8}}>
            Disconnect: FLC × 115% (raw minimum — pick HP-rated disconnect with electrician). Use package nameplate MCA/MOCP when available. Verify final sizing with project electrician or engineer of record.
          </div>
        </div>
      ) : (
        <div style={{fontFamily:F.mono,fontSize:10,color:C.dim,padding:'8px 0'}}>
          No NEC data for this HP / phase / voltage combination.
        </div>
      )}
    </div>
  );
}

function FeedbackModal({ tab, onClose }) {
  const [rep, setRep]     = React.useState(() => localStorage.getItem('airiq_rep_name') || '');
  const [branch, setBranch] = React.useState('');
  const [fbType, setFbType] = React.useState('Bug Report');
  const [msg, setMsg]     = React.useState('');
  const [status, setStatus] = React.useState(null);

  async function send() {
    if (!msg.trim()) return;
    setStatus('sending');
    try {
      const r = await fetch('/api/slack-feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rep, branch, type: fbType, message: msg, tab }),
      });
      if (!r.ok) throw new Error();
      setStatus('ok');
      setTimeout(onClose, 2000);
    } catch {
      setStatus('err');
    }
  }

  const overlay = { position:'fixed', inset:0, background:'rgba(0,0,0,0.75)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:9999, padding:16 };
  const box     = { background:C.surface2, border:`1px solid ${C.copper}`, borderRadius:12, padding:24, width:'100%', maxWidth:420, fontFamily:F.body };
  const inS     = { width:'100%', background:C.surface, border:`1px solid ${C.border}`, borderRadius:6, padding:'8px 10px', color:C.text, fontFamily:F.body, fontSize:14, boxSizing:'border-box', outline:'none' };

  return (
    <div style={overlay} onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={box}>
        <div style={{fontFamily:F.head,fontSize:20,letterSpacing:3,color:C.text,marginBottom:16}}>SEND FEEDBACK TO JON</div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div>
            <div style={{fontFamily:F.mono,fontSize:10,color:C.mid,letterSpacing:1,marginBottom:4}}>REP NAME</div>
            <input value={rep} onChange={e=>setRep(e.target.value)} placeholder="Your name" style={inS}/>
          </div>
          <div>
            <div style={{fontFamily:F.mono,fontSize:10,color:C.mid,letterSpacing:1,marginBottom:4}}>BRANCH</div>
            <select value={branch} onChange={e=>setBranch(e.target.value)} style={inS}>
              <option value="">Select branch...</option>
              {BRANCHES.map(b=><option key={b} value={b}>{b}</option>)}
            </select>
          </div>

}

{"cfm":number_or_null,"psi":number_or_null,"appType":"string_or_null","airQuality":"1"|"2"|"3"|"4"|"5"|null,"hours":"8"|"10"|"16"|"24"|null,"phase":"1ph"|"3ph"|null,"notes":"string_or_null"}` }] }] }) });

  }

  async function designSystem() {
    if (!sysReqs.cfm) return;
    setSysBusy(true); setSysRec(null); setSysStock({}); setSelectedTier(null);
    const compCatalog = Object.entries(COMP_DB).map(([k,v])=>
      `${k} (${v.label}): `+Object.entries(v.cfm||{}).map(([m,ps])=>
        `${m}@${Object.entries(ps).map(([p,c])=>`${p}psi=${c}cfm`).join("/")}`)
      .join(", ")
    ).join("\n");
    const hadCatalog = HAD_DRYERS.map(d=>`${d.model}=${d.cfm}CFM`).join(", ");
    const airQualityLabels = {"class0":"Class 0 — Oil-Free (ISO 8573-1)","1":"Class 1 — Pharmaceutical/food (oil-free)","2":"Class 2 — Electronics/painting","3":"Class 3 — Instrument air","4":"Class 4 — General manufacturing","5":"Class 5 — Basic"};
    const filterPkgs = {"class0":"Oil-free compressor REQUIRED — Hodge HD/HV/HT are oil-flooded and cannot meet Class 0. Recommend Hertz Eagle oil-free series. Treatment: desiccant dryer + coalescing pre-filter + coalescing after-filter + sterile/HEPA terminal filter.","1":"Desiccant dryer + coalescing pre-filter + coalescing after-filter + carbon filter + sterile filter (consider oil-free compressor)","2":"Refrigerant dryer + coalescing pre-filter + coalescing after-filter + carbon filter","3":"Refrigerant dryer + coalescing pre-filter + coalescing after-filter","4":"Refrigerant dryer + coalescing filter","5":"Coalescing filter only (dryer recommended)"};
    const prompt =
`You are a compressed air system design engineer for Hodge Compressor. Design Good/Better/Best recommendations.

CUSTOMER REQUIREMENTS:
Required CFM: ${sysReqs.cfm} CFM | Pressure: ${sysReqs.psi} PSIG | Application: ${sysReqs.appType}
Air quality: ISO 8573-1 ${airQualityLabels[sysReqs.airQuality]||sysReqs.airQuality}
Operating schedule: ${sysReqs.hours} hrs/day × ${sysReqs.days} days/week × ${sysReqs.weeks} weeks/year = ${Number(sysReqs.hours)*Number(sysReqs.days)*Number(sysReqs.weeks)} annual hours
Power: ${sysReqs.phase==="1ph"?"Single-phase (very limited Hodge options — recommend phase converter or HTM7.5(1Ph) only)":"Three-phase"} | Voltage: ${{
  "230v1ph":"208-230V Single Phase — restrict recommendations to: HTM series (HTM7.5, HTM10, HTM15, HTM20 — all run on 208V despite tech data) and small HD models (HD10, HD15, HD20, HD25 only). HV/HT/HTV and larger HD units require 3-phase; flag and recommend phase converter if needed.",
  "230v3ph":"208-230V Three Phase — available on smaller HD models (HD10–HD25) and HTM series (HTM units run on 208V). Most HV/HT/HTV models are 460V standard; note non-standard motor configuration and confirm with factory for larger models.",
  "460v3ph":"460V Three Phase — standard Hodge catalog voltage, all models available",
  "575v3ph":"575V Three Phase — available on most models, common in Canada, confirm with factory",
  "380v3ph":"380V Three Phase — export voltage, factory order, confirm lead time"
}[sysReqs.voltage]||sysReqs.voltage}
${sysReqs.notes?`Special requirements: ${sysReqs.notes}`:""}

HODGE COMPRESSOR CATALOG (model@psi=cfm):
${compCatalog}

HAD REFRIGERANT DRYERS: ${hadCatalog} — always prefer HAD if CFM fits; use Beko DRYPOINT if above HAD487.

FILTER PACKAGES BY AIR QUALITY CLASS:
Class 0: ${filterPkgs["class0"]}
Class 1: ${filterPkgs["1"]}
Class 2: ${filterPkgs["2"]}
Class 3: ${filterPkgs["3"]}
Class 4: ${filterPkgs["4"]}
Class 5: ${filterPkgs["5"]}

DESIGN RULES:
1. Apply 15% safety factor: minimum safe CFM = required × 1.15 = ${Math.ceil(Number(sysReqs.cfm)*1.15)} CFM
2. Choose the closest PSI column at or above ${sysReqs.psi} psig
3. GOOD: Fixed speed HD (direct drive single-stage) — smallest model meeting safety CFM
4. BETTER: HT series (two-stage fixed speed) — better efficiency, lower discharge temp, same or next tier up
5. BEST: HV or HTV series (variable speed) — calculate 30% avg energy savings vs GOOD
6. If no single unit meets demand, set dual=true and recommend 2× the same model
7. HTM units: set htmPolicy=true to trigger deposit policy notice
8. Receiver tank: use 2 gal/CFM as minimum (round to nearest standard: 80,120,200,240,400,500,1000 gal)
9. Do NOT compute annualEnergyCost or annualEnergySavings — omit those fields or set to 0. Energy costs are calculated client-side from your model selection and cfmAtPsi values.

Return ONLY valid JSON, no markdown fence, no extra text:
{
  "good":   { "series":"HD","model":"HD30","cfmAtPsi":113,"psiUsed":116,"dual":false,"headline":"Fixed Speed — Direct Drive","why":"…one sentence…","dryer":"HAD135","tankGal":120,"filters":["…"],"htmPolicy":false,"loadAction":{"series":"HD","model":"HD30","pressure":116} },
  "better": { "series":"HT","model":"HT30","cfmAtPsi":144,"psiUsed":116,"dual":false,"headline":"Two-Stage Fixed Speed","why":"…","dryer":"HAD135","tankGal":120,"filters":["…"],"htmPolicy":false,"loadAction":{"series":"HT","model":"HT30","pressure":116} },
  "best":   { "series":"HV","model":"HV30","cfmAtPsi":127,"psiUsed":116,"dual":false,"headline":"Variable Speed Drive","why":"…","dryer":"HAD135","tankGal":120,"filters":["…"],"auditNote":"A data-logging audit can quantify exact demand, identify leaks, find pressure drops, and validate right-sizing — offer this as a value-add service.","htmPolicy":false,"loadAction":{"series":"HV","model":"HV30","pressure":116} }
}`;
    try {
      const res = await fetch("/api/claude",{ method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1800, messages:[{role:"user",content:prompt}] }) });
      const d = await res.json(); if(d.error) throw new Error(d.error.message||"Claude error");
      const text = (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const m = text.match(/\{[\s\S]*\}/);
      if (!m) throw new Error("No JSON returned");
      const rec = JSON.parse(m[0]);
      const annualHrs = Number(sysReqs.hours) * Number(sysReqs.days) * Number(sysReqs.weeks);
      const reqCFM    = Number(sysReqs.cfm);
      ["good","better","best"].forEach(k => {
        const t = rec[k]; if (!t) return;
        const normModel  = String(t.model||"").toUpperCase().replace(/[-\s]/g,"");
        const normSeries = String(t.series||"").toUpperCase();
        const cfmTbl = ((COMP_DB[normSeries] || {}).cfm || {})[normModel] || {};
        const psiKeys = Object.keys(cfmTbl).map(Number).sort((a,b)=>a-b);
        const psiKey  = psiKeys.find(p => p >= Number(sysReqs.psi)) || psiKeys[psiKeys.length-1];
        const ratedCFM = (psiKey && cfmTbl[psiKey]) || Number(t.cfmAtPsi) || 0;
        t.annualEnergyCost = calcEnergyCost(normModel, normSeries, ratedCFM, reqCFM, annualHrs);
      });
      if (rec.good && rec.best)
        rec.best.annualEnergySavings = Math.max(0, rec.good.annualEnergyCost - rec.best.annualEnergyCost);
      setSysRec(rec);
      const models = [rec.good,rec.better,rec.best].filter(Boolean);
      const stockMap = {};
      await Promise.all(models.map(async tier => {
        try {
          const invRes = await fetch(`/api/inventory?q=${encodeURIComponent(tier.model)}`);
          if (invRes.ok) {
            const inv = await invRes.json();
            const rows = (inv.items||[]).flatMap(i=>(i.rawRows||[]));
            const match = rows.find(r=>r.name?.toUpperCase().includes(tier.model.toUpperCase()));
            if (match) stockMap[tier.model] = { onHand:match.quantityOnHand, available:match.quantityAvailable };
          }
        } catch {}
      }));
      setSysStock(stockMap);
    } catch(e) { setSysRec({ error:e.message }); }
    setSysBusy(false);
  }

  async function parsePmEstimate(file) {
    setPmBusy(true); setPmData(null);
    try {
      const isDocx = file.type==="application/vnd.openxmlformats-officedocument.wordprocessingml.document" || file.name?.toLowerCase().endsWith(".docx");
      const isPdf  = file.type==="application/pdf";
      const isImg  = file.type.startsWith("image/");
      if (!isPdf && !isImg && !isDocx) { setPmData({error:"Please upload a PDF, Word doc (.docx), or image of the PM estimate."}); setPmBusy(false); return; }
      const b64 = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.onerror=rej; r.readAsDataURL(file); });
      const EXTRACT_PROMPT = `{"annualPmCost":number,"monthlySubscriptionCost":number|null,"servicesIncluded":["..."],"unitCovered":"string"}
If a field is absent, use null.`;
      let messages;
      if (isDocx) {
        const textResp = await fetch("/api/parse-docx",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({base64:b64}) });
        const textData = await textResp.json();
        if (textData.error) throw new Error(textData.error);
        messages = [{ role:"user", content:[{ type:"text", text:`Extract from this Hodge PM estimate and return ONLY valid JSON (no markdown):\n${EXTRACT_PROMPT}\n\nPM ESTIMATE TEXT:\n${textData.text}` }] }];
      } else {
        const mediaBlock = isPdf
          ? { type:"document", source:{ type:"base64", media_type:"application/pdf", data:b64 } }
          : { type:"image",    source:{ type:"base64", media_type:file.type, data:b64 } };
        messages = [{ role:"user", content:[mediaBlock,{ type:"text", text:`Extract from this Hodge PM estimate and return ONLY valid JSON (no markdown):\n${EXTRACT_PROMPT}` }] }];
      }
      const resp = await fetch("/api/claude",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:512, messages }) });
      const d = await resp.json();
      if (d.error) throw new Error(d.error.message||JSON.stringify(d.error));
      const raw = (d.content?.[0]?.text||"").trim();
      const clean = raw.replace(/^```(?:json)?\n?|\n?```$/g,"").trim();
      setPmData(JSON.parse(clean));
    } catch(e) { setPmData({error:e.message}); }
    setPmBusy(false);
  }

  function loadEstimateIntoForm(est) {
    setJob({ customer: est.customer||"", address: est.address||"", pipeSize: est.pipeSize||"1\"", dropSize: est.dropSize||"3/4\"", pipeColor: est.pipeColor||"Blue", totalRun: est.totalRunFt ? String(est.totalRunFt) : "" });
    setComps((est.compressors||[]).map(c => ({ id:uid(), series:c.series||"HD", model:c.model||"HD30", pressure:c.pressure||116, inletTemp:100, ambientTemp:100 })));

  function filterPastList(list) {
    return list.filter(est => {
      if (fSeries !== "Any" && !(est.compressors||[]).some(c => c.series === fSeries)) return false;
      if (fPipeSize !== "Any" && est.pipeSize !== fPipeSize) return false;
      if (fSysType !== "Any") {
        const st = (est.systemType||"").toLowerCase();
        if (fSysType === "Loop" && st !== "loop") return false;
        if (fSysType === "Branch" && st !== "branch") return false;
      }
      const run = Number(est.totalRunFt)||0;
      if (fRunRange === "Under 100ft" && run >= 100) return false;
      if (fRunRange === "100-300ft"   && (run < 100 || run > 300)) return false;
      if (fRunRange === "300ft+"      && run <= 300) return false;
      return true;
    });
  }

  async function handleFileUpload(e) {
    const files = Array.from(e.target.files);
    setFileInputKey(k => k + 1);
    if (!files.length) return;
    const newImgs = [];
    for (const file of files) {
      if (file.type === "application/pdf") {
        alert(`${file.name}: PDF detected — export as PNG or JPG first.`);
        continue;
      }
      try {
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = ev => resolve(ev.target.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        newImgs.push({ dataUrl, mediaType: file.type || "image/jpeg", name: file.name });
      } catch { /* skip unreadable file */ }
    }
    if (newImgs.length) {
      setLayoutImgs(prev => [...prev, ...newImgs]);
      setLayoutAnalysis(null);
    }
  }

              }

      const d = await res.json();

      const m = text.match(/\{[\s\S]*\}/);
      if (!m) throw new Error("Could not parse analysis response");

            </div>

            
            <div style={{marginBottom:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontFamily:F.mono,fontSize:11,letterSpacing:2,color:C.copper}}>🔄 HOSE REELS</span>

        {reels.map(r=>(
          <div key={r.id} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
            <input type="number" value={r.qty} min={1}
              onChange={e=>updRow(setReels,r.id,"qty",Number(e.target.value))}

            <select value={r.name} onChange={e=>updRow(setReels,r.id,"name",e.target.value)}

              {REEL_OPTS.map(o=><option key={o} value={o}>{o}</option>)}

              style={{background:"none",border:"none",color:C.mid,cursor:"pointer",fontSize:18,padding:"0 4px",flexShrink:0,lineHeight:1}}>×</button>

        ))}
            </div>
          </div>
        </div>
      </div>

      
      <div style={{marginBottom:12}}>
        {secHdr('layout','📐 LAYOUT DRAWINGS / PHOTOS',
          layoutAnalysis&&!layoutAnalysis.error?'analysis ready':layoutImgs.length>0?`${layoutImgs.length} image${layoutImgs.length!==1?'s':''}`:null,
