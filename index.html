  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;overflow:hidden;}
    body{background:#06090F;font-family:system-ui,sans-serif;color:#E4EDF8;}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-track{background:#06090F;}
    ::-webkit-scrollbar-thumb{background:#1E2D47;border-radius:2px;}
    input,textarea,select,button{font-family:inherit;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.25;}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
    .pulse{animation:pulse 1.6s ease infinite;}
    .fadeUp{animation:fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards;}
    .s1{animation:fadeUp 0.4s 0.04s cubic-bezier(0.16,1,0.3,1) both;}
    .s2{animation:fadeUp 0.4s 0.10s cubic-bezier(0.16,1,0.3,1) both;}
    .s3{animation:fadeUp 0.4s 0.16s cubic-bezier(0.16,1,0.3,1) both;}
    .s4{animation:fadeUp 0.4s 0.22s cubic-bezier(0.16,1,0.3,1) both;}
    .s5{animation:fadeUp 0.4s 0.28s cubic-bezier(0.16,1,0.3,1) both;}
    .s6{animation:fadeUp 0.4s 0.34s cubic-bezier(0.16,1,0.3,1) both;}
    .s7{animation:fadeUp 0.4s 0.40s cubic-bezier(0.16,1,0.3,1) both;}
    /* ── Print / PDF styles ─────────────────────────────────────── */
    /* #print-portal lives outside #root in the DOM — display:none hides the
       entire app, display:block on the portal shows only the BOM, so the
       content starts on page 1 with no blank pages from hidden UI elements */
    #print-portal{display:none;}
    @media print{
      @page{margin:0.5in;}
      html,body{height:auto!important;min-height:0!important;overflow:visible!important;background:white!important;}
      #root{display:none!important;height:0!important;min-height:0!important;overflow:hidden!important;}
      #print-portal{
        display:block!important;
        background:white;
        font-family:Arial,Helvetica,sans-serif;color:#111;font-size:10pt;line-height:1.45;
        -webkit-print-color-adjust:exact;print-color-adjust:exact;
      }
      #print-portal .print-logo{max-height:48px!important;width:auto!important;}
      #print-portal table{width:100%;border-collapse:collapse;margin-bottom:10pt;page-break-inside:auto;}
      #print-portal tr{page-break-inside:avoid;page-break-after:auto;}
      #print-portal th{
        background:#1E3A8A!important;color:#fff!important;
        padding:5pt 7pt;text-align:left;font-size:8.5pt;
        -webkit-print-color-adjust:exact;print-color-adjust:exact;
      }
      #print-portal td{padding:4pt 7pt;border-bottom:0.5pt solid #ddd;font-size:8.5pt;vertical-align:top;}
      #print-portal tr:nth-child(even) td{
        background:#f5f7fb!important;
        -webkit-print-color-adjust:exact;print-color-adjust:exact;
      }
    }
    .app-header{position:sticky;top:0;z-index:100;}
    .vendor-bar{position:sticky;top:0;z-index:99;}
    @media (max-width:480px){
      .grid-2col{grid-template-columns:1fr!important;}
      .app-header-inner{padding:5px 12px!important;}
      .app-header-logo{height:32px!important;}
      .app-header-title{font-size:16px!important;}
      .app-header-sub{font-size:9px!important;}
    }
  </style>

function formatMsg(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<p style="font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#64748b;margin:12px 0 4px">$1</p>')
    .replace(/^## (.+)$/gm, '<p style="font-weight:600;margin:10px 0 4px">$1</p>')
    .replace(/^- (.+)/gm, '<div style="display:flex;gap:8px;margin:3px 0"><span style="color:#94a3b8;flex-shrink:0">•</span><span>$1</span></div>')
    .replace(/^(\d+)\. (.+)/gm, '<div style="display:flex;gap:8px;margin:3px 0"><span style="color:#94a3b8;flex-shrink:0;min-width:16px">$1.</span><span>$2</span></div>')
    .replace(/\n\n/g, '<br/>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer" style="color:#1d4ed8;text-decoration:underline">$1 ↗</a>')
    .replace(/\n/g, '<br/>');
}

const INTENT_REGEX = /\b(price|pricing|cost|available|availability|stock|in.?stock|on.?hand|how much|do you have|do we have|quantity|qty|can i get)\b/i;

function buildSTContext(pricebookItems, inventoryItems) {
  if (pricebookItems.length === 0 && inventoryItems.length === 0) return "";
  const merged = pricebookItems.map(p => {
    const inv = inventoryItems.find(i =>
      i.id === p.id ||
      (i.name||"").toLowerCase() === (p.displayName||p.name||"").toLowerCase() ||
      (i.code||"").toLowerCase() === (p.code||"").toLowerCase()
    );
    return {
      name: p.displayName||p.name,
      price: p.price != null ? `$${Number(p.price).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}` : "N/A",
      sku: p.code||p.sku||"N/A", active: p.active,
      onHand: inv?.onHand??inv?.quantityOnHand??p.quantity??null,
      available: inv?.available??inv?.quantityAvailable??null,
    };
  });
  inventoryItems.forEach(inv => {
    const name = inv.name||"";
    if (!merged.find(m=>(m.name||"").toLowerCase()===name.toLowerCase())) {
      merged.push({ name, price:"N/A", sku:inv.code||"N/A", active:inv.active,
        onHand:inv.onHand??inv.quantityOnHand??null, available:inv.available??inv.quantityAvailable??null });
    }
  });
  const lines = merged.map(item => {
    const onHandStr = item.onHand!==null ? `${item.onHand} units` : "not tracked";
    const availStr  = item.available!==null ? `${item.available} units` : "not tracked";
    return `${item.name} | Price: ${item.price} | On Hand: ${onHandStr} | Available: ${availStr} | SKU: ${item.sku} | Active: ${item.active}`;
  });
  return "\n\n=== LIVE SERVICETITAN DATA (pricebook + inventory) ===\n" + lines.join("\n") +
    "\nSource: Live pull from ServiceTitan. Present price, on-hand, and available quantities clearly using the format in your instructions.";
}

// ─── AIRIQ COMPONENT ─────────────────────────────────────────────────────────
function AirIQ() {
  const [messages, setMessages]     = React.useState([]);
  const [input, setInput]           = React.useState("");
  const [loading, setLoading]       = React.useState(false);
  const [showStarters, setShowStarters] = React.useState(true);
  const [isListening, setIsListening]   = React.useState(false);
  const [stLookupActive, setStLookupActive] = React.useState(false);
  const bottomRef      = React.useRef(null);
  const recognitionRef = React.useRef(null);
  const textareaRef    = React.useRef(null);

  React.useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior:"smooth" });
  }, [messages, loading]);

  const stopListening = () => {
    if (recognitionRef.current) { recognitionRef.current.stop(); recognitionRef.current = null; }
    setIsListening(false);
  };
  const startListening = () => {
    if (isListening) { stopListening(); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("Voice not supported. Try Chrome."); return; }
    const r = new SR(); r.lang="en-US"; r.continuous=false; r.interimResults=false;
    recognitionRef.current = r;
    r.onstart = () => setIsListening(true);
    r.onend   = () => { setIsListening(false); recognitionRef.current=null; };
    r.onerror = () => { setIsListening(false); recognitionRef.current=null; };
    r.onresult = e => { setInput(e.results[0][0].transcript); setTimeout(autoResize,50); };
    r.start();
  };
  const autoResize = () => {
    const el = textareaRef.current; if (!el) return;
    el.style.height="40px"; el.style.height=Math.min(el.scrollHeight,120)+"px";
  };

  const submit = async (text) => {
    const msg = text || input.trim();
    if (!msg || loading) return;
    setShowStarters(false); setInput("");
    if (textareaRef.current) textareaRef.current.style.height="40px";
    const newMsgs = [...messages, { role:"user", content:msg }];
    setMessages(newMsgs); setLoading(true); setStLookupActive(false);

    const modelMatches = msg.match(MODEL_REGEX);
    const hasIntent    = INTENT_REGEX.test(msg);
    const needsST      = !!(modelMatches && hasIntent) || hasIntent;
    const searchTerms  = needsST ? (modelMatches ? [...new Set(modelMatches)].slice(0,3) : [msg.replace(INTENT_REGEX,"").trim().slice(0,40)]) : [];
    if (needsST) setStLookupActive(true);

    const stTool = {
      name:"lookup_servicetitan_pricing",
      description:"Look up live pricing and stock availability for equipment in ServiceTitan. Only call this when the rep explicitly asks about price, cost, stock, or availability.",
      input_schema:{ type:"object", properties:{ search_term:{ type:"string", description:"The model number or equipment name to search for" } }, required:["search_term"] }
    };
    const stInstruction = needsST ? `\n\n=== SERVICETITAN LIVE LOOKUP AVAILABLE ===\nThe rep is asking about pricing or stock for: ${searchTerms.join(", ")}. Call lookup_servicetitan_pricing now with each search term to get live data before responding.` : "";

    try {
      const res1 = await fetch("/api/claude", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-6", max_tokens:2000, system:SYS+stInstruction,
          messages:newMsgs.map(m=>({ role:m.role, content:m.content })),
          tools:[{ type:"web_search_20250305", name:"web_search" }, stTool],
        }),
      });
      const data1 = await res1.json();
      if (data1.error) throw new Error(data1.error.message);

      const toolUseBlock = (data1.content||[]).find(b=>b.type==="tool_use"&&b.name==="lookup_servicetitan_pricing");
      let finalReply="", stDataUsed=false;
      let webSearched = (data1.content||[]).some(b=>b.type==="tool_use"&&b.name==="web_search");

      if (toolUseBlock) {
        const searchTerm = toolUseBlock.input.search_term || searchTerms[0] || "";
        let stResult = "No data found.";
        try {
          const workerRes = await fetch("/api/st", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ endpoint:`/pricebook/v2/tenant/${ST_TENANT}/equipment?`,
              tenant:ST_TENANT, appKey:ST_APP_KEY, clientId:ST_CLIENT_ID, clientSecret:ST_CLIENT_SECRET, searchTerm }),
          });
          if (workerRes.ok) {
            const workerData = await workerRes.json();
            const pricebookItems = workerData.data || [];
            let inventoryItems = [];
            try {
              const invRes = await fetch(`/api/inventory?q=${encodeURIComponent(searchTerm)}`);
              if (invRes.ok) {
                const invData = await invRes.json();
                inventoryItems = (invData.items||[]).flatMap(item =>
                  (item.rawRows||[]).map(r=>({ name:r.name, code:r.code,
                    onHand:r.quantityOnHand, available:r.quantityAvailable,
                    onOrder:r.quantityOnOrder, location:r.location }))
                );
              }
            } catch {}
            if (pricebookItems.length>0 || inventoryItems.length>0) {
              stDataUsed=true; stResult=buildSTContext(pricebookItems,inventoryItems);
            } else {
              stResult=`No matching equipment found for "${searchTerm}" in ServiceTitan pricebook or inventory.`;
            }
          }
        } catch {}

        const res2 = await fetch("/api/claude", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            model:"claude-sonnet-4-6", max_tokens:2000, system:SYS+stInstruction,
            messages:[ ...newMsgs.map(m=>({ role:m.role, content:m.content })),
              { role:"assistant", content:data1.content },
              { role:"user", content:[{ type:"tool_result", tool_use_id:toolUseBlock.id, content:stResult }] } ],
            tools:[{ type:"web_search_20250305", name:"web_search" }, stTool],
          }),
        });
        const data2 = await res2.json();
        if (data2.error) throw new Error(data2.error.message);
        finalReply = (data2.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
        webSearched = webSearched || (data2.content||[]).some(b=>b.type==="tool_use"&&b.name==="web_search");
      } else {
        finalReply = (data1.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
      }

      setStLookupActive(false);
      setMessages([...newMsgs, { role:"assistant", content:finalReply, webSearched, stDataUsed }]);
    } catch(err) {
      setStLookupActive(false);
      setMessages([...newMsgs, { role:"assistant", content:`⚠️ ${err.message}`, error:true }]);
    }
    setLoading(false);
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:C.bg }}>
      {/* ST Status bar — single scrollable row */}
      <div className="vendor-bar" style={{ padding:"4px 12px 6px", background:C.surface, borderBottom:`1px solid ${C.border}`,
        display:"flex", alignItems:"center", gap:6, overflowX:"auto", flexWrap:"nowrap",
        flexShrink:0, WebkitOverflowScrolling:"touch" }}>
        {ST_VENDORS.map((v,i) => (
          <a key={i} href={v.url} target="_blank" rel="noopener noreferrer"
            style={{ fontSize:10, fontWeight:600, padding:"2px 8px", borderRadius:20,
              background:"#1e2535", color:"#60a5fa", textDecoration:"none",
              display:"flex", alignItems:"center", gap:3, border:"1px solid #2a3a55",
              flexShrink:0, whiteSpace:"nowrap" }}>
            <span style={{ fontSize:7 }}>↗</span>{v.short}
          </a>
        ))}
        <span style={{ fontSize:10, padding:"2px 8px", borderRadius:20, background:"#1e2535",
          border:"1px solid #2a3a55", color:"#60a5fa", fontWeight:500,
          display:"flex", alignItems:"center", gap:4, flexShrink:0, whiteSpace:"nowrap" }}>
          {stLookupActive
            ? <><span style={{ width:5,height:5,borderRadius:"50%",background:"#f59e0b",display:"inline-block",animation:"blink 1s infinite" }}/> ST…</>
            : "ST Price + Stock"}
        </span>
      </div>

      {/* Messages */}
      <div style={{ flex:1, overflowY:"auto", padding:"16px", display:"flex", flexDirection:"column", gap:12 }}>
        {messages.length===0 && (
          <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center",
            justifyContent:"center", gap:8, padding:32, minHeight:200 }}>
            <div style={{ fontSize:28, marginBottom:4 }}>💨</div>
            <div style={{ fontWeight:600, fontSize:14, color:C.text }}>Ready for your reps</div>
            <div style={{ fontSize:12, color:C.mid, textAlign:"center", maxWidth:260, lineHeight:1.6 }}>
              Ask about specs, applications, objections — or check live pricing and stock by model number.
            </div>
          </div>
        )}
        {messages.map((m,i) => {
          const isUser = m.role==="user";
          return (
            <div key={i} style={{ display:"flex", flexDirection:"column",
              alignSelf:isUser?"flex-end":"flex-start", maxWidth:"92%", gap:4 }}>
              <div style={{ display:"flex", gap:8, flexDirection:isUser?"row-reverse":"row" }}>
                <div style={{ width:26, height:26, borderRadius:"50%", flexShrink:0,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:10, fontWeight:600,
                  background:isUser?"#e87c2a":"#2a2d3a", color:isUser?"#fff":"#9ca3af" }}>
                  {isUser?"Rep":"AI"}
                </div>
                <div style={{ padding:"10px 13px",
                  borderRadius:isUser?"12px 4px 12px 12px":"4px 12px 12px 12px",
                  fontSize:14, lineHeight:1.65,
                  background:isUser?"#e87c2a":"#1a1d27",
                  color:isUser?"#fff":"#e2e6f0",
                  border:isUser?"none":"1px solid #2a2d3a", maxWidth:"100%" }}>
                  {isUser ? m.content : <span dangerouslySetInnerHTML={{ __html:formatMsg(m.content) }}/>}
                </div>
              </div>
              {!isUser && (m.webSearched||m.stDataUsed) && (
                <div style={{ display:"flex", gap:5, paddingLeft:34 }}>
                  {m.stDataUsed && <span style={{ fontSize:9, padding:"2px 7px", borderRadius:20,
                    background:"#1e2535", color:"#60a5fa", border:"1px solid #2a3a55" }}>📊 Live ST data</span>}
                  {m.webSearched && <span style={{ fontSize:9, padding:"2px 7px", borderRadius:20,
                    background:"#1a1d27", color:"#6b7280", border:"1px solid #2a2d3a" }}>🔍 web searched</span>}
                </div>
              )}
            </div>
          );
        })}
        {loading && (
          <div style={{ display:"flex", gap:8, alignSelf:"flex-start" }}>
            <div style={{ width:26, height:26, borderRadius:"50%", background:"#2a2d3a",
              display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, color:"#9ca3af" }}>AI</div>
            <div style={{ padding:"10px 14px", borderRadius:"4px 12px 12px 12px",
              background:"#1a1d27", border:"1px solid #2a2d3a", display:"flex", gap:4, alignItems:"center" }}>
              {stLookupActive && <span style={{ fontSize:10, color:"#1d4ed8", marginRight:3 }}>Checking ST…</span>}
              {[0,1,2].map(i=>(
                <div key={i} style={{ width:5,height:5,borderRadius:"50%",background:"#4b5563",
                  animation:"pulse 1.2s infinite", animationDelay:`${i*0.2}s` }}/>
              ))}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Starters */}
      {showStarters && (
        <div style={{ padding:"6px 14px 8px", display:"flex", flexWrap:"wrap", gap:5,
          flexShrink:0, background:C.bg, borderTop:`1px solid #2a2d3a` }}>
          {STARTERS.map((s,i) => (
            <button key={i} onClick={() => submit(s)} style={{
              fontSize:11, padding:"5px 10px", borderRadius:20, border:"1px solid #2a2d3a",
              background:"#1a1d27", color:"#9ca3af", cursor:"pointer", fontFamily:"inherit" }}>
              {s}
            </button>
          ))}
        </div>
      )}

      {/* Input */}
      <div style={{ padding:"10px 14px", borderTop:`1px solid #2a2d3a`,
        display:"flex", gap:7, background:"#1a1d27", flexShrink:0 }}>
        <textarea ref={textareaRef} value={input}
          onChange={e=>{setInput(e.target.value);autoResize();}}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();submit();}}}
          placeholder="Ask a question or check availability — e.g. 'price and stock on HD30'"
          style={{ flex:1, resize:"none", border:"1px solid #2a2d3a", borderRadius:8,
            padding:"11px 11px", fontSize:14, fontFamily:"inherit", outline:"none",
            height:44, minHeight:44, maxHeight:120, lineHeight:1.5,
            color:"#e2e6f0", background:"#0f1117" }}/>
        <button onClick={startListening} disabled={loading} style={{
          minWidth:44, height:44, borderRadius:8, border:"none",
          background:isListening?"#7f1d1d":"#1e2535",
          color:isListening?"#f87171":"#60a5fa",
          cursor:loading?"not-allowed":"pointer",
          display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <rect x="9" y="2" width="6" height="11" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </button>
        <button onClick={()=>submit()} disabled={loading||!input.trim()} style={{
          minWidth:44, height:44, borderRadius:8, border:"none",
          background:loading||!input.trim()?"#1e2535":"#e87c2a",
          color:"#fff", cursor:loading||!input.trim()?"not-allowed":"pointer",
          display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  );
}

// ─── WINGMAN COMPONENT ───────────────────────────────────────────────────────
function Wingman() {
  const [tab, setTab]     = React.useState("brief");
  const [stories, setStories] = React.useState([]);

  React.useEffect(() => {
    (async () => {
      try {
        const res = await fetch('/api/stories');
        const data = await res.json();
        setStories(data.stories || []);
      } catch { setStories([]); }
    })();
  }, []);

  const save = async (newStory) => {
    try {
      const res = await fetch('/api/stories', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(newStory)
      });
      const data = await res.json();
      if (data.success) setStories(prev => [...prev, data.story]);
    } catch {}
  };

  const WTABS = [
    { id:"brief", label:"MISSION BRIEF" },
    { id:"intel", label:"FIELD INTEL" },
    { id:"log",   label:"LOG A WIN" },
  ];

  return (
    <div>
      {/* Wingman sub-tabs */}
      <div style={{ display:"flex", gap:2, marginBottom:20, borderBottom:`1px solid ${C.border}`,
        marginLeft:-16, marginRight:-16, paddingLeft:16 }}>
        {WTABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            background: tab===t.id ? `linear-gradient(180deg,${C.orangeSoft} 0%,transparent 100%)` : "none",
            border:"none", padding:"10px 18px",
            fontFamily:F.head, fontSize:13, letterSpacing:2,
            color: tab===t.id ? C.orange : C.mid,
            borderBottom: tab===t.id ? `2px solid ${C.orange}` : "2px solid transparent",
          }}>{t.label}</button>
        ))}
      </div>
      {tab==="brief" && <MissionBrief stories={stories}/>}
      {tab==="intel" && <FieldIntel stories={stories}/>}
      {tab==="log"   && <LogAWin stories={stories} onSave={save} onDone={()=>setTab("intel")}/>}
    </div>
  );
}

// ─── MISSION BRIEF ───────────────────────────────────────────────────────────
function MissionBrief({ stories }) {
  const [company,  setCompany]  = React.useState("");
  const [industry, setIndustry] = React.useState("");
  const [entry,    setEntry]    = React.useState("");
  const [loading,  setLoading]  = React.useState(false);
  const [brief,    setBrief]    = React.useState(null);
  const [err,      setErr]      = React.useState("");

  const ready = industry && entry;

  const generate = async () => {
    setLoading(true); setBrief(null); setErr("");
    const ind = INDUSTRIES.find(i => i.id === industry);
    const storySummaries = stories.map(s =>
      `[ID:${s.id}] ${INDUSTRIES.find(x=>x.id===s.industry)?.label||s.industry} | Problem: ${s.problem.slice(0,90)} | Outcome: ${s.outcome.slice(0,70)}`
    ).join("\n");

    const prompt = `You are an elite field sales coach for Hodge Compressors, an industrial compressed air equipment company with branches across the Southeast and Midwest. A sales rep is in the parking lot, about to cold-call a manufacturing facility — no appointment, no contact.

Company: ${company || "(unknown — rep will identify on arrival)"}
Industry: ${ind?.label}
Industry pain points: ${ind?.pains}
Entry approach: ${entry==="back" ? "Back door / shipping dock (primary)" : "Front door / reception (fallback)"}

War stories available:
${storySummaries}

Respond ONLY with valid JSON, zero markdown:
{
  "who_to_find": "Specific role title + one punchy sentence on why they're the right target",
  "opening_line": "Exact casual words to say at this entry point — natural, not salesy, 1-2 sentences",
  "recovery_line": "Exact words if turned away or told to come back — specific and natural",
  "hook": "One punchy sentence dropping the right pain angle for this industry naturally",
  "door_strategy": "4-5 sentences of specific tactical advice for ${entry==="back"?"working the shipping dock and back door":"navigating front desk reception without getting screened out"}",
  "facility_tips": ["Specific visual cue or physical observation that opens a real conversation","Another concrete tip","Another tip"],
  "matched_story_id": "Best matching story ID or null",
  "matched_story_reason": "One sentence on why this story fits"
}`;

    try {
      const res = await fetch("/api/claude", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-6", max_tokens:1000,
          messages:[{ role:"user", content:prompt }]
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const raw = data.content?.find(b=>b.type==="text")?.text || "";
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setBrief({ ...parsed, matchedStory:stories.find(s=>s.id===parsed.matched_story_id)||null });
    } catch(e) { setErr("Brief generation failed — " + e.message); }
    setLoading(false);
  };

  if (brief) return <BriefOutput brief={brief} entry={entry} onReset={() => setBrief(null)} stories={stories}/>;

  return (
    <div>
      <SectionHeader label="MISSION BRIEF" sub="You're in the parking lot. Get armed before you walk in."/>
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10,
        padding:20, marginBottom:16, boxShadow:"0 4px 40px rgba(0,0,0,0.4)" }}>
        <div style={{ marginBottom:16 }}>
          <FieldRow label="COMPANY NAME" hint="optional">
            <input value={company} onChange={e=>setCompany(e.target.value)}
              placeholder="You'll find out once you're inside" style={inS}/>
          </FieldRow>
        </div>
        <div style={{ marginBottom:16 }}>
          <FieldRow label="FACILITY TYPE" required>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6 }}>
              {INDUSTRIES.map(i=>(
                <ToggleBtn key={i.id} active={industry===i.id} onClick={()=>setIndustry(i.id)}>
                  {i.label}
                </ToggleBtn>
              ))}
            </div>
          </FieldRow>
        </div>
        <div style={{ marginBottom:16 }}>
          <FieldRow label="ENTRY POINT" required>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              {[

function FieldIntel({ stories }) {
  const [search, setSearch]     = React.useState("");
  const [indFilter, setIndFilter] = React.useState("all");

  const filtered = stories.filter(s => {
    const okInd = indFilter==="all" || s.industry===indFilter;
    const q = search.toLowerCase();
    const okQ = !q || [s.problem,s.outcome,s.narrative,s.solution].some(f=>f?.toLowerCase().includes(q));
    return okInd && okQ;
  });

  return (
    <div>
      <SectionHeader label="FIELD INTEL" sub={`${stories.length} confirmed wins from across all branches.`}/>
      <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search by problem, outcome, industry..."
          style={{ ...inS, flex:1, minWidth:180 }}/>
        <select value={indFilter} onChange={e=>setIndFilter(e.target.value)}
          style={{ ...inS, width:"auto" }}>
          <option value="all">All Industries</option>
          {INDUSTRIES.map(i=><option key={i.id} value={i.id}>{i.label}</option>)}
        </select>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {filtered.length===0
          ? <div style={{ textAlign:"center", padding:40, color:C.dim, fontFamily:F.mono }}>NO STORIES MATCH</div>
          : filtered.map((s,i) => (
            <div key={s.id} className="fadeUp" style={{ animationDelay:`${i*0.04}s` }}>
              <StoryCard story={s}/>
            </div>
          ))
        }
      </div>
    </div>
  );
}

function LogAWin({ stories, onSave, onDone }) {
  const blank = { industry:"", problem:"", solution:"", outcome:"", narrative:"",

  const [form, setForm]     = React.useState(blank);

  const submit = async () => {

    <div>
      <SectionHeader label="LOG A WIN"
        sub="Your story could arm another rep for their next close. Real and concise beats polished."/>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6 }}>

              <ToggleBtn key={i.id} active={form.industry===i.id} onClick={()=>set("industry",i.id)}>
                {i.label}
              </ToggleBtn>
            ))}

        </FieldRow>
        <FieldRow label="WHAT WAS THEIR PROBLEM?" required>
          <textarea value={form.problem} onChange={e=>set("problem",e.target.value)} rows={3}
            placeholder="Be specific. What was breaking, failing, or costing them? Numbers help."
            style={taS}/>

        <FieldRow label="WHAT DID WE DO?">
          <textarea value={form.solution} onChange={e=>set("solution",e.target.value)} rows={2}
            placeholder="What product or service solved it?" style={taS}/>
        </FieldRow>
        <FieldRow label="WHAT WAS THE RESULT?" required>
          <textarea value={form.outcome} onChange={e=>set("outcome",e.target.value)} rows={2}
            placeholder="Downtime eliminated, dollars saved, production restored — numbers if you have them."

        <FieldRow label="HOW WOULD YOU TELL THIS STORY AT LUNCH?">
          <textarea value={form.narrative} onChange={e=>set("narrative",e.target.value)} rows={3}

          <input value={form.customer_type} onChange={e=>set("customer_type",e.target.value)}
            placeholder="e.g. Auto parts manufacturer, ~80 employees, running 3 shifts" style={inS}/>
        </FieldRow>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
          <FieldRow label="YOUR NAME" required>
            <input value={form.submitter_name} onChange={e=>set("submitter_name",e.target.value)}
              placeholder="First + last initial" style={inS}/>
          </FieldRow>
          <FieldRow label="YOUR ROLE">
            <select value={form.submitter_role} onChange={e=>set("submitter_role",e.target.value)} style={inS}>
              <option value="">Select...</option>
              {ROLES.map(r=><option key={r} value={r}>{r}</option>)}
            </select>
          </FieldRow>
        </div>
        <FieldRow label="YOUR BRANCH" required>
          <select value={form.submitter_branch} onChange={e=>set("submitter_branch",e.target.value)} style={inS}>

          background:ok?`linear-gradient(135deg,${C.orange} 0%,#E8640A 100%)`:C.surface2,
          border:"none", borderRadius:8, padding:"15px",
          fontFamily:F.head, fontSize:18, letterSpacing:4,
          color:ok?"#fff":C.dim, transition:"all 0.2s", marginTop:4,
          boxShadow:ok?"0 0 28px rgba(249,115,22,0.2)":"none",
        }}>
          {saving ? "LOGGING WIN..." : "LOG THIS WIN →"}
        </button>
      </div>
    </div>
  );
}

function estAvailPressures(series, model) {
  const cfm = COMP_DB[series]?.cfm[model];
  if (!cfm) return [116,145,181];
  return Object.keys(cfm).map(Number).sort((a,b)=>a-b);
}
function estCFM(series, model, psi) {
  return COMP_DB[series]?.cfm[model]?.[psi] ?? null;
}
function estReqDryerCFM(cfm, inletT, ambT, psi) {
  const ci = CF_INLET[inletT]  || 1.0;
  const ca = CF_AMBIENT[ambT]  || 1.0;
  const cp = CF_PRESS[psi]     || 1.0;
  return cfm / (ci * ca * cp);
}
function estRecHAD(reqCFM) {
  return HAD_DRYERS.find(d => d.cfm >= reqCFM) || HAD_DRYERS[HAD_DRYERS.length-1];
}
function estRecTank(cfm) {
  return TANK_TBL.find(r => cfm <= r.max) || TANK_TBL[TANK_TBL.length-1];
}

// ─── ESTIMATOR DRAWING-ANALYSIS HELPERS ──────────────────────────────────────
function findClosestCompModel(modelStr) {
  if (!modelStr) return null;
  const s = String(modelStr).toUpperCase().replace(/[-\s]/g,'');
  const series = ['HTV','HTM','HV','HT','HD'].find(p=>s.startsWith(p));
  if (!series || !COMP_DB[series]) return null;
  const models = Object.keys(COMP_DB[series].cfm||{});
  if (models.includes(s)) return {series, model:s};
  const num = parseFloat(s.slice(series.length));
  if (isNaN(num)) return {series, model:models[0]};
  let best=models[0], bestDiff=Infinity;
  models.forEach(m=>{const n=parseFloat(m.slice(series.length));if(!isNaN(n)&&Math.abs(n-num)<bestDiff){bestDiff=Math.abs(n-num);best=m;}});
  return {series, model:best};
}
function findDryerOption(modelStr) {
  if (!modelStr) return null;
  const u = String(modelStr).toUpperCase();
  return DRYER_OPTS.find(o=>o.toUpperCase().startsWith(u))||null;
}
function findTankOption(sizeStr) {
  if (!sizeStr) return null;
  const m = String(sizeStr).match(/(\d+)/);
  if (!m) return null;
  const g = parseInt(m[1]);
  return TANK_OPTS.find(o=>{const n=o.match(/^(\d+)/);return n&&parseInt(n[1])>=g;})||TANK_OPTS[TANK_OPTS.length-1];
}
function matchPipeSize(raw) {
  if (!raw) return null;
  const s = String(raw).trim();
  if (PIPE_SIZES.includes(s)) return s;
  const num = parseFloat(s.replace(/[^\d.]/g,''));
  if (isNaN(num)) return null;
  return PIPE_SIZES.find(ps=>Math.abs(parseFloat(ps)-num)<0.05)||null;
}

// ─── AIRPIPE ESTIMATOR COMPONENT ─────────────────────────────────────────────
function Estimator() {
  const [job, setJob]         = React.useState({customer:"",address:"",pipeSize:"1\"",pipeColor:"Blue",totalRun:"",dropSize:"3/4\""});
  const [comps, setComps]     = React.useState([]);
  const [dryers, setDryers]   = React.useState([]);
  const [tanks, setTanks]     = React.useState([]);
  const [reels, setReels]     = React.useState([]);
  const [bomText, setBomText] = React.useState("");
  const [bomBusy, setBomBusy] = React.useState(false);
  const [layoutImgs, setLayoutImgs]         = React.useState([]);
  const [layoutAnalysis, setLayoutAnalysis] = React.useState(null);
  const [layoutBusy, setLayoutBusy]         = React.useState(false);
  const [fileInputKey, setFileInputKey]     = React.useState(0);
  const fileInputRef = React.useRef(null);
  const [showPast, setShowPast]             = React.useState(false);
  const [pastList, setPastList]             = React.useState([]);
  const [pastLoading, setPastLoading]       = React.useState(false);
  const [fSeries, setFSeries]               = React.useState("Any");
  const [fPipeSize, setFPipeSize]           = React.useState("Any");
  const [fSysType, setFSysType]             = React.useState("Any");
  const [fRunRange, setFRunRange]           = React.useState("Any");
  const [saveRep, setSaveRep]               = React.useState("Jon Sanders");
  const [saveBusy, setSaveBusy]             = React.useState(false);
  const [saveMsg, setSaveMsg]               = React.useState("");

  const uid = () => Date.now() + Math.random();

  function addComp() {
    setComps(p => [...p, {id:uid(),series:"HD",model:"HD30",pressure:116,inletTemp:100,ambientTemp:100}]);
  }
  function updComp(id, field, val) {
    setComps(p => p.map(c => {
      if (c.id !== id) return c;
      const u = {...c,[field]:val};
      if (field==="series") {
        u.model = Object.keys(COMP_DB[val]?.cfm||{})[0]||"";
        const ap = estAvailPressures(val, u.model);
        u.pressure = ap[0]||116;
      }
      if (field==="model") {
        const ap = estAvailPressures(u.series, val);
        if (!ap.includes(u.pressure)) u.pressure = ap[0];
      }
      return u;
    }));
  }
  function rmComp(id) { setComps(p=>p.filter(c=>c.id!==id)); }

  function addRow(setter, def) { setter(p=>[...p,{id:uid(),name:def||"",qty:1}]); }
  function updRow(setter, id, f, v) { setter(p=>p.map(r=>r.id===id?{...r,[f]:v}:r)); }
  function rmRow(setter, id) { setter(p=>p.filter(r=>r.id!==id)); }

  async function loadEstimates() {
    setPastLoading(true);
    try {
      const r = await fetch("/api/estimates");
      const d = await r.json();
      setPastList(Array.isArray(d) ? d : []);
    } catch { setPastList([]); }
    setPastLoading(false);
  }

  React.useEffect(() => { if (showPast) loadEstimates(); }, [showPast]);

  async function saveEstimate() {
    setSaveBusy(true); setSaveMsg("");
    const sysType = layoutAnalysis && !layoutAnalysis.error
      ? (layoutAnalysis.systemType === "loop" ? "loop" : layoutAnalysis.systemType === "dead-end" ? "branch" : "")
      : "";
    const payload = {
      repName:      saveRep,
      customer:     job.customer,
      address:      job.address,
      pipeSize:     job.pipeSize,
      dropSize:     job.dropSize,
      pipeColor:    job.pipeColor,
      totalRunFt:   Number(job.totalRun) || 0,
      systemType:   sysType,
      compressors:  comps.map(c => ({ series:c.series, model:c.model, pressure:c.pressure, cfm: estCFM(c.series,c.model,c.pressure)||null })),
      dryers:       dryers.map(d => ({ qty:d.qty, name:d.name })),
      tanks:        tanks.map(t  => ({ qty:t.qty, name:t.name })),
      hoseReels:    reels.map(r  => ({ qty:r.qty, name:r.name })),
      analysisNotes: layoutAnalysis && !layoutAnalysis.error ? layoutAnalysis.notes||"" : "",
      bomOutput:    bomText,
    };
    try {
      const r = await fetch("/api/estimates", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload) });
      if (!r.ok) throw new Error("Server error " + r.status);
      setSaveMsg("Saved!");
      setTimeout(() => setSaveMsg(""), 3000);
    } catch(e) { setSaveMsg("⚠ " + e.message); }
    setSaveBusy(false);
  }

  function resetEstimate() {
    setJob({customer:"",address:"",pipeSize:"1\"",pipeColor:"Blue",totalRun:"",dropSize:"3/4\""});
    setComps([]); setDryers([]); setTanks([]); setReels([]);
    setLayoutImgs([]); setLayoutAnalysis(null);
    setBomText(""); setSaveMsg("");
    setFileInputKey(k => k + 1);
  }

  function loadEstimateIntoForm(est) {
    setJob({ customer: est.customer||"", address: est.address||"", pipeSize: est.pipeSize||"1\"", dropSize: est.dropSize||"3/4\"", pipeColor: est.pipeColor||"Blue", totalRun: est.totalRunFt ? String(est.totalRunFt) : "" });
    setComps((est.compressors||[]).map(c => ({ id:uid(), series:c.series||"HD", model:c.model||"HD30", pressure:c.pressure||116, inletTemp:100, ambientTemp:100 })));
    setDryers((est.dryers||[]).map(d => ({ id:uid(), qty:d.qty||1, name:d.name||"" })));
    setTanks((est.tanks||[]).map(t => ({ id:uid(), qty:t.qty||1, name:t.name||"" })));
    setReels((est.hoseReels||[]).map(r => ({ id:uid(), qty:r.qty||1, name:r.name||"" })));
    setBomText(est.bomOutput||"");
    setLayoutAnalysis(est.analysisNotes ? { notes: est.analysisNotes, systemType: est.systemType||"", confidence:"medium", totalRunFt:est.totalRunFt||null, elbows90:0, tees:0, drops:0, ceilingHeightFt:null } : null);
    setLayoutImgs([]);
    setShowPast(false);
  }

  function filterPastList(list) {
    return list.filter(est => {
      if (fSeries !== "Any" && !(est.compressors||[]).some(c => c.series === fSeries)) return false;
      if (fPipeSize !== "Any" && est.pipeSize !== fPipeSize) return false;
      if (fSysType !== "Any") {
        const st = (est.systemType||"").toLowerCase();
        if (fSysType === "Loop" && st !== "loop") return false;
        if (fSysType === "Branch" && st !== "branch") return false;
      }
      const run = Number(est.totalRunFt)||0;
      if (fRunRange === "Under 100ft" && run >= 100) return false;
      if (fRunRange === "100-300ft"   && (run < 100 || run > 300)) return false;
      if (fRunRange === "300ft+"      && run <= 300) return false;
      return true;
    });
  }

  async function handleFileUpload(e) {
    const files = Array.from(e.target.files);
    // Remount input now (key+1) — files already copied, so reads are unaffected
    setFileInputKey(k => k + 1);
    if (!files.length) return;
    const newImgs = [];
    for (const file of files) {
      if (file.type === "application/pdf") {
        alert(`${file.name}: PDF detected — export as PNG or JPG first.`);
        continue;
      }
      try {
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = ev => resolve(ev.target.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        newImgs.push({ dataUrl, mediaType: file.type || "image/jpeg", name: file.name });
      } catch { /* skip unreadable file */ }
    }
    if (newImgs.length) {
      setLayoutImgs(prev => [...prev, ...newImgs]);
      setLayoutAnalysis(null);
    }
  }

        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1800,
          messages: [{
            role: "user",
            content: [
              ...imageBlocks,
              { type: "text", text: `${multiNote}You are analyzing a compressed air system layout for a Hodge Compressor AIRpipe piping installation. Extract ALL equipment and piping details visible in this facility drawing, sketch, GoodNotes export, or site photo.

COMPRESSOR: Identify model number or HP. Match to closest Hodge model from this list — return the exact model string:

OIL/WATER SEPARATOR: true if present, false if not.

FRL: Filter/Regulator/Lubricator — note qty (0 if none).

PIPE SIZE: Return as one of: 3/4",1",1.5",2",2.5",3",4",6",8" — null if not visible.

SYSTEM TYPE: "loop" (ring main, complete circuit) or "dead-end" (linear with branches) or "unknown".

{"compressor":{"model":null,"confidence":"low","notes":""},"dryer":{"model":null,"type":"refrigerated","confidence":"low","notes":""},"tank":{"size":null,"confidence":"low"},"filters":[],"oilWaterSeparator":false,"frl":{"qty":0},"pipeSize":null,"systemType":"unknown","totalRunFt":null,"elbows90":0,"tees":0,"drops":0,"ceilingHeightFt":null,"headerPipeSize":null,"headerPipeSizeReason":"","dropPipeSize":null,"dropPipeSizeReason":"","confidence":"low","notes":"","warnings":""}`
              }
            ]
          }]
        })
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error.message);
      const text = (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      const m = text.match(/\{[\s\S]*\}/);
      if (!m) throw new Error("Could not parse analysis response");
      const a = JSON.parse(m[0]);

      // ── Auto-populate form ──────────────────────────────────────────────────
      const populated = [];

      // Job fields
      const jobPatch = {};
      const ps = matchPipeSize(a.headerPipeSize || a.pipeSize);
      if (ps) { jobPatch.pipeSize = ps; populated.push(`Header pipe size: ${ps}`); }
      const ds = matchPipeSize(a.dropPipeSize);

      if (a.totalRunFt && !job.totalRun) { jobPatch.totalRun = String(a.totalRunFt); populated.push(`Total run: ${a.totalRunFt} ft`); }
      if (Object.keys(jobPatch).length) setJob(prev=>({...prev,...jobPatch}));

      // Compressor (medium or high confidence only)
      let compMatch = null;

          populated.push(`Compressor: ${compMatch.model} (${a.compressor.confidence} confidence)`);
        }
      }

      // Dryers, filters, OWS, FRL → all go into dryers list
      const dItems = [];
      if (a.dryer?.model) {
        const opt = findDryerOption(a.dryer.model);
        if (opt) { dItems.push({id:uid(),qty:1,name:opt,fromDrawing:true}); populated.push(`Dryer: ${a.dryer.model}`); }
      }
      (a.filters||[]).forEach(f=>{
        const ft = (f.type||'').toLowerCase();
        let opt = ft.includes('coalesc')
          ? (f.position?.includes('before')||f.position?.includes('pre') ? 'Coalescing Pre-Filter (bulk liquid/oil removal)' : 'Coalescing After-Filter (submicron oil aerosol)')
          : ft.includes('carbon') ? 'Activated Carbon Filter (odor/vapor removal)'
          : ft.includes('particul') ? 'Particulate Filter (dry solids)' : null;
        if (opt) { dItems.push({id:uid(),qty:f.qty||1,name:opt,fromDrawing:true}); populated.push(`Filter: ${f.qty||1}× ${f.type} (${f.position||''})`); }
      });
      if (a.oilWaterSeparator) { dItems.push({id:uid(),qty:1,name:'QWIK-PURE CS — Oil-Water Separator',fromDrawing:true}); populated.push('Oil-water separator'); }
      if ((a.frl?.qty||0)>0) { dItems.push({id:uid(),qty:a.frl.qty,name:'Filter/Regulator/Lubricator (FRL)',fromDrawing:true}); populated.push(`FRL: ${a.frl.qty}×`); }
      if (dItems.length) setDryers(prev=>[...prev,...dItems]);

      }

      setLayoutAnalysis({...a, _populated: populated});
    } catch(e) {
      setLayoutAnalysis({ error: e.message });
    }
    setLayoutBusy(false);

:""}

                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <div style={{fontFamily:F.mono,fontSize:9,color:C.copper,letterSpacing:2}}>UNIT {idx+1}</div>
                  {c.fromDrawing && <span style={{fontFamily:F.mono,fontSize:7,letterSpacing:1,color:C.blueLight,background:"rgba(59,111,212,0.12)",border:`1px solid ${C.blueLight}44`,borderRadius:3,padding:"1px 5px"}}>📐 DRAWING</span>}
                </div>
                <button onClick={()=>rmComp(c.id)}
                  style={{background:"none",border:"none",color:C.mid,cursor:"pointer",fontSize:18,padding:"0 4px",lineHeight:1}}>×</button>
              </div>
              <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <FieldRow label="SERIES">
                  <select value={c.series} onChange={e=>updComp(c.id,"series",e.target.value)} style={inS}>
                    {Object.keys(COMP_DB).map(s=><option key={s} value={s}>{COMP_DB[s].label}</option>)}
                  </select>
                </FieldRow>
                <FieldRow label="MODEL">
                  <select value={c.model} onChange={e=>updComp(c.id,"model",e.target.value)} style={inS}>
                    {Object.keys(COMP_DB[c.series]?.cfm||{}).map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                </FieldRow>
              </div>
              <FieldRow label="PRESSURE / CFM">
                <select value={c.pressure} onChange={e=>updComp(c.id,"pressure",Number(e.target.value))} style={inS}>
                  {pressures.map(p=>(
                    <option key={p} value={p}>{p} psi — {estCFM(c.series,c.model,p)||"?"} CFM</option>
                  ))}
                </select>
              </FieldRow>
              <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
                <FieldRow label="INLET TEMP (°F)" hint="dryer sizing">
                  <select value={c.inletTemp} onChange={e=>updComp(c.id,"inletTemp",Number(e.target.value))} style={inS}>
                    {Object.keys(CF_INLET).map(t=><option key={t} value={t}>{t}°F</option>)}
                  </select>
                </FieldRow>
                <FieldRow label="AMBIENT TEMP (°F)" hint="dryer sizing">
                  <select value={c.ambientTemp} onChange={e=>updComp(c.id,"ambientTemp",Number(e.target.value))} style={inS}>
                    {Object.keys(CF_AMBIENT).map(t=><option key={t} value={t}>{t}°F</option>)}
                  </select>
                </FieldRow>
              </div>
              {cfm && (
                <div style={{background:C.surface3,borderRadius:6,padding:"10px 12px",marginTop:10,borderLeft:`3px solid ${C.copper}`}}>
                  <div style={{fontFamily:F.mono,fontSize:9,color:C.copper,letterSpacing:2,marginBottom:6}}>AUTO-RECOMMEND</div>
                  <div style={{fontSize:13,color:C.text,lineHeight:1.85}}>
                    <div><span style={{color:C.mid}}>CFM @ {c.pressure} psi:</span> <strong>{cfm}</strong> — <span style={{color:C.dim,fontSize:12}}>{conn}</span></div>
                    {hadRec && (
                      <div><span style={{color:C.mid}}>HAD Dryer:</span> <strong>{hadRec.model}</strong> ({hadRec.cfm} CFM, {hadRec.conn})
                        <span style={{color:C.dim,fontSize:11}}> — {reqCFM?.toFixed(1)} CFM req'd (CAGI corrected)</span>
                      </div>
                    )}
                    {noTank && <div style={{color:C.dim,fontSize:12}}>Tank: Included in {c.model} — no separate unit needed</div>}
                    {!noTank && tRec && (
                      <div><span style={{color:C.mid}}>Tank:</span> <strong>{tRec.min} gal</strong> min / <strong>{tRec.ideal||"1000+"} gal</strong> ideal (Samuel)</div>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Dryers & Filters */}
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <Mono color={C.copper}>DRYERS & FILTERS</Mono>
          {addBtn("Add Item", ()=>addRow(setDryers, DRYER_OPTS[0]))}
        </div>
        {dryers.length===0 && <div style={{color:C.dim,fontSize:12,fontFamily:F.mono,letterSpacing:1}}>No items added.</div>}
        {dryers.map(d=>(
          <div key={d.id} style={{marginBottom:8}}>
            {d.fromDrawing && <div style={{fontFamily:F.mono,fontSize:7,letterSpacing:1,color:C.blueLight,marginBottom:3}}>📐 FROM DRAWING</div>}
            <div style={{display:"flex",gap:8,alignItems:"center",borderLeft:d.fromDrawing?`2px solid ${C.blueLight}`:undefined,paddingLeft:d.fromDrawing?8:0}}>
              <input type="number" value={d.qty} min={1}
                onChange={e=>updRow(setDryers,d.id,"qty",Number(e.target.value))}
                style={{...inS,width:58,flexShrink:0}}/>
              <select value={d.name} onChange={e=>updRow(setDryers,d.id,"name",e.target.value)}
                style={{...inS,flex:1}}>
                {DRYER_OPTS.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
              <button onClick={()=>rmRow(setDryers,d.id)}
                style={{background:"none",border:"none",color:C.mid,cursor:"pointer",fontSize:18,padding:"0 4px",flexShrink:0,lineHeight:1}}>×</button>
            </div>
          </div>
        ))}
      </div>

      {/* Receiver Tanks */}
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <Mono color={C.copper}>RECEIVER TANKS</Mono>
          {addBtn("Add Tank", ()=>addRow(setTanks, TANK_OPTS[0]))}
        </div>
        {tanks.length===0 && <div style={{color:C.dim,fontSize:12,fontFamily:F.mono,letterSpacing:1}}>No tanks added.</div>}
        {tanks.map(t=>(
          <div key={t.id} style={{marginBottom:8}}>
            {t.fromDrawing && <div style={{fontFamily:F.mono,fontSize:7,letterSpacing:1,color:C.blueLight,marginBottom:3}}>📐 FROM DRAWING</div>}
            <div style={{display:"flex",gap:8,alignItems:"center",borderLeft:t.fromDrawing?`2px solid ${C.blueLight}`:undefined,paddingLeft:t.fromDrawing?8:0}}>
              <input type="number" value={t.qty} min={1}
                onChange={e=>updRow(setTanks,t.id,"qty",Number(e.target.value))}
                style={{...inS,width:58,flexShrink:0}}/>
              <select value={t.name} onChange={e=>updRow(setTanks,t.id,"name",e.target.value)}
                style={{...inS,flex:1}}>
                {TANK_OPTS.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
              <button onClick={()=>rmRow(setTanks,t.id)}
                style={{background:"none",border:"none",color:C.mid,cursor:"pointer",fontSize:18,padding:"0 4px",flexShrink:0,lineHeight:1}}>×</button>
            </div>
          </div>
        ))}
      </div>

      {/* Hose Reels */}
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <Mono color={C.copper}>HOSE REELS</Mono>
          {addBtn("Add Hose Reel", ()=>addRow(setReels, REEL_OPTS[0]))}
        </div>
        {reels.length===0 && <div style={{color:C.dim,fontSize:12,fontFamily:F.mono,letterSpacing:1}}>No reels added.</div>}
        {reels.map(r=>(
          <div key={r.id} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
            <input type="number" value={r.qty} min={1}
              onChange={e=>updRow(setReels,r.id,"qty",Number(e.target.value))}
              style={{...inS,width:58,flexShrink:0}}/>
            <select value={r.name} onChange={e=>updRow(setReels,r.id,"name",e.target.value)}
              style={{...inS,flex:1}}>
              {REEL_OPTS.map(o=><option key={o} value={o}>{o}</option>)}
            </select>
            <button onClick={()=>rmRow(setReels,r.id)}
              style={{background:"none",border:"none",color:C.mid,cursor:"pointer",fontSize:18,padding:"0 4px",flexShrink:0,lineHeight:1}}>×</button>
          </div>
        ))}
      </div>

      {/* Layout Drawing Upload */}
      <div style={card}>
        <Mono color={C.copper}>LAYOUT DRAWINGS / PHOTOS</Mono>
        <div style={{color:C.mid,fontSize:12,fontFamily:F.mono,letterSpacing:1,marginBottom:12}}>
          Upload one or more facility sketches, GoodNotes exports, or site photos — AI consolidates all images into a single analysis
        </div>
        <input key={fileInputKey} ref={fileInputRef} type="file" accept="image/png,image/jpeg,image/jpg,image/webp"
          multiple style={{display:"none"}} onChange={handleFileUpload}/>
        {layoutImgs.length === 0 ? (
          <button onClick={()=>fileInputRef.current?.click()} style={{
            width:"100%",background:C.surface2,border:`1px dashed ${C.border}`,
            borderRadius:8,padding:20,color:C.mid,fontSize:13,cursor:"pointer",
            fontFamily:F.body,display:"flex",flexDirection:"column",alignItems:"center",gap:8
          }}>
            <span style={{fontSize:26}}>📁</span>
            <span>Tap to upload PNG or JPG (multiple files OK)</span>
            <span style={{fontSize:11,color:C.dim}}>GoodNotes export · facility sketch · site photo · PDF → export as PNG first</span>
          </button>
        ) : (
          <div>
            {/* Thumbnail grid */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:8,marginBottom:10}}>
              {layoutImgs.map((img, idx) => (
                <div key={idx} style={{position:"relative",borderRadius:6,overflow:"hidden",border:`1px solid ${C.border}`,background:C.surface2}}>
                  <img src={img.dataUrl} alt={img.name} style={{width:"100%",height:90,objectFit:"cover",display:"block"}}/>
                  <button onClick={()=>removeLayoutImg(idx)} style={{
                    position:"absolute",top:3,right:3,background:"rgba(6,9,15,0.85)",
                    border:`1px solid ${C.border}`,borderRadius:3,color:C.mid,
                    padding:"1px 5px",cursor:"pointer",fontSize:10,fontFamily:F.mono,lineHeight:1.5
                  }}>✕</button>
                  <div style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:0,padding:"2px 5px",
                    whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{img.name}</div>
                </div>
              ))}
              {/* Add more tile */}
              <button onClick={()=>fileInputRef.current?.click()} style={{
                background:"none",border:`1px dashed ${C.border}`,borderRadius:6,
                height:90+20,color:C.dim,fontSize:11,cursor:"pointer",fontFamily:F.body,
                display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4
              }}>
                <span style={{fontSize:20}}>+</span>
                <span>Add more</span>
              </button>
            </div>
            <button onClick={analyzeLayout} disabled={layoutBusy} style={{
              width:"100%",
              background:layoutBusy?C.surface2:`linear-gradient(135deg,${C.blueLight} 0%,${C.blue} 100%)`,
              border:"none",borderRadius:7,padding:11,fontFamily:F.head,fontSize:16,letterSpacing:3,
              color:layoutBusy?C.dim:"#fff",transition:"all 0.2s",marginBottom:12,
              boxShadow:layoutBusy?"none":"0 0 20px rgba(59,111,212,0.22)",cursor:layoutBusy?"default":"pointer"
            }}>
              {layoutBusy?`ANALYZING ${layoutImgs.length} IMAGE${layoutImgs.length>1?"S":""}...`:`ANALYZE ${layoutImgs.length} IMAGE${layoutImgs.length>1?"S":""} →`}
            </button>
            {layoutAnalysis && !layoutAnalysis.error && (
              <div style={{background:C.surface2,border:`1px solid ${C.blueLight}44`,borderRadius:8,padding:12}}>
                {/* Header + confidence */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontFamily:F.mono,fontSize:9,color:C.blueLight,letterSpacing:2}}>LAYOUT ANALYSIS</div>
                  <div style={{
                    fontFamily:F.mono,fontSize:9,letterSpacing:2,padding:"3px 8px",borderRadius:3,
                    background:layoutAnalysis.confidence==="high"?C.greenSoft:layoutAnalysis.confidence==="medium"?C.orangeSoft:"rgba(220,38,38,0.10)",
                    color:layoutAnalysis.confidence==="high"?C.green:layoutAnalysis.confidence==="medium"?C.orange:C.red,
                    border:`1px solid ${layoutAnalysis.confidence==="high"?C.green+"44":layoutAnalysis.confidence==="medium"?C.orange+"44":C.red+"44"}`
                  }}>
                    {(layoutAnalysis.confidence||"?").toUpperCase()} CONFIDENCE
                  </div>
                </div>

                {/* Equipment detected */}
                {(layoutAnalysis.compressor?.model||layoutAnalysis.dryer?.model||layoutAnalysis.tank?.size||(layoutAnalysis.filters||[]).length>0||layoutAnalysis.oilWaterSeparator||(layoutAnalysis.frl?.qty||0)>0) && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontFamily:F.mono,fontSize:8,color:C.dim,letterSpacing:1,marginBottom:5}}>EQUIPMENT DETECTED</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {layoutAnalysis.compressor?.model && (
                        <div style={{background:C.surface3,borderRadius:4,padding:"4px 8px",display:"flex",alignItems:"center",gap:5}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>COMPRESSOR</span>
                          <strong style={{fontFamily:F.body,fontSize:12,color:C.text}}>{layoutAnalysis.compressor.model}</strong>
                          <span style={{fontFamily:F.mono,fontSize:7,color:layoutAnalysis.compressor.confidence==="high"?C.green:layoutAnalysis.compressor.confidence==="medium"?C.orange:C.mid}}>●</span>
                        </div>
                      )}
                      {layoutAnalysis.dryer?.model && (
                        <div style={{background:C.surface3,borderRadius:4,padding:"4px 8px",display:"flex",alignItems:"center",gap:5}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>DRYER</span>
                          <strong style={{fontFamily:F.body,fontSize:12,color:C.text}}>{layoutAnalysis.dryer.model}</strong>
                          <span style={{fontFamily:F.mono,fontSize:7,color:layoutAnalysis.dryer.confidence==="high"?C.green:layoutAnalysis.dryer.confidence==="medium"?C.orange:C.mid}}>●</span>
                        </div>
                      )}
                      {layoutAnalysis.tank?.size && (
                        <div style={{background:C.surface3,borderRadius:4,padding:"4px 8px",display:"flex",alignItems:"center",gap:5}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>TANK</span>
                          <strong style={{fontFamily:F.body,fontSize:12,color:C.text}}>{layoutAnalysis.tank.size}</strong>
                        </div>
                      )}
                      {(layoutAnalysis.filters||[]).map((f,i)=>(
                        <div key={i} style={{background:C.surface3,borderRadius:4,padding:"4px 8px"}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>{f.qty||1}× {(f.type||"").toUpperCase()}</span>
                        </div>
                      ))}
                      {layoutAnalysis.oilWaterSeparator && (
                        <div style={{background:C.surface3,borderRadius:4,padding:"4px 8px"}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>OIL/WATER SEP</span>
                        </div>
                      )}
                      {(layoutAnalysis.frl?.qty||0)>0 && (
                        <div style={{background:C.surface3,borderRadius:4,padding:"4px 8px"}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>{layoutAnalysis.frl.qty}× FRL</span>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* Auto-populated summary */}
                {(layoutAnalysis._populated||[]).length>0 && (
                  <div style={{background:C.greenSoft,border:`1px solid ${C.green}33`,borderRadius:5,padding:"8px 10px",marginBottom:10}}>
                    <div style={{fontFamily:F.mono,fontSize:8,color:C.green,letterSpacing:1,marginBottom:4}}>✓ AUTO-POPULATED INTO FORM</div>
                    {(layoutAnalysis._populated||[]).map((item,i)=>(
                      <div key={i} style={{fontSize:12,color:C.text,lineHeight:1.7}}>• {item}</div>
                    ))}
                    <div style={{fontFamily:F.mono,fontSize:8,color:C.green,marginTop:5,opacity:0.7}}>Review sections above and adjust before generating BOM</div>
                  </div>
                )}

                {/* Pipe size recommendations */}
                {(layoutAnalysis.headerPipeSize || layoutAnalysis.dropPipeSize) && (
                  <div style={{background:C.surface2,border:`1px solid ${C.blueLight}55`,borderRadius:7,padding:"10px 12px",marginBottom:10}}>
                    <div style={{fontFamily:F.mono,fontSize:8,color:C.blueLight,letterSpacing:2,marginBottom:8}}>AI PIPE SIZE RECOMMENDATIONS — review and override in Job Info above</div>
                    <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      {layoutAnalysis.headerPipeSize && (
                        <div>
                          <div style={{fontFamily:F.mono,fontSize:8,color:C.dim,letterSpacing:1,marginBottom:4}}>HEADER (MAIN RUN)</div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <select value={job.pipeSize} onChange={e=>setJob(prev=>({...prev,pipeSize:e.target.value}))}
                              style={{...inS,fontSize:14,fontWeight:600,padding:"7px 10px",flex:1}}>
                              {PIPE_SIZES.map(s=><option key={s} value={s}>{s}</option>)}
                            </select>
                          </div>
                          {layoutAnalysis.headerPipeSizeReason && (
                            <div style={{fontFamily:F.mono,fontSize:8,color:C.mid,marginTop:4,lineHeight:1.4}}>{layoutAnalysis.headerPipeSizeReason}</div>
                          )}
                        </div>
                      )}
                      {layoutAnalysis.dropPipeSize && (
                        <div>
                          <div style={{fontFamily:F.mono,fontSize:8,color:C.dim,letterSpacing:1,marginBottom:4}}>DROPS (BRANCHES)</div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <select value={job.dropSize||"3/4\""} onChange={e=>setJob(prev=>({...prev,dropSize:e.target.value}))}
                              style={{...inS,fontSize:14,fontWeight:600,padding:"7px 10px",flex:1}}>
                              {PIPE_SIZES.map(s=><option key={s} value={s}>{s}</option>)}
                            </select>
                          </div>
                          {layoutAnalysis.dropPipeSizeReason && (
                            <div style={{fontFamily:F.mono,fontSize:8,color:C.mid,marginTop:4,lineHeight:1.4}}>{layoutAnalysis.dropPipeSizeReason}</div>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* Piping grid */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
                  {[
                    ["PIPE RUN",    layoutAnalysis.totalRunFt!=null?layoutAnalysis.totalRunFt+" ft":"—"],
                    ["SYSTEM TYPE", layoutAnalysis.systemType||"—"],
                    ["90° ELBOWS",  layoutAnalysis.elbows90??0],
                    ["TEES",        layoutAnalysis.tees??0],
                    ["DROPS",       layoutAnalysis.drops??0],
                    ["CEILING HT",  layoutAnalysis.ceilingHeightFt?layoutAnalysis.ceilingHeightFt+" ft":"—"],
                  ].map(([label,val])=>(
                    <div key={label} style={{background:C.surface3,borderRadius:5,padding:"7px 10px"}}>
                      <div style={{fontFamily:F.mono,fontSize:8,color:C.dim,letterSpacing:1,marginBottom:2}}>{label}</div>
                      <div style={{fontSize:14,fontFamily:F.body,color:C.text,fontWeight:600}}>{val}</div>
                    </div>
                  ))}
                </div>

                {/* Notes / warnings */}
                {layoutAnalysis.notes && (
                  <div style={{fontSize:12,color:C.mid,lineHeight:1.5,fontStyle:"italic",borderTop:`1px solid ${C.border}`,paddingTop:8}}>
                    {layoutAnalysis.notes}
                  </div>
                )}
                {layoutAnalysis.warnings && (
                  <div style={{fontSize:12,color:C.orange,marginTop:6,fontFamily:F.mono}}>⚠ {layoutAnalysis.warnings}</div>
                )}
              </div>
            )}
            {layoutAnalysis?.error && (
              <div style={{color:C.red,fontSize:12,fontFamily:F.mono,padding:"8px 0"}}>⚠ {layoutAnalysis.error}</div>
            )}
          </div>
        )}
      </div>

      {/* Generate BOM */}
      <button onClick={genBOM} disabled={bomBusy} style={{
        width:"100%",
        background:bomBusy?C.surface2:`linear-gradient(135deg,${C.copper} 0%,#A0632A 100%)`,
        border:"none",borderRadius:8,padding:15,
        fontFamily:F.head,fontSize:18,letterSpacing:4,
        color:bomBusy?C.dim:"#fff",transition:"all 0.2s",marginBottom:16,
        boxShadow:bomBusy?"none":"0 0 28px rgba(193,122,53,0.25)",
      }}>
        {bomBusy?"GENERATING BOM...":"GENERATE BOM →"}
      </button>

      {bomText && (
        <div style={{background:C.surface,border:`1px solid ${C.copper}44`,borderRadius:10,padding:16,marginBottom:12}}>
          <Mono color={C.copper}>BILL OF MATERIALS</Mono>
          <div style={{marginTop:14}}>
            <BOMTable raw={bomText}/>
          </div>
        </div>
      )}

      {/* Save This Estimate */}
      {bomText && (
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:16,marginBottom:20}}>
          <Mono color={C.copper}>SAVE THIS ESTIMATE</Mono>
          <div style={{display:"flex",gap:10,alignItems:"flex-end",marginTop:12,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:160}}>
              <div style={{fontFamily:F.mono,fontSize:9,color:C.dim,letterSpacing:1,marginBottom:4}}>REP NAME</div>
              <select value={saveRep} onChange={e=>setSaveRep(e.target.value)} style={{...inS,width:"100%"}}>
                {REPS.map(r=><option key={r} value={r}>{r}</option>)}
              </select>
            </div>
            <button onClick={genPDF} style={{
              background:`linear-gradient(135deg,#1E3A8A 0%,#3B6FD4 100%)`,
              border:"none",borderRadius:7,padding:"10px 18px",
              fontFamily:F.head,fontSize:15,letterSpacing:3,
              color:"#fff",cursor:"pointer",transition:"all 0.2s",
              boxShadow:"0 0 18px rgba(30,58,138,0.2)",flexShrink:0
            }}>
              PDF ↓
            </button>
            <button onClick={saveEstimate} disabled={saveBusy} style={{
              background:saveBusy?C.surface2:`linear-gradient(135deg,${C.copper} 0%,#A0632A 100%)`,
              border:"none",borderRadius:7,padding:"10px 22px",
              fontFamily:F.head,fontSize:15,letterSpacing:3,
              color:saveBusy?C.dim:"#fff",cursor:saveBusy?"default":"pointer",transition:"all 0.2s",
              boxShadow:saveBusy?"none":"0 0 18px rgba(193,122,53,0.2)",flexShrink:0
            }}>
              {saveBusy?"SAVING...":"SAVE →"}
            </button>
            <button onClick={resetEstimate} style={{
              background:"none",border:`1.5px solid ${C.border}`,borderRadius:7,padding:"10px 18px",
              fontFamily:F.head,fontSize:15,letterSpacing:3,
              color:C.mid,cursor:"pointer",transition:"all 0.2s",flexShrink:0
            }}>
              NEW ↺
            </button>
          </div>
          {saveMsg && (
            <div style={{marginTop:8,fontFamily:F.mono,fontSize:11,letterSpacing:1,
              color:saveMsg.startsWith("⚠")?C.red:C.green}}>
              {saveMsg}
            </div>
          )}
        </div>
      )}

      {/* Portal: render BOM print area outside #root so #root{display:none}
            hides all app UI and print content starts on page 1 */}
      {bomText && ReactDOM.createPortal(
        <BOMPrintArea
          job={job} layoutImgs={layoutImgs} layoutAnalysis={layoutAnalysis}
          bomText={bomText} saveRep={saveRep}/>,
        document.getElementById("print-portal")
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
