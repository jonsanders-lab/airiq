    .replace(/^### (.+)$/gm, '<p style="font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#64748b;margin:12px 0 4px">$1</p>')
    .replace(/^## (.+)$/gm, '<p style="font-weight:600;margin:10px 0 4px">$1</p>')
    .replace(/^- (.+)/gm, '<div style="display:flex;gap:8px;margin:3px 0"><span style="color:#94a3b8;flex-shrink:0">•</span><span>$1</span></div>')
    .replace(/^(\d+)\. (.+)/gm, '<div style="display:flex;gap:8px;margin:3px 0"><span style="color:#94a3b8;flex-shrink:0;min-width:16px">$1.</span><span>$2</span></div>')
    .replace(/\n\n/g, '<br/>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer" style="color:#1d4ed8;text-decoration:underline">$1 ↗</a>')
    .replace(/\n/g, '<br/>');
}

// Merge pricebook + inventory results by name/id
function buildSTContext(pricebookItems, inventoryItems) {
  if (pricebookItems.length === 0 && inventoryItems.length === 0) return "";

  // Build a map from pricebook
  const merged = pricebookItems.map(p => {
    // Try to match an inventory record by id or name
    const inv = inventoryItems.find(i => i.id === p.id || i.name?.toLowerCase() === p.name?.toLowerCase());
    const qty = inv?.quantity ?? p.quantity ?? p.onHand ?? p.stockQuantity ?? null;
    return {
      name: p.name,
      price: p.price != null ? `$${Number(p.price).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}` : "N/A",
      sku: p.code || p.sku || "N/A",
      active: p.active,
      qty,
    };
  });

  // Add any inventory-only items not in pricebook
  inventoryItems.forEach(inv => {
    if (!merged.find(m => m.name?.toLowerCase() === inv.name?.toLowerCase())) {
      merged.push({
        name: inv.name,
        price: "N/A",
        sku: inv.code || inv.sku || "N/A",
        active: inv.active,
        qty: inv.quantity ?? inv.onHand ?? inv.stockQuantity ?? null,
      });
    }
  });

  const lines = merged.map(item => {
    const stockLine = item.qty !== null ? `${item.qty} units on hand` : "stock qty not tracked";
    return `${item.name} | Price: ${item.price} | Stock: ${stockLine} | SKU: ${item.sku} | Active: ${item.active}`;
  });

  return "\n\n=== LIVE SERVICETITAN DATA (pricebook + inventory) ===\n" +
    lines.join("\n") +
    "\nSource: Live pull from ServiceTitan. Present price and stock on hand clearly to the rep using the format in your instructions.";
}

// Broad model number regex: catches Hodge (HD30, HAD85, HTM-15), Hertz (HBD22, HVD37), and generic alphanumeric models
const MODEL_REGEX = /\b(H[DBVATC][A-Z]?\d{1,3}[A-Z]?|HTM[-\s]?\d+|HAD\d+|HBD\s?\d+|HVD\s?\d+|HDD\s?\d+|HTV\s?\d+|IMPETUS\s?\d+|EAGLE\s?\d+|[A-Z]{2,6}[-\s]?\d{2,4}[A-Z]?)\b/gi;

// Intent keywords that should also trigger an ST lookup
const INTENT_REGEX = /\b(price|pricing|cost|available|availability|stock|in.?stock|on.?hand|how much|do you have|do we have|quantity|qty|can i get)\b/i;

    // Detect model numbers and/or pricing/availability intent

    const hasIntent = INTENT_REGEX.test(msg);

    let stContext = "";

    // Detect whether ST lookup is needed
    const needsST = !!(modelMatches || hasIntent);
    const searchTerms = needsST
      ? (modelMatches ? [...new Set(modelMatches)].slice(0, 3) : [msg.replace(INTENT_REGEX, "").trim().slice(0, 40)])

    if (needsST) setStLookupActive(true);

    // Build ST lookup tool definition — Worker is called by Claude server-side, bypassing browser restrictions

      name: "lookup_servicetitan_pricing",
      description: "Look up live pricing and availability for equipment in ServiceTitan pricebook. Call this whenever a rep asks about price, cost, availability, or stock for any model number.",
      input_schema: {
        type: "object",
        properties: {
          search_term: { type: "string", description: "The model number or equipment name to search for" }
        },
        required: ["search_term"]

    try {
      // First API call — Claude may invoke the ST tool

          messages: newMsgs.map((m) => ({ role: m.role, content: m.content })),
          tools: [
            { type: "web_search_20250305", name: "web_search" },
            stTool
          ],
        }),
      });
      const data1 = await res1.json();
      if (data1.error) throw new Error(data1.error.message);

      // Check if Claude wants to call the ST tool
      const toolUseBlock = (data1.content || []).find(b => b.type === "tool_use" && b.name === "lookup_servicetitan_pricing");

      let finalReply = "";
      let stDataUsed = false;
      let webSearched = (data1.content || []).some(b => b.type === "tool_use" && b.name === "web_search");

      if (toolUseBlock) {
        // Call the Worker server-side via a second Anthropic API call with tool result
        const searchTerm = toolUseBlock.input.search_term || searchTerms[0] || "";
        let stResult = "No data found.";
        try {
          const workerRes = await fetch("/api/st", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              endpoint: `/pricebook/v2/tenant/${ST_TENANT}/equipment?`,

  return (
