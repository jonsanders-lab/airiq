          <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <FieldRow label="REQUIRED CFM">
              <input type="number" value={sysReqs.cfm} onChange={e=>setSysReqs(p=>({...p,cfm:e.target.value}))}
                placeholder="e.g. 100" style={inS}/>
            </FieldRow>
            <FieldRow label="OPERATING PRESSURE">
              <select value={sysReqs.psi} onChange={e=>setSysReqs(p=>({...p,psi:e.target.value}))} style={inS}>
                {["80","100","116","125","145","175"].map(v=><option key={v} value={v}>{v} PSIG</option>)}
              </select>
            </FieldRow>
          </div>
          <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <FieldRow label="APPLICATION TYPE">
              <select value={sysReqs.appType} onChange={e=>setSysReqs(p=>({...p,appType:e.target.value}))} style={inS}>
                {["General Manufacturing","Automotive/Body Shop","Food & Beverage","Woodworking","Pharmaceutical/Medical","Painting/Coating","Electronics","Textile","Other"].map(a=><option key={a} value={a}>{a}</option>)}
              </select>
            </FieldRow>
            <FieldRow label="AIR QUALITY (ISO 8573-1)">
              <select value={sysReqs.airQuality} onChange={e=>setSysReqs(p=>({...p,airQuality:e.target.value}))} style={inS}>
                <option value="1">Class 1 — Pharmaceutical/Oil-free</option>
                <option value="2">Class 2 — Electronics/Painting</option>
                <option value="3">Class 3 — Instrument Air</option>
                <option value="4">Class 4 — General Manufacturing</option>
                <option value="5">Class 5 — Basic Compressed Air</option>
              </select>
            </FieldRow>
          </div>
          <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:6}}>
            <FieldRow label="HRS / DAY">
              <select value={sysReqs.hours} onChange={e=>setSysReqs(p=>({...p,hours:e.target.value}))} style={inS}>
                {["4","6","8","10","12","16","24"].map(h=><option key={h} value={h}>{h} hrs</option>)}
              </select>
            </FieldRow>
            <FieldRow label="DAYS / WEEK">
              <select value={sysReqs.days} onChange={e=>setSysReqs(p=>({...p,days:e.target.value}))} style={inS}>
                {["1","2","3","4","5","6","7"].map(d=><option key={d} value={d}>{d} days</option>)}
              </select>
            </FieldRow>
            <FieldRow label="WEEKS / YEAR">
              <select value={sysReqs.weeks} onChange={e=>setSysReqs(p=>({...p,weeks:e.target.value}))} style={inS}>
                {["10","20","30","40","48","50","52"].map(w=><option key={w} value={w}>{w} wks</option>)}
              </select>
            </FieldRow>
          </div>
          {(() => { const ann = Number(sysReqs.hours)*Number(sysReqs.days)*Number(sysReqs.weeks); return ann > 0 && (
            <div style={{fontFamily:F.mono,fontSize:11,color:C.blueLight,letterSpacing:1,marginBottom:10,padding:"6px 10px",background:C.blueSoft,borderRadius:6,border:`1px solid ${C.blue}33`}}>
              ≈ {ann.toLocaleString()} hrs/year estimated annual operation
            </div>
          ); })()}
          <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <FieldRow label="POWER AVAILABLE">
              <select value={sysReqs.phase} onChange={e=>setSysReqs(p=>({...p,phase:e.target.value,
                voltage:e.target.value==="1ph"?"230v1ph":sysReqs.voltage==="230v1ph"?"460v3ph":sysReqs.voltage}))} style={inS}>
                <option value="3ph">Three-Phase</option>
                <option value="1ph">Single-Phase</option>
              </select>
            </FieldRow>
          </div>
          <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <FieldRow label="VOLTAGE">
              <select value={sysReqs.voltage} onChange={e=>setSysReqs(p=>({...p,voltage:e.target.value,
                phase:e.target.value==="230v1ph"?"1ph":"3ph"}))} style={inS}>
                {sysReqs.phase==="1ph"
                  ? <option value="230v1ph">208-230V Single Phase</option>
                  : <>
                      <option value="230v3ph">208-230V Three Phase</option>
                      <option value="460v3ph">460V Three Phase (most common)</option>
                      <option value="575v3ph">575V Three Phase</option>
                      <option value="380v3ph">380V Three Phase (export)</option>
                    </>
                }
              </select>
            </FieldRow>
            <div style={{display:"flex",alignItems:"flex-end",paddingBottom:2}}>
              {sysReqs.voltage==="230v1ph" && (
                <div style={{background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:6,padding:"7px 10px",fontSize:11,color:"#f59e0b",lineHeight:1.5,width:"100%"}}>
                  ⚠ Single phase limits to HTM series (HTM7.5/10/15/20 — all run on 208V) and small HD models (HD10, HD15, HD20, HD25) only. HV, HT, HTV, and larger HD units require 3-phase or a phase converter.
                </div>
              )}
              {sysReqs.voltage==="230v3ph" && (
                <div style={{background:C.blueSoft,border:`1px solid ${C.blue}44`,borderRadius:6,padding:"7px 10px",fontSize:11,color:C.blueLight,lineHeight:1.5,width:"100%"}}>
                  ℹ HTM series and small HD models (HD10–HD25) are available in 208-230V. Most HV/HT/HTV units are 460V standard — confirm motor configuration with factory for larger models.
                </div>
              )}
              {sysReqs.voltage==="575v3ph" && (
                <div style={{background:C.blueSoft,border:`1px solid ${C.blue}44`,borderRadius:6,padding:"7px 10px",fontSize:11,color:C.blueLight,lineHeight:1.5,width:"100%"}}>
                  ℹ 575V available on most models — common in Canada. Confirm availability and lead time with factory.
                </div>
              )}
              {sysReqs.voltage==="380v3ph" && (
                <div style={{background:C.blueSoft,border:`1px solid ${C.blue}44`,borderRadius:6,padding:"7px 10px",fontSize:11,color:C.blueLight,lineHeight:1.5,width:"100%"}}>
                  ℹ 380V export configuration — not a standard stock voltage. Factory order required; confirm lead time.
                </div>
              )}
            </div>
          </div>
          <FieldRow label="NOTES / SPECIAL REQUIREMENTS">
            <input value={sysReqs.notes} onChange={e=>setSysReqs(p=>({...p,notes:e.target.value}))}
              placeholder="Existing equipment, special conditions, future expansion plans…" style={inS}/>
          </FieldRow>

          <button onClick={designSystem} disabled={sysBusy||!sysReqs.cfm}
            className={!sysBusy&&sysReqs.cfm?"copper-pulse":""}
            style={{
            marginTop:16, width:"100%", padding:"18px 0", borderRadius:8, border:"none",
            background:sysBusy||!sysReqs.cfm?C.surface2:`linear-gradient(135deg,${C.copper} 0%,#E8860A 50%,#A0632A 100%)`,
            color:sysBusy||!sysReqs.cfm?C.dim:"#fff", fontSize:18, letterSpacing:4,
            fontFamily:F.head, cursor:sysBusy||!sysReqs.cfm?"default":"pointer", transition:"background 0.2s, color 0.2s",
            fontWeight:700
          }}>
            {sysBusy ? "⏳ DESIGNING SYSTEM…" : "⚡ DESIGN SYSTEM →"}
          </button>
        </>)}
        </div>{/* end padding div */}
      </div>

      {/* ── Good / Better / Best Output ── */}
      {sysRec && !sysRec.error && (() => {
        const tiers = [
          { key:"good",   rec:sysRec.good,   label:"GOOD",   sub:"Fixed Speed",          borderColor:C.border,  headColor:C.mid },
          { key:"better", rec:sysRec.better, label:"BETTER", sub:"Two-Stage / Enhanced",  borderColor:C.blue,    headColor:C.blueLight },
          { key:"best",   rec:sysRec.best,   label:"BEST",   sub:"Variable Speed Drive",  borderColor:C.copper,  headColor:C.copper },
        ];
        return (
          <div style={{marginBottom:12}}>
            <Mono color={C.copper} style={{marginBottom:10}}>SYSTEM RECOMMENDATION</Mono>
            <div className="gbb-grid" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
              {tiers.map(({key,rec,label,sub,borderColor,headColor})=>{
                if (!rec) return null;
                const stock = sysStock[rec.model];
                const isHTM = rec.htmPolicy;
                const dual = rec.dual;
                return (
                  <div key={key} style={{background:C.surface,border:`1.5px solid ${borderColor}`,borderRadius:10,padding:14,display:"flex",flexDirection:"column",gap:8}}>
                    {/* Tier badge */}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div>
                        <div style={{fontFamily:F.head,fontSize:18,letterSpacing:3,color:headColor,lineHeight:1}}>{label}</div>
                        <div style={{fontFamily:F.mono,fontSize:9,color:C.dim,letterSpacing:2,marginTop:2}}>{sub}</div>
                      </div>
                      {key==="best" && <span style={{fontSize:10,background:C.copperSoft,color:C.copper,border:`1px solid ${C.copper}44`,borderRadius:4,padding:"2px 6px",fontFamily:F.mono}}>VSD</span>}
                    </div>

                    {/* Model */}
                    <div style={{background:C.surface2,borderRadius:7,padding:"8px 10px"}}>
                      <div style={{fontFamily:F.head,fontSize:20,letterSpacing:2,color:C.text,lineHeight:1}}>
                        {dual ? `2× ${rec.model}` : rec.model}
                      </div>
                      <div style={{fontFamily:F.mono,fontSize:9,color:C.mid,marginTop:3}}>
                        {rec.cfmAtPsi} CFM @ {rec.psiUsed} PSI {dual?"(combined)":""}
                      </div>
                    </div>

                    {/* Why */}
                    <div style={{fontSize:12,color:C.text,lineHeight:1.5}}>{rec.headline} — {rec.why}</div>

                    {/* Stock */}
                    {stock ? (
                      <div style={{fontFamily:F.mono,fontSize:10,color:stock.available>0?C.green:C.red,letterSpacing:1}}>
                        {stock.available>0 ? `✓ ${stock.available} available` : "⚠ Out of stock"}
                        {stock.onHand>0 && stock.available!==stock.onHand ? ` (${stock.onHand} on hand)` : ""}
                      </div>
                    ) : (
                      <div style={{fontFamily:F.mono,fontSize:9,color:C.dim,letterSpacing:1}}>ST lookup pending…</div>
                    )}

                    {/* Treatment package */}
                    <div style={{borderTop:`1px solid ${C.border}`,paddingTop:8}}>
                      <div style={{fontFamily:F.mono,fontSize:9,color:C.dim,letterSpacing:1,marginBottom:5}}>TREATMENT PACKAGE</div>
                      <div style={{fontSize:12,color:C.mid}}>{rec.dryer}</div>
                      {rec.tankGal && <div style={{fontSize:12,color:C.mid}}>{rec.tankGal} gal receiver tank</div>}
                      {(rec.filters||[]).map((f,i)=><div key={i} style={{fontSize:11,color:C.dim}}>{f}</div>)}
                    </div>

                    {/* Energy */}
                    {rec.annualEnergyCost>0 && (
                      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:8}}>
                        <div style={{fontFamily:F.mono,fontSize:9,color:C.dim,letterSpacing:1,marginBottom:4}}>EST. ANNUAL ENERGY COST</div>
                        <div style={{fontFamily:F.head,fontSize:18,letterSpacing:2,color:headColor}}>${rec.annualEnergyCost?.toLocaleString()}/yr</div>
                        {rec.annualEnergySavings>0 && (
                          <div style={{fontFamily:F.mono,fontSize:10,color:C.green,marginTop:3}}>
                            ↓ Save ~${rec.annualEnergySavings?.toLocaleString()}/yr vs fixed speed
                          </div>
                        )}
                        <div style={{fontFamily:F.mono,fontSize:9,color:C.dim,marginTop:6,lineHeight:1.5}}>
                          Based on motor nameplate kW × load factor. Actual consumption varies. A data-logging air audit provides measured results.
                        </div>
                      </div>
                    )}

                    {/* Audit note (BEST only) */}
                    {rec.auditNote && (
                      <div style={{background:C.blueSoft,border:`1px solid ${C.blue}44`,borderRadius:6,padding:"8px 10px",fontSize:11,color:C.blueLight,lineHeight:1.5}}>
                        📊 {rec.auditNote}
                      </div>
                    )}

              </div>
              {cfm && (
                <div style={{background:C.surface3,borderRadius:6,padding:"10px 12px",marginTop:10,borderLeft:`3px solid ${C.copper}`}}>
                  <div style={{fontFamily:F.mono,fontSize:9,color:C.copper,letterSpacing:2,marginBottom:6}}>AUTO-RECOMMEND</div>
                  <div style={{fontSize:13,color:C.text,lineHeight:1.85}}>
                    <div><span style={{color:C.mid}}>CFM @ {c.pressure} psi:</span> <strong>{cfm}</strong> — <span style={{color:C.dim,fontSize:12}}>{conn}</span></div>
                    {hadRec && (
                      <div><span style={{color:C.mid}}>HAD Dryer:</span> <strong>{hadRec.model}</strong> ({hadRec.cfm} CFM, {hadRec.conn})
                        <span style={{color:C.dim,fontSize:11}}> — {reqCFM?.toFixed(1)} CFM req'd (CAGI corrected)</span>
                      </div>
                    )}
                    {noTank && <div style={{color:C.dim,fontSize:12}}>Tank: Included in {c.model} — no separate unit needed</div>}
                    {!noTank && tRec && (
                      <div><span style={{color:C.mid}}>Tank:</span> <strong>{tRec.min} gal</strong> min / <strong>{tRec.ideal||"1000+"} gal</strong> ideal (Samuel)</div>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        })}
            </div>

            {/* ── Dryers & Filters ── */}
            <div style={{marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontFamily:F.mono,fontSize:11,letterSpacing:2,color:C.copper}}>💧 DRYERS & FILTERS</span>
                {addBtn("Add Item", ()=>addRow(setDryers, DRYER_OPTS[0]))}
              </div>
              {dryers.length===0 && <div style={{color:C.dim,fontSize:12,fontFamily:F.mono,letterSpacing:1}}>No items added.</div>}
        {dryers.map(d=>(
          <div key={d.id} style={{marginBottom:8}}>
            {d.fromDrawing && <div style={{fontFamily:F.mono,fontSize:7,letterSpacing:1,color:C.blueLight,marginBottom:3}}>📐 FROM DRAWING</div>}
            <div style={{display:"flex",gap:8,alignItems:"center",borderLeft:d.fromDrawing?`2px solid ${C.blueLight}`:undefined,paddingLeft:d.fromDrawing?8:0}}>
              <input type="number" value={d.qty} min={1}
                onChange={e=>updRow(setDryers,d.id,"qty",Number(e.target.value))}
                style={{...inS,width:58,flexShrink:0}}/>
              <select value={d.name} onChange={e=>updRow(setDryers,d.id,"name",e.target.value)}
                style={{...inS,flex:1}}>
                {DRYER_OPTS.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
              <button onClick={()=>rmRow(setDryers,d.id)}
                style={{background:"none",border:"none",color:C.mid,cursor:"pointer",fontSize:18,padding:"0 4px",flexShrink:0,lineHeight:1}}>×</button>
            </div>
          </div>
        ))}
            </div>

            {/* ── Receiver Tanks ── */}
            <div style={{marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontFamily:F.mono,fontSize:11,letterSpacing:2,color:C.copper}}>🔵 RECEIVER TANKS</span>
                {addBtn("Add Tank", ()=>addRow(setTanks, TANK_OPTS[0]))}
              </div>
              {tanks.length===0 && <div style={{color:C.dim,fontSize:12,fontFamily:F.mono,letterSpacing:1}}>No tanks added.</div>}
        {tanks.map(t=>(
          <div key={t.id} style={{marginBottom:8}}>
            {t.fromDrawing && <div style={{fontFamily:F.mono,fontSize:7,letterSpacing:1,color:C.blueLight,marginBottom:3}}>📐 FROM DRAWING</div>}
            <div style={{display:"flex",gap:8,alignItems:"center",borderLeft:t.fromDrawing?`2px solid ${C.blueLight}`:undefined,paddingLeft:t.fromDrawing?8:0}}>
              <input type="number" value={t.qty} min={1}
                onChange={e=>updRow(setTanks,t.id,"qty",Number(e.target.value))}
                style={{...inS,width:58,flexShrink:0}}/>
              <select value={t.name} onChange={e=>updRow(setTanks,t.id,"name",e.target.value)}
                style={{...inS,flex:1}}>
                {TANK_OPTS.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
              <button onClick={()=>rmRow(setTanks,t.id)}
                style={{background:"none",border:"none",color:C.mid,cursor:"pointer",fontSize:18,padding:"0 4px",flexShrink:0,lineHeight:1}}>×</button>
            </div>
          </div>
        ))}
            </div>

            {/* ── Hose Reels ── */}
            <div style={{marginBottom:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontFamily:F.mono,fontSize:11,letterSpacing:2,color:C.copper}}>🔄 HOSE REELS</span>
                {addBtn("Add Hose Reel", ()=>addRow(setReels, REEL_OPTS[0]))}
              </div>
              {reels.length===0 && <div style={{color:C.dim,fontSize:12,fontFamily:F.mono,letterSpacing:1}}>No reels added.</div>}
        {reels.map(r=>(
          <div key={r.id} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
            <input type="number" value={r.qty} min={1}
              onChange={e=>updRow(setReels,r.id,"qty",Number(e.target.value))}
              style={{...inS,width:58,flexShrink:0}}/>
            <select value={r.name} onChange={e=>updRow(setReels,r.id,"name",e.target.value)}
              style={{...inS,flex:1}}>
              {REEL_OPTS.map(o=><option key={o} value={o}>{o}</option>)}
            </select>
            <button onClick={()=>rmRow(setReels,r.id)}
              style={{background:"none",border:"none",color:C.mid,cursor:"pointer",fontSize:18,padding:"0 4px",flexShrink:0,lineHeight:1}}>×</button>
          </div>
        ))}
            </div>
          </div>
        </div>
      </div>

      {/* ── STEP 6 — Layout Drawings / Photos ── */}
      <div style={{marginBottom:12}}>
        {secHdr('layout','📐 LAYOUT DRAWINGS / PHOTOS',
          layoutAnalysis&&!layoutAnalysis.error?'analysis ready':layoutImgs.length>0?`${layoutImgs.length} image${layoutImgs.length!==1?'s':''}`:null,
          'STEP 6',
          'Upload site drawings → AI extracts fittings and pipe runs'
        )}
        <div style={{overflow:'hidden',maxHeight:secOpen('layout')?'9999px':'0',transition:'max-height 0.3s ease',background:C.surface,border:`1.5px solid ${C.copper}`,borderLeft:`4px solid ${C.copper}`,borderTop:'none',borderRadius:'0 0 10px 10px'}}>
          <div style={{padding:16}}>
            <div style={{color:C.mid,fontSize:12,fontFamily:F.mono,letterSpacing:1,marginBottom:12}}>
              Upload one or more facility sketches, GoodNotes exports, or site photos — AI consolidates all images into a single analysis
            </div>
        <input key={fileInputKey} ref={fileInputRef} type="file" accept="image/png,image/jpeg,image/jpg,image/webp"
          multiple style={{display:"none"}} onChange={handleFileUpload}/>
        {layoutImgs.length === 0 ? (
          <button onClick={()=>fileInputRef.current?.click()} style={{
            width:"100%",background:C.surface2,border:`1px dashed ${C.border}`,
            borderRadius:8,padding:20,color:C.mid,fontSize:13,cursor:"pointer",
            fontFamily:F.body,display:"flex",flexDirection:"column",alignItems:"center",gap:8
          }}>
            <span style={{fontSize:26}}>📁</span>
            <span>Tap to upload PNG or JPG (multiple files OK)</span>
            <span style={{fontSize:11,color:C.dim}}>GoodNotes export · facility sketch · site photo · PDF → export as PNG first</span>
          </button>
        ) : (
          <div>
            {/* Thumbnail grid */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:8,marginBottom:10}}>
              {layoutImgs.map((img, idx) => (
                <div key={idx} style={{position:"relative",borderRadius:6,overflow:"hidden",border:`1px solid ${C.border}`,background:C.surface2}}>
                  <img src={img.dataUrl} alt={img.name} style={{width:"100%",height:90,objectFit:"cover",display:"block"}}/>
                  <button onClick={()=>removeLayoutImg(idx)} style={{
                    position:"absolute",top:3,right:3,background:"rgba(6,9,15,0.85)",
                    border:`1px solid ${C.border}`,borderRadius:3,color:C.mid,
                    padding:"1px 5px",cursor:"pointer",fontSize:10,fontFamily:F.mono,lineHeight:1.5
                  }}>✕</button>
                  <div style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:0,padding:"2px 5px",
                    whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{img.name}</div>
                </div>
              ))}
              {/* Add more tile */}
              <button onClick={()=>fileInputRef.current?.click()} style={{
                background:"none",border:`1px dashed ${C.border}`,borderRadius:6,
                height:90+20,color:C.dim,fontSize:11,cursor:"pointer",fontFamily:F.body,
                display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4
              }}>
                <span style={{fontSize:20}}>+</span>
                <span>Add more</span>
              </button>
            </div>
            <button onClick={analyzeLayout} disabled={layoutBusy} style={{
              width:"100%",
              background:layoutBusy?C.surface2:`linear-gradient(135deg,${C.blueLight} 0%,${C.blue} 100%)`,
              border:"none",borderRadius:7,padding:11,fontFamily:F.head,fontSize:16,letterSpacing:3,
              color:layoutBusy?C.dim:"#fff",transition:"all 0.2s",marginBottom:12,
              boxShadow:layoutBusy?"none":"0 0 20px rgba(59,111,212,0.22)",cursor:layoutBusy?"default":"pointer"
            }}>
              {layoutBusy?`ANALYZING ${layoutImgs.length} IMAGE${layoutImgs.length>1?"S":""}...`:`ANALYZE ${layoutImgs.length} IMAGE${layoutImgs.length>1?"S":""} →`}
            </button>
            {layoutAnalysis && !layoutAnalysis.error && (
              <div style={{background:C.surface2,border:`1px solid ${C.blueLight}44`,borderRadius:8,padding:12}}>
                {/* Header + confidence */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontFamily:F.mono,fontSize:9,color:C.blueLight,letterSpacing:2}}>LAYOUT ANALYSIS</div>
                  <div style={{
                    fontFamily:F.mono,fontSize:9,letterSpacing:2,padding:"3px 8px",borderRadius:3,
                    background:layoutAnalysis.confidence==="high"?C.greenSoft:layoutAnalysis.confidence==="medium"?C.orangeSoft:"rgba(220,38,38,0.10)",
                    color:layoutAnalysis.confidence==="high"?C.green:layoutAnalysis.confidence==="medium"?C.orange:C.red,
                    border:`1px solid ${layoutAnalysis.confidence==="high"?C.green+"44":layoutAnalysis.confidence==="medium"?C.orange+"44":C.red+"44"}`
                  }}>
                    {(layoutAnalysis.confidence||"?").toUpperCase()} CONFIDENCE
                  </div>
                </div>

                {/* Equipment detected */}
                {(layoutAnalysis.compressor?.model||layoutAnalysis.dryer?.model||layoutAnalysis.tank?.size||(layoutAnalysis.filters||[]).length>0||layoutAnalysis.oilWaterSeparator||(layoutAnalysis.frl?.qty||0)>0) && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontFamily:F.mono,fontSize:8,color:C.dim,letterSpacing:1,marginBottom:5}}>EQUIPMENT DETECTED</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {layoutAnalysis.compressor?.model && (
                        <div style={{background:C.surface3,borderRadius:4,padding:"4px 8px",display:"flex",alignItems:"center",gap:5}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>COMPRESSOR</span>
                          <strong style={{fontFamily:F.body,fontSize:12,color:C.text}}>{layoutAnalysis.compressor.model}</strong>
                          <span style={{fontFamily:F.mono,fontSize:7,color:layoutAnalysis.compressor.confidence==="high"?C.green:layoutAnalysis.compressor.confidence==="medium"?C.orange:C.mid}}>●</span>
                        </div>
                      )}
                      {layoutAnalysis.dryer?.model && (
                        <div style={{background:C.surface3,borderRadius:4,padding:"4px 8px",display:"flex",alignItems:"center",gap:5}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>DRYER</span>
                          <strong style={{fontFamily:F.body,fontSize:12,color:C.text}}>{layoutAnalysis.dryer.model}</strong>
                          <span style={{fontFamily:F.mono,fontSize:7,color:layoutAnalysis.dryer.confidence==="high"?C.green:layoutAnalysis.dryer.confidence==="medium"?C.orange:C.mid}}>●</span>
                        </div>
                      )}
                      {layoutAnalysis.tank?.size && (
                        <div style={{background:C.surface3,borderRadius:4,padding:"4px 8px",display:"flex",alignItems:"center",gap:5}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>TANK</span>
                          <strong style={{fontFamily:F.body,fontSize:12,color:C.text}}>{layoutAnalysis.tank.size}</strong>
                        </div>
                      )}
                      {(layoutAnalysis.filters||[]).map((f,i)=>(
                        <div key={i} style={{background:C.surface3,borderRadius:4,padding:"4px 8px"}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>{f.qty||1}× {(f.type||"").toUpperCase()}</span>
                        </div>
                      ))}
                      {layoutAnalysis.oilWaterSeparator && (
                        <div style={{background:C.surface3,borderRadius:4,padding:"4px 8px"}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>OIL/WATER SEP</span>
                        </div>
                      )}
                      {(layoutAnalysis.frl?.qty||0)>0 && (
                        <div style={{background:C.surface3,borderRadius:4,padding:"4px 8px"}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>{layoutAnalysis.frl.qty}× FRL</span>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* Auto-populated summary */}
                {(layoutAnalysis._populated||[]).length>0 && (
                  <div style={{background:C.greenSoft,border:`1px solid ${C.green}33`,borderRadius:5,padding:"8px 10px",marginBottom:10}}>
                    <div style={{fontFamily:F.mono,fontSize:8,color:C.green,letterSpacing:1,marginBottom:4}}>✓ AUTO-POPULATED INTO FORM</div>
                    {(layoutAnalysis._populated||[]).map((item,i)=>(
                      <div key={i} style={{fontSize:12,color:C.text,lineHeight:1.7}}>• {item}</div>
                    ))}
                    <div style={{fontFamily:F.mono,fontSize:8,color:C.green,marginTop:5,opacity:0.7}}>Review sections above and adjust before generating BOM</div>
                  </div>
                )}

                {/* Pipe size recommendations */}
                {(layoutAnalysis.headerPipeSize || layoutAnalysis.dropPipeSize) && (
                  <div style={{background:C.surface2,border:`1px solid ${C.blueLight}55`,borderRadius:7,padding:"10px 12px",marginBottom:10}}>
                    <div style={{fontFamily:F.mono,fontSize:8,color:C.blueLight,letterSpacing:2,marginBottom:8}}>AI PIPE SIZE RECOMMENDATIONS — review and override in Job Info above</div>
                    <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      {layoutAnalysis.headerPipeSize && (
                        <div>
                          <div style={{fontFamily:F.mono,fontSize:8,color:C.dim,letterSpacing:1,marginBottom:4}}>HEADER (MAIN RUN)</div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <select value={job.pipeSize} onChange={e=>setJob(prev=>({...prev,pipeSize:e.target.value}))}
                              style={{...inS,fontSize:14,fontWeight:600,padding:"7px 10px",flex:1}}>
                              {PIPE_SIZES.map(s=><option key={s} value={s}>{s}</option>)}
                            </select>
                          </div>
                          {layoutAnalysis.headerPipeSizeReason && (
                            <div style={{fontFamily:F.mono,fontSize:8,color:C.mid,marginTop:4,lineHeight:1.4}}>{layoutAnalysis.headerPipeSizeReason}</div>
                          )}
                        </div>
                      )}
                      {layoutAnalysis.dropPipeSize && (
                        <div>
                          <div style={{fontFamily:F.mono,fontSize:8,color:C.dim,letterSpacing:1,marginBottom:4}}>DROPS (BRANCHES)</div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <select value={job.dropSize||"3/4\""} onChange={e=>setJob(prev=>({...prev,dropSize:e.target.value}))}
                              style={{...inS,fontSize:14,fontWeight:600,padding:"7px 10px",flex:1}}>
                              {PIPE_SIZES.map(s=><option key={s} value={s}>{s}</option>)}
                            </select>
                          </div>
                          {layoutAnalysis.dropPipeSizeReason && (
                            <div style={{fontFamily:F.mono,fontSize:8,color:C.mid,marginTop:4,lineHeight:1.4}}>{layoutAnalysis.dropPipeSizeReason}</div>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* Piping grid */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
                  {[
                    ["PIPE RUN",    layoutAnalysis.totalRunFt!=null?layoutAnalysis.totalRunFt+" ft":"—"],
                    ["SYSTEM TYPE", layoutAnalysis.systemType||"—"],
                    ["90° ELBOWS",  layoutAnalysis.elbows90??0],
                    ["TEES",        layoutAnalysis.tees??0],
                    ["DROPS",       layoutAnalysis.drops??0],
                    ["CEILING HT",  layoutAnalysis.ceilingHeightFt?layoutAnalysis.ceilingHeightFt+" ft":"—"],
                  ].map(([label,val])=>(
                    <div key={label} style={{background:C.surface3,borderRadius:5,padding:"7px 10px"}}>
                      <div style={{fontFamily:F.mono,fontSize:8,color:C.dim,letterSpacing:1,marginBottom:2}}>{label}</div>
                      <div style={{fontSize:14,fontFamily:F.body,color:C.text,fontWeight:600}}>{val}</div>
                    </div>
                  ))}
                </div>

                {/* Notes / warnings */}
                {layoutAnalysis.notes && (
                  <div style={{fontSize:12,color:C.mid,lineHeight:1.5,fontStyle:"italic",borderTop:`1px solid ${C.border}`,paddingTop:8}}>
                    {layoutAnalysis.notes}
                  </div>
                )}
                {layoutAnalysis.warnings && (
                  <div style={{fontSize:12,color:C.orange,marginTop:6,fontFamily:F.mono}}>⚠ {layoutAnalysis.warnings}</div>
                )}
              </div>
            )}
            {layoutAnalysis?.error && (
              <div style={{color:C.red,fontSize:12,fontFamily:F.mono,padding:"8px 0"}}>⚠ {layoutAnalysis.error}</div>
            )}
          </div>
        )}
          </div>
        </div>
      </div>

      {/* ── BILL OF MATERIALS ── */}
      <div style={{marginBottom:20}}>
        <div style={{fontFamily:F.head,fontSize:22,letterSpacing:3,color:C.copper,marginBottom:8}}>BILL OF MATERIALS</div>
        <div style={{height:2,background:`linear-gradient(90deg,${C.copper},rgba(193,122,53,0))`,marginBottom:16,borderRadius:1}}/>
        <button onClick={genBOM} disabled={bomBusy} style={{
          width:"100%",
          background:bomBusy?C.surface2:`linear-gradient(135deg,${C.copper} 0%,#A0632A 100%)`,
          border:"none",borderRadius:8,padding:15,
          fontFamily:F.head,fontSize:18,letterSpacing:4,
          color:bomBusy?C.dim:"#fff",transition:"all 0.2s",marginBottom:16,
          boxShadow:bomBusy?"none":"0 0 28px rgba(193,122,53,0.25)",
        }}>
          {bomBusy?"GENERATING SYSTEM BOM...":"GENERATE SYSTEM BOM →"}
        </button>
        {bomText && (
          <div style={{background:C.surface,border:`1px solid ${C.copper}44`,borderRadius:10,padding:16}}>
            <Mono color={C.copper}>BILL OF MATERIALS</Mono>
            <div style={{marginTop:14}}>
              <BOMTable raw={bomText}/>
            </div>
          </div>
        )}
      </div>

      {/* ── Save & Export ── */}
      {bomText ? (
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:16,marginBottom:20}}>
          <Mono color={C.copper}>SAVE THIS ESTIMATE</Mono>
          <div style={{display:"flex",gap:10,alignItems:"flex-end",marginTop:12,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:160}}>
              <div style={{fontFamily:F.mono,fontSize:9,color:C.dim,letterSpacing:1,marginBottom:4}}>REP NAME</div>
              <select value={saveRep} onChange={e=>setSaveRep(e.target.value)} style={{...inS,width:"100%"}}>
                {REPS.map(r=><option key={r} value={r}>{r}</option>)}
              </select>
            </div>
            <button onClick={genPDF} style={{
              background:`linear-gradient(135deg,#1E3A8A 0%,#3B6FD4 100%)`,
              border:"none",borderRadius:7,padding:"10px 18px",
              fontFamily:F.head,fontSize:15,letterSpacing:3,
              color:"#fff",cursor:"pointer",transition:"all 0.2s",
              boxShadow:"0 0 18px rgba(30,58,138,0.2)",flexShrink:0
            }}>
              PDF ↓
            </button>
            <button onClick={saveEstimate} disabled={saveBusy} style={{
              background:saveBusy?C.surface2:`linear-gradient(135deg,${C.copper} 0%,#A0632A 100%)`,
              border:"none",borderRadius:7,padding:"10px 22px",
              fontFamily:F.head,fontSize:15,letterSpacing:3,
              color:saveBusy?C.dim:"#fff",cursor:saveBusy?"default":"pointer",transition:"all 0.2s",
              boxShadow:saveBusy?"none":"0 0 18px rgba(193,122,53,0.2)",flexShrink:0
            }}>
              {saveBusy?"SAVING...":"SAVE →"}
            </button>
            <button onClick={resetEstimate} style={{
              background:"none",border:`1.5px solid ${C.border}`,borderRadius:7,padding:"10px 18px",
              fontFamily:F.head,fontSize:15,letterSpacing:3,
              color:C.mid,cursor:"pointer",transition:"all 0.2s",flexShrink:0
            }}>
              NEW ↺
            </button>
          </div>
          {saveMsg && (
            <div style={{marginTop:8,fontFamily:F.mono,fontSize:11,letterSpacing:1,
              color:saveMsg.startsWith("⚠")?C.red:C.green}}>
              {saveMsg}
            </div>
          )}
        </div>
      ) : (
        <div style={{fontFamily:F.mono,fontSize:11,color:C.dim,letterSpacing:1,padding:"12px 0",textAlign:'center'}}>
          Generate a BOM above to unlock save &amp; export.
        </div>
      )}

      {/* Portal: render BOM print area outside #root so #root{display:none}
            hides all app UI and print content starts on page 1 */}
      {bomText && ReactDOM.createPortal(
        <BOMPrintArea
          job={job} layoutImgs={layoutImgs} layoutAnalysis={layoutAnalysis}
          bomText={bomText} saveRep={saveRep}/>,
        document.getElementById("print-portal")
      )}
    </div>
  );
}

// ─── SITE SURVEY HELPERS ─────────────────────────────────────────────────────
const LUGGING_SIZES = ["2.5\"","3\"","4\"","6\"","8\""];

function YNToggle({ value, onChange }) {
  return (
    <div style={{ display:"flex", gap:6 }}>
      <ToggleBtn active={value===true}  onClick={()=>onChange(value===true  ? null : true)}>Yes</ToggleBtn>
      <ToggleBtn active={value===false} onClick={()=>onChange(value===false ? null : false)}>No</ToggleBtn>
    </div>
  );
}

function SurveyChk({ checked, onChange, label, highlight }) {
  return (
    <label style={{ display:"flex", alignItems:"flex-start", gap:10, cursor:"pointer" }}>
      <input type="checkbox" checked={!!checked} onChange={e=>onChange(e.target.checked)}
        style={{ width:18, height:18, marginTop:1, accentColor:C.orange, cursor:"pointer", flexShrink:0 }}/>
      <span style={{ fontSize:14, color:highlight ? C.orange : C.text, lineHeight:1.4 }}>{label}</span>
    </label>
  );
}

function SurveyCard({ title, done, open, onToggle, children }) {
  return (
    <div style={{ background:C.surface, border:`1px solid ${done ? C.copper : C.border}`,
      borderRadius:10, marginBottom:10, overflow:"hidden" }}>
      <button onClick={onToggle} style={{
        width:"100%", background: done ? C.copperSoft : "none", border:"none", padding:"14px 16px",
        display:"flex", alignItems:"center", gap:10, cursor:"pointer", textAlign:"left",
      }}>
        <span style={{ fontFamily:F.head, fontSize:17, letterSpacing:2, color:done?C.copper:C.text, flex:1 }}>{title}</span>
        {done && <span style={{ fontSize:14, color:C.copper }}>✓</span>}
        <span style={{ color:C.mid, fontSize:13 }}>{open ? "▲" : "▼"}</span>
      </button>
      {open && (
        <div style={{ padding:"0 16px 16px", display:"flex", flexDirection:"column", gap:14 }}>
          {children}
        </div>
      )}
    </div>
  );
}

// Connection points per symbol (relative to center 0,0, before rotation/scale)
const FD_CONNECTORS = {
  compressor:[{x:-32,y:0},{x:32,y:0}],
  dryer:     [{x:-28,y:0},{x:28,y:0}],
  tank:      [{x:0,y:-24},{x:0,y:24}],
  filter:    [{x:-16,y:0},{x:16,y:0}],
  ows:       [{x:-28,y:0},{x:28,y:0}],
  ballvalve: [{x:-20,y:0},{x:20,y:0}],
  tee:       [{x:-20,y:0},{x:20,y:0},{x:0,y:-18}],
  drop:      [{x:0,y:-20},{x:0,y:22}],
};

function getConnectors(el) {
  if(el.type!=='symbol') return [];
  const pts=FD_CONNECTORS[el.symbolId]||[];
  const rot=(el.rotation||0)*Math.PI/180, sc=el.scale||1;
  return pts.map(p=>{
    const lx=p.x*sc, ly=p.y*sc;
    return {x:el.x+lx*Math.cos(rot)-ly*Math.sin(rot), y:el.y+lx*Math.sin(rot)+ly*Math.cos(rot)};
  });
}

// fdSym draws a symbol centered at (0,0) inside a translate/scale/rotate transform
function fdSym(ctx, sym, x, y, scale=1, rotation=0) {
  ctx.save();
  ctx.translate(x,y);
  if(rotation) ctx.rotate(rotation*Math.PI/180);
  if(scale!==1) ctx.scale(scale,scale);
  ctx.strokeStyle='#C17A35'; ctx.fillStyle='#111A2E'; ctx.lineWidth=2.5;
  const SYM_FONT = "bold 12px 'Barlow Semi Condensed',sans-serif";
  switch(sym) {
    case 'compressor':
      ctx.fillRect(-32,-20,64,40); ctx.strokeRect(-32,-20,64,40);
      ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font=SYM_FONT; ctx.textAlign='center';
      ctx.fillText('COMP',0,4); break;
    case 'dryer':
      ctx.fillRect(-28,-18,56,36); ctx.strokeRect(-28,-18,56,36);
      ctx.beginPath();
      for(let i=0;i<3;i++){const wx=-14+i*14;ctx.moveTo(wx,5);ctx.quadraticCurveTo(wx+4,-3,wx+8,5);}
      ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font=SYM_FONT; ctx.textAlign='center';
      ctx.fillText('DRY',0,-5); break;
    case 'tank':
      ctx.beginPath(); ctx.ellipse(0,-24,14,7,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillRect(-14,-24,28,48); ctx.strokeRect(-14,-24,28,48);
      ctx.beginPath(); ctx.ellipse(0,24,14,7,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font=SYM_FONT; ctx.textAlign='center';
      ctx.fillText('TANK',0,4); break;
    case 'filter':
      ctx.beginPath(); ctx.arc(0,0,16,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font="bold 16px 'Barlow Semi Condensed',sans-serif"; ctx.textAlign='center';
      ctx.fillText('F',0,5); break;
    case 'ows':
      ctx.fillRect(-28,-18,56,36); ctx.strokeRect(-28,-18,56,36);
      ctx.fillStyle='#fff'; ctx.font=SYM_FONT; ctx.textAlign='center';
      ctx.fillText('OWS',0,4); break;
    case 'ballvalve':
      ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-20,0); ctx.lineTo(-10,0);
      ctx.moveTo(10,0); ctx.lineTo(20,0); ctx.moveTo(0,-10); ctx.lineTo(0,-18); ctx.stroke(); break;
    case 'elbow90':
      ctx.beginPath(); ctx.moveTo(-18,0); ctx.arcTo(0,0,0,-18,18); ctx.lineTo(0,-18); ctx.stroke(); break;
    case 'elbow45':
      ctx.beginPath(); ctx.moveTo(-18,0); ctx.arcTo(0,0,13,-13,14); ctx.lineTo(13,-13); ctx.stroke(); break;
    case 'tee':
      ctx.beginPath(); ctx.moveTo(-20,0); ctx.lineTo(20,0); ctx.moveTo(0,0); ctx.lineTo(0,-18); ctx.stroke(); break;
    case 'coupling':
      ctx.beginPath();
      ctx.moveTo(-20,0); ctx.lineTo(-5,0); ctx.moveTo(5,0); ctx.lineTo(20,0);
      ctx.moveTo(-5,-8); ctx.lineTo(-5,8); ctx.moveTo(5,-8); ctx.lineTo(5,8);
      ctx.stroke(); break;
    case 'union':
      ctx.beginPath(); ctx.moveTo(-20,0); ctx.lineTo(-8,0); ctx.moveTo(8,0); ctx.lineTo(20,0); ctx.stroke();
      ctx.beginPath(); ctx.arc(-5,0,5,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(5,0,5,0,Math.PI*2); ctx.stroke(); break;
    case 'endcap':
      ctx.beginPath(); ctx.moveTo(-18,0); ctx.lineTo(2,0); ctx.moveTo(2,-10); ctx.lineTo(2,10); ctx.stroke(); break;
    case 'flexhose':
      ctx.beginPath(); ctx.moveTo(-20,0);
      for(let i=0;i<4;i++){ctx.quadraticCurveTo(-15+i*10,-8,-10+i*10,0);ctx.quadraticCurveTo(-5+i*10,8,i*10,0);}
      ctx.stroke(); break;
    case 'quickconn':
      ctx.beginPath(); ctx.moveTo(-18,0); ctx.lineTo(-2,0);
      ctx.moveTo(-2,-8); ctx.lineTo(12,0); ctx.lineTo(-2,8); ctx.closePath();
      ctx.fill(); ctx.stroke(); break;
    case 'nptadapt':
      ctx.beginPath(); ctx.moveTo(-18,0); ctx.lineTo(-4,0);
      ctx.moveTo(-4,-10); ctx.lineTo(10,0); ctx.lineTo(-4,10); ctx.closePath();
      ctx.fill(); ctx.stroke(); break;
    case 'drop':
      ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(0,6);
      ctx.moveTo(-8,0); ctx.lineTo(0,18); ctx.lineTo(8,0); ctx.stroke();
      ctx.beginPath(); ctx.arc(0,22,5,0,Math.PI*2); ctx.stroke(); break;
    case 'termblock':
      ctx.fillRect(-22,-12,44,24); ctx.strokeRect(-22,-12,44,24);
      for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(-14+i*10,-12);ctx.lineTo(-14+i*10,12);ctx.stroke();} break;
    case 'wallfac':
      ctx.strokeStyle='#9CA3AF'; ctx.lineWidth=5; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(-30,0); ctx.lineTo(30,0); ctx.stroke(); break;
    case 'door':
      ctx.beginPath(); ctx.moveTo(-20,0); ctx.lineTo(20,0);
      ctx.moveTo(-20,0); ctx.arc(-20,0,40,0,Math.PI/2); ctx.stroke(); break;
    case 'column':
      ctx.fillStyle='#4B5563'; ctx.fillRect(-10,-10,20,20); ctx.strokeRect(-10,-10,20,20); break;
    case 'dimnarrow':
      ctx.beginPath(); ctx.moveTo(-28,0); ctx.lineTo(28,0);
      ctx.moveTo(-28,-6); ctx.lineTo(-28,6); ctx.moveTo(28,-6); ctx.lineTo(28,6);
      ctx.stroke(); break;
    default:
      ctx.fillRect(-16,-12,32,24); ctx.strokeRect(-16,-12,32,24);
  }
  ctx.restore();
}

const FacilityDrawing = React.forwardRef(function FacilityDrawing({ customerName, repName }, fdRef) {
  const canvasRef   = React.useRef(null);
  const dragRef     = React.useRef(null);
  const pinchRef    = React.useRef(null);
  const undoRef     = React.useRef([]);
  const logoRef     = React.useRef(null);
  const zoomRef     = React.useRef(1);
  const panRef      = React.useRef({x:0,y:0});
  const FD_LS       = 'airiq_facility_drawing_draft';

  const [els,          setEls]          = React.useState(()=>{ try{return JSON.parse(localStorage.getItem(FD_LS)||'[]');}catch{return[];} });
  const [tool,         setTool]         = React.useState('wall');
  const [activeSym,    setActiveSym]    = React.useState('compressor');
  const [pipeSize,     setPipeSize]     = React.useState('1"');
  const [pipeColor,    setPipeColor]    = React.useState('blue');
  const [selected,     setSelected]     = React.useState(null);
  const [drawing,      setDrawing]      = React.useState(null);
  const [cursor,       setCursor]       = React.useState(null);
  const [labelIn,      setLabelIn]      = React.useState({show:false,x:0,y:0,text:'',forId:null,isPipe:false,elevNote:''});
  const [zoom,         setZoom]         = React.useState(1);
  const [pan,          setPan]          = React.useState({x:0,y:0});
  const [isFullscreen, setIsFullscreen] = React.useState(false);
  const [showTemplates,setShowTemplates]= React.useState(false);
  const [snapPt,       setSnapPt]       = React.useState(null);
  const [ctxMenu,      setCtxMenu]      = React.useState({show:false,x:0,y:0,elId:null});

  const longPressRef   = React.useRef(null);
  const lastTapRef     = React.useRef({time:0,x:0,y:0});
  const lastDrawTool   = React.useRef('pipe');
  const prevPipeRef    = React.useRef(null); // {x,y,angle} of last completed pipe
  const [showBom,      setShowBom]      = React.useState(false);

  React.useEffect(()=>{ zoomRef.current=zoom; },[zoom]);
  React.useEffect(()=>{ panRef.current=pan; },[pan]);
  React.useEffect(()=>{ const img=new Image(); img.onload=()=>{logoRef.current=img;}; img.src=LOGO_SRC; },[]);

  const snap        = v => Math.round(v/FD.G)*FD.G;
  const clampZoom   = z => Math.max(0.25,Math.min(4,z));
  const persist     = list => { try{localStorage.setItem(FD_LS,JSON.stringify(list));}catch{} };

  function mutate(fn) {
    setEls(prev=>{ undoRef.current=[...undoRef.current.slice(-19),prev]; const next=fn(prev); persist(next); return next; });
  }
  const addEl    = el  => mutate(p=>[...p,el]);
  const rmEl     = id  => { mutate(p=>p.filter(e=>e.id!==id)); setSelected(null); };
  const updEl    = (id,u) => setEls(p=>{ const n=p.map(e=>e.id===id?{...e,...u}:e); persist(n); return n; });
  const undo     = ()  => { const p=undoRef.current.pop(); if(p!=null){setEls(p);persist(p);} };
  const clearAll = ()  => { if(!window.confirm('Clear entire drawing?'))return; mutate(()=>[]); setSelected(null); };
  const fitView  = ()  => { setZoom(1); setPan({x:0,y:0}); };
  const changeTool = t => { if(t!=='select'&&t!=='erase') lastDrawTool.current=t; setTool(t); };

  function getCanvasPos(e) {
    const cv=canvasRef.current; if(!cv) return {x:0,y:0};
    const r=cv.getBoundingClientRect();
    const src=e.changedTouches?e.changedTouches[0]:(e.touches?e.touches[0]:e);
    if(!src) return {x:0,y:0};
    return {x:(src.clientX-r.left)*(FD.W/r.width), y:(src.clientY-r.top)*(FD.H/r.height)};
  }

  function screenToWorld(cp) {
    const z=zoomRef.current, p=panRef.current;
    return {x:(cp.x-p.x)/z, y:(cp.y-p.y)/z};
  }

  function getPos(e, doSnap=true) {
    const w=screenToWorld(getCanvasPos(e));
    return doSnap?{x:snap(w.x),y:snap(w.y)}:w;
  }

  function findSnapPoint(wx, wy, elsList) {
    const threshold=30/zoomRef.current;
    // Connector points first (highest priority) — returns sourceEl for auto-fitting logic
    for(const el of elsList) {
      for(const pt of getConnectors(el)) {
        if(Math.hypot(wx-pt.x,wy-pt.y)<threshold) return {x:pt.x,y:pt.y,sourceEl:el};
      }
    }
    // Fallback: bbox edge centers of any symbol
    for(const el of elsList) {
      if(el.type!=='symbol') continue;
      const sc=el.scale||1, rot=(el.rotation||0)*Math.PI/180;
      const hw=38*sc, hh=32*sc;
      for(const p of [{x:hw,y:0},{x:-hw,y:0},{x:0,y:-hh},{x:0,y:hh}]) {
        const ex=el.x+p.x*Math.cos(rot)-p.y*Math.sin(rot);
        const ey=el.y+p.x*Math.sin(rot)+p.y*Math.cos(rot);
        if(Math.hypot(wx-ex,wy-ey)<threshold) return {x:ex,y:ey,sourceEl:el};
      }
    }
    return null;
  }

  function hitTest(x, y) {
    for(let i=els.length-1;i>=0;i--) {
      const el=els[i];
      if(el.type==='wall'||el.type==='pipe'||el.type==='dim') {
        const {x1,y1,x2,y2}=el, dx=x2-x1, dy=y2-y1, len2=dx*dx+dy*dy;
        if(!len2) continue;
        const t=Math.max(0,Math.min(1,((x-x1)*dx+(y-y1)*dy)/len2));
        if(Math.hypot(x-(x1+t*dx),y-(y1+t*dy))<10) return el;
      } else if(el.type==='label') {
        if(Math.abs(x-el.x)<60&&Math.abs(y-el.y)<12) return el;
      } else {
        const sc=el.scale||1;
        if(Math.abs(x-el.x)<42*sc&&Math.abs(y-el.y)<36*sc) return el;
      }
    }
    return null;
  }

  function hitHandle(x, y, el) {
    if(!el||el.type!=='symbol') return null;
    const sc=el.scale||1, rot=(el.rotation||0)*Math.PI/180;
    // Rotation handle: above symbol in its local up direction
    const rhx=el.x+Math.sin(rot)*50*sc, rhy=el.y-Math.cos(rot)*50*sc;
    if(Math.hypot(x-rhx,y-rhy)<16) return 'rotate';
    // Corner handles
    const corners=[[-38*sc,-32*sc],[38*sc,-32*sc],[38*sc,32*sc],[-38*sc,32*sc]];
    const labels=['tl','tr','br','bl'];
    for(let i=0;i<4;i++){
      const [lx,ly]=corners[i];
      const wx=el.x+lx*Math.cos(rot)-ly*Math.sin(rot);
      const wy=el.y+lx*Math.sin(rot)+ly*Math.cos(rot);
      if(Math.hypot(x-wx,y-wy)<9) return labels[i];
    }
    return null;
  }

  function hitEndpoint(x, y, el) {
    if(!el.x1) return null;
    if(Math.hypot(x-el.x1,y-el.y1)<14) return 'p1';
    if(Math.hypot(x-el.x2,y-el.y2)<14) return 'p2';
    return null;
  }

  function onDown(e) {
    e.preventDefault();
    // Two-finger: pinch/pan
    if(e.touches&&e.touches.length===2) {
      clearTimeout(longPressRef.current);
      const [t0,t1]=[e.touches[0],e.touches[1]];
      pinchRef.current={
        dist:Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY),
        cx:(t0.clientX+t1.clientX)/2, cy:(t0.clientY+t1.clientY)/2,
        startZoom:zoomRef.current, startPan:{...panRef.current},
      };
      return;
    }

    clearTimeout(longPressRef.current);
    const raw=getPos(e,false);
    const snapped={x:snap(raw.x),y:snap(raw.y)};

    // Double-tap (touch only, SELECT mode) → switch to last draw mode
    if(e.touches&&e.touches.length===1&&tool==='select'&&!drawing) {
      const now=Date.now(), last=lastTapRef.current;
      if(now-last.time<300&&Math.hypot(raw.x-last.x,raw.y-last.y)<40) {
        if(!hitTest(raw.x,raw.y)) {
          changeTool(lastDrawTool.current);
          lastTapRef.current={time:0,x:0,y:0};
          return;
        }
      }
      lastTapRef.current={time:now,x:raw.x,y:raw.y};
    }

    if(tool==='erase') { const h=hitTest(raw.x,raw.y); if(h)rmEl(h.id); return; }
    if(tool==='label') { setLabelIn({show:true,x:snapped.x,y:snapped.y,text:'',forId:null,isPipe:false}); return; }

    if(tool==='select') {
      const h=hitTest(raw.x,raw.y);
      if(h) {
        setSelected(h.id);
        const handle=hitHandle(raw.x,raw.y,h);
        if(handle==='rotate') {
          const src=e.touches?e.touches[0]:e;
          dragRef.current={mode:'rotate',id:h.id,orig:{...h},
            startAngle:Math.atan2(raw.y-h.y,raw.x-h.x),startX:raw.x,startY:raw.y,
            startCX:src?.clientX||0, startCY:src?.clientY||0};
        } else if(['tl','tr','br','bl'].includes(handle)) {
          dragRef.current={mode:'resize',id:h.id,orig:{...h},corner:handle};
        } else {
          const ep=hitEndpoint(raw.x,raw.y,h);
          if(ep) {
            dragRef.current={mode:'endpoint',id:h.id,orig:{...h},ep};
          } else {
            dragRef.current={mode:'move',id:h.id,sx:snapped.x,sy:snapped.y,orig:{...h}};
          }
        }
        // Long press on symbol (touch only) → context menu
        if(e.touches&&h.type==='symbol') {
          const tx=e.touches[0].clientX, ty=e.touches[0].clientY;
          longPressRef.current=setTimeout(()=>{
            setCtxMenu({show:true,x:tx,y:ty,elId:h.id});
            dragRef.current=null;
          },500);
        }
      } else {
        setSelected(null);
        dragRef.current={mode:'pan',startCp:getCanvasPos(e),startPan:{...panRef.current}};
      }
      return;
    }

    if(tool==='wall'||tool==='pipe'||tool==='dim') {
      const sp=findSnapPoint(raw.x,raw.y,els);
      const fx=sp?sp.x:snapped.x, fy=sp?sp.y:snapped.y;
      if(!drawing) {
        setDrawing({x1:fx,y1:fy,x2:fx,y2:fy,startSnap:sp,isDim:tool==='dim'});
      } else {
        const sp2=findSnapPoint(raw.x,raw.y,els);
        const ex=sp2?sp2.x:snapped.x, ey=sp2?sp2.y:snapped.y;
        if(tool==='dim') {
          addEl({id:(Date.now()+Math.random()).toString(36),type:'dim',x1:drawing.x1,y1:drawing.y1,x2:ex,y2:ey});
          setDrawing(null); setSnapPt(null);
        } else if(tool==='wall') {
          addEl({id:(Date.now()+Math.random()).toString(36),type:'wall',
                 x1:drawing.x1,y1:drawing.y1,x2:ex,y2:ey,pipeSize:null,pipeColor:null});
          setDrawing(null); setSnapPt(null);
        } else {
          // Pipe completion: auto-elbow, auto-NPT-adapter, auto-couplings
          const newAngle=Math.atan2(ey-drawing.y1,ex-drawing.x1);
          const pipeLen=Math.hypot(ex-drawing.x1,ey-drawing.y1);
          const ftLen=pipeLen/FD.G;
          const sticks=Math.max(1,Math.ceil(ftLen/19));
          const extraEls=[];

          // Auto-elbow at direction change >30°
          if(prevPipeRef.current) {
            const {x:px,y:py,angle:prevAngle}=prevPipeRef.current;
            if(Math.hypot(drawing.x1-px,drawing.y1-py)<FD.G*0.6) {
              let diff=((newAngle-prevAngle)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
              if(diff>Math.PI) diff=Math.PI*2-diff;
              if(diff>Math.PI/6) extraEls.push({
                id:(Date.now()+Math.random()+0.01).toString(36),
                type:'symbol',symbolId:'elbow90',
                x:drawing.x1,y:drawing.y1,
                rotation:((prevAngle*180/Math.PI)%360+360)%360,scale:0.7,label:'',
              });
            }
          }
          prevPipeRef.current={x:ex,y:ey,angle:newAngle};

          // FIX 3: Auto NPT adapter at equipment connections
          const EQ=['compressor','dryer','tank','filter','ows'];
          if(drawing.startSnap?.sourceEl&&EQ.includes(drawing.startSnap.sourceEl.symbolId))
            extraEls.push({id:(Date.now()+Math.random()+0.02).toString(36),
              type:'symbol',symbolId:'nptadapt',x:drawing.x1,y:drawing.y1,
              rotation:((newAngle*180/Math.PI+180)%360+360)%360,scale:0.7,label:`${pipeSize} NPT`});
          if(sp2?.sourceEl&&EQ.includes(sp2.sourceEl.symbolId))
            extraEls.push({id:(Date.now()+Math.random()+0.03).toString(36),
              type:'symbol',symbolId:'nptadapt',x:ex,y:ey,
              rotation:((newAngle*180/Math.PI)%360+360)%360,scale:0.7,label:`${pipeSize} NPT`});

          // FIX 4: Auto couplings at each 19 ft interval
          for(let i=1;i<sticks;i++) {
            const t=(i*19*FD.G)/pipeLen;
            extraEls.push({id:(Date.now()+Math.random()+i*0.1+0.04).toString(36),
              type:'symbol',symbolId:'coupling',
              x:Math.round(drawing.x1+(ex-drawing.x1)*t),
              y:Math.round(drawing.y1+(ey-drawing.y1)*t),
              rotation:((newAngle*180/Math.PI)%360+360)%360,scale:0.8,label:pipeSize});
          }

          mutate(p=>[...p,
            {id:(Date.now()+Math.random()).toString(36),type:'pipe',
             x1:drawing.x1,y1:drawing.y1,x2:ex,y2:ey,pipeSize,pipeColor,sticks},
            ...extraEls,
          ]);
          setDrawing(null); setSnapPt(null);
        }
      }
      return;
    }

    if(tool==='symbol') {
      const id=(Date.now()+Math.random()).toString(36);
      addEl({id,type:'symbol',symbolId:activeSym,x:snapped.x,y:snapped.y,label:'',rotation:0,scale:1.2});
      setLabelIn({show:true,x:snapped.x,y:snapped.y-44,text:'',forId:id,isPipe:false});
    }
  }

  function onMove(e) {
    // Pinch zoom/pan (two fingers)
    if(e.touches&&e.touches.length===2&&pinchRef.current) {
      const [t0,t1]=[e.touches[0],e.touches[1]];
      const dist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
      const cx=(t0.clientX+t1.clientX)/2, cy=(t0.clientY+t1.clientY)/2;
      const {dist:d0,startZoom,startPan}=pinchRef.current;
      const cv=canvasRef.current; if(!cv) return;
      const r=cv.getBoundingClientRect();
      const pcx=(cx-r.left)*(FD.W/r.width), pcy=(cy-r.top)*(FD.H/r.height);
      const newZoom=clampZoom(startZoom*(dist/d0));
      const wx=(pcx-startPan.x)/startZoom, wy=(pcy-startPan.y)/startZoom;
      setZoom(newZoom);
      setPan({x:pcx-wx*newZoom, y:pcy-wy*newZoom});
      return;
    }
    // Any single-finger movement cancels long-press
    clearTimeout(longPressRef.current);

    const cp=getCanvasPos(e);
    const raw=screenToWorld(cp);
    const snapped={x:snap(raw.x),y:snap(raw.y)};
    setCursor(snapped);

    // Pan drag in SELECT mode
    if(dragRef.current?.mode==='pan') {
      const dr=dragRef.current;
      setPan({x:dr.startPan.x+(cp.x-dr.startCp.x), y:dr.startPan.y+(cp.y-dr.startCp.y)});
      return;
    }

    // Snap check while drawing pipe/dim
    if((tool==='pipe'||tool==='dim')&&drawing) {
      const sp=findSnapPoint(raw.x,raw.y,els);
      setSnapPt(sp);
      setDrawing(d=>({...d, x2:sp?sp.x:snapped.x, y2:sp?sp.y:snapped.y}));
      return;
    }
    if(drawing) { setDrawing(d=>({...d,x2:snapped.x,y2:snapped.y})); return; }

    // Connector snap preview even before drawing starts
    if(tool==='pipe'||tool==='dim') {
      setSnapPt(findSnapPoint(raw.x,raw.y,els));
    }

    // SELECT mode element manipulation
    if(tool==='select'&&dragRef.current) {
      const dr=dragRef.current;
      if(dr.mode==='move') {
        const dx=snapped.x-dr.sx, dy=snapped.y-dr.sy;
        if(dr.orig.type==='wall'||dr.orig.type==='pipe'||dr.orig.type==='dim')
          updEl(dr.id,{x1:snap(dr.orig.x1+dx),y1:snap(dr.orig.y1+dy),x2:snap(dr.orig.x2+dx),y2:snap(dr.orig.y2+dy)});
        else updEl(dr.id,{x:snap(dr.orig.x+dx),y:snap(dr.orig.y+dy)});
      } else if(dr.mode==='rotate') {
        const angle=Math.atan2(raw.y-dr.orig.y,raw.x-dr.orig.x);
        const delta=(angle-dr.startAngle)*180/Math.PI;
        updEl(dr.id,{rotation:((dr.orig.rotation||0)+delta+360)%360});
      } else if(dr.mode==='resize') {
        const dist=Math.hypot(raw.x-dr.orig.x,raw.y-dr.orig.y);
        updEl(dr.id,{scale:Math.max(0.5,Math.min(3,dist/50))});
      } else if(dr.mode==='endpoint') {
        if(dr.ep==='p1') updEl(dr.id,{x1:snapped.x,y1:snapped.y});
        else              updEl(dr.id,{x2:snapped.x,y2:snapped.y});
      }
    }
  }

  function onUp(e) {
    clearTimeout(longPressRef.current);
    const dr=dragRef.current;
    // Rotation click: within 20 screen pixels of mousedown → snap to next 90°
    if(dr?.mode==='rotate'&&e) {
      const src=e.changedTouches?e.changedTouches[0]:(e.touches&&e.touches.length?e.touches[0]:e);
      if(src&&Math.hypot((src.clientX||0)-dr.startCX,(src.clientY||0)-dr.startCY)<20) {
        const cur=Math.round((dr.orig.rotation||0)/90)*90;
        updEl(dr.id,{rotation:(cur+90)%360});
      }
    }
    dragRef.current=null; pinchRef.current=null;
  }

  function onDblClick(e) {
    const raw=getPos(e,false);
    const h=hitTest(raw.x,raw.y);
    if(h&&h.type==='pipe') {
      const mx=(h.x1+h.x2)/2, my=(h.y1+h.y2)/2;
      setLabelIn({show:true,x:mx,y:my,text:h.customLabel||'',forId:h.id,isPipe:true,elevNote:h.elevNote||''});
    }
  }

  function commitLabel() {
    const {forId,text,x,y,isPipe,elevNote}=labelIn;
    if(forId) {
      if(isPipe) updEl(forId,{customLabel:text||null,elevNote:elevNote||null});
      else updEl(forId,{label:text});
    } else if(text.trim()) {
      addEl({id:(Date.now()+Math.random()).toString(36),type:'label',x,y,text});
    }
    setLabelIn({show:false,x:0,y:0,text:'',forId:null,isPipe:false,elevNote:''});
  }

  function computeBom() {
    const FITTING_SFX = {elbow90:'003',elbow45:'004',tee:'005',union:'002',endcap:'006',flexhose:'055'};
    // Pipe footage by size+color
    const pMap = {};
    for(const el of els.filter(e=>e.type==='pipe')) {
      const ft=Math.hypot(el.x2-el.x1,el.y2-el.y1)/FD.G;
      const k=`${el.pipeSize}|${el.pipeColor}`;
      if(!pMap[k]) pMap[k]={size:el.pipeSize,color:el.pipeColor,footage:0};
      pMap[k].footage+=ft;
    }
    const pipeRows=Object.values(pMap).map(p=>{
      const col=p.color.charAt(0).toUpperCase()+p.color.slice(1);
      const footage=Math.round(p.footage*10)/10;
      const sticks=Math.ceil(footage/19);
      return {desc:`${p.size} AIRpipe — ${col}`,pn:apipePN(p.size,col),qty:sticks,notes:`${footage}ft total · ${sticks} stick${sticks!==1?'s':''}`};
    });
    // Symbols by type (fittings & drops only)
    const symMap={};
    for(const el of els.filter(e=>e.type==='symbol')) {
      const sym=FD_SYMBOLS.find(s=>s.id===el.symbolId);
      if(!sym||sym.sec==='EQUIPMENT'||sym.sec==='FACILITY') continue;
      if(!symMap[el.symbolId]) symMap[el.symbolId]={label:sym.label,count:0,sampleLabel:el.label};
      symMap[el.symbolId].count++;
    }
    const symRows=Object.entries(symMap).map(([id,{label,count,sampleLabel}])=>{
      const pfx=sampleLabel?PIPE_PFX[sampleLabel.replace(/ NPT/,'').replace(/ Coupling/,'')]||null:null;
      const sfx=FITTING_SFX[id];
      const pn=(pfx&&sfx)?pfx+sfx:'—';
      return {desc:label+(sampleLabel?` (${sampleLabel})`:''),pn,qty:count,notes:''};
    });
    // Equipment count
    const eqRows=[];
    const eqMap={};
    for(const el of els.filter(e=>e.type==='symbol')) {
      const sym=FD_SYMBOLS.find(s=>s.id===el.symbolId);
      if(!sym||sym.sec!=='EQUIPMENT') continue;
      if(!eqMap[el.symbolId]) eqMap[el.symbolId]={label:sym.label,count:0};
      eqMap[el.symbolId].count++;
    }
    for(const [,{label,count}] of Object.entries(eqMap))
      eqRows.push({desc:label+(els.find(e=>e.type==='symbol'&&FD_SYMBOLS.find(s=>s.id===e.symbolId)?.sec==='EQUIPMENT'&&e.label)?` (${els.find(e=>e.type==='symbol'&&FD_SYMBOLS.find(s=>s.id===e.symbolId)?.sec==='EQUIPMENT'&&e.label)?.label})`:''),pn:'—',qty:count,notes:'Qty to verify'});
    return [...eqRows,...pipeRows,...symRows];
  }

  // Wheel zoom (non-passive so we can preventDefault)
  React.useEffect(()=>{
    const cv=canvasRef.current; if(!cv) return;
    const handler=e=>{
      e.preventDefault();
      const cp=getCanvasPos(e);
      const z=zoomRef.current, p=panRef.current;
      const factor=e.deltaY<0?1.12:1/1.12;
      const newZ=clampZoom(z*factor);
      const wx=(cp.x-p.x)/z, wy=(cp.y-p.y)/z;
      setZoom(newZ);
      setPan({x:cp.x-wx*newZ, y:cp.y-wy*newZ});
    };
    cv.addEventListener('wheel',handler,{passive:false});
    return ()=>cv.removeEventListener('wheel',handler);
  },[]);

  React.useEffect(()=>{
    const fn=e=>{
      if((e.key==='Delete'||e.key==='Backspace')&&selected&&!labelIn.show){rmEl(selected);}
      if(e.key==='Escape'){setDrawing(null);setSnapPt(null);setLabelIn({show:false,x:0,y:0,text:'',forId:null,isPipe:false});}
      if(e.key==='f'||e.key==='F'){fitView();}
    };
    window.addEventListener('keydown',fn); return()=>window.removeEventListener('keydown',fn);
  },[selected,labelIn.show,els]);

  // Canvas draw
  React.useEffect(()=>{
    const cv=canvasRef.current; if(!cv) return;
    const ctx=cv.getContext('2d');

    // Clear in screen space
    ctx.save(); ctx.setTransform(1,0,0,1,0,0);
    ctx.fillStyle='#141414'; ctx.fillRect(0,0,FD.W,FD.H);
    ctx.restore();

    // Apply zoom/pan
    ctx.save();
    ctx.setTransform(zoom,0,0,zoom,pan.x,pan.y);

    // Grid — minor (1 ft) and major (5 ft) lines in copper
    ctx.lineCap='butt';
    for(let gx=0;gx<=FD.W;gx+=FD.G){
      const major=(gx%(FD.G*5)===0);
      ctx.strokeStyle=major?'rgba(193,122,53,0.45)':'rgba(193,122,53,0.22)';
      ctx.lineWidth=(major?1:0.5)/zoom;
      ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,FD.H); ctx.stroke();
    }
    for(let gy=0;gy<=FD.H;gy+=FD.G){
      const major=(gy%(FD.G*5)===0);
      ctx.strokeStyle=major?'rgba(193,122,53,0.45)':'rgba(193,122,53,0.22)';
      ctx.lineWidth=(major?1:0.5)/zoom;
      ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(FD.W,gy); ctx.stroke();
    }
    // Footage labels along top and left edges every 5 ft
    ctx.fillStyle='rgba(193,122,53,0.65)';
    ctx.font=`bold ${Math.round(10/zoom)}px 'Barlow Semi Condensed',sans-serif`;
    ctx.textAlign='center';
    for(let gx=FD.G*5;gx<FD.W;gx+=FD.G*5){
      ctx.fillText(`${gx/FD.G}`,gx,12/zoom);
    }
    ctx.textAlign='right';
    for(let gy=FD.G*5;gy<FD.H;gy+=FD.G*5){
      ctx.fillText(`${gy/FD.G}`,34/zoom,gy+4/zoom);
    }

    // Elements
    for(const el of els) {
      ctx.save();
      if(el.type==='wall') {
        ctx.strokeStyle='#9CA3AF'; ctx.lineWidth=4; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(el.x1,el.y1); ctx.lineTo(el.x2,el.y2); ctx.stroke();
      } else if(el.type==='pipe') {
        const col=FD_PIPE_COLS[el.pipeColor]||FD_PIPE_COLS.blue;
        ctx.strokeStyle=col; ctx.lineWidth=FD_PIPE_W[el.pipeSize]||3; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(el.x1,el.y1); ctx.lineTo(el.x2,el.y2); ctx.stroke();
        const mx=(el.x1+el.x2)/2, my=(el.y1+el.y2)/2;
        const ftRaw=Math.hypot(el.x2-el.x1,el.y2-el.y1)/FD.G;
        const ft=Math.round(ftRaw*2)/2;
        const colorName=el.pipeColor?(el.pipeColor.charAt(0).toUpperCase()+el.pipeColor.slice(1)):'Blue';
        const sticks=el.sticks||Math.ceil(Math.max(1,ftRaw)/19);
        let lbl;
        if(el.customLabel) {
          lbl=el.customLabel;
        } else if(ftRaw>19) {
          const c=sticks-1;
          lbl=`${el.pipeSize} — ${ft}ft · ${sticks} sticks${c>0?` · ${c} coupling${c>1?'s':''}`:''} ⚠`;
        } else {
          lbl=ft>0?`${el.pipeSize} ${colorName} — ${ft} ft`:`${el.pipeSize}`;
        }
        ctx.font="bold 12px 'Barlow Semi Condensed',sans-serif"; ctx.textAlign='center';
        const lblW=ctx.measureText(lbl).width;
        ctx.fillStyle='rgba(8,10,20,0.78)';
        ctx.fillRect(mx-lblW/2-5,my-19,lblW+10,16);
        ctx.fillStyle='#fff';
        ctx.fillText(lbl,mx,my-7);
        // Elevation note tag (FIX 6)
        if(el.elevNote) {
          ctx.font="11px 'Barlow Semi Condensed',sans-serif"; ctx.textAlign='center';
          const etw=ctx.measureText(el.elevNote).width;
          ctx.fillStyle='rgba(30,80,200,0.85)';
          ctx.fillRect(mx-etw/2-4,my+3,etw+8,14);
          ctx.fillStyle='#fff'; ctx.fillText(el.elevNote,mx,my+13);
        }
      } else if(el.type==='dim') {
        const {x1,y1,x2,y2}=el;
        const mx=(x1+x2)/2, my=(y1+y2)/2;
        const ft=Math.round(Math.hypot(x2-x1,y2-y1)/FD.G*2)/2;
        const ang=Math.atan2(y2-y1,x2-x1);
        const px=Math.cos(ang+Math.PI/2)*7, py=Math.sin(ang+Math.PI/2)*7;
        ctx.strokeStyle='#E5E7EB'; ctx.lineWidth=1.5; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x1+px,y1+py); ctx.lineTo(x1-px,y1-py);
        ctx.moveTo(x2+px,y2+py); ctx.lineTo(x2-px,y2-py);
        ctx.stroke();
        const aw=10;
        ctx.beginPath();
        ctx.moveTo(x1,y1); ctx.lineTo(x1+Math.cos(ang+0.38)*aw,y1+Math.sin(ang+0.38)*aw);
        ctx.moveTo(x1,y1); ctx.lineTo(x1+Math.cos(ang-0.38)*aw,y1+Math.sin(ang-0.38)*aw);
        ctx.moveTo(x2,y2); ctx.lineTo(x2+Math.cos(ang+Math.PI+0.38)*aw,y2+Math.sin(ang+Math.PI+0.38)*aw);
        ctx.moveTo(x2,y2); ctx.lineTo(x2+Math.cos(ang+Math.PI-0.38)*aw,y2+Math.sin(ang+Math.PI-0.38)*aw);
        ctx.stroke();
        ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(mx-28,my-19,56,15);
        ctx.fillStyle='#F9FAFB'; ctx.font='bold 10px monospace'; ctx.textAlign='center';
        ctx.fillText(`${ft} ft`,mx,my-8);
      } else if(el.type==='symbol') {
        fdSym(ctx,el.symbolId,el.x,el.y,el.scale||1,el.rotation||0);
        if(el.label){
          const sc=el.scale||1;
          ctx.fillStyle='#fff'; ctx.font="bold 13px 'Barlow Semi Condensed',sans-serif"; ctx.textAlign='center';
          ctx.fillText(el.label,el.x,el.y+44*sc);
        }
      } else if(el.type==='label') {
        ctx.fillStyle='#F9FAFB'; ctx.font="bold 13px 'Barlow Semi Condensed',sans-serif"; ctx.textAlign='left';
        ctx.fillText(el.text,el.x,el.y);
      }

      // Selection indicators
      if(el.id===selected) {
        if(el.type==='wall'||el.type==='pipe'||el.type==='dim') {
          ctx.strokeStyle='#3B82F6'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
          const pad=8;
          ctx.strokeRect(Math.min(el.x1,el.x2)-pad,Math.min(el.y1,el.y2)-pad,
                         Math.abs(el.x2-el.x1)+pad*2,Math.abs(el.y2-el.y1)+pad*2);
          ctx.setLineDash([]);
          // Endpoint handles for dim/pipe/wall
          [el.x1,el.y1,el.x2,el.y2].forEach((v,i)=>{
            if(i%2===0) {
              ctx.fillStyle='#fff'; ctx.strokeStyle='#3B82F6'; ctx.lineWidth=1.5;
              ctx.beginPath(); ctx.arc(i===0?el.x1:el.x2,i===0?el.y1:el.y2,5,0,Math.PI*2);
              ctx.fill(); ctx.stroke();
            }
          });
        } else if(el.type==='symbol') {
          const sc=el.scale||1, rot=(el.rotation||0)*Math.PI/180;
          // Rotated selection box with orange glow
          ctx.strokeStyle='#F97316'; ctx.lineWidth=3; ctx.setLineDash([5,3]);
          ctx.shadowColor='#F97316'; ctx.shadowBlur=10;
          ctx.save();
          ctx.translate(el.x,el.y); ctx.rotate(rot);
          ctx.strokeRect(-38*sc,-32*sc,76*sc,64*sc);
          ctx.restore();
          ctx.setLineDash([]); ctx.shadowBlur=0;
          // Rotation handle
          const rhx=el.x+Math.sin(rot)*50*sc, rhy=el.y-Math.cos(rot)*50*sc;
          ctx.fillStyle='#C17A35';
          ctx.beginPath(); ctx.arc(rhx,rhy,9,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#fff'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
          ctx.fillText('↻',rhx,rhy+4);
          // Rotation label
          ctx.fillStyle='rgba(193,122,53,0.9)'; ctx.font='8px monospace'; ctx.textAlign='center';
          ctx.fillText(`${Math.round(el.rotation||0)}°`,el.x,el.y-36*sc-10);
          // Corner resize handles
          const corners=[[-38*sc,-32*sc],[38*sc,-32*sc],[38*sc,32*sc],[-38*sc,32*sc]];
          corners.forEach(([lx,ly])=>{
            const wx=el.x+lx*Math.cos(rot)-ly*Math.sin(rot);
            const wy=el.y+lx*Math.sin(rot)+ly*Math.cos(rot);
            ctx.fillStyle='#fff'; ctx.strokeStyle='#3B82F6'; ctx.lineWidth=1.5;
            ctx.fillRect(wx-5,wy-5,10,10); ctx.strokeRect(wx-5,wy-5,10,10);
          });
          // Connector dots
          for(const pt of getConnectors(el)) {
            ctx.beginPath(); ctx.arc(pt.x,pt.y,4,0,Math.PI*2);
            ctx.fillStyle='rgba(59,130,246,0.5)'; ctx.fill();
            ctx.strokeStyle='#3B82F6'; ctx.lineWidth=1; ctx.stroke();
          }
        } else {
          ctx.strokeStyle='#3B82F6'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
          ctx.strokeRect(el.x-4,el.y-16,80,22); ctx.setLineDash([]);
        }
      }
      ctx.restore();
    }

    // In-progress drawing preview
    if(drawing) {
      ctx.save(); ctx.setLineDash([6,4]);
      if(drawing.isDim) {
        ctx.strokeStyle='#E5E7EB'; ctx.lineWidth=1.5; ctx.lineCap='round';
      } else {
        ctx.strokeStyle=tool==='pipe'?(FD_PIPE_COLS[pipeColor]||'#3B82F6'):'#9CA3AF';
        ctx.lineWidth=tool==='pipe'?(FD_PIPE_W[pipeSize]||3):4; ctx.lineCap='round';
      }
      ctx.beginPath(); ctx.moveTo(drawing.x1,drawing.y1); ctx.lineTo(drawing.x2,drawing.y2); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
    }

    // Snap indicator: filled green circle at snap point
    if(snapPt) {
      ctx.save();
      ctx.beginPath(); ctx.arc(snapPt.x,snapPt.y,9,0,Math.PI*2);
      ctx.fillStyle='rgba(34,197,94,0.25)'; ctx.fill();
      ctx.beginPath(); ctx.arc(snapPt.x,snapPt.y,5,0,Math.PI*2);
      ctx.fillStyle='#22C55E'; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
      ctx.restore();
    }

    // Cursor crosshair
    if(cursor&&tool!=='select'&&tool!=='erase') {
      ctx.save(); ctx.strokeStyle='rgba(193,122,53,0.7)'; ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(cursor.x-8,cursor.y); ctx.lineTo(cursor.x+8,cursor.y);
      ctx.moveTo(cursor.x,cursor.y-8); ctx.lineTo(cursor.x,cursor.y+8);
      ctx.stroke(); ctx.restore();
    }

    ctx.restore(); // end zoom/pan transform

    // Screen-space overlays (fixed size regardless of zoom)
    ctx.save(); ctx.setTransform(1,0,0,1,0,0);
    ctx.fillStyle='rgba(193,122,53,0.45)'; ctx.font="bold 10px 'Barlow Semi Condensed',sans-serif"; ctx.textAlign='left';
    ctx.fillText('1 sq = 1 ft',8,FD.H-8);
    ctx.restore();

  },[els,drawing,selected,cursor,tool,pipeSize,pipeColor,zoom,pan,snapPt]);

  function buildExportCanvas() {
    const src=canvasRef.current; if(!src) return null;
    const ec=document.createElement('canvas');
    ec.width=FD.W; ec.height=FD.H+64;
    const ctx=ec.getContext('2d');
    ctx.fillStyle='#1E3A8A'; ctx.fillRect(0,0,FD.W,64);
    if(logoRef.current) ctx.drawImage(logoRef.current,10,8,46,46);
    ctx.fillStyle='#FFFFFF'; ctx.font='bold 17px sans-serif'; ctx.textAlign='left';
    ctx.fillText('COMPRESSED AIR SYSTEM LAYOUT',66,26);
    ctx.font='11px sans-serif';
    ctx.fillText([customerName,repName,new Date().toLocaleDateString()].filter(Boolean).join('  ·  '),66,46);
    ctx.fillStyle='#C17A35'; ctx.font='bold 12px sans-serif'; ctx.textAlign='right';
    ctx.fillText('HODGE COMPRESSOR',FD.W-16,38);
    ctx.drawImage(src,0,64);
    return ec;
  }

    const savedZoom=zoom, savedPan={...pan};
    setZoom(1); setPan({x:0,y:0});
    // Use setTimeout to let state/canvas re-render before capturing
    setTimeout(()=>{
      const ec=buildExportCanvas(); if(!ec) return;
      const a=document.createElement('a');
      a.download=`facility-drawing-${(customerName||'site').replace(/\s+/g,'-')}-${new Date().toISOString().slice(0,10)}.png`;
      a.href=ec.toDataURL('image/png'); a.click();
      setZoom(savedZoom); setPan(savedPan);
    },80);
  }
