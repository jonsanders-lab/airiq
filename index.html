          'Upload site drawings → AI extracts fittings and pipe runs'
        )}
        <div style={{overflow:'hidden',maxHeight:secOpen('layout')?'9999px':'0',transition:'max-height 0.3s ease',background:C.surface,border:`1.5px solid ${C.copper}`,borderLeft:`4px solid ${C.copper}`,borderTop:'none',borderRadius:'0 0 10px 10px'}}>
          <div style={{padding:16}}>
            <div style={{color:C.mid,fontSize:12,fontFamily:F.mono,letterSpacing:1,marginBottom:12}}>
              Upload one or more facility sketches, GoodNotes exports, or site photos — AI consolidates all images into a single analysis
            </div>
        <input key={fileInputKey} ref={fileInputRef} type="file" accept="image/png,image/jpeg,image/jpg,image/webp"
          multiple style={{display:"none"}} onChange={handleFileUpload}/>
        {layoutImgs.length === 0 ? (
          <button onClick={()=>fileInputRef.current?.click()} style={{
            width:"100%",background:C.surface2,border:`1px dashed ${C.border}`,
            borderRadius:8,padding:20,color:C.mid,fontSize:13,cursor:"pointer",
            fontFamily:F.body,display:"flex",flexDirection:"column",alignItems:"center",gap:8
          }}>
            <span style={{fontSize:26}}>📁</span>
            <span>Tap to upload PNG or JPG (multiple files OK)</span>
            <span style={{fontSize:11,color:C.dim}}>GoodNotes export · facility sketch · site photo · PDF → export as PNG first</span>
          </button>
        ) : (
          <div>
            
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:8,marginBottom:10}}>
              {layoutImgs.map((img, idx) => (
                <div key={idx} style={{position:"relative",borderRadius:6,overflow:"hidden",border:`1px solid ${C.border}`,background:C.surface2}}>
                  <img src={img.dataUrl} alt={img.name} style={{width:"100%",height:90,objectFit:"cover",display:"block"}}/>
                  <button onClick={()=>removeLayoutImg(idx)} style={{
                    position:"absolute",top:3,right:3,background:"rgba(6,9,15,0.85)",
                    border:`1px solid ${C.border}`,borderRadius:3,color:C.mid,
                    padding:"1px 5px",cursor:"pointer",fontSize:10,fontFamily:F.mono,lineHeight:1.5
                  }}>✕</button>
                  <div style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:0,padding:"2px 5px",
                    whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{img.name}</div>
                </div>
              ))}
              
              <button onClick={()=>fileInputRef.current?.click()} style={{
                background:"none",border:`1px dashed ${C.border}`,borderRadius:6,
                height:90+20,color:C.dim,fontSize:11,cursor:"pointer",fontFamily:F.body,
                display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4
              }}>
                <span style={{fontSize:20}}>+</span>
                <span>Add more</span>
              </button>
            </div>
            <button onClick={analyzeLayout} disabled={layoutBusy} style={{
              width:"100%",
              background:layoutBusy?C.surface2:`linear-gradient(135deg,${C.blueLight} 0%,${C.blue} 100%)`,
              border:"none",borderRadius:7,padding:11,fontFamily:F.head,fontSize:16,letterSpacing:3,
              color:layoutBusy?C.dim:"#fff",transition:"all 0.2s",marginBottom:12,
              boxShadow:layoutBusy?"none":"0 0 20px rgba(59,111,212,0.22)",cursor:layoutBusy?"default":"pointer"
            }}>
              {layoutBusy?`ANALYZING ${layoutImgs.length} IMAGE${layoutImgs.length>1?"S":""}...`:`ANALYZE ${layoutImgs.length} IMAGE${layoutImgs.length>1?"S":""} →`}
            </button>
            {layoutAnalysis && !layoutAnalysis.error && (
              <div style={{background:C.surface2,border:`1px solid rgba(59,111,212,0.27)`,borderRadius:8,padding:12}}>
                
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontFamily:F.mono,fontSize:9,color:C.blueLight,letterSpacing:2}}>LAYOUT ANALYSIS</div>
                  <div style={{
                    fontFamily:F.mono,fontSize:9,letterSpacing:2,padding:"3px 8px",borderRadius:3,
                    background:layoutAnalysis.confidence==="high"?C.greenSoft:layoutAnalysis.confidence==="medium"?C.orangeSoft:"rgba(220,38,38,0.10)",
                    color:layoutAnalysis.confidence==="high"?C.green:layoutAnalysis.confidence==="medium"?C.orange:C.red,
                    border:`1px solid ${layoutAnalysis.confidence==="high"?C.green+"44":layoutAnalysis.confidence==="medium"?C.orange+"44":C.red+"44"}`
                  }}>
                    {(layoutAnalysis.confidence||"?").toUpperCase()} CONFIDENCE
                  </div>
                </div>

                
                {(layoutAnalysis.compressor?.model||layoutAnalysis.dryer?.model||layoutAnalysis.tank?.size||(layoutAnalysis.filters||[]).length>0||layoutAnalysis.oilWaterSeparator||(layoutAnalysis.frl?.qty||0)>0) && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontFamily:F.mono,fontSize:8,color:C.dim,letterSpacing:1,marginBottom:5}}>EQUIPMENT DETECTED</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {layoutAnalysis.compressor?.model && (
                        <div style={{background:C.surface3,borderRadius:4,padding:"4px 8px",display:"flex",alignItems:"center",gap:5}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>COMPRESSOR</span>
                          <strong style={{fontFamily:F.body,fontSize:12,color:C.text}}>{layoutAnalysis.compressor.model}</strong>
                          <span style={{fontFamily:F.mono,fontSize:7,color:layoutAnalysis.compressor.confidence==="high"?C.green:layoutAnalysis.compressor.confidence==="medium"?C.orange:C.mid}}>●</span>
                        </div>
                      )}
                      {layoutAnalysis.dryer?.model && (
                        <div style={{background:C.surface3,borderRadius:4,padding:"4px 8px",display:"flex",alignItems:"center",gap:5}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>DRYER</span>
                          <strong style={{fontFamily:F.body,fontSize:12,color:C.text}}>{layoutAnalysis.dryer.model}</strong>
                          <span style={{fontFamily:F.mono,fontSize:7,color:layoutAnalysis.dryer.confidence==="high"?C.green:layoutAnalysis.dryer.confidence==="medium"?C.orange:C.mid}}>●</span>
                        </div>
                      )}
                      {layoutAnalysis.tank?.size && (
                        <div style={{background:C.surface3,borderRadius:4,padding:"4px 8px",display:"flex",alignItems:"center",gap:5}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>TANK</span>
                          <strong style={{fontFamily:F.body,fontSize:12,color:C.text}}>{layoutAnalysis.tank.size}</strong>
                        </div>
                      )}
                      {(layoutAnalysis.filters||[]).map((f,i)=>(
                        <div key={i} style={{background:C.surface3,borderRadius:4,padding:"4px 8px"}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>{f.qty||1}× {(f.type||"").toUpperCase()}</span>
                        </div>
                      ))}
                      {layoutAnalysis.oilWaterSeparator && (
                        <div style={{background:C.surface3,borderRadius:4,padding:"4px 8px"}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>OIL/WATER SEP</span>
                        </div>
                      )}
                      {(layoutAnalysis.frl?.qty||0)>0 && (
                        <div style={{background:C.surface3,borderRadius:4,padding:"4px 8px"}}>
                          <span style={{fontFamily:F.mono,fontSize:7,color:C.dim,letterSpacing:1}}>{layoutAnalysis.frl.qty}× FRL</span>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                
                {(layoutAnalysis._populated||[]).length>0 && (
                  <div style={{background:C.greenSoft,border:`1px solid rgba(34,197,94,0.20)`,borderRadius:5,padding:"8px 10px",marginBottom:10}}>
                    <div style={{fontFamily:F.mono,fontSize:8,color:C.green,letterSpacing:1,marginBottom:4}}>✓ AUTO-POPULATED INTO FORM</div>
                    {(layoutAnalysis._populated||[]).map((item,i)=>(
                      <div key={i} style={{fontSize:12,color:C.text,lineHeight:1.7}}>• {item}</div>
                    ))}
                    <div style={{fontFamily:F.mono,fontSize:8,color:C.green,marginTop:5,opacity:0.7}}>Review sections above and adjust before generating BOM</div>
                  </div>
                )}

                
                {(layoutAnalysis.headerPipeSize || layoutAnalysis.dropPipeSize) && (
                  <div style={{background:C.surface2,border:`1px solid rgba(59,111,212,0.33)`,borderRadius:7,padding:"10px 12px",marginBottom:10}}>
                    <div style={{fontFamily:F.mono,fontSize:8,color:C.blueLight,letterSpacing:2,marginBottom:8}}>AI PIPE SIZE RECOMMENDATIONS — review and override in Job Info above</div>
                    <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      {layoutAnalysis.headerPipeSize && (
                        <div>
                          <div style={{fontFamily:F.mono,fontSize:8,color:C.dim,letterSpacing:1,marginBottom:4}}>HEADER (MAIN RUN)</div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <select value={job.pipeSize} onChange={e=>setJob(prev=>({...prev,pipeSize:e.target.value}))}
                              style={{...inS,fontSize:14,fontWeight:600,padding:"7px 10px",flex:1}}>
                              {PIPE_SIZES.map(s=><option key={s} value={s}>{s}</option>)}
                            </select>
                          </div>
                          {layoutAnalysis.headerPipeSizeReason && (
                            <div style={{fontFamily:F.mono,fontSize:8,color:C.mid,marginTop:4,lineHeight:1.4}}>{layoutAnalysis.headerPipeSizeReason}</div>
                          )}
                        </div>
                      )}
                      {layoutAnalysis.dropPipeSize && (
                        <div>
                          <div style={{fontFamily:F.mono,fontSize:8,color:C.dim,letterSpacing:1,marginBottom:4}}>DROPS (BRANCHES)</div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <select value={job.dropSize||"3/4\""} onChange={e=>setJob(prev=>({...prev,dropSize:e.target.value}))}
                              style={{...inS,fontSize:14,fontWeight:600,padding:"7px 10px",flex:1}}>
                              {PIPE_SIZES.map(s=><option key={s} value={s}>{s}</option>)}
                            </select>
                          </div>
                          {layoutAnalysis.dropPipeSizeReason && (
                            <div style={{fontFamily:F.mono,fontSize:8,color:C.mid,marginTop:4,lineHeight:1.4}}>{layoutAnalysis.dropPipeSizeReason}</div>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                )}

                
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
                  {[
                    ["PIPE RUN",    layoutAnalysis.totalRunFt!=null?layoutAnalysis.totalRunFt+" ft":"—"],
                    ["SYSTEM TYPE", layoutAnalysis.systemType||"—"],
                    ["90° ELBOWS",  layoutAnalysis.elbows90??0],
                    ["TEES",        layoutAnalysis.tees??0],
                    ["DROPS",       layoutAnalysis.drops??0],
                    ["CEILING HT",  layoutAnalysis.ceilingHeightFt?layoutAnalysis.ceilingHeightFt+" ft":"—"],
                  ].map(([label,val])=>(
                    <div key={label} style={{background:C.surface3,borderRadius:5,padding:"7px 10px"}}>
                      <div style={{fontFamily:F.mono,fontSize:8,color:C.dim,letterSpacing:1,marginBottom:2}}>{label}</div>
                      <div style={{fontSize:14,fontFamily:F.body,color:C.text,fontWeight:600}}>{val}</div>
                    </div>
                  ))}
                </div>

                
                {layoutAnalysis.notes && (
                  <div style={{fontSize:12,color:C.mid,lineHeight:1.5,fontStyle:"italic",borderTop:`1px solid ${C.border}`,paddingTop:8}}>
                    {layoutAnalysis.notes}
                  </div>
                )}
                {layoutAnalysis.warnings && (
                  <div style={{fontSize:12,color:C.orange,marginTop:6,fontFamily:F.mono}}>⚠ {layoutAnalysis.warnings}</div>
                )}
              </div>
            )}
            {layoutAnalysis?.error && (
              <div style={{color:C.red,fontSize:12,fontFamily:F.mono,padding:"8px 0"}}>⚠ {layoutAnalysis.error}</div>
            )}
          </div>
        )}
          </div>
        </div>
      </div>

      
      <div style={{marginBottom:20}}>
        <div style={{fontFamily:F.head,fontSize:22,letterSpacing:3,color:C.copper,marginBottom:8}}>BILL OF MATERIALS</div>
        <div style={{height:2,background:`linear-gradient(90deg,${C.copper},rgba(193,122,53,0))`,marginBottom:16,borderRadius:1}}/>
        <button onClick={genBOM} disabled={bomBusy} style={{
          width:"100%",
          background:bomBusy?C.surface2:`linear-gradient(135deg,${C.copper} 0%,#A0632A 100%)`,
          border:"none",borderRadius:8,padding:15,
          fontFamily:F.head,fontSize:18,letterSpacing:4,
          color:bomBusy?C.dim:"#fff",transition:"all 0.2s",marginBottom:16,
          boxShadow:bomBusy?"none":"0 0 28px rgba(193,122,53,0.25)",
        }}>
          {bomBusy?"GENERATING SYSTEM BOM...":"GENERATE SYSTEM BOM →"}
        </button>
        {bomText && (
          <div style={{background:C.surface,border:`1px solid rgba(193,122,53,0.27)`,borderRadius:10,padding:16}}>
            <Mono color={C.copper}>BILL OF MATERIALS</Mono>
            <div style={{marginTop:14}}>
              <BOMTable raw={bomText}/>
            </div>
          </div>
        )}
      </div>

      
      {bomText ? (
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:16,marginBottom:20}}>
          <Mono color={C.copper}>SAVE THIS ESTIMATE</Mono>
          <div style={{display:"flex",gap:10,alignItems:"flex-end",marginTop:12,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:160}}>
              <div style={{fontFamily:F.mono,fontSize:9,color:C.dim,letterSpacing:1,marginBottom:4}}>REP NAME</div>
              <select value={saveRep} onChange={e=>setSaveRep(e.target.value)} style={{...inS,width:"100%"}}>
                {REPS.map(r=><option key={r} value={r}>{r}</option>)}
              </select>
            </div>
            <button onClick={genPDF} style={{
              background:`linear-gradient(135deg,#1E3A8A 0%,#3B6FD4 100%)`,
              border:"none",borderRadius:7,padding:"10px 18px",
              fontFamily:F.head,fontSize:15,letterSpacing:3,
              color:"#fff",cursor:"pointer",transition:"all 0.2s",
              boxShadow:"0 0 18px rgba(30,58,138,0.2)",flexShrink:0
            }}>
              PDF ↓
            </button>
            <button onClick={saveEstimate} disabled={saveBusy} style={{
              background:saveBusy?C.surface2:`linear-gradient(135deg,${C.copper} 0%,#A0632A 100%)`,
              border:"none",borderRadius:7,padding:"10px 22px",
              fontFamily:F.head,fontSize:15,letterSpacing:3,
              color:saveBusy?C.dim:"#fff",cursor:saveBusy?"default":"pointer",transition:"all 0.2s",
              boxShadow:saveBusy?"none":"0 0 18px rgba(193,122,53,0.2)",flexShrink:0
            }}>
              {saveBusy?"SAVING...":"SAVE →"}
            </button>
            <button onClick={resetEstimate} style={{
              background:"none",border:`1.5px solid ${C.border}`,borderRadius:7,padding:"10px 18px",
              fontFamily:F.head,fontSize:15,letterSpacing:3,
              color:C.mid,cursor:"pointer",transition:"all 0.2s",flexShrink:0
            }}>
              NEW ↺
            </button>
          </div>
          {saveMsg && (
            <div style={{marginTop:8,fontFamily:F.mono,fontSize:11,letterSpacing:1,
              color:saveMsg.startsWith("⚠")?C.red:C.green}}>
              {saveMsg}
            </div>
          )}
        </div>
      ) : (
        <div style={{fontFamily:F.mono,fontSize:11,color:C.dim,letterSpacing:1,padding:"12px 0",textAlign:'center'}}>
          Generate a BOM above to unlock save &amp; export.
        </div>
      )}

      
      {bomText && ReactDOM.createPortal(
        <BOMPrintArea
          job={job} layoutImgs={layoutImgs} layoutAnalysis={layoutAnalysis}
          bomText={bomText} saveRep={saveRep}/>,
        document.getElementById("print-portal")
      )}

      
      {tierModal && (
        <div onClick={()=>setTierModal(null)}
          style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.82)',zIndex:10050,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:C.surface2,border:`1.5px solid ${C.copper}`,borderRadius:12,padding:28,maxWidth:400,width:'92%'}}>
            <div style={{fontFamily:F.mono,fontSize:11,letterSpacing:2,color:C.copper,marginBottom:8}}>CHANGE TIER ↗</div>
            <div style={{fontFamily:F.body,fontSize:14,color:C.text,marginBottom:6}}>
              Switching to <strong style={{color:C.copper}}>{tierModal.rec.model}{tierModal.rec.dual?' (×2)':''}</strong>
            </div>
            <div style={{fontFamily:F.body,fontSize:12,color:C.mid,marginBottom:20,lineHeight:1.5}}>
              You have an existing proposed drawing. What would you like to do with the piping?
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <button onClick={()=>{
                const {rec} = tierModal;
                const proposed=(()=>{try{return JSON.parse(localStorage.getItem('airiq_facility_drawing_proposed')||'[]');}catch{return[];}})();
                const EQUIP_IDS=['compressor','dryer','tank','filter','ows'];
                const equipEls=proposed.filter(e=>e.type==='symbol'&&EQUIP_IDS.includes(e.symbolId));
                const nonEquip=proposed.filter(e=>!(e.type==='symbol'&&EQUIP_IDS.includes(e.symbolId)));
                const idg=()=>(Date.now()+Math.random()).toString(36);
                const newEquip=[];
                const oldComps=equipEls.filter(e=>e.symbolId==='compressor');
                const oldDryer=equipEls.find(e=>e.symbolId==='dryer');
                const oldTank=equipEls.find(e=>e.symbolId==='tank');
                if(rec.dual){
                  const p1=oldComps[0]||{x:160,y:300,rotation:0,scale:1};
                  const p2=oldComps[1]||{x:160,y:500,rotation:0,scale:1};
                  newEquip.push({...p1,id:idg(),type:'symbol',symbolId:'compressor',label:rec.model||'Compressor',...fdDimPatch('compressor',rec.model)});
                  newEquip.push({...p2,id:idg(),type:'symbol',symbolId:'compressor',label:rec.model||'Compressor',...fdDimPatch('compressor',rec.model)});
                } else {
                  const p=oldComps[0]||{x:200,y:400,rotation:0,scale:1};
                  newEquip.push({...p,id:idg(),type:'symbol',symbolId:'compressor',label:rec.model||'Compressor',...fdDimPatch('compressor',rec.model)});
                }
                if(rec.dryer){const p=oldDryer||{x:380,y:400,rotation:0,scale:1};newEquip.push({...p,id:idg(),type:'symbol',symbolId:'dryer',label:'Air Dryer',...fdDimPatch('dryer',rec.dryer)});}
                if(rec.tankGal){const p=oldTank||{x:560,y:380,rotation:0,scale:1};newEquip.push({...p,id:idg(),type:'symbol',symbolId:'tank',label:`${rec.tankGal}G Tank`,...fdDimPatch('tank',rec.tankGal)});}
                try{localStorage.setItem('airiq_facility_drawing_proposed',JSON.stringify([...nonEquip,...newEquip]));}catch{}
                setDrawingReset(n=>n+1);
                setProposedEquipment(rec);setDrawingMode('proposed');setTab('site-design');setTierModal(null);
              }} style={{
                background:`linear-gradient(135deg,${C.copper},#A0632A)`,border:'none',borderRadius:8,
                padding:'13px 18px',fontFamily:F.head,fontSize:14,letterSpacing:2,color:'#fff',cursor:'pointer',textAlign:'left',
              }}>
                KEEP PIPING — swap equipment only
              </button>
              <button onClick={()=>{
                try{localStorage.removeItem('airiq_facility_drawing_proposed');}catch{}
                setDrawingReset(n=>n+1);
                setProposedEquipment(tierModal.rec);setDrawingMode('proposed');setTab('site-design');setTierModal(null);
              }} style={{
                background:'none',border:`1px solid ${C.border}`,borderRadius:8,
                padding:'13px 18px',fontFamily:F.head,fontSize:14,letterSpacing:2,color:C.mid,cursor:'pointer',textAlign:'left',
              }}>
                START FRESH — clear proposed drawing
              </button>
              <button onClick={()=>setTierModal(null)}
                style={{background:'transparent',border:'none',fontFamily:F.mono,fontSize:9,color:C.dim,cursor:'pointer',marginTop:4,letterSpacing:1}}>
                ✕ cancel
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const LUGGING_SIZES = ["2.5\"","3\"","4\"","6\"","8\""];

function YNToggle({ value, onChange }) {
  return (
    <div style={{ display:"flex", gap:6 }}>
      <ToggleBtn active={value===true}  onClick={()=>onChange(value===true  ? null : true)}>Yes</ToggleBtn>
      <ToggleBtn active={value===false} onClick={()=>onChange(value===false ? null : false)}>No</ToggleBtn>
    </div>
  );
}

function SurveyChk({ checked, onChange, label, highlight }) {
  return (
    <label style={{ display:"flex", alignItems:"flex-start", gap:10, cursor:"pointer" }}>
      <input type="checkbox" checked={!!checked} onChange={e=>onChange(e.target.checked)}
        style={{ width:18, height:18, marginTop:1, accentColor:C.orange, cursor:"pointer", flexShrink:0 }}/>
      <span style={{ fontSize:14, color:highlight ? C.orange : C.text, lineHeight:1.4 }}>{label}</span>
    </label>
  );
}

function SurveyCard({ title, done, open, onToggle, children }) {
  return (
    <div style={{ background:C.surface, border:`1px solid ${done ? C.copper : C.border}`,
      borderRadius:10, marginBottom:10, overflow:"hidden" }}>
      <button onClick={onToggle} style={{
        width:"100%", background: done ? C.copperSoft : "none", border:"none", padding:"14px 16px",
        display:"flex", alignItems:"center", gap:10, cursor:"pointer", textAlign:"left",
      }}>

function applyNptDedup(elsList) {
  const EQ_SYMS = new Set(['compressor','dryer','tank','filter','ows']);
  const connPts = [];
  for(const el of elsList) {
    if(el.type==='symbol' && EQ_SYMS.has(el.symbolId))
      for(const pt of getConnectors(el)) connPts.push(pt);
  }
  const seen = new Map();
  return elsList.map(el => {
    if(el.type!=='symbol' || el.symbolId!=='nptadapt' || !el.label) return el;
    let bestKey = null, bestDist = 30;
    for(const pt of connPts) {
      const d = Math.hypot(el.x-pt.x, el.y-pt.y);
      if(d < bestDist) { bestDist=d; bestKey=`${Math.round(pt.x)},${Math.round(pt.y)}`; }
    }
    if(!bestKey) return el;
    if(seen.has(bestKey)) return {...el, label:''};
    seen.set(bestKey, el.id);
    return el;
  });
}

function getConnectors(el) {
  if(el.type!=='symbol') return [];
  const pts=FD_CONNECTORS[el.symbolId]||[];
  const rot=(el.rotation||0)*Math.PI/180, sc=el.scale||1;
  return pts.map(p=>{
    const lx=p.x*sc, ly=p.y*sc;
    return {x:el.x+lx*Math.cos(rot)-ly*Math.sin(rot), y:el.y+lx*Math.sin(rot)+ly*Math.cos(rot)};
  });
}

const FD_TANK_DIMS = { '80':[16,16], '120':[18,18], '240':[24,24], '400':[30,30], '660':[36,36] };
const FD_DIM_SYMS = ['compressor','dryer','tank'];
const FD_BASE_PX = { compressor:[64,40], dryer:[56,36], tank:[44,44] };

function fdLookupDims(symbolId, modelOrLabel) {
  if(!modelOrLabel) return null;
  const L=String(modelOrLabel).toUpperCase().replace(/[\s\-]/g,'');
  if(symbolId==='tank') {
    const m=L.match(/^(\d+)G?/);
    return (m && FD_TANK_DIMS[m[1]]) || null;
  }
  const m2=L.match(/^(H[A-Z]+\d+)/);
  return FD_DIMS[m2?m2[1]:L] || null;
}
function fdScaleForDims(symbolId, dimW, dimD) {
  const base=FD_BASE_PX[symbolId];
  if(!base||!dimW||!dimD) return 1;
  const pxPerInch=FD.G/12;
  const sW=(dimW*pxPerInch)/base[0], sD=(dimD*pxPerInch)/base[1];
  return Math.max(0.3,Math.min(4,Math.sqrt(sW*sD)));
}
function fdDimPatch(symbolId, modelOrLabel) {
  const d=fdLookupDims(symbolId, modelOrLabel);
  return d ? {dimW:d[0], dimD:d[1], scale:fdScaleForDims(symbolId,d[0],d[1])} : {};
}

function fdSym(ctx, sym, x, y, scale=1, rotation=0, pm=false) {
  ctx.save();
  ctx.translate(x,y);
  if(rotation) ctx.rotate(rotation*Math.PI/180);
  if(scale!==1) ctx.scale(scale,scale);
  const _bg=pm?'#FFFFFF':'#111A2E',_fg=pm?'#1E3A8A':'#ffffff',_bd=pm?'#1E3A8A':'#C17A35';
  ctx.strokeStyle=_bd; ctx.fillStyle=_bg; ctx.lineWidth=2.5;
  const SYM_FONT = "bold 12px 'Barlow Semi Condensed',sans-serif";
  switch(sym) {
    case 'compressor':
      ctx.fillRect(-32,-20,64,40); ctx.strokeRect(-32,-20,64,40);
      ctx.fillStyle=_fg; ctx.font=SYM_FONT; ctx.textAlign='center';
      ctx.fillText('COMP',0,4); break;
    case 'dryer':
      ctx.fillRect(-28,-18,56,36); ctx.strokeRect(-28,-18,56,36);
      ctx.beginPath();
      for(let i=0;i<3;i++){const wx=-14+i*14;ctx.moveTo(wx,5);ctx.quadraticCurveTo(wx+4,-3,wx+8,5);}
      ctx.stroke();
      ctx.fillStyle=_fg; ctx.font=SYM_FONT; ctx.textAlign='center';
      ctx.fillText('DRY',0,-5); break;
    case 'tank':
      ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle=_fg; ctx.font=SYM_FONT; ctx.textAlign='center';
      ctx.fillText('TANK',0,4); break;
    case 'filter':
      ctx.beginPath(); ctx.arc(0,0,16,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle=_fg; ctx.font="bold 16px 'Barlow Semi Condensed',sans-serif"; ctx.textAlign='center';
      ctx.fillText('F',0,5); break;
    case 'ows':
      ctx.fillRect(-28,-18,56,36); ctx.strokeRect(-28,-18,56,36);
      ctx.fillStyle=_fg; ctx.font=SYM_FONT; ctx.textAlign='center';
      ctx.fillText('OWS',0,4); break;
    case 'ballvalve':
      ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-20,0); ctx.lineTo(-10,0);

      ctx.moveTo(8,0); ctx.lineTo(20,0);
      ctx.stroke(); break;
    case 'ptlelbow':
      ctx.strokeStyle=FD_DRAIN_HEX; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-10,0); ctx.arcTo(0,0,0,-10,10); ctx.lineTo(0,-10); ctx.stroke();
      ctx.beginPath(); ctx.arc(-10,0,3,0,Math.PI*2); ctx.fillStyle=FD_DRAIN_HEX; ctx.fill();
      ctx.beginPath(); ctx.arc(0,-10,3,0,Math.PI*2); ctx.fill(); break;
    case 'ptltee':
      ctx.strokeStyle=FD_DRAIN_HEX; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(10,0); ctx.moveTo(0,0); ctx.lineTo(0,-10); ctx.stroke();
      ctx.beginPath(); ctx.arc(-10,0,3,0,Math.PI*2); ctx.fillStyle=FD_DRAIN_HEX; ctx.fill();
      ctx.beginPath(); ctx.arc(10,0,3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(0,-10,3,0,Math.PI*2); ctx.fill(); break;
    case 'ptlconn':
      ctx.strokeStyle=FD_DRAIN_HEX; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(-3,0); ctx.moveTo(3,0); ctx.lineTo(10,0);
      ctx.moveTo(-3,-5); ctx.lineTo(-3,5); ctx.moveTo(3,-5); ctx.lineTo(3,5); ctx.stroke();
      ctx.beginPath(); ctx.arc(-10,0,3,0,Math.PI*2); ctx.fillStyle=FD_DRAIN_HEX; ctx.fill();
      ctx.beginPath(); ctx.arc(10,0,3,0,Math.PI*2); ctx.fill(); break;
    default:
      ctx.fillRect(-16,-12,32,24); ctx.strokeRect(-16,-12,32,24);
  }
  ctx.restore();
}

function orthoElbowRot(dx, dy, flip) {
  if(!flip) { // H-V: horizontal first, corner at (x2,y1)
    if(dx>=0 && dy>0)  return 270;
    if(dx>=0)          return 0;
    if(dy>0)           return 180;
    return 90;
  } else {    // V-H: vertical first, corner at (x1,y2)
    if(dy>0  && dx>=0) return 90;
    if(dy<=0 && dx>=0) return 180;
    if(dy>0)           return 0;
    return 270;
  }
}

function teeBranchRot(mainDeg, branchRad) {
  const m=mainDeg*Math.PI/180;
  const c=Math.cos(m)*Math.sin(branchRad)-Math.sin(m)*Math.cos(branchRad);
  return ((c>=0?mainDeg+180:mainDeg)+360)%360;
}

function straightenPipes(els) {
  const result=[];
  for(const el of els) {
    if(el.type==='pipe'&&!el.isDrain&&Math.abs(el.x1-el.x2)>1&&Math.abs(el.y1-el.y2)>1) {
      const cx=el.x2, cy=el.y1;
      const dx=el.x2-el.x1, dy=el.y2-el.y1;
      const id1=(Date.now()+Math.random()).toString(36);
      const id2=(Date.now()+Math.random()).toString(36);
      const id3=(Date.now()+Math.random()).toString(36);
      result.push({...el,id:id1,x2:cx,y2:cy});
      result.push({id:id2,type:'symbol',symbolId:'elbow90',x:cx,y:cy,rotation:orthoElbowRot(dx,dy,false),scale:0.7,label:''});
      result.push({...el,id:id3,x1:cx,y1:cy});
    } else {
      result.push(el);
    }
  }
  return result;
}

  const [proposedEls, setProposedEls] = React.useState(()=>{ try{return applyNptDedup(straightenPipes(JSON.parse(localStorage.getItem(FD_PR_LS)||'[]')));}catch{return[];} });
  const els    = isProposed ? proposedEls : asisEls;
  const setEls = isProposed ? setProposedEls : setAsisEls;
  const [tool,         setTool]         = React.useState('wall');
  const [activeSym,    setActiveSym]    = React.useState('compressor');
  const [pipeSize,     setPipeSize]     = React.useState('1"');
  const [pipeColor,    setPipeColor]    = React.useState('blue');
  const [selected,     setSelected]     = React.useState(null);
  const [drawing,      setDrawing]      = React.useState(null);
  const [cursor,       setCursor]       = React.useState(null);
  const [labelIn,      setLabelIn]      = React.useState({show:false,x:0,y:0,text:'',forId:null,isPipe:false,elevNote:''});
  const [zoom,         setZoom]         = React.useState(1);
  const [pan,          setPan]          = React.useState({x:0,y:0});
  const [isFullscreen, setIsFullscreen] = React.useState(false);
  const [showTemplates,setShowTemplates]= React.useState(false);
  const [snapPt,       setSnapPt]       = React.useState(null);
  const [ctxMenu,      setCtxMenu]      = React.useState({show:false,x:0,y:0,elId:null});

  const longPressRef   = React.useRef(null);
  const lastTapRef     = React.useRef({time:0,x:0,y:0});
  const lastDrawTool   = React.useRef('pipe');
  const prevPipeRef    = React.useRef(null); // {x,y,angle} of last completed pipe
  const lastClickRef   = React.useRef({time:0,x:0,y:0});
  const [orthoFlip,    setOrthoFlip]    = React.useState(false); // false=H-V, true=V-H
  const orthoFlipRef   = React.useRef(false);
  const [showBom,      setShowBom]      = React.useState(false);
  const [pipeSnap,     setPipeSnap]     = React.useState(null); // inline fitting snap preview
  const [hoverSym,     setHoverSym]     = React.useState(null); // id of symbol under cursor for rotate handle
  const [drainMode,    setDrainMode]    = React.useState(false);
  const [drainSize,    setDrainSize]    = React.useState('3/8"');
  const [isLight,      setIsLight]      = React.useState(()=>document.documentElement.classList.contains('theme-light'));

  const INLINE_FITTINGS = ['ballvalve','elbow90','elbow45','tee','filter','ows','ptlelbow','ptltee','ptlconn'];
  const PTL_FITTINGS    = ['ptlelbow','ptltee','ptlconn'];

  function findPipeSnap(wx, wy) {
    if(!INLINE_FITTINGS.includes(activeSym)) return null;
    const isPTL = PTL_FITTINGS.includes(activeSym);
    const threshold = 18/zoomRef.current;
    let best = null, bestDist = threshold;
    for(const el of els) {
      if(el.type !== 'pipe') continue;
      if(isPTL && !el.isDrain) continue;   // PTL fittings only snap to drain pipes
      if(!isPTL && el.isDrain) continue;   // regular fittings skip drain pipes
      const {x1,y1,x2,y2} = el;
      const dx=x2-x1, dy=y2-y1, len2=dx*dx+dy*dy;
      if(!len2) continue;
      const tRaw = ((wx-x1)*dx+(wy-y1)*dy)/len2;
      const tc   = Math.max(0, Math.min(1, tRaw));
      const cx=x1+tc*dx, cy=y1+tc*dy;
      const dist = Math.hypot(wx-cx, wy-cy);
      if(dist < bestDist) {
        bestDist = dist;
        const angle = Math.atan2(dy, dx);
        const isEndpoint = tc <= 0.05 || tc >= 0.95;
        const tClamped = isEndpoint ? (tc<=0.05?0:1) : Math.max(0.08, Math.min(0.92, tRaw));
        best = { pipe:el, t:tClamped, sx:snap(cx), sy:snap(cy), angle, isEndpoint };
      }
    }
    return best;
  }

  React.useEffect(()=>{ zoomRef.current=zoom; },[zoom]);
  React.useEffect(()=>{ panRef.current=pan; },[pan]);
  React.useEffect(()=>{ const img=new Image(); img.onload=()=>{logoRef.current=img;}; img.src=LOGO_SRC; },[]);
  React.useEffect(()=>{
    const obs=new MutationObserver(()=>setIsLight(document.documentElement.classList.contains('theme-light')));
    obs.observe(document.documentElement,{attributes:true,attributeFilter:['class']});
    return()=>obs.disconnect();
  },[]);

  React.useEffect(()=>{
    if(!isProposed||!proposedEquipment) return;
    setProposedEls(prev=>{
      const hasEquip=prev.some(e=>e.type==='symbol'&&['compressor','dryer','tank'].includes(e.symbolId));
      if(hasEquip) return prev; // equipment already placed — don't overwrite
      const id=()=>(Date.now()+Math.random()).toString(36);
      const items=[];
      if(proposedEquipment.dual){
        items.push({id:id(),type:'symbol',symbolId:'compressor',x:160,y:300,label:proposedEquipment.model||'Compressor',rotation:0,scale:1,...fdDimPatch('compressor',proposedEquipment.model)});
        items.push({id:id(),type:'symbol',symbolId:'compressor',x:160,y:500,label:proposedEquipment.model||'Compressor',rotation:0,scale:1,...fdDimPatch('compressor',proposedEquipment.model)});
        if(proposedEquipment.dryer)  items.push({id:id(),type:'symbol',symbolId:'dryer', x:400,y:400,label:'Air Dryer',rotation:0,scale:1,...fdDimPatch('dryer',proposedEquipment.dryer)});
        if(proposedEquipment.tankGal)items.push({id:id(),type:'symbol',symbolId:'tank',  x:580,y:380,label:`${proposedEquipment.tankGal}G Tank`,rotation:0,scale:1,...fdDimPatch('tank',proposedEquipment.tankGal)});
      } else {
        items.push({id:id(),type:'symbol',symbolId:'compressor',x:200,y:400,label:proposedEquipment.model||'Compressor',rotation:0,scale:1,...fdDimPatch('compressor',proposedEquipment.model)});
        if(proposedEquipment.dryer)  items.push({id:id(),type:'symbol',symbolId:'dryer', x:380,y:400,label:'Air Dryer',rotation:0,scale:1,...fdDimPatch('dryer',proposedEquipment.dryer)});
        if(proposedEquipment.tankGal)items.push({id:id(),type:'symbol',symbolId:'tank',  x:560,y:380,label:`${proposedEquipment.tankGal}G Tank`,rotation:0,scale:1,...fdDimPatch('tank',proposedEquipment.tankGal)});
      }
      try{localStorage.setItem(FD_PR_LS,JSON.stringify(items));}catch{}
      return items;
    });
  },[isProposed,proposedEquipment]);

  const snap        = v => Math.round(v/FD.G)*FD.G;
  const clampZoom   = z => Math.max(0.1,Math.min(4,z));
  const persist     = list => { try{localStorage.setItem(currentLSKey,JSON.stringify(list));}catch{} };

  function mutate(fn) {
    setEls(prev=>{ undoRef.current=[...undoRef.current.slice(-19),prev]; redoRef.current=[]; const next=applyNptDedup(fn(prev)); persist(next); return next; });
  }
  const addEl    = el  => mutate(p=>[...p,el]);
  const rmEl     = id  => { mutate(p=>p.filter(e=>e.id!==id)); setSelected(null); };
  const updEl    = (id,u) => setEls(p=>{ const n=p.map(e=>e.id===id?{...e,...u}:e); persist(n); return n; });
  const setSymDims = (el,dimW,dimD) => updEl(el.id,{dimW,dimD,scale:fdScaleForDims(el.symbolId,dimW,dimD)});
  const undo     = ()  => { const p=undoRef.current.pop(); if(p!=null){redoRef.current=[...redoRef.current.slice(-19),els];setEls(p);persist(p);} };
  const redo     = ()  => { const p=redoRef.current.pop(); if(p!=null){undoRef.current=[...undoRef.current.slice(-19),els];setEls(p);persist(p);} };
  const clearAll = ()  => { if(!window.confirm('Clear entire drawing?'))return; mutate(()=>[]); setSelected(null); };
  const fitView = () => {
    const targets=els.filter(e=>e.type==='symbol'||e.type==='pipe'||e.type==='wall'||e.type==='dim'||e.type==='label');
    if(targets.length===0){setZoom(1);setPan({x:FD.W/2-300,y:FD.H/2-200});return;}
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    for(const el of targets){
      if(el.type==='pipe'||el.type==='wall'||el.type==='dim'){
        minX=Math.min(minX,el.x1,el.x2);maxX=Math.max(maxX,el.x1,el.x2);
        minY=Math.min(minY,el.y1,el.y2);maxY=Math.max(maxY,el.y1,el.y2);
      } else if(el.type==='symbol'){
        const p=50*(el.scale||1);
        minX=Math.min(minX,el.x-p);maxX=Math.max(maxX,el.x+p);
        minY=Math.min(minY,el.y-p);maxY=Math.max(maxY,el.y+p);
      } else if(el.type==='label'){
        minX=Math.min(minX,el.x);maxX=Math.max(maxX,el.x+120);
        minY=Math.min(minY,el.y-20);maxY=Math.max(maxY,el.y);
      }
    }
    if(minX===Infinity){setZoom(1);setPan({x:0,y:0});return;}
    const PAD=80;
    const contentW=maxX-minX+PAD*2, contentH=maxY-minY+PAD*2;
    const nz=clampZoom(Math.min(FD.W/contentW,FD.H/contentH));
    const cx=(minX+maxX)/2, cy=(minY+maxY)/2;
    setZoom(nz); setPan({x:FD.W/2-cx*nz,y:FD.H/2-cy*nz});
  };
  const changeTool = t => { if(t!=='select'&&t!=='erase') lastDrawTool.current=t; setTool(t); setPipeSnap(null); setDrainMode(false); };

  function getCanvasPos(e) {
    const cv=canvasRef.current; if(!cv) return {x:0,y:0};
    const r=cv.getBoundingClientRect();
    const src=e.changedTouches?e.changedTouches[0]:(e.touches?e.touches[0]:e);
    if(!src) return {x:0,y:0};
    return {x:(src.clientX-r.left)*(FD.W/r.width), y:(src.clientY-r.top)*(FD.H/r.height)};
  }

  function screenToWorld(cp) {
    const z=zoomRef.current, p=panRef.current;
    return {x:(cp.x-p.x)/z, y:(cp.y-p.y)/z};
  }

  function getPos(e, doSnap=true) {
    const w=screenToWorld(getCanvasPos(e));
    return doSnap?{x:snap(w.x),y:snap(w.y)}:w;
  }

  function findSnapPoint(wx, wy, elsList) {
    const threshold=30/zoomRef.current;
    for(const el of elsList) {
      for(const pt of getConnectors(el)) {
        if(Math.hypot(wx-pt.x,wy-pt.y)<threshold) return {x:pt.x,y:pt.y,sourceEl:el};
      }
    }
    for(const el of elsList) {
      if(el.type!=='pipe') continue;
      for(const pt of [{x:el.x1,y:el.y1},{x:el.x2,y:el.y2}]) {
        if(Math.hypot(wx-pt.x,wy-pt.y)<threshold) return {x:pt.x,y:pt.y,sourceEl:el};
      }
    }
    for(const el of elsList) {
      if(el.type!=='pipe') continue;
      const bdx=el.x2-el.x1, bdy=el.y2-el.y1, blen2=bdx*bdx+bdy*bdy;
      if(!blen2) continue;
      const bt=((wx-el.x1)*bdx+(wy-el.y1)*bdy)/blen2;
      if(bt<0.05||bt>0.95) continue;
      const px=el.x1+bt*bdx, py=el.y1+bt*bdy;
      if(Math.hypot(wx-px,wy-py)<threshold) return {x:px,y:py,sourceEl:el,onBody:true};
    }
    for(const el of elsList) {
      if(el.type!=='symbol') continue;
      const sc=el.scale||1, rot=(el.rotation||0)*Math.PI/180;
      const hw=38*sc, hh=32*sc;
      for(const p of [{x:hw,y:0},{x:-hw,y:0},{x:0,y:-hh},{x:0,y:hh}]) {
        const ex=el.x+p.x*Math.cos(rot)-p.y*Math.sin(rot);
        const ey=el.y+p.x*Math.sin(rot)+p.y*Math.cos(rot);
        if(Math.hypot(wx-ex,wy-ey)<threshold) return {x:ex,y:ey,sourceEl:el};
      }
    }
    return null;
  }

  function orthoLock(x1, y1, ex, ey) {
    const dx=ex-x1, dy=ey-y1;
    if(dx===0||dy===0) return {x:ex,y:ey};
    if(Math.abs(dx)<=FD.G && Math.abs(dx)<Math.abs(dy)) return {x:x1,y:ey};
    if(Math.abs(dy)<=FD.G && Math.abs(dy)<=Math.abs(dx)) return {x:ex,y:y1};
    return {x:ex,y:ey};
  }

  function hitTest(x, y) {
    for(let i=els.length-1;i>=0;i--) {
      const el=els[i];
      if(el.type==='wall'||el.type==='pipe'||el.type==='dim') {
        const {x1,y1,x2,y2}=el, dx=x2-x1, dy=y2-y1, len2=dx*dx+dy*dy;
        if(!len2) continue;
        const t=Math.max(0,Math.min(1,((x-x1)*dx+(y-y1)*dy)/len2));
        if(Math.hypot(x-(x1+t*dx),y-(y1+t*dy))<10) return el;
      } else if(el.type==='label') {
        if(Math.abs(x-el.x)<60&&Math.abs(y-el.y)<12) return el;
      } else {
        const sc=el.scale||1;
        if(Math.abs(x-el.x)<42*sc&&Math.abs(y-el.y)<36*sc) return el;
      }
    }
    return null;
  }

  function hitHandle(x, y, el) {
    if(!el||el.type!=='symbol') return null;
    const sc=el.scale||1, rot=(el.rotation||0)*Math.PI/180;
    const rhx=el.x+Math.sin(rot)*50*sc, rhy=el.y-Math.cos(rot)*50*sc;
    if(Math.hypot(x-rhx,y-rhy)<16) return 'rotate';
    const corners=[[-38*sc,-32*sc],[38*sc,-32*sc],[38*sc,32*sc],[-38*sc,32*sc]];
    const labels=['tl','tr','br','bl'];
    for(let i=0;i<4;i++){
      const [lx,ly]=corners[i];
      const wx=el.x+lx*Math.cos(rot)-ly*Math.sin(rot);
      const wy=el.y+lx*Math.sin(rot)+ly*Math.cos(rot);
      if(Math.hypot(x-wx,y-wy)<9) return labels[i];
    }
    return null;
  }

  function hitEndpoint(x, y, el) {
    if(!el.x1) return null;
    if(Math.hypot(x-el.x1,y-el.y1)<14) return 'p1';
    if(Math.hypot(x-el.x2,y-el.y2)<14) return 'p2';
    return null;
  }

  function onDown(e) {
    e.preventDefault();
    if(e.touches&&e.touches.length===2) {
      clearTimeout(longPressRef.current);
      const [t0,t1]=[e.touches[0],e.touches[1]];
      pinchRef.current={
        dist:Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY),
        cx:(t0.clientX+t1.clientX)/2, cy:(t0.clientY+t1.clientY)/2,
        startZoom:zoomRef.current, startPan:{...panRef.current},
      };
      return;
    }

    clearTimeout(longPressRef.current);
    const raw=getPos(e,false);
    const snapped={x:snap(raw.x),y:snap(raw.y)};

    if(e.touches&&e.touches.length===1&&tool==='select'&&!drawing) {
      const now=Date.now(), last=lastTapRef.current;
      if(now-last.time<300&&Math.hypot(raw.x-last.x,raw.y-last.y)<40) {
        if(!hitTest(raw.x,raw.y)) {
          changeTool(lastDrawTool.current);
          lastTapRef.current={time:0,x:0,y:0};
          return;
        }
      }
      lastTapRef.current={time:now,x:raw.x,y:raw.y};
    }

    if(e.touches&&e.touches.length===1&&drawing&&(tool==='pipe'||drainMode)) {
      const now=Date.now(), last=lastTapRef.current;
      if(now-last.time<300&&Math.hypot(raw.x-last.x,raw.y-last.y)<40) {
        lastTapRef.current={time:0,x:0,y:0};
        setDrawing(null); setSnapPt(null); return;
      }
      lastTapRef.current={time:now,x:raw.x,y:raw.y};
    }

    if(hoverSym) {
      const hEl=els.find(e=>e.id===hoverSym);
      if(hEl&&hEl.type==='symbol') {
        const rot=(hEl.rotation||0)*Math.PI/180, sc=hEl.scale||1;
        const rhx=hEl.x+Math.sin(rot)*50*sc, rhy=hEl.y-Math.cos(rot)*50*sc;
        if(Math.hypot(raw.x-rhx,raw.y-rhy)<16/zoomRef.current) {
          const src=e.touches?e.touches[0]:e;
          setSelected(hEl.id);
          dragRef.current={mode:'rotate',id:hEl.id,orig:{...hEl},
            startAngle:Math.atan2(raw.y-hEl.y,raw.x-hEl.x),startX:raw.x,startY:raw.y,
            startCX:src?.clientX||0,startCY:src?.clientY||0};
          return;
        }
      }
    }

    if(tool==='erase') { const h=hitTest(raw.x,raw.y); if(h)rmEl(h.id); return; }
    if(tool==='label') { setLabelIn({show:true,x:snapped.x,y:snapped.y,text:'',forId:null,isPipe:false}); return; }

    if(tool==='select') {
      const h=hitTest(raw.x,raw.y);
      if(h) {
        setSelected(h.id);
        const handle=hitHandle(raw.x,raw.y,h);
        if(handle==='rotate') {
          const src=e.touches?e.touches[0]:e;
          dragRef.current={mode:'rotate',id:h.id,orig:{...h},
            startAngle:Math.atan2(raw.y-h.y,raw.x-h.x),startX:raw.x,startY:raw.y,
            startCX:src?.clientX||0, startCY:src?.clientY||0};
        } else if(['tl','tr','br','bl'].includes(handle)) {
          dragRef.current={mode:'resize',id:h.id,orig:{...h},corner:handle};
        } else {
          const ep=hitEndpoint(raw.x,raw.y,h);
          if(ep) {
            dragRef.current={mode:'endpoint',id:h.id,orig:{...h},ep};
          } else {
            dragRef.current={mode:'move',id:h.id,sx:snapped.x,sy:snapped.y,orig:{...h}};
            if(h.type==='symbol') {
              const origConns=getConnectors(h);
              const connPipes=[];
              for(const pipe of els.filter(e=>e.type==='pipe')) {
                for(let ci=0;ci<origConns.length;ci++) {
                  const c=origConns[ci];
                  if(Math.hypot(pipe.x1-c.x,pipe.y1-c.y)<8)
                    connPipes.push({pipeId:pipe.id,ep:'p1',connIdx:ci});
                  else if(Math.hypot(pipe.x2-c.x,pipe.y2-c.y)<8)
                    connPipes.push({pipeId:pipe.id,ep:'p2',connIdx:ci});
                }
              }
              dragRef.current.connPipes=connPipes;
            }
          }
        }
        if(e.touches&&h.type==='symbol') {
          const tx=e.touches[0].clientX, ty=e.touches[0].clientY;
          longPressRef.current=setTimeout(()=>{
            setCtxMenu({show:true,x:tx,y:ty,elId:h.id});
            dragRef.current=null;
          },500);
        }
      } else {
        setSelected(null);
        dragRef.current={mode:'pan',startCp:getCanvasPos(e),startPan:{...panRef.current}};
      }
      return;
    }

    if(tool==='wall'||tool==='pipe'||tool==='dim') {
      const sp=findSnapPoint(raw.x,raw.y,els);
      const fx=sp?sp.x:snapped.x, fy=sp?sp.y:snapped.y;
      if(!drawing) {
        setDrawing({x1:fx,y1:fy,x2:fx,y2:fy,startSnap:sp,isDim:tool==='dim'});
      } else {
        const sp2=findSnapPoint(raw.x,raw.y,els);
        let ex=sp2?sp2.x:snapped.x, ey=sp2?sp2.y:snapped.y;
        {const _now=Date.now(),_lc=lastClickRef.current;
         if(!sp2&&_now-_lc.time<300&&Math.hypot(ex-_lc.x,ey-_lc.y)<20){setDrawing(null);setSnapPt(null);return;}}
        if(tool==='dim') {
          addEl({id:(Date.now()+Math.random()).toString(36),type:'dim',x1:drawing.x1,y1:drawing.y1,x2:ex,y2:ey});
          setDrawing(null); setSnapPt(null);
        } else if(tool==='wall') {
          addEl({id:(Date.now()+Math.random()).toString(36),type:'wall',
                 x1:drawing.x1,y1:drawing.y1,x2:ex,y2:ey,pipeSize:null,pipeColor:null});
          setDrawing(null); setSnapPt(null);
        } else {
          if(drainMode) {
            mutate(p=>[...p,{id:(Date.now()+Math.random()).toString(36),type:'pipe',
              x1:drawing.x1,y1:drawing.y1,x2:ex,y2:ey,isDrain:true,drainSize}]);
            lastClickRef.current={time:Date.now(),x:ex,y:ey};
            if(sp2){setDrawing(null);}else{setDrawing({x1:ex,y1:ey,x2:ex,y2:ey,startSnap:null,isDim:false});}
            setSnapPt(null); return;
          }
          const flip=orthoFlipRef.current;
          const dx=ex-drawing.x1, dy=ey-drawing.y1;
          const EQ=['compressor','dryer','tank','filter','ows'];
          const extraEls=[];
          const idg=()=>(Date.now()+Math.random()).toString(36);
          if(Math.abs(dx)<1||Math.abs(dy)<1) {
            const pipeLen=Math.hypot(dx,dy);
            const sticks=Math.max(1,Math.ceil(pipeLen/FD.G/19));
            const angle=Math.atan2(dy,dx);
            const rotDeg=((angle*180/Math.PI)%360+360)%360;
            if(drawing.startSnap?.sourceEl&&EQ.includes(drawing.startSnap.sourceEl.symbolId))
              extraEls.push({id:idg(),type:'symbol',symbolId:'nptadapt',x:drawing.x1,y:drawing.y1,
                rotation:((rotDeg+180)%360),scale:0.7,label:`${pipeSize} NPT`});
            if(sp2?.sourceEl&&EQ.includes(sp2.sourceEl.symbolId))
              extraEls.push({id:idg(),type:'symbol',symbolId:'nptadapt',x:ex,y:ey,
                rotation:rotDeg,scale:0.7,label:`${pipeSize} NPT`});

  function onMove(e) {
    if(e.touches&&e.touches.length===2&&pinchRef.current) {
      const [t0,t1]=[e.touches[0],e.touches[1]];
      const dist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
      const cx=(t0.clientX+t1.clientX)/2, cy=(t0.clientY+t1.clientY)/2;
      const {dist:d0,startZoom,startPan}=pinchRef.current;
      const cv=canvasRef.current; if(!cv) return;
      const r=cv.getBoundingClientRect();
      const pcx=(cx-r.left)*(FD.W/r.width), pcy=(cy-r.top)*(FD.H/r.height);
      const newZoom=clampZoom(startZoom*(dist/d0));
      const wx=(pcx-startPan.x)/startZoom, wy=(pcy-startPan.y)/startZoom;
      setZoom(newZoom);
      setPan({x:pcx-wx*newZoom, y:pcy-wy*newZoom});
      return;
    }
    clearTimeout(longPressRef.current);

    const cp=getCanvasPos(e);
    const raw=screenToWorld(cp);
    const snapped={x:snap(raw.x),y:snap(raw.y)};
    setCursor(snapped);

    if(dragRef.current?.mode==='pan') {
      const dr=dragRef.current;
      setPan({x:dr.startPan.x+(cp.x-dr.startCp.x), y:dr.startPan.y+(cp.y-dr.startCp.y)});
      return;
    }

    if((tool==='pipe'||tool==='dim')&&drawing) {
      const sp=findSnapPoint(raw.x,raw.y,els);
      setSnapPt(sp);
      let nx2=sp?sp.x:snapped.x, ny2=sp?sp.y:snapped.y;
      if(tool==='pipe'&&!drainMode) {
        const flip=!!e.shiftKey;
        if(flip!==orthoFlipRef.current){orthoFlipRef.current=flip;setOrthoFlip(flip);}
      }
      setDrawing(d=>({...d, x2:nx2, y2:ny2}));
      return;
    }
    if(drawing) { setDrawing(d=>({...d,x2:snapped.x,y2:snapped.y})); return; }

    if(tool==='pipe'||tool==='dim') {
      setSnapPt(findSnapPoint(raw.x,raw.y,els));
    }

    if(tool==='symbol' && INLINE_FITTINGS.includes(activeSym)) {
      setPipeSnap(findPipeSnap(raw.x,raw.y));
    } else if(tool!=='symbol') {
      if(pipeSnap) setPipeSnap(null);
    }

    {
      let hid=null;
      for(let i=els.length-1;i>=0;i--) {
        const el=els[i];
        if(el.type!=='symbol') continue;
        const sc=el.scale||1;
        if(Math.abs(raw.x-el.x)<44*sc&&Math.abs(raw.y-el.y)<38*sc){hid=el.id;break;}
      }
      if(hid!==hoverSym) setHoverSym(hid);
    }

    if(tool==='select'&&dragRef.current) {
      const dr=dragRef.current;
      if(dr.mode==='move') {
        const dx=snapped.x-dr.sx, dy=snapped.y-dr.sy;
        if(dr.orig.type==='wall'||dr.orig.type==='pipe'||dr.orig.type==='dim') {
          updEl(dr.id,{x1:snap(dr.orig.x1+dx),y1:snap(dr.orig.y1+dy),x2:snap(dr.orig.x2+dx),y2:snap(dr.orig.y2+dy)});
        } else {
          const nx=snap(dr.orig.x+dx), ny=snap(dr.orig.y+dy);
          if((dr.connPipes||[]).length>0) {
            const newConns=getConnectors({...dr.orig,x:nx,y:ny});
            setEls(p=>{
              const n=p.map(e=>{
                if(e.id===dr.id) return {...e,x:nx,y:ny};
                const cp=(dr.connPipes||[]).find(c=>c.pipeId===e.id);
                if(cp){const nc=newConns[cp.connIdx];if(nc)return cp.ep==='p1'?{...e,x1:nc.x,y1:nc.y}:{...e,x2:nc.x,y2:nc.y};}
                return e;
              });
              persist(n); return n;
            });
          } else {
            updEl(dr.id,{x:nx,y:ny});
          }
        }
      } else if(dr.mode==='rotate') {
        const angle=Math.atan2(raw.y-dr.orig.y,raw.x-dr.orig.x);
        const delta=(angle-dr.startAngle)*180/Math.PI;
        const raw360=((dr.orig.rotation||0)+delta+360)%360;
        const snap45=Math.round(raw360/45)*45;
        updEl(dr.id,{rotation:snap45%360});
      } else if(dr.mode==='resize') {
        const dist=Math.hypot(raw.x-dr.orig.x,raw.y-dr.orig.y);
        updEl(dr.id,{scale:Math.max(0.5,Math.min(3,dist/50))});
      } else if(dr.mode==='endpoint') {
        if(dr.ep==='p1') updEl(dr.id,{x1:snapped.x,y1:snapped.y});
        else              updEl(dr.id,{x2:snapped.x,y2:snapped.y});
      }
    }
  }

  function onUp(e) {
    clearTimeout(longPressRef.current);
    const dr=dragRef.current;
    if(dr?.mode==='rotate'&&e) {
      const src=e.changedTouches?e.changedTouches[0]:(e.touches&&e.touches.length?e.touches[0]:e);
      if(src&&Math.hypot((src.clientX||0)-dr.startCX,(src.clientY||0)-dr.startCY)<20) {
        const cur=Math.round((dr.orig.rotation||0)/90)*90;
        updEl(dr.id,{rotation:(cur+90)%360});
      }
    }
    if(dr?.mode==='move'&&dr.orig.type==='symbol'&&(dr.connPipes||[]).length>0) {
      mutate(prev=>{
        let next=prev, changed=false;
        for(const cp of dr.connPipes) {
          const pipe=next.find(e=>e.id===cp.pipeId);
          if(!pipe||pipe.x1===pipe.x2||pipe.y1===pipe.y2) continue;
          const corner={x:pipe.x2,y:pipe.y1};
          const p1={...pipe,id:(Date.now()+Math.random()).toString(36),x2:corner.x,y2:corner.y};
          const p2={...pipe,id:(Date.now()+Math.random()).toString(36),x1:corner.x,y1:corner.y};
          if(!changed){next=[...next];changed=true;}
          const idx=next.findIndex(e=>e.id===pipe.id);
          if(idx>=0) next.splice(idx,1,p1,p2);
        }
        return changed?next:prev;
      });
    }
    dragRef.current=null; pinchRef.current=null;
  }

  function onDblClick(e) {
    const raw=getPos(e,false);
    const h=hitTest(raw.x,raw.y);
    if(h&&h.type==='pipe') {
      const mx=(h.x1+h.x2)/2, my=(h.y1+h.y2)/2;
      setLabelIn({show:true,x:mx,y:my,text:h.customLabel||'',forId:h.id,isPipe:true,elevNote:h.elevNote||''});
    }
  }

  function onContextMenu(e) {
    e.preventDefault();
    const raw=getPos(e,false);
    const h=hitTest(raw.x,raw.y);
    if(h&&h.type==='symbol') {
      const src=e.changedTouches?e.changedTouches[0]:e;
      setCtxMenu({show:true,x:src.clientX,y:src.clientY,elId:h.id});
    }

  function commitLabel() {
    const {forId,text,x,y,isPipe,elevNote}=labelIn;
    if(forId) {
      if(isPipe) updEl(forId,{customLabel:text||null,elevNote:elevNote||null});
      else {
        const el=els.find(e=>e.id===forId);
        const patch={label:text};
        if(el && !el.dimW && FD_DIM_SYMS.includes(el.symbolId)) Object.assign(patch,fdDimPatch(el.symbolId,text));
        updEl(forId,patch);
      }
    } else if(text.trim()) {
      addEl({id:(Date.now()+Math.random()).toString(36),type:'label',x,y,text});
    }
    setLabelIn({show:false,x:0,y:0,text:'',forId:null,isPipe:false,elevNote:''});
  }

  function computeBom() {
    const FITTING_SFX = {elbow90:'003',elbow45:'004',tee:'005',union:'002',endcap:'006',flexhose:'055'};
    const pMap = {};
    for(const el of els.filter(e=>e.type==='pipe'&&!e.isDrain)) {
      const ft=Math.hypot(el.x2-el.x1,el.y2-el.y1)/FD.G;
      const k=`${el.pipeSize}|${el.pipeColor}`;
      if(!pMap[k]) pMap[k]={size:el.pipeSize,color:el.pipeColor,footage:0};
      pMap[k].footage+=ft;
    }
    const pipeRows=Object.values(pMap).map(p=>{
      const mat=FD_PIPE_MATS[p.color]||FD_PIPE_MATS.blue;
      const footage=Math.round(p.footage*10)/10;
      const sticks=Math.ceil(footage/19);
      const isAirpipe=mat.group==='airpipe';
      const desc=isAirpipe?`${p.size} AIRpipe ${mat.short}`:`${p.size} ${mat.short} Pipe`;
      const pn=isAirpipe?apipePN(p.size,mat.short):'—';
      return {desc,pn,qty:sticks,notes:`${footage}ft total · ${sticks} stick${sticks!==1?'s':''}`};
    });
    const symMap={};
    for(const el of els.filter(e=>e.type==='symbol')) {
      const sym=FD_SYMBOLS.find(s=>s.id===el.symbolId);
      if(!sym||sym.sec==='EQUIPMENT'||sym.sec==='FACILITY'||sym.sec==='DRAIN FITTINGS') continue;
      if(!symMap[el.symbolId]) symMap[el.symbolId]={label:sym.label,count:0,sampleLabel:el.label};
      symMap[el.symbolId].count++;
    }
    const symRows=Object.entries(symMap).map(([id,{label,count,sampleLabel}])=>{
      const pfx=sampleLabel?PIPE_PFX[sampleLabel.replace(/ NPT/,'').replace(/ Coupling/,'')]||null:null;
      const sfx=FITTING_SFX[id];
      const pn=(pfx&&sfx)?pfx+sfx:'—';
      return {desc:label+(sampleLabel?` (${sampleLabel})`:''),pn,qty:count,notes:''};
    });
    const eqRows=[];
    const eqMap={};
    for(const el of els.filter(e=>e.type==='symbol')) {
      const sym=FD_SYMBOLS.find(s=>s.id===el.symbolId);
      if(!sym||sym.sec!=='EQUIPMENT') continue;
      if(!eqMap[el.symbolId]) eqMap[el.symbolId]={label:sym.label,count:0};
      eqMap[el.symbolId].count++;
    }
    for(const [,{label,count}] of Object.entries(eqMap))
      eqRows.push({desc:label+(els.find(e=>e.type==='symbol'&&FD_SYMBOLS.find(s=>s.id===e.symbolId)?.sec==='EQUIPMENT'&&e.label)?` (${els.find(e=>e.type==='symbol'&&FD_SYMBOLS.find(s=>s.id===e.symbolId)?.sec==='EQUIPMENT'&&e.label)?.label})`:''),pn:'—',qty:count,notes:'Qty to verify'});
    const drainMap={};
    for(const el of els.filter(e=>e.type==='pipe'&&e.isDrain)) {
      const ft=Math.hypot(el.x2-el.x1,el.y2-el.y1)/FD.G;
      const k=el.drainSize||'3/8"';
      if(!drainMap[k]) drainMap[k]={size:k,footage:0};
      drainMap[k].footage+=ft;
    }
    const drainPipeRows=Object.values(drainMap).map(p=>{
      const footage=Math.round(p.footage*10)/10;
      return {desc:`${p.size} Condensate Drain Tubing`,pn:'—',qty:`${footage} ft`,notes:'Push-to-lock fittings'};
    });
    const PTL_LABELS={ptlelbow:'PTL Elbow (90°)',ptltee:'PTL Tee',ptlconn:'PTL Straight Connector'};
    const drainFitMap={};
    for(const el of els.filter(e=>e.type==='symbol'&&PTL_LABELS[e.symbolId])) {
      if(!drainFitMap[el.symbolId]) drainFitMap[el.symbolId]={label:PTL_LABELS[el.symbolId],count:0};
      drainFitMap[el.symbolId].count++;
    }

    ctx.fillStyle=isLight?'rgba(100,116,139,0.75)':'rgba(193,122,53,0.45)'; ctx.font="bold 9px 'Barlow Semi Condensed',sans-serif"; ctx.textAlign='left';
    ctx.fillText(`1 sq = 1 ft  ·  ${Math.round(zoom*100)}%`,8,FD.H-8);
    const sbFt=GRID_FT.find(f=>f*FD.G*zoom>=70)||1000;
    const sbPx=Math.round(sbFt*FD.G*zoom);
    const sbX=FD.W-sbPx-14, sbY2=FD.H-14;
    ctx.strokeStyle=isLight?'rgba(100,116,139,0.80)':'rgba(193,122,53,0.85)'; ctx.lineWidth=1.5; ctx.lineCap='butt';
    ctx.beginPath();
    ctx.moveTo(sbX,sbY2-4);    ctx.lineTo(sbX,sbY2);
    ctx.moveTo(sbX,sbY2);      ctx.lineTo(sbX+sbPx,sbY2);
    ctx.moveTo(sbX+sbPx,sbY2-4);ctx.lineTo(sbX+sbPx,sbY2);
    ctx.stroke();
    ctx.fillStyle=isLight?'rgba(100,116,139,0.85)':'rgba(193,122,53,0.90)'; ctx.textAlign='center';
    ctx.fillText(`${sbFt} ft`,sbX+sbPx/2,sbY2-6);
    ctx.restore();

  },[els,drawing,selected,hoverSym,cursor,tool,pipeSize,pipeColor,zoom,pan,snapPt,pipeSnap,activeSym,drainMode,drainSize,orthoFlip,isLight]);

  function buildPDFCanvas() {
    const tgts=els.filter(e=>['symbol','pipe','wall','dim'].includes(e.type));
    if(!tgts.length){alert('Nothing to export.');return null;}
    let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
    for(const el of tgts){
      if(el.type==='pipe'||el.type==='wall'||el.type==='dim'){mnX=Math.min(mnX,el.x1,el.x2);mxX=Math.max(mxX,el.x1,el.x2);mnY=Math.min(mnY,el.y1,el.y2);mxY=Math.max(mxY,el.y1,el.y2);}
      else{const p=70*(el.scale||1);mnX=Math.min(mnX,el.x-p);mxX=Math.max(mxX,el.x+p);mnY=Math.min(mnY,el.y-p);mxY=Math.max(mxY,el.y+p);}
    }
    const PAD=FD.G*4,FTR=56; mnX-=PAD;mnY-=PAD;mxX+=PAD;mxY+=PAD;
    const cW=Math.max(600,Math.ceil(mxX-mnX)), cH=Math.max(400,Math.ceil(mxY-mnY))+FTR;
    const ec=document.createElement('canvas'); ec.width=cW; ec.height=cH;
    const ctx=ec.getContext('2d');
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,cW,cH);
    ctx.strokeStyle='#EEEEEE'; ctx.lineWidth=0.5;
    for(let gx=Math.floor(mnX/FD.G)*FD.G;gx<=mxX;gx+=FD.G){const sx=gx-mnX;ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(sx,cH-FTR);ctx.stroke();}
    for(let gy=Math.floor(mnY/FD.G)*FD.G;gy<=mxY;gy+=FD.G){const sy=gy-mnY;ctx.beginPath();ctx.moveTo(0,sy);ctx.lineTo(cW,sy);ctx.stroke();}
    const wx=x=>x-mnX, wy=y=>y-mnY;
    for(const el of tgts){
      ctx.save();
      if(el.type==='wall'){
        ctx.strokeStyle='#888';ctx.lineWidth=3;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(wx(el.x1),wy(el.y1));ctx.lineTo(wx(el.x2),wy(el.y2));ctx.stroke();
      }else if(el.type==='pipe'){
        if(el.isDrain){
          ctx.strokeStyle=FD_DRAIN_HEX;ctx.lineWidth=FD_DRAIN_W[el.drainSize]||2;ctx.lineCap='round';ctx.setLineDash([6,5]);
          ctx.beginPath();ctx.moveTo(wx(el.x1),wy(el.y1));ctx.lineTo(wx(el.x2),wy(el.y2));ctx.stroke();ctx.setLineDash([]);
        }else{
          const mat=FD_PIPE_MATS[el.pipeColor]||FD_PIPE_MATS.blue;
          const col=el.pipeColor==='pvc'?'#888':el.pipeColor==='blackiron'?'#333':mat.hex;
          ctx.strokeStyle=col;ctx.lineWidth=(FD_PIPE_W[el.pipeSize]||3);ctx.lineCap='round';
          ctx.beginPath();ctx.moveTo(wx(el.x1),wy(el.y1));ctx.lineTo(wx(el.x2),wy(el.y2));ctx.stroke();
          const mx=(wx(el.x1)+wx(el.x2))/2,my=(wy(el.y1)+wy(el.y2))/2;
          const ft=Math.round(Math.hypot(el.x2-el.x1,el.y2-el.y1)/FD.G*2)/2;
          if(ft>0){ctx.font="bold 10px 'Barlow Semi Condensed',sans-serif";ctx.textAlign='center';ctx.fillStyle='#1a1a1a';ctx.fillText(`${el.pipeSize} · ${ft}ft`,mx,my-6);}
        }
      }else if(el.type==='dim'){
        ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.setLineDash([4,3]);
        ctx.beginPath();ctx.moveTo(wx(el.x1),wy(el.y1));ctx.lineTo(wx(el.x2),wy(el.y2));ctx.stroke();ctx.setLineDash([]);
        const mx=(wx(el.x1)+wx(el.x2))/2,my=(wy(el.y1)+wy(el.y2))/2;
        const ft=Math.round(Math.hypot(el.x2-el.x1,el.y2-el.y1)/FD.G*2)/2;
        ctx.font="10px sans-serif";ctx.textAlign='center';ctx.fillStyle='#555';ctx.fillText(`${ft} ft`,mx,my-5);
      }else if(el.type==='symbol'){
        fdSym(ctx,el.symbolId,wx(el.x),wy(el.y),el.scale||1,el.rotation||0,true);
        if(el.label){ctx.font="bold 11px 'Barlow Semi Condensed',sans-serif";ctx.textAlign='center';ctx.fillStyle='#1a1a1a';ctx.fillText(el.label,wx(el.x),wy(el.y)+48*(el.scale||1));}
      }
      ctx.restore();
    }
    let _pdfBranch='', _pdfLocation='';
    try {
      const _draft=JSON.parse(localStorage.getItem('airiq_site_survey_draft')||'{}');
      _pdfLocation=(_draft.equipLocation||'').trim();
      _pdfBranch=(_draft.branch||'').trim();
    } catch(e) {}
    if(!_pdfBranch) _pdfBranch=(localStorage.getItem('airiq_rep_branch')||localStorage.getItem('sandbot_branch')||'').trim();
    const _metaParts=[];
    if(customerName) _metaParts.push(`Customer: ${customerName}`);
    if(_pdfLocation) _metaParts.push(`Location: ${_pdfLocation}`);
    if(_pdfBranch)   _metaParts.push(`Branch: ${_pdfBranch}`);
    if(repName)      _metaParts.push(`Rep: ${repName}`);
    _metaParts.push(new Date().toLocaleDateString());
    const fy=cH-FTR;
    ctx.fillStyle='#1E3A8A';ctx.fillRect(0,fy,cW,FTR);
    if(logoRef.current)ctx.drawImage(logoRef.current,10,fy+8,36,36);
    ctx.fillStyle='#fff';ctx.font='bold 13px sans-serif';ctx.textAlign='left';
    ctx.fillText('HODGE INDUSTRIAL TECHNOLOGIES — AirIQ Site Drawing',54,fy+22);
    ctx.font='10px sans-serif';
    ctx.fillText(_metaParts.join('  ·  '),54,fy+40);
    ctx.font='9px sans-serif';ctx.textAlign='right';ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.fillText('1 sq = 1 ft  ·  Scale drawing',cW-10,fy+40);
    return ec;
  }

    const imgData=ec.toDataURL('image/jpeg',0.92);

      {showTemplates&&(

            style={{background:isLight?C.surface:'#141414',border:`1.5px solid ${C.copper}`,borderRadius:10,padding:24,maxWidth:480,width:'92%'}}>
            <div style={{fontFamily:F.mono,fontSize:11,letterSpacing:2,color:C.copper,marginBottom:16}}>START FROM TEMPLATE</div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {TEMPLATE_OPTS.map(t=>(
                <button key={t.key} onClick={()=>applyTemplate(t.key)}
                  style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:7,padding:'12px 16px',
                         textAlign:'left',cursor:'pointer',transition:'border-color 0.15s'}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=C.copper}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
                  <div style={{fontFamily:F.mono,fontSize:10,color:C.text,marginBottom:3}}>{t.name}</div>
                  <div style={{fontFamily:F.mono,fontSize:8,color:C.mid}}>{t.desc}</div>

              ))}
              <button onClick={()=>{ if(els.length>0&&!window.confirm('Clear current drawing?'))return; mutate(()=>[]); setShowTemplates(false); }}
                style={{background:'transparent',border:`1px solid ${C.border}`,borderRadius:7,padding:'10px 16px',
                       fontFamily:F.mono,fontSize:9,color:C.dim,cursor:'pointer',textAlign:'left'}}>

              style={{marginTop:14,background:'transparent',border:'none',fontFamily:F.mono,fontSize:9,color:C.mid,cursor:'pointer'}}>

});

function SiteSurvey({ proposedEquipment, setProposedEquipment, drawingMode, setDrawingMode, drawingReset, setDrawingReset }) {
  const LS_KEY = "airiq_site_survey_draft";
  const today = new Date().toISOString().slice(0,10);
  const BLANK_FORM = {
    date:today, rep:"", branch:"", customer:"", contact:"", driveTime:"",
    delivery:"", electrical:"", piping:"",
    eqRotaryScrew:false, eqRecip:false, eqDryer:false, eqReceiver:false,
    eqFilter:false, eqOWSep:false, eqAutoDrains:false, eqSafetyValve:false,
    eqOther:false, eqOtherText:"",
    existingEquip:"",
    equipLocation:"", hasDock:null, hasForklift:null, forkRamp:null,
    unloadingIssues:null, unloadingNotes:"", forkCanSet:null,
    clearPath:null, doorsHalls:null, doorsHallsNotes:"",
    grassGravel:null, needLevelers:null, placingChallenges:null, placingChallengesNotes:"",
    fusDisconnect:null, circuitBreaker:null, wireSize:"", electricalNotes:"",
    pipingDescription:"", pipeMaterial:"", pipeSize:"1\"", linearFeet:"",
    pipeAbove8ft:null, pipeHeightNotes:"",
    elbows90:"", tees:"", couplings:"", ballValves:"", nptConnectors:"",
    bushings:"", unions:"", pipeClips:"", unistrut:"", quickBranch:"",
    bypasses:"", numDrops:"", dropLength:"", terminationBlocks:"", quickConnects:"",
    equipObstructions:null, equipObstructionsNotes:"",
    beams:null, beamsNotes:"", pipingNotes:"",
    rentalDiesel:false, rentalScissor:false, rentalForklift:false,
    rentalLugging:false, rentalOther:"",
    drawDrops:false, drawElectrical:false, drawBypasses:false, drawEquipment:false,
    drawBeams:false, drawDock:false, drawCustomerEquip:false, drawPiping:false, drawDiagrams:false,
    managerApproval:null, approvalNotes:"",
  };

  function initForm() {
    try {
      const saved = localStorage.getItem(LS_KEY);
      if (saved) {
        const draft = JSON.parse(saved);
        if (draft.customer || draft.rep) return draft;
      }
    } catch(e) {}
    return {...BLANK_FORM};
  }

  const [form, setFormRaw] = React.useState(initForm);
  const [open, setOpen]           = React.useState([0]);
  const [busy, setBusy]           = React.useState(false);
  const [saveMsg, setSaveMsg]     = React.useState("");
  const [showPast, setShowPast]   = React.useState(false);
  const [pastList, setPastList]   = React.useState([]);
  const [pastLoading, setPastLoading] = React.useState(false);
  const [savedData, setSavedData]       = React.useState(null);
  const [drawingOpen, setDrawingOpen]   = React.useState(false);
  const [feedbackOpen, setFeedbackOpen] = React.useState(false);
  const drawingRef                      = React.useRef(null);
  const SESSIONS_KEY = 'airiq_sessions';
  const [sessions, setSessions]         = React.useState(()=>{ try{return JSON.parse(localStorage.getItem(SESSIONS_KEY)||'[]');}catch{return[];} });
  const [showSessions, setShowSessions] = React.useState(false);
  const [sessionSearch, setSessionSearch] = React.useState('');
  const [sessionBranch, setSessionBranch] = React.useState('All');
  const [repEmail, setRepEmail]   = React.useState(() => {
    try { return localStorage.getItem("airiq_rep_email")||""; } catch { return ""; }
  });
  const [repEmailInput, setRepEmailInput] = React.useState("");

  function setForm(update) {
    setFormRaw(prev => {
      const next = typeof update === "function" ? update(prev) : {...prev, ...update};
      if (next.customer || next.rep) {
        try { localStorage.setItem(LS_KEY, JSON.stringify(next)); } catch(e) {}
      }
      return next;
    });
  }

  function f(field, val) { setForm({[field]:val}); }

  function persistSessions(list) {
    setSessions(list);
    try { localStorage.setItem(SESSIONS_KEY, JSON.stringify(list)); } catch(e) {}
  }

  function saveSession() {
    const defaultName = [form.customer, new Date().toLocaleDateString('en-US',{month:'numeric',day:'numeric'})].filter(Boolean).join(' — ');
    const name = window.prompt('Session name:', defaultName);
    if (!name) return;
    let asIsDrawing = [], proposedDrawing = [];
    try { asIsDrawing = JSON.parse(localStorage.getItem('airiq_facility_drawing_draft')||'[]'); } catch(e) {}
    try { proposedDrawing = JSON.parse(localStorage.getItem('airiq_facility_drawing_proposed')||'[]'); } catch(e) {}
    const session = {
      id: Date.now().toString(36),
      name: name.trim(),
      date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
      rep: form.rep || '',
      branch: form.branch || '',
      tier: proposedEquipment || null,
      asIsDrawing,
      proposedDrawing,
    };
    try{ localStorage.setItem('airiq_rep_name', form.rep||''); }catch(e){}
    persistSessions([session, ...sessions]);
  }

  function loadSession(s) {
    try { localStorage.setItem('airiq_facility_drawing_draft', JSON.stringify(s.asIsDrawing||[])); } catch(e) {}
    try { localStorage.setItem('airiq_facility_drawing_proposed', JSON.stringify(s.proposedDrawing||[])); } catch(e) {}
    if (setProposedEquipment) setProposedEquipment(s.tier||null);
    const mode = (s.proposedDrawing||[]).length > 0 ? 'proposed' : 'asis';
    if (setDrawingMode) setDrawingMode(mode);
    if (setDrawingReset) setDrawingReset(n=>n+1);
    setDrawingOpen(true);
    setShowSessions(false);
  }

  function deleteSession(id) {
    if (!window.confirm('Delete this session? This cannot be undone.')) return;
    persistSessions(sessions.filter(s=>s.id!==id));
  }

  function newSession() {
    const hasContent = (() => {
      try {
        const a = JSON.parse(localStorage.getItem('airiq_facility_drawing_draft')||'[]');
        const p = JSON.parse(localStorage.getItem('airiq_facility_drawing_proposed')||'[]');
        return a.length > 0 || p.length > 0;
      } catch { return false; }
    })();
    if (hasContent) {
      const choice = window.confirm('Save current session before starting fresh?\n\nOK = Save first\nCancel = Discard and start fresh');
      if (choice) { saveSession(); }
    }
    try { localStorage.removeItem('airiq_facility_drawing_draft'); } catch(e) {}
    try { localStorage.removeItem('airiq_facility_drawing_proposed'); } catch(e) {}
    if (setProposedEquipment) setProposedEquipment(null);
    if (setDrawingMode) setDrawingMode('asis');
    if (setDrawingReset) setDrawingReset(n=>n+1);
  }

  React.useEffect(() => {
    if (LUGGING_SIZES.includes(form.pipeSize) && !form.rentalLugging) {
      setForm({rentalLugging:true});
    }
  }, [form.pipeSize]);

  React.useEffect(() => {
    if (drawingMode === 'proposed') setDrawingOpen(true);
  }, [drawingMode]);

  const sectionDone = [
    !!(form.date && form.rep && form.branch && form.customer),
    !!(form.delivery && form.electrical && form.piping),
    !!(form.eqRotaryScrew||form.eqRecip||form.eqDryer||form.eqReceiver||form.eqFilter||form.eqOWSep||form.eqAutoDrains||form.eqSafetyValve||form.eqOther),
    !!(form.existingEquip.trim()),
    !!(form.equipLocation.trim()),
    !!(form.wireSize.trim()),
    !!(form.pipingDescription.trim() && form.pipeMaterial && form.linearFeet),
    true,
    !!(form.drawDrops && form.drawElectrical && form.drawBypasses && form.drawEquipment &&
       form.drawBeams && form.drawDock && form.drawCustomerEquip && form.drawPiping && form.drawDiagrams),
    form.managerApproval !== null,
  ];
  const completedCount = sectionDone.filter(Boolean).length;

  function toggleSection(i) {
    setOpen(prev => prev.includes(i) ? prev.filter(x=>x!==i) : [...prev,i]);
  }

  const sel = (field, options, placeholder) => (
    <select value={form[field]} onChange={e=>f(field,e.target.value)} style={inS}>
      <option value="">{placeholder||"— Select —"}</option>
      {options.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  );

  function buildEmailBody(data) {
    const lines = ["SITE SURVEY — INSTALLATION QUOTING FORM",""];
    const yn = v => v===true?"Yes":v===false?"No":null;
    function add(lbl,v){ if(v!==null&&v!==undefined&&v!==""&&v!==false) lines.push(`${lbl}: ${v}`); }
    function h(t){ lines.push(""); lines.push(t); lines.push("-".repeat(t.length)); }

    h("JOB INFO");
    add("Date",data.date); add("Sales Rep",data.rep); add("Branch",data.branch);
    add("Customer",data.customer); add("Contact",data.contact); add("Drive Time",data.driveTime);

    h("DELIVERY & RESPONSIBILITY");
    add("Delivery",data.delivery); add("Electrical",data.electrical); add("Piping",data.piping);

    const equip=[data.eqRotaryScrew&&"Rotary Screw Compressor",data.eqRecip&&"Reciprocating Compressor",
      data.eqDryer&&"Air Dryer",data.eqReceiver&&"Receiver Tank",data.eqFilter&&"Filter",
      data.eqOWSep&&"O/W Separator",data.eqAutoDrains&&"Auto Drains",
      data.eqSafetyValve&&"Safety Valve & Gauge for Tank",
      data.eqOther&&(data.eqOtherText||"Other")].filter(Boolean);
    if(equip.length){h("NEW EQUIPMENT");equip.forEach(e=>lines.push("• "+e));}

    h("EXISTING EQUIPMENT"); add("Description",data.existingEquip);

    h("SITE CONDITIONS");
    add("Equipment Location",data.equipLocation);
    add("Loading Dock",yn(data.hasDock)); add("Customer Forklift",yn(data.hasForklift));
    add("Forklift Drive Out/Ramp",yn(data.forkRamp));
    if(data.unloadingIssues!==null) add("Unloading Issues",yn(data.unloadingIssues)+(data.unloadingNotes?": "+data.unloadingNotes:""));
    add("Forklift Can Set Equipment",yn(data.forkCanSet)); add("Clear Path",yn(data.clearPath));
    if(data.doorsHalls!==null) add("Doors or Halls",yn(data.doorsHalls)+(data.doorsHallsNotes?": "+data.doorsHallsNotes:""));
    add("Grass/Gravel/Unlevel",yn(data.grassGravel)); add("Levelers or Pads",yn(data.needLevelers));
    if(data.placingChallenges!==null) add("Placing Challenges",yn(data.placingChallenges)+(data.placingChallengesNotes?": "+data.placingChallengesNotes:""));

    h("ELECTRICAL");
    add("Fusible Disconnect <10ft",yn(data.fusDisconnect));
    add("Room for Circuit Breaker",yn(data.circuitBreaker));
    add("Wire Size",data.wireSize); add("Notes",data.electricalNotes);

    h("PIPING");
    add("Description",data.pipingDescription); add("Material",data.pipeMaterial);
    add("Pipe Size",data.pipeSize); add("Linear Feet",data.linearFeet?data.linearFeet+" ft":null);
    if(data.pipeAbove8ft!==null) add("Pipe Above 8ft",yn(data.pipeAbove8ft)+(data.pipeHeightNotes?": "+data.pipeHeightNotes:""));
    [["90 Elbows",data.elbows90],["Tees",data.tees],["Couplings",data.couplings],
     ["Ball Valves",data.ballValves],["NPT Connectors",data.nptConnectors],["Bushings/Reducers",data.bushings],
     ["Unions",data.unions],["Pipe Clips",data.pipeClips],["Unistrut",data.unistrut],
     ["Quick Branch",data.quickBranch],["Bypasses",data.bypasses],["# of Drops",data.numDrops],
     ["Drop Length & Size",data.dropLength],["Termination Blocks",data.terminationBlocks],
     ["Quick Connects",data.quickConnects],
    ].forEach(([l,v])=>add(l,v));
    if(data.equipObstructions!==null) add("Equipment Obstructions",yn(data.equipObstructions)+(data.equipObstructionsNotes?": "+data.equipObstructionsNotes:""));
    if(data.beams!==null) add("Beams/Workarounds",yn(data.beams)+(data.beamsNotes?": "+data.beamsNotes:""));
    add("Piping Notes",data.pipingNotes);

    const rental=[data.rentalDiesel&&"Diesel Compressor",data.rentalScissor&&"Scissor Lift",
      data.rentalForklift&&"Forklift",data.rentalLugging&&"Lugging Tool",data.rentalOther||null].filter(Boolean);
    if(rental.length){h("RENTAL EQUIPMENT");rental.forEach(r=>lines.push("• "+r));}

    const drawing=[data.drawDrops&&"Locations of all drops",
      data.drawElectrical&&"Locations of disconnects and all electrical",
      data.drawBypasses&&"Locations of bypasses",data.drawEquipment&&"All new and existing equipment",
      data.drawBeams&&"Beams and other workarounds",data.drawDock&&"Dock, ramp, delivery areas",
      data.drawCustomerEquip&&"Customer equipment or shelving",data.drawPiping&&"Locations of all piping",
      data.drawDiagrams&&"All diagrams, sketches, drawings"].filter(Boolean);
    if(drawing.length){h("DRAWING CHECKLIST");drawing.forEach(d=>lines.push("✓ "+d));}

    h("APPROVAL");
    add("Manager Approval",yn(data.managerApproval)); add("Notes",data.approvalNotes);

    return lines.join("\n");
  }

  async function loadPastSurveys() {
    setPastLoading(true);
    try {
      const r = await fetch("/api/estimates");
      const d = await r.json();
      setPastList(Array.isArray(d) ? d.filter(e => e.type === "site-survey") : []);
    } catch { setPastList([]); }
    setPastLoading(false);
  }

  React.useEffect(() => { if (showPast) loadPastSurveys(); }, [showPast]);

  async function deleteSurvey(id) {
    if (!window.confirm("Delete this survey? This cannot be undone.")) return;
    try {
      await fetch(`/api/estimates/${id}`, { method:"DELETE" });
      setPastList(prev => prev.filter(e => e.id !== id));
    } catch(e) {
      alert("Delete failed — check connection");
    }
  }

  async function handleSave() {
    setBusy(true); setSaveMsg("");
    try {
      const snapshot = {...form};
      const drawingDataURL = drawingRef.current?.getDataURL();
      if (drawingDataURL) snapshot.drawingDataURL = drawingDataURL;
      const res = await fetch("/api/estimates", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({type:"site-survey", data:snapshot, savedAt:new Date().toISOString()})
      });
      if (!res.ok) throw new Error();
      try { localStorage.removeItem(LS_KEY); } catch(e) {}
      setFormRaw({...BLANK_FORM});
      setOpen([0]);
      setSavedData(snapshot);
      setTimeout(() => setSavedData(null), 10000);
    } catch(e) {
      setSaveMsg("Save failed — check connection");
    } finally { setBusy(false); }
  }
